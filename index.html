tài khoản thanh toán.\""},{"id":197,"stt":40,"chapter":"IV. PHÁP LÝ – THỂ CHẾ – TUÂN THỦ","topic":"IV.8. Ngân hàng số, thanh toán","topicCode":"IV.8","question":"Trong quy trình mở tài khoản thanh toán tại ngân hàng, \"giấy tờ tùy thân” đối với cá nhân là công dân Việt Nam bao gồm loại nào dưới đây?","options":{"A":"A. Thẻ căn cước công dân, thẻ căn cước, căn cước điện tử","B":"B. Thẻ căn cước công dân, thẻ căn cước, hộ chiếu Việt Nam","C":"C. Thẻ căn cước, căn cước điện tử, giấy phép lái xe","D":"D. Thẻ căn cước công dân, căn cước điện tử, tài khoản định danh điện tử"},"correct":"A","explanation":"Thông tư 30/2025/TT-NHNN\n📖 Điều khoản: Điều 1 Thông tư 30/2025 sửa khoản 10 Điều 3 Thông tư 15 theo hướng: “Đối với cá nhân là công dân Việt Nam: thẻ căn cước công dân, thẻ căn cước hoặc căn cước điện tử.”"},{"id":198,"stt":41,"chapter":"IV. PHÁP LÝ – THỂ CHẾ – TUÂN THỦ","topic":"IV.8. Ngân hàng số, thanh toán","topicCode":"IV.8","question":"Theo quy định hiện hành, Phương tiện thanh toán không dùng tiền mặt bao gồm những loại nào sau đây?","options":{"A":"A. Séc, lệnh chi, ủy nhiệm chi, nhờ thu, ủy nhiệm thu, thẻ ngân hàng, ví điện tử và các phương tiện khác theo quy định của NHNN","B":"B. Séc, lệnh chi, ủy nhiệm chi, nhờ thu, ủy nhiệm thu, thẻ ngân hàng, tiền mã hóa, ví điện tử và các phương tiện khác theo quy định của NHNN","C":"C. Séc, lệnh chi, ủy nhiệm chi, nhờ thu, ủy nhiệm thu, ví điện tử và các phương tiện khác theo quy định của NHNN","D":"D. Séc, ủy nhiệm chi, nhờ thu, ủy nhiệm thu, thẻ ngân hàng, ví điện tử và các phương tiện khác theo quy định của NHNN"},"correct":"A","explanation":"Nghị định 52/2024/NĐ-CP\n📖 Điều khoản: Khoản 10 Điều 3 Nghị định 52/2024/NĐ-CP: \"10. Phương tiện thanh toán không dùng tiền mặt (sau đây gọi là phương tiện thanh toán) là phương tiện do tổ chức cung ứng dịch vụ thanh toán, công ty tài chính được phép phát hành thẻ tín dụng, tổ chức cung ứng dịch vụ trung gian thanh toán cung ứng dịch vụ ví điện tử phát hành và được khách hàng sử dụng nhằm thực hiện giao dịch thanh toán, bao gồm: séc, lệnh chi, ủy nhiệm chi, nhờ thu, ủy nhiệm thu, thẻ ngân hàng (bao gồm: thẻ ghi nợ, thẻ tín dụng, thẻ trả trước), ví điện tử và các phương tiện thanh toán khác theo quy định của Ngân hàng Nhà nước.\""},{"id":199,"stt":42,"chapter":"IV. PHÁP LÝ – THỂ CHẾ – TUÂN THỦ","topic":"IV.8. Ngân hàng số, thanh toán","topicCode":"IV.8","question":"Tổ chức, cá nhân sử dụng dịch vụ thanh toán có trách nhiệm nào sau đây?","options":{"A":"A. Tự bảo vệ các bí mật thông tin tài khoản, giao dịch; thông báo kịp thời cho tổ chức cung ứng dịch vụ thanh toán khi phát hiện sai sót, nhầm lẫn hoặc nghi ngờ thông tin giao dịch bị lợi dụng","B":"B. Tự bảo vệ thông tin tài khoản; thông báo cho tổ chức cung ứng dịch vụ thanh toán khi giao dịch không thành công","C":"C. Tự bảo vệ các bí mật thông tin tài khoản, giao dịch; chỉ thông báo khi phát sinh thiệt hại thực tế","D":"D. Tự bảo vệ thông tin tài khoản; thông báo cho tổ chức cung ứng dịch vụ thanh toán trong thời hạn 24 giờ kể từ khi phát hiện sự cố"},"correct":"A","explanation":"Thông tư 15/2024/TT-NHNN (đã được sửa đổi, bổ sung)\n📖 Điều khoản: Khoản 4 Điều 17 Thông tư 15/2024/TT-NHNN: \"Điều 17. Trách nhiệm của tổ chức, cá nhân sử dụng dịch vụ thanh toán: 4. Tự bảo vệ các bí mật thông tin tài khoản, giao dịch của cá nhân, tổ chức để đảm bảo an toàn, bảo mật trong giao dịch thanh toán; thông báo kịp thời cho tổ chức cung ứng dịch vụ thanh toán khi phát hiện thấy có sai sót, nhầm lẫn trong giao dịch thanh toán hoặc nghi ngờ thông tin giao dịch bị lợi dụng.\""},{"id":200,"stt":43,"chapter":"IV. PHÁP LÝ – THỂ CHẾ – TUÂN THỦ","topic":"IV.9. An ninh an toàn thông tin","topicCode":"IV.9","question":"Theo Thông tư 09/2020/TT-NHNN, tổ chức quản lý hệ thống thông tin từ cấp độ mấy trở lên phải thành lập hoặc chỉ định bộ phận chuyên trách về ATTT?","options":{"A":"Cấp độ 1","B":"Cấp độ 2","C":"Cấp độ 3","D":"Cấp độ 4"},"correct":"C","explanation":"Thông tư 09/2020/TT-NHNN\n📖 Điều khoản: Điểm a Khoản 3 Điều 13, TT 09/2020/TT-NHNN"},{"id":201,"stt":44,"chapter":"IV. PHÁP LÝ – THỂ CHẾ – TUÂN THỦ","topic":"IV.9. An ninh an toàn thông tin","topicCode":"IV.9","question":"Theo Thông tư 50/2024/TT-NHNN, hình thức xác nhận bằng mã PIN (trừ trường hợp gắn với thẻ vật lý) phải có độ dài tối thiểu bao nhiêu ký tự?","options":{"A":"04 ký tự","B":"06 ký tự","C":"08 ký tự","D":"10 ký tự"},"correct":"B","explanation":"Thông tư 50/2024/TT-NHNN (được sửa đổi, bổ sung bởi Thông tư 77/2025/TT-NHNN)\n📖 Điều khoản: Điểm a Khoản 2 Điều 11, TT 50/2024/TT-NHNN"},{"id":202,"stt":45,"chapter":"IV. PHÁP LÝ – THỂ CHẾ – TUÂN THỦ","topic":"IV.9. An ninh an toàn thông tin","topicCode":"IV.9","question":"Theo thông tư 77/2025/TT-NHNN, trường hợp khách hàng là hộ kinh doanh, thông tin sinh trắc học sử dụng để đối chiếu, so sánh khi thực hiện xác nhận giao dịch là của đối tượng nào?","options":{"A":"Bất kỳ nhân viên nào trong tổ chức","B":"Kế toán trưởng","C":"Người đại diện hợp pháp hoặc cá nhân được người đại diện hợp pháp ủy quyền.","D":"Người trực tiếp soạn thảo giao dịch"},"correct":"C","explanation":"Thông tư 77/2025/TT-NHNN\n📖 Điều khoản: Phụ lục 2"},{"id":203,"stt":46,"chapter":"IV. PHÁP LÝ – THỂ CHẾ – TUÂN THỦ","topic":"IV.9. An ninh an toàn thông tin","topicCode":"IV.9","question":"Theo Thông tư 77/2025/TT-NHNN, ứng dụng Mobile Banking phải tự động thoát hoặc dừng hoạt động khi phát hiện dấu hiệu nào sau đây?","options":{"A":"Thiết bị chưa được cài đặt mật khẩu","B":"Thiết bị đã bị phá khóa (root/jailbreak)","C":"Thiết bị không có kết nối Internet","D":"Thiết bị không có sim"},"correct":"B","explanation":"Thông tư 77/2025/TT-NHNN\n📖 Điều khoản: Khoản 2 Điều 5 Thông tư 77/2025/TT-NHNN"},{"id":204,"stt":47,"chapter":"IV. PHÁP LÝ – THỂ CHẾ – TUÂN THỦ","topic":"IV.10. Khoa học công nghệ","topicCode":"IV.10","question":"Hoạt động nào dưới đây được xác định là hoạt động khoa học, công nghệ và đổi mới sáng tạo theo quy định của Luật Khoa học, công nghệ và đổi mới sáng tạo năm 2025?","options":{"A":"Nghiên cứu cơ bản","B":"Sản xuất thử nghiệm","C":"Ứng dụng, chuyển giao công nghệ","D":"Cả 03 đáp án đều đúng"},"correct":"D","explanation":"Luật Khoa học, công nghệ và đổi mới sáng tạo 2025\n📖 Điều khoản: Khoản 4 Điều 3"},{"id":205,"stt":48,"chapter":"IV. PHÁP LÝ – THỂ CHẾ – TUÂN THỦ","topic":"IV.10. Khoa học công nghệ","topicCode":"IV.10","question":"Theo Luật Khoa học, công nghệ và đổi mới sáng tạo 2025, tác giả kết quả nhiệm vụ khoa học, công nghệ và đổi mới sáng tạo được thưởng tối thiểu bao nhiêu % lợi nhuận thu được từ việc cho thuê, bán, chuyển nhượng, chuyển giao quyền sử dụng, tự khai thác, sử dụng kết quả","options":{"A":"Tối thiểu 10% lợi nhuận thu được.","B":"Tối thiểu 20% lợi nhuận thu được.","C":"Tối thiểu 30% lợi nhuận thu được","D":"Tối thiểu 50% lợi nhuận thu được."},"correct":"C","explanation":"Luật Khoa học, công nghệ và đổi mới sáng tạo 2025\n📖 Điều khoản: điểm a Khoản 3 Điều 28"},{"id":206,"stt":49,"chapter":"IV. PHÁP LÝ – THỂ CHẾ – TUÂN THỦ","topic":"IV.10. Khoa học công nghệ","topicCode":"IV.10","question":"Theo Luật Khoa học, công nghệ và đổi mới sáng tạo 2025, công nghệ nào được khuyến khích ứng dụng để nâng cao hiệu quả của hoạt động khoa học, công nghệ và đổi mới sáng tạo?","options":{"A":"Dữ liệu lớn và trí tuệ nhân tạo","B":"Internet vạn vật","C":"Thực tế ảo và hỗn hợp","D":"Điện toán đám mây"},"correct":"A","explanation":"Luật Khoa học, công nghệ và đổi mới sáng tạo 2025\n📖 Điều khoản: Khoản 2 Điều 20"},{"id":207,"stt":50,"chapter":"IV. PHÁP LÝ – THỂ CHẾ – TUÂN THỦ","topic":"IV.10. Khoa học công nghệ","topicCode":"IV.10","question":"Theo quy định pháp luật, việc xử lý rủi ro về tài chính trong quá trình thực hiện nhiệm vụ khoa học, công nghệ và đổi mới sáng tạo thông qua hình thức nào?","options":{"A":"Miễn, giảm, giãn thời gian hoàn trả;","B":"Khoanh nợ, xóa nợ (trong trường hợp phá sản)","C":"Không thu hồi tạm ứng còn lại","D":"Cả 3 đáp đều đúng"},"correct":"D","explanation":"Nghị định 265/2025/NĐ-CP\n📖 Điều khoản: Khoản 2 Điều 25"},{"id":208,"stt":51,"chapter":"IV. PHÁP LÝ – THỂ CHẾ – TUÂN THỦ","topic":"IV.10. Khoa học công nghệ","topicCode":"IV.10","question":"Theo Luật Khoa học, công nghệ và đổi mới sáng tạo 2025, cá nhân hoạt động khoa học, công nghệ và đổi mới sáng tạo được hưởng những ưu đãi nào?","options":{"A":"Hỗ trợ đào tạo, bồi dưỡng, nghiên cứu khoa học, phát triển công nghệ","B":"Ưu tiên trong bổ nhiệm, tuyển dụng, bố trí vị trí việc làm, thu nhập, thuế thu nhập cá nhân, lao động","C":"Ưu tiên trong nhà ở, xuất cảnh, nhập cảnh, cư trú và cấp giấy phép lao động","D":"Cả 03 đáp án đều đúng"},"correct":"D","explanation":"Luật Khoa học, công nghệ và đổi mới sáng tạo 2025\n📖 Điều khoản: Khoản 1 Điều 55"},{"id":209,"stt":52,"chapter":"IV. PHÁP LÝ – THỂ CHẾ – TUÂN THỦ","topic":"IV.10. Khoa học công nghệ","topicCode":"IV.10","question":"Theo Luật Khoa học, công nghệ và đổi mới sáng tạo 2025, cá nhân có nghĩa vụ gì trong hoạt động khoa học, công nghệ và đổi mới sáng tạo?","options":{"A":"Đóng góp trí tuệ, tài năng vào sự nghiệp phát triển khoa học, công nghệ và đổi mới sáng tạo","B":"Tuân thủ liêm chính khoa học, đạo đức nghề nghiệp trong hoạt động khoa học, công nghệ và đổi mới sáng tạo.","C":"Truyền thông, phổ biến tri thức, kết quả, thành tựu khoa học, công nghệ và đổi mới sáng tạo cho cộng đồng","D":"Cả 03 đáp án đều đúng"},"correct":"D","explanation":"Luật Khoa học, công nghệ và đổi mới sáng tạo 2025\n📖 Điều khoản: Khoản 2 Điều 52"},{"id":210,"stt":53,"chapter":"IV. PHÁP LÝ – THỂ CHẾ – TUÂN THỦ","topic":"IV.10. Khoa học công nghệ","topicCode":"IV.10","question":"Theo Luật Khoa học, công nghệ và đổi mới sáng tạo 2025, Ngày Khoa học, Công nghệ và Đổi mới sáng tạo Việt Nam là ngày nào?","options":{"A":"Ngày 19 tháng 5 hằng năm","B":"Ngày 01 tháng 5 hằng năm.","C":"Ngày 18 tháng 5 hằng năm.","D":"Ngày 02 tháng 9 hằng năm."},"correct":"C","explanation":"Luật Khoa học, công nghệ và đổi mới sáng tạo 2025\n📖 Điều khoản: Điều 7"},{"id":211,"stt":54,"chapter":"IV. PHÁP LÝ – THỂ CHẾ – TUÂN THỦ","topic":"IV.10. Khoa học công nghệ","topicCode":"IV.10","question":"Theo Luật Khoa học, công nghệ và đổi mới sáng tạo 2025, chủ thể nào có thẩm quyền phê duyệt Chiến lược phát triển khoa học, công nghệ và đổi mới sáng tạo?","options":{"A":"Thủ tướng Chính phủ","B":"Bộ Khoa học và Công nghệ","C":"Chính phủ","D":"Quốc hội"},"correct":"A","explanation":"Luật Khoa học, công nghệ và đổi mới sáng tạo 2025\n📖 Điều khoản: Khoản 1 Điều 15"},{"id":212,"stt":55,"chapter":"IV. PHÁP LÝ – THỂ CHẾ – TUÂN THỦ","topic":"IV.10. Khoa học công nghệ","topicCode":"IV.10","question":"Theo Luật Khoa học, công nghệ và đổi mới sáng tạo 2025, Quỹ đổi mới công nghệ quốc gia có chức năng nào dưới đây?","options":{"A":"hỗ trợ lãi suất vay để ứng dụng công nghệ, chuyển giao công nghệ, đổi mới công nghệ, đổi mới sáng tạo","B":"Tài trợ, đặt hàng thực hiện chương trình, nhiệm vụ khoa học, công nghệ và đổi mới sáng tạo","C":"Hỗ trợ hoạt động phát triển hệ thống đổi mới sáng tạo, hệ sinh thái khởi nghiệp sáng tạo","D":"Cả 03 đáp án trên"},"correct":"D","explanation":"Luật Khoa học, công nghệ và đổi mới sáng tạo 2025\n📖 Điều khoản: Khoản 2 Điều 64"},{"id":213,"stt":56,"chapter":"IV. PHÁP LÝ – THỂ CHẾ – TUÂN THỦ","topic":"IV.11. Dữ liệu","topicCode":"IV.11","question":"Theo Nghị định 356/2025/NĐ-CP, trong quá trình xử lý dữ liệu cá nhân nhạy cảm, cơ quan, tổ chức có nghĩa vụ nào sau đây?","options":{"A":"Mã hóa toàn bộ dữ liệu lưu trữ và không cho phép bất kỳ nhân viên nào truy cập dưới mọi hình thức","B":"Thiết lập quy định phân quyền giới hạn truy cập, quy trình xử lý và các biện pháp bảo mật.","C":"Lưu trữ toàn bộ dữ liệu cá nhân nhạy cảm trên máy chủ dùng chung do cơ quan quản lý nhà nước cung cấp.","D":"Lập báo cáo kiểm toán bảo mật gửi cho Bộ Công an định kỳ mỗi tháng một lần."},"correct":"B","explanation":"Nghị định 356/2025/NĐ-CP\n📖 Điều khoản: Khoản 2 Điều 4"},{"id":214,"stt":57,"chapter":"IV. PHÁP LÝ – THỂ CHẾ – TUÂN THỦ","topic":"IV.11. Dữ liệu","topicCode":"IV.11","question":"Theo Luật Dữ liệu 2024, nhận định nào sau đây đúng về chuyển, xử lý dữ liệu xuyên biên giới?","options":{"A":"Cơ quan, tổ chức, cá nhân bị cấm chuyển dữ liệu từ nước ngoài về Việt Nam","B":"Chỉ cơ quan nhà nước mới được xử lý dữ liệu của nước ngoài tại Việt Nam","C":"Cơ quan, tổ chức, cá nhân được tự do chuyển dữ liệu từ nước ngoài về Việt Nam, xử lý dữ liệu của nước ngoài tại Việt Nam; được Nhà nước bảo vệ các quyền và lợi ích hợp pháp theo quy định của pháp luật.","D":"Việc chuyển dữ liệu xuyên biên giới được thực hiện tự do, không chịu sự điều chỉnh bởi các quy định về an ninh và quốc phòng"},"correct":"C","explanation":"Luật Dữ liệu 2024\n📖 Điều khoản: Khoản 1 và khoản 3 Điều 23"},{"id":215,"stt":58,"chapter":"IV. PHÁP LÝ – THỂ CHẾ – TUÂN THỦ","topic":"IV.11. Dữ liệu","topicCode":"IV.11","question":"Theo Luật Dữ liệu 2024, “dữ liệu số” được hiểu là gì?","options":{"A":"Dữ liệu về sự vật, hiện tượng, sự kiện chỉ được thể hiện bằng chữ viết dưới dạng điện tử","B":"Dữ liệu về sự vật, hiện tượng, sự kiện, bao gồm một hoặc kết hợp các dạng âm thanh, hình ảnh, chữ số, chữ viết, ký hiệu được thể hiện dưới dạng kỹ thuật số","C":"Thông tin được lưu trữ trong cơ sở dữ liệu của cơ quan nhà nước","D":"Dữ liệu về sự vật, hiện tượng, sự kiện, bao gồm chữ số, chữ viết, ký hiệu được thể hiện dưới dạng điện tử"},"correct":"B","explanation":"Luật Dữ liệu 2024\n📖 Điều khoản: Khoản 1 Điều 3"},{"id":216,"stt":59,"chapter":"IV. PHÁP LÝ – THỂ CHẾ – TUÂN THỦ","topic":"IV.11. Dữ liệu","topicCode":"IV.11","question":"Theo Nghị định 356/2025/NĐ-CP, tần suất tổ chức, cá nhân hoạt động trong lĩnh vực tài chính, ngân hàng, hoạt động thông tin tín dụng có trách nhiệm thực hiện đánh giá tuân thủ các quy định về bảo vệ dữ liệu cá nhân định kỳ?","options":{"A":"6 tháng/lần","B":"01 năm/lần","C":"02 năm/lần","D":"03 năm/lần"},"correct":"B","explanation":"Nghị định 356/2025/NĐ-CP\n📖 Điều khoản: Khoản 1 Điều 8"},{"id":217,"stt":60,"chapter":"IV. PHÁP LÝ – THỂ CHẾ – TUÂN THỦ","topic":"IV.11. Dữ liệu","topicCode":"IV.11","question":"Căn cứ theo Nghị định 53/2022/NĐ-CP Quy định chi tiết một số điều của Luật An ninh mạng, thời gian lưu trữ dữ liệu tại Việt Nam bắt đầu từ khi doanh nghiệp nhận được yêu cầu lưu trữ dữ liệu đến khi kết thúc yêu cầu tối thiểu là bao lâu?","options":{"A":"Tối thiểu 12 tháng","B":"Tối thiểu 24 tháng","C":"Tối thiểu 36 tháng","D":"Tối thiểu 60 tháng"},"correct":"B","explanation":"Nghị định 53/2022/NĐ-CP\n📖 Điều khoản: Khoản 1 Điều 27"},{"id":218,"stt":1,"chapter":"V. AN TOÀN – AN NINH – BẢO MẬT","topic":"V.1. An toàn thông tin ngân hàng số","topicCode":"V.1","question":"Theo chỉ thị 02/CT-NHNN ngày 09/01/2026, An toàn thông tin đối với các hệ thống số, nền tảng số và ứng dụng mới của tổ chức phải được thực hiện như thế nào?","options":{"A":"Chỉ bổ sung sau khi hệ thống đi vào vận hành","B":"Là yếu tố bắt buộc tích hợp ngay từ khi thiết kế","C":"Chỉ áp dụng với khi hệ thống có xảy ra sự cố bảo mật","D":"Chỉ cần thực hiện khi có yêu cầu thanh tra"},"correct":"B","explanation":"Theo chỉ thị 02/CT-NHNN ngày 09/01/2026\n📖 Điều khoản: III.6"},{"id":219,"stt":2,"chapter":"V. AN TOÀN – AN NINH – BẢO MẬT","topic":"V.1. An toàn thông tin ngân hàng số","topicCode":"V.1","question":"Theo chỉ thị 02/CT-NHNN ngày 09/01/2026, tổ chức phải thực hiện việc kiểm tra, đánh giá an toàn thông tin và quản lý rủi ro với tần suất như thế nào?","options":{"A":"Chỉ kiểm tra khi có sự cố xảy ra","B":"Một lần khi mới triển khai hệ thống","C":"Thường xuyên và định kỳ theo quy định","D":"Không cần thực hiện kiểm tra, đánh giá"},"correct":"C","explanation":"Theo chỉ thị 02/CT-NHNN ngày 09/01/2026\n📖 Điều khoản: III.6.ii"},{"id":220,"stt":3,"chapter":"V. AN TOÀN – AN NINH – BẢO MẬT","topic":"V.1. An toàn thông tin ngân hàng số","topicCode":"V.1","question":"Theo chỉ thị 02/CT-NHNN ngày 09/01/2026, các giải pháp phòng, chống lộ lọt thông tin, dữ liệu phải được triển khai theo phương thức nào?","options":{"A":"Chỉ triển khai giải pháp dễ thực hiện","B":"Triển khai tổng thể và đồng bộ","C":"Chỉ cần triển khai phần bảo mật dữ liệu của ngành ngân hàng","D":"Chỉ cần triển khai bảo mật dữ liệu cho hệ thống có kết nối Internet"},"correct":"B","explanation":"Theo chỉ thị 02/CT-NHNN ngày 09/01/2026\n📖 Điều khoản: III.6.i"},{"id":221,"stt":4,"chapter":"V. AN TOÀN – AN NINH – BẢO MẬT","topic":"V.1. An toàn thông tin ngân hàng số","topicCode":"V.1","question":"Các quy tắc cơ bản để bảo đảm an toàn bảo mật thiết bị cá nhân (máy tính, điện thoại)","options":{"A":"Khóa màn hình thiết bị khi không sử dụng, đặt mật khẩu mạnh(tối thiểu 8 ký tự bao gồm chữ hoa, thường và số); Thực hiện định kỳ cập nhật phần bảo mật của thiết bị và các phần mềm trên thiết bị.","B":"Bỏ chức năng tự động khóa màn hình thiết bị để thuận tiện khi sử dụng","C":"Đặt mật khẩu đơn giản cho thiết bị để thuận tiện khi mở thiết bị.","D":"Hạn chế cập nhật phần bảo mật của thiết bị và các phần mềm trên thiết bị để các ứng dụng hoạt động ổn định"},"correct":"A","explanation":"Theo QĐ số 757/QĐ-BKHCN ngày 29/04/2025\n📖 Điều khoản: Phụ lục I.3 phần II.4"},{"id":222,"stt":5,"chapter":"V. AN TOÀN – AN NINH – BẢO MẬT","topic":"V.1. An toàn thông tin ngân hàng số","topicCode":"V.1","question":"Các quy tắc cơ bản để bảo vệ dữ liệu cá nhân, dữ liệu nhạy cảm và quyền riêng tư trong môi trường số","options":{"A":"Cung cấp, chia sẻ thông tin cá nhân khi được yêu cầu;","B":"Không cung cấp, chia sẻ thông tin cá nhân, đặc biệt thông tin nhạy cảm cho người lạ hoặc khi dùng AI trong công việc; cảnh giác với yêu cầu cung cấp mật khẩu, mã OTP;","C":"Cung cấp, chia sẻ thông tin cá nhân và thông tin nhạy cảm khi dùng AI trong công việc;","D":"Cung cấp mật khẩu, mã OTP cho người khác khi được yêu cầu với lý do phục vụ công việc;"},"correct":"B","explanation":"Theo QĐ Số: 757/QĐ-BKHCN ngày 29/04/2025\n📖 Điều khoản: Phụ lục I.3 phần II.4"},{"id":223,"stt":6,"chapter":"V. AN TOÀN – AN NINH – BẢO MẬT","topic":"V.1. An toàn thông tin ngân hàng số","topicCode":"V.1","question":"Theo Quyết định số 3579/QĐ-NHNN ngày 03/11/2025, một trong những nhiệm vụ cần thực hiện đối với hệ thống CNTT, dịch vụ thanh toán trực tuyến, thanh toán thẻ trong công tác bảo đảm an toàn thông tin, an ninh mạng là gì?","options":{"A":"Triển khai áp dụng các tiêu chuẩn quốc tế về an ninh bảo mật","B":"Chỉ cần áp dụng các tiêu chuẩn trong nước","C":"Chỉ triển khai biện pháp bảo mật khi phát sinh sự cố","D":"Không ưu tiên triển khai các tiêu chuẩn bảo mật"},"correct":"A","explanation":"Quyết định số 3579/QĐ-NHNN ngày 03/11/2025\n📖 Điều khoản: IV.7.đ"},{"id":224,"stt":7,"chapter":"V. AN TOÀN – AN NINH – BẢO MẬT","topic":"V.1. An toàn thông tin ngân hàng số","topicCode":"V.1","question":"Theo Quyết định số 3579/QĐ-NHNN ngày 03/11/2025, mục đích của việc triển khai hiệu quả công tác kiểm soát nội bộ về an ninh, an toàn thông tin là gì?","options":{"A":"Đảm bảo đáp ứng các quy định Pháp luật","B":"Kịp thời phát hiện, cảnh báo và có biện pháp ngăn chặn những rủi ro phát sinh trong hoạt động nghiệp vụ và vận hành nội bộ","C":"Chỉ nhằm kiểm tra tuân thủ quy trình nội bộ của nhân viên","D":"Thay thế cho hoạt động kiểm toán độc lập bên ngoài"},"correct":"B","explanation":"Quyết định số 3579/QĐ-NHNN ngày 03/11/2025\n📖 Điều khoản: IV.7.d"},{"id":225,"stt":8,"chapter":"V. AN TOÀN – AN NINH – BẢO MẬT","topic":"V.1. An toàn thông tin ngân hàng số","topicCode":"V.1","question":"Ứng dụng ngân hàng đã hiển thị đầy đủ thông tin giao dịch trước khi xác nhận và giao dịch có sử dụng OTP SMS. Tuy nhiên, vẫn xảy ra các trường hợp khách hàng bị lừa đảo. Trong các nội dung sau, đâu có thể là nguyên nhân chính dẫn đến việc khách hàng bị lừa đảo?","options":{"A":"Khách hàng bị thao túng hoặc không kiểm tra, đối chiếu đúng nội dung giao dịch trước khi nhập OTP","B":"OTP SMS không an toàn nên việc hiển thị thông tin giao dịch không có ý nghĩa.","C":"Chưa áp dụng sinh trắc học nên OTP không đủ an toàn","D":"OTP không nên dùng cho giao dịch tài chính."},"correct":"A","explanation":"Thông tư 50/2024/TT-NHNN (TT50)\n📖 Điều khoản: Điều 18"},{"id":226,"stt":9,"chapter":"V. AN TOÀN – AN NINH – BẢO MẬT","topic":"V.1. An ninh mạng","topicCode":"V.1","question":"Theo chỉ thị 02/CT-NHNN ngày 09/01/2026, tổ chức phải đặc biệt chú ý rà soát quản lý chặt chẽ sản phẩm, dịch vụ công nghệ thông tin của bên thứ ba trong trường hợp nào?","options":{"A":"Khi bên thứ ba là doanh nghiệp nước ngoài","B":"Khi giá trị hợp đồng với bên thứ ba vượt ngưỡng quy định","C":"Khi sử dụng dịch vụ điện toán đám mây","D":"Khi bên thứ ba cung cấp dịch vụ cho nhiều tổ chức cùng lúc"},"correct":"C","explanation":"Theo chỉ thị 02/CT-NHNN ngày 09/01/2026\n📖 Điều khoản: III.6.iv"},{"id":227,"stt":10,"chapter":"V. AN TOÀN – AN NINH – BẢO MẬT","topic":"V.2. An ninh mạng","topicCode":"V.2","question":"Theo chỉ thị 02/CT-NHNN ngày 09/01/2026, những hệ thống thông tin nào cần được đặc biệt ưu tiên nâng cao năng lực bảo vệ?","options":{"A":"Hệ thống email nội bộ và cổng thông tin điện tử","B":"Hệ thống thanh toán quan trọng, hệ thống ngân hàng lõi (core banking) và hệ thống cung cấp dịch vụ cho khách hàng trên Internet","C":"Hệ thống quản lý nhân sự và kế toán nội bộ","D":"Hệ thống lưu trữ văn bản và hồ sơ điện tử"},"correct":"B","explanation":"Theo chỉ thị 02/CT-NHNN ngày 09/01/2026\n📖 Điều khoản: I.4"},{"id":228,"stt":11,"chapter":"V. AN TOÀN – AN NINH – BẢO MẬT","topic":"V.2. An ninh mạng","topicCode":"V.2","question":"Theo Quyết định số 3579/QĐ-NHNN ngày 03/11/2025, đến năm 2030, hệ thống giám sát vận hành của ngân hàng phải ứng dụng công nghệ nào và phục vụ mục đích gì?","options":{"A":"Chỉ cần ứng dụng công cụ giám sát truyền thống như quản lý nhật ký","B":"Ứng dụng AI/Big Data trong cảnh báo và hỗ trợ khắc phục sự cố","C":"Chỉ cần ứng dụng công nghệ quản lý nhật ký bảo mật để giám sát an ninh mạng","D":"Ứng dụng tự động hóa báo cáo vận hành định kỳ"},"correct":"B","explanation":"Quyết định số 3579/QĐ-NHNN ngày 03/11/2025\n📖 Điều khoản: III.2.b"},{"id":229,"stt":12,"chapter":"V. AN TOÀN – AN NINH – BẢO MẬT","topic":"V.2. An ninh mạng","topicCode":"V.2","question":"Theo Quyết định số 3579/QĐ-NHNN ngày 03/11/2025, Ngân hàng, Tổ chức tín dụng phi ngân hàng, tổ chức cung ứng dịch vụ trung gian thanh toán cần chủ động phát huy điều gì để tăng cường trao đổi, chia sẻ kinh nghiệm hoạt động trong an ninh, an toàn thông tin?","options":{"A":"Sự phối hợp, hỗ trợ của cơ quan nhà nước có chức năng về an ninh, an toàn thông tin và liên kết và phối hợp hành động quốc tế trong hoạt động diễn tập và xử lý sự cố","B":"Hoạt động độc lập, hạn chế hoàn toàn việc trao đổi thông tin","C":"Hạn chế phối hợp với cơ quan nhà nước để tránh phát sinh thủ tục","D":"Chỉ cần tăng cường phối hợp trong nội bộ."},"correct":"A","explanation":"Quyết định số 3579/QĐ-NHNN ngày 03/11/2025\n📖 Điều khoản: IV.7.e"},{"id":230,"stt":13,"chapter":"V. AN TOÀN – AN NINH – BẢO MẬT","topic":"V.2. An ninh mạng","topicCode":"V.2","question":"Theo Quyết định số 3580/QĐ-NHNN ngày 03/11/2025, một trong các yêu cầu an toàn thông tin, an ninh mạng cho dữ liệu ngành ngân hàng là gì?","options":{"A":"Xây dựng phương án dự phòng dữ liệu và không cần thực hiện kiểm tra phục hồi dữ liệu từ các bản dữ phòng để tránh lãng phí nguồn lực","B":"Triển khai giải pháp lưu trữ dữ liệu tập trung tại một điểm duy nhất để bảo đảm hệ thống hoạt động ổn định","C":"Xây dựng giải pháp lưu trữ dữ liệu phân tán để bảo đảm truy cập dữ liệu mọi lúc, mọi nơi","D":"Xây dựng phương án dự phòng, kịch bản ứng phó khi các CSDL bị lỗi, bị tấn công, bảo đảm phục vụ người dân, doanh nghiệp không bị gián đoạn, an toàn"},"correct":"D","explanation":"Quyết định số 3580/QĐ-NHNN ngày 03/11/2025\n📖 Điều khoản: V.6"},{"id":231,"stt":14,"chapter":"V. AN TOÀN – AN NINH – BẢO MẬT","topic":"V.2. An ninh mạng","topicCode":"V.2","question":"Trong những nội dung sau đây, đâu là tác hại của việc để lộ thông tin cá nhân trên không gian mạng và khi sử dụng AI miễn phí trên không gian mạng?","options":{"A":"Không có tác hại đến cá nhân","B":"Thông tin cá nhân bị lộ sẽ không ảnh hưởng đến cá nhân và tài khoản ngân hàng","C":"Kẻ gian có thể sử dụng để mạo danh cá nhân bị lộ thông tin thực hiện các hành vi trái phép như lừa đảo, chiếm đoạt tài sản","D":"Kẻ gian sẽ không thể sử dụng thông tin cá nhân bị để gây hại cho cá nhân"},"correct":"C","explanation":"Theo QĐ Số: 757/QĐ-BKHCN ngày 29/04/2025\n📖 Điều khoản: Phụ lục I.3 phần II.4"},{"id":232,"stt":15,"chapter":"V. AN TOÀN – AN NINH – BẢO MẬT","topic":"V.2. An ninh mạng","topicCode":"V.2","question":"Theo Quyết định số 3580/QĐ-NHNN ngày 03/11/2025, ngành Ngân hàng cần phối hợp với cơ quan nào trong việc bảo đảm an toàn dữ liệu?","options":{"A":"Bộ Tài chính, Bộ Công Thương, Bộ Công An","B":"Bộ Công an, Bộ Quốc phòng, Bộ Khoa học và Công nghệ","C":"Bộ Tài chính, Bộ Kế hoạch và Đầu tư, Bộ Công An","D":"Bộ Công An, Bộ Khoa học và Công nghệ, Bộ Công Thương"},"correct":"B","explanation":"Quyết định số 3580/QĐ-NHNN ngày 03/11/2025\n📖 Điều khoản: V.6"},{"id":233,"stt":16,"chapter":"V. AN TOÀN – AN NINH – BẢO MẬT","topic":"V.2. An ninh mạng","topicCode":"V.2","question":"Thông tư 09/2020/TT-NHNN phân loại các hệ thống thông tin trong hoạt động ngân hàng thành mấy cấp độ?","options":{"A":"2","B":"3","C":"4","D":"5"},"correct":"D","explanation":"Thông tư 09/2020/TT-NHNN\n📖 Điều khoản: Điều 5"},{"id":234,"stt":17,"chapter":"V. AN TOÀN – AN NINH – BẢO MẬT","topic":"V.2. An ninh mạng","topicCode":"V.2","question":"Người dùng truy cập vào website giả mạo có sử dụng giao thức HTTPS, chứng chỉ TLS/SSL hợp lệ và nhập thông tin đăng nhập. Nhận định nào sau đây là đúng nhất?","options":{"A":"Giao thức HTTPS về bản chất không đủ mạnh để bảo vệ dữ liệu người dùng, nên dù có chứng chỉ hợp lệ thì website vẫn dễ dàng bị khai thác để đánh cắp thông tin đăng nhập.","B":"Kẻ tấn công lợi dụng phương pháp tấn công phi kỹ thuật để lừa đảo người dùng truy cập website giả mạo, người dùng đã đồng nhất \"có HTTPS và chứng chỉ hợp lệ\" là đáng tin cậy, trong khi website giả vẫn có thể có chứng chỉ hợp lệ. Cần tổ chức đào tạo nhận thức ATTT cho người dùng","C":"Hệ thống DNS không có cơ chế xác thực tuyệt đối nên bản thân việc phân giải tên miền luôn là điểm yếu kỹ thuật chính dẫn đến việc người dùng bị đưa sang website giả mạo.","D":"Trình duyệt web không có khả năng phân biệt website thật và website giả nếu cả hai cùng có giao diện giống nhau, nên lỗi chính nằm ở công cụ chứ không phải ở hành vi người dùng."},"correct":"B","explanation":"Thông tư 50/2024/TT-NHNN (TT50)\n📖 Điều khoản: Điều 18 (TT50)"},{"id":235,"stt":18,"chapter":"V. AN TOÀN – AN NINH – BẢO MẬT","topic":"V.2. Quản lý rủi ro công nghệ thông tin","topicCode":"V.2","question":"Theo Thông tư 09/2020/TT-NHNN, đơn vị phải thực hiện kiểm tra, đánh giá an toàn hệ thống thông tin đối với hệ thống cấp độ 3 tối thiểu bao nhiêu lâu một lần?","options":{"A":"Ít nhất 6 tháng một lần","B":"Ít nhất 1 năm một lần","C":"Ít nhất 2 năm một lần","D":"Chỉ kiểm tra khi có sự cố"},"correct":"B","explanation":"Thông tư 09/2020/TT-NHNN\n📖 Điều khoản: Điều 42"},{"id":236,"stt":19,"chapter":"V. AN TOÀN – AN NINH – BẢO MẬT","topic":"V.3. Quản lý rủi ro công nghệ thông tin","topicCode":"V.3","question":"Theo Luật số 91/2025/QH15 về bảo vệ dữ liệu cá nhân, hành vi nào sau đây bị nghiêm cấm đối với dữ liệu cá nhân trong ngân hàng?","options":{"A":"Mua bán, chuyển giao trái phép dữ liệu cá nhân của khách hàng cho bên thứ ba","B":"Chào mời khách hàng sử dụng dịch vụ mới của ngân hàng (nếu khách hàng đã đồng ý nhận quảng cáo)","C":"Lưu trữ dữ liệu khách hàng trên máy chủ tại Việt Nam","D":"Cung cấp dữ liệu khách hàng cho cơ quan Công an theo yêu cầu của pháp luật"},"correct":"A","explanation":"Luật Bảo vệ dữ liệu cá nhân số 91/2025/QH15\n📖 Điều khoản: Điều 7"},{"id":237,"stt":20,"chapter":"V. AN TOÀN – AN NINH – BẢO MẬT","topic":"V.3. Quản lý rủi ro công nghệ thông tin","topicCode":"V.3","question":"Tại Thông tư 77/2025/TT-NHNN, nội dung nào sau đây là một trong những quy định nhằm giảm thiểu rủi ro khi cung cấp ứng dụng ngân hàng trên thiết bị di động?","options":{"A":"Khuyến khích khách hàng cài đặt các ứng dụng từ nguồn không xác định (File APK)","B":"Ứng dụng Mobile Banking của tổ chức phải tự động thoát hoặc dừng hoạt động và thông báo cho khách hàng nếu phát hiện thiết bị của khách hàng đã bị phá khóa (root / jailbreak);","C":"Ngân hàng phải chịu mọi trách nhiệm nếu khách hàng bị mất tiền do lộ mật khẩu","D":"Cho phép một ứng dụng ngân hàng đăng nhập cùng lúc trên 10 thiết bị khác nhau"},"correct":"B","explanation":"Thông tư 77/2025/TT-NHNN\n📖 Điều khoản: Điều 5"},{"id":238,"stt":21,"chapter":"V. AN TOÀN – AN NINH – BẢO MẬT","topic":"V.3. Quản lý rủi ro công nghệ thông tin","topicCode":"V.3","question":"Để hạn chế rủi ro \"Deepfake\" trong xác thực khuôn mặt, Thông tư 77/2025/TT-NHNN khuyến nghị áp dụng công nghệ gì?","options":{"A":"Công nghệ nhận diện ảnh tĩnh","B":"Công nghệ phát hiện tấn công giả mạo thông tin sinh trắc học của vật thể sống (Presentation Attack Detection - PAD)","C":"Công nghệ vẽ lại khuôn mặt khách hàng","D":"Không cần công nghệ nào, chỉ cần mắt thường nhân viên nhìn qua video call"},"correct":"B","explanation":"Thông tư 77/2025/TT-NHNN\n📖 Điều khoản: Điều 7"},{"id":239,"stt":22,"chapter":"V. AN TOÀN – AN NINH – BẢO MẬT","topic":"V.3. Quản lý rủi ro công nghệ thông tin","topicCode":"V.3","question":"Theo Luật An ninh mạng số 116/2025/QH15, khi nhận được yêu cầu từ cơ quan chuyên trách an ninh mạng về việc gỡ bỏ dịch vụ có nội dung vi phạm pháp luật, chủ quản hệ thống có thời gian bao lâu để thực hiện?","options":{"A":"Trong vòng 24 giờ kể từ thời điểm nhận được yêu cầu","B":"Trong vòng 48 giờ","C":"Trong vòng 1 tuần","D":"Khi nào thấy thuận tiện thì thực hiện"},"correct":"A","explanation":"Luật An ninh mạng số 116/2025/QH15\n📖 Điều khoản: Điều 25"},{"id":240,"stt":23,"chapter":"V. AN TOÀN – AN NINH – BẢO MẬT","topic":"V.3. Quản lý rủi ro công nghệ thông tin","topicCode":"V.3","question":"Nội dung nào sau đây là một trong những yêu cầu đối với các tổ chức tín dụng, tổ chức cung ứng dịch vụ trung gian thanh toán, công ty thông tin tín dụng tại Chỉ thị 02/CT-NHNN năm 2026","options":{"A":"Tăng số lượng giao dịch","B":"Mở rộng quy mô, chi nhánh của tổ chức","C":"Bố trí kinh phí chi cho các sản phẩm, dịch vụ an ninh mạng, bảo mật thông tin, dữ liệu với tỷ lệ 10% tổng kinh phí triển khai","D":"Bảo đảm tính thống nhất, đồng bộ, kết nối hệ thống trong các ứng dụng và sản phẩm kỳ thuật số, từ đó nâng cao hiệu quả hoạt động, sự hài lòng và gắn bó của khách hàng"},"correct":"D","explanation":"Chỉ thị 02/CT-NHNN năm 2026\n📖 Điều khoản: III.2"},{"id":241,"stt":24,"chapter":"V. AN TOÀN – AN NINH – BẢO MẬT","topic":"V.3. Quản lý rủi ro công nghệ thông tin","topicCode":"V.3","question":"Email lừa đảo (phishing email) thường có đặc điểm nào sau đây?","options":{"A":"Được gửi từ tên miền chính thức của ngân hàng","B":"Chứa đường link có tên gần giống với trang web chính thức của các thương hiệu, ngân hàng, ... và thường kèm theo thông điệp kêu gọi người dùng bấm vào đường link đính kèm.","C":"Không có bất kỳ nội dung kêu gọi hành động","D":"Luôn đi kèm thông cáo báo chí chính thức"},"correct":"B","explanation":"Thông tư 09/2020/TT-NHNN\n📖 Điều khoản: Điều 27"},{"id":242,"stt":25,"chapter":"V. AN TOÀN – AN NINH – BẢO MẬT","topic":"V.3. Quản lý rủi ro công nghệ thông tin","topicCode":"V.3","question":"Khi thẩm định rủi ro đối với đơn vị thuê ngoài quản lý hệ thống thẻ, ngân hàng phát hiện họ dùng mạng riêng ảo (VPN) chung cho nhiều khách hàng. Ngân hàng phải xử lý rủi ro này như thế nào để bảo đảm an toàn và tuân thủ?","options":{"A":"Chấp nhận nếu giá thuê rẻ.","B":"Yêu cầu tách biệt hoàn toàn kết nối truy cập, bảo đảm định danh và giám sát riêng biệt cho ngân hàng","C":"Yêu cầu họ cài phần mềm diệt virus mạnh hơn.","D":"Chỉ cần ký cam kết bảo mật thông tin."},"correct":"B","explanation":"Thông tư 09/2020/TT-NHNN\n📖 Điều khoản: Điều 36"},{"id":243,"stt":26,"chapter":"V. AN TOÀN – AN NINH – BẢO MẬT","topic":"V.3. Phòng chống gian lận (Fraud Detection)","topicCode":"V.3","question":"Hành vi nào sau đây tạo điều kiện trực tiếp nhất để kẻ gian chiếm đoạt tài khoản khách hàng?","options":{"A":"Sử dụng mạng wifi công cộng","B":"Cung cấp mật khẩu và mã OTP cho người lạ","C":"Nhấp vào đường link trong tin nhắn không rõ nguồn gốc","D":"Kích hoạt tính năng xác thực sinh trắc học trên ứng dụng"},"correct":"B","explanation":"Thông tư 50/2024/TT-NHNN\n📖 Điều khoản: khoản 2 Điều 18"},{"id":244,"stt":27,"chapter":"V. AN TOÀN – AN NINH – BẢO MẬT","topic":"V.4. Phòng chống gian lận (Fraud Detection)","topicCode":"V.4","question":"Mục đích của Xác thực nhiều yếu tố (MFA) khi đăng nhập tài khoản là gì","options":{"A":"Tăng tốc độ xử lý giao dịch để giảm thời gian chờ","B":"Giới hạn số lần đăng nhập","C":"Khóa tài khoản khi đăng nhập sai từ lần đầu tiên","D":"Ngăn chặn truy cập trái phép kể cả khi mật khẩu bị lộ"},"correct":"D","explanation":"Thông tư 09/2020/TT-NHNN\n📖 Điều khoản: khoản 14 Điều 2"},{"id":245,"stt":28,"chapter":"V. AN TOÀN – AN NINH – BẢO MẬT","topic":"V.4. Phòng chống gian lận (Fraud Detection)","topicCode":"V.4","question":"Mục đích của việc hệ thống gửi cảnh báo giao dịch bất thường cho khách hàng là gì?","options":{"A":"Nhắc khách hàng cập nhật ứng dụng định kỳ để nâng cao bảo mật và trải nghiệm sử dụng","B":"Đảm bảo tuân thủ quy định về báo cáo giao dịch đáng ngờ cho cơ quan quản lý","C":"Giúp khách hàng kịp thời xác minh và ngăn chặn giao dịch trái phép","D":"Tự động từ chối giao dịch"},"correct":"C","explanation":"Thông tư 50/2024/TT-NHNN\n📖 Điều khoản: Điều 18"},{"id":246,"stt":29,"chapter":"V. AN TOÀN – AN NINH – BẢO MẬT","topic":"V.4. Phòng chống gian lận (Fraud Detection)","topicCode":"V.4","question":"Dấu hiệu nào sau đây được xem là dấu hiệu đáng ngờ trong lĩnh vực ngân hàng?","options":{"A":"Giao dịch phát sinh đúng hạn mức tại khu vực khách hàng thường giao dịch","B":"Giao dịch chuyển khoản quốc tế có đầy đủ xác thực và khớp với lịch sử giao dịch","C":"Khách hàng thường xuyên đổi tiền có mệnh giá nhỏ sang mệnh giá lớn","D":"Khách hàng thực hiện giao dịch chuyển tiền quốc tế theo hợp đồng thương mại đã đăng ký"},"correct":"C","explanation":"Luật Phòng, chống rửa tiền số 14/2022/QH15 -\n📖 Điều khoản: khoản 8 Điều 28"},{"id":247,"stt":30,"chapter":"V. AN TOÀN – AN NINH – BẢO MẬT","topic":"V.4. Phòng chống gian lận (Fraud Detection)","topicCode":"V.4","question":"Một hệ thống ngân hàng lưu trữ dữ liệu khách hàng (bao gồm thông tin định danh và số dư tài khoản) dưới dạng không mã hóa với lý do “chỉ sử dụng nội bộ và không kết nối Internet”. Nhận định nào dưới đây là đúng nhất?","options":{"A":"Dữ liệu khách hàng cần được bảo vệ kể cả khi lưu trữ nội bộ, bao gồm áp dụng mã hóa hoặc biện pháp bảo vệ tương đương.","B":"Chỉ cần triển khai firewall là đủ để bảo vệ dữ liệu khách hàng.","C":"Không cần mã hóa dữ liệu nếu hệ thống chỉ hoạt động trong mạng nội bộ.","D":"Chỉ cần mã hóa dữ liệu khi truyền qua Internet, không cần mã hóa khi lưu trữ."},"correct":"A","explanation":"Dữ liệu khách hàng là dữ liệu nhạy cảm, cần được bảo vệ trong cả quá trình lưu trữ và xử lý, không phụ thuộc vào môi trường nội bộ hay bên ngoài.\n📖 Điều khoản: Điều 8 Nghị định 356/2025/NĐ-CP"},{"id":248,"stt":31,"chapter":"V. AN TOÀN – AN NINH – BẢO MẬT","topic":"V.4. Phòng chống gian lận (Fraud Detection)","topicCode":"V.4","question":"Một hệ thống ngân hàng truyền dữ liệu khách hàng giữa các máy chủ nội bộ dưới dạng không mã hóa với lý do “mạng nội bộ là an toàn”. Trong bối cảnh này, nhận định nào là chính xác nhất?","options":{"A":"Không cần mã hóa vì dữ liệu chỉ lưu chuyển trong mạng nội bộ.","B":"Dữ liệu vẫn có nguy cơ bị nghe lén hoặc truy cập trái phép nếu không mã hóa, kể cả trong mạng nội bộ.","C":"Chỉ cần mã hóa khi truyền dữ liệu qua Internet công cộng.","D":"Mã hóa chỉ cần thiết với dữ liệu không phải của ngân hàng."},"correct":"B","explanation":"Mạng nội bộ vẫn tồn tại rủi ro (insider, tấn công lateral), do đó dữ liệu cần được bảo vệ khi truyền.\n📖 Điều khoản: Điều 8 Nghị định 356/2025/NĐ-CP"},{"id":249,"stt":32,"chapter":"V. AN TOÀN – AN NINH – BẢO MẬT","topic":"V.4. Phòng chống gian lận (Fraud Detection)","topicCode":"V.4","question":"Dữ liệu khách hàng được lưu trữ không mã hóa trong hệ thống nội bộ. Điều này không phù hợp với yêu cầu nào?","options":{"A":"Yêu cầu tối ưu hiệu năng.","B":"Yêu cầu phân bổ tài nguyên.","C":"Yêu cầu bảo vệ dữ liệu khách hàng khi lưu trữ.","D":"Yêu cầu giao diện hệ thống."},"correct":"C","explanation":"Dữ liệu nhạy cảm cần được bảo vệ khi lưu trữ.\n📖 Điều khoản: Điều 8 Nghị định 356/2025/NĐ-CP"},{"id":250,"stt":33,"chapter":"V. AN TOÀN – AN NINH – BẢO MẬT","topic":"V.5. Bảo mật dữ liệu khách hàng","topicCode":"V.5","question":"Một hệ thống ngân hàng phát hiện tài khoản khách hàng đăng nhập từ vị trí địa lý bất thường so với lịch sử sử dụng, nhưng hệ thống không yêu cầu xác minh bổ sung và vẫn cho phép tiếp tục giao dịch. Trong bối cảnh này, nhận định nào là phù hợp nhất?","options":{"A":"Không có rủi ro đáng kể nếu khách hàng đã nhập đúng tên đăng nhập và mật khẩu.","B":"Chỉ cần ghi nhận giao dịch vào log, không cần thêm biện pháp kiểm soát nào khác.","C":"Việc không áp dụng xác minh bổ sung khi có dấu hiệu bất thường làm tăng nguy cơ tài khoản bị lợi dụng hoặc bị chiếm đoạt.","D":"Chỉ cần áp dụng biện pháp kiểm soát bổ sung nếu giao dịch có giá trị rất lớn."},"correct":"C","explanation":"Khi có dấu hiệu bất thường về hành vi truy cập hoặc giao dịch, hệ thống cần áp dụng biện pháp kiểm soát phù hợp với mức độ rủi ro để bảo vệ tài khoản và dữ liệu khách hàng.\n📖 Điều khoản: TT50/2024 – Điều 15"},{"id":251,"stt":34,"chapter":"V. AN TOÀN – AN NINH – BẢO MẬT","topic":"V.5. Bảo mật dữ liệu khách hàng","topicCode":"V.5","question":"Một nhân viên ngân hàng truy cập hệ thống nội bộ từ xa qua Internet nhưng chỉ sử dụng tên đăng nhập và mật khẩu, không có xác thực đa yếu tố hoặc biện pháp xác thực bổ sung. Cách triển khai này tiềm ẩn vấn đề gì?","options":{"A":"Việc không áp dụng xác thực bổ sung cho truy cập từ xa làm tăng nguy cơ bị chiếm đoạt tài khoản khi thông tin đăng nhập bị lộ.","B":"Không có rủi ro nếu người dùng đặt mật khẩu đủ dài và thay đổi định kỳ.","C":"Chỉ cần áp dụng xác thực bổ sung khi truy cập từ thiết bị lạ hoặc từ nước ngoài.","D":"Không cần xác thực bổ sung nếu người dùng truy cập để xem thông tin, chưa thực hiện giao dịch."},"correct":"A","explanation":"Thông tư 09/2020/TT-NHNN\n📖 Điều khoản: khoản 6 Điều 29"},{"id":252,"stt":35,"chapter":"V. AN TOÀN – AN NINH – BẢO MẬT","topic":"V.5. Bảo mật dữ liệu khách hàng","topicCode":"V.5","question":"Một hệ thống ngân hàng cho phép xuất dữ liệu khách hàng ra file Excel nhưng không kiểm soát nội dung, phạm vi dữ liệu hoặc mục đích sử dụng của dữ liệu đầu ra. Điều này không đáp ứng yêu cầu nào?","options":{"A":"Yêu cầu tối ưu hóa khả năng khai thác dữ liệu để phục vụ công việc nội bộ.","B":"Yêu cầu bảo vệ dữ liệu khách hàng trong toàn bộ vòng đời xử lý, bao gồm cả khi trích xuất hoặc cung cấp dữ liệu đầu ra.","C":"Yêu cầu tăng tốc độ xử lý dữ liệu bằng cách bỏ qua bước kiểm soát nội dung file xuất.","D":"Yêu cầu đơn giản hóa thao tác người dùng để giảm áp lực cho bộ phận hỗ trợ kỹ thuật."},"correct":"B","explanation":"Dữ liệu đầu ra cũng là một phần của quá trình xử lý dữ liệu khách hàng và phải được kiểm soát tương tự như khi lưu trữ hoặc truyền tải.\n📖 Điều khoản: Điều 8 Nghị định 356/2025/NĐ-CP"},{"id":253,"stt":36,"chapter":"V. AN TOÀN – AN NINH – BẢO MẬT","topic":"V.5. Bảo mật dữ liệu khách hàng","topicCode":"V.5","question":"Đâu không phải là kỹ năng số cơ bản dành cho cán bộ, công chức, viên chức, người lao động trong cơ quan nhà nước?","options":{"A":"Đánh giá độ tin cậy của thông tin","B":"Nhận biết và xử lý thông tin sai lệch do AI tạo ra","C":"Nhận diện và xử lý thông tin giả mạo, sai lệch trong lĩnh vực quản lý nhà nước","D":"Chia sẻ thông tin chưa được kiểm chứng lên mạng xã hội"},"correct":"D","explanation":"Quyết định 757/QĐ-BKHCN\n📖 Điều khoản: II.1, Phụ lục I.3"},{"id":254,"stt":37,"chapter":"V. AN TOÀN – AN NINH – BẢO MẬT","topic":"V.5. Bảo mật dữ liệu khách hàng","topicCode":"V.5","question":"Đâu không phải hành vi sử dụng AI nhằm mục đích lừa đảo trên không gian mạng?","options":{"A":"Giả mạo hoặc mô phỏng người thật để lừa dối một cách có chủ đích","B":"Tạo ra hoặc phổ biến nội dung giả mạo có khả năng gây nguy hại nghiêm trọng đến an ninh quốc gia, trật tự, an toàn xã hội","C":"Sử dụng AI để hỗ trợ phân tích dữ liệu và nâng cao hiệu quả công việc","D":"Dùng AI để thao túng nhận thức, hành vi của người khác, gây tổn hại nghiêm trọng đến quyền và lợi ích hợp pháp của con người"},"correct":"C","explanation":"Luật Trí tuệ nhân tạo số 134/2025/QH15\n📖 Điều khoản: khoản 2 Điều 7"},{"id":255,"stt":38,"chapter":"V. AN TOÀN – AN NINH – BẢO MẬT","topic":"V.5. Bảo mật dữ liệu khách hàng","topicCode":"V.5","question":"Theo Thông tư 50/2024/TT-NHNN (được sửa đổi, bổ sung bởi Thông tư 77/2025/TT-NHNN), các tổ chức cung ứng dịch vụ ngân hàng trực tuyến phải triển khai các biện pháp kiểm soát nào nhằm giảm thiểu rủi ro trong giao dịch của khách hàng?","options":{"A":"Thông báo giao dịch qua tin nhắn SMS hoặc thư điện tử.","B":"Thiết lập hạn mức giao dịch theo giá trị và loại giao dịch nhằm kiểm soát rủi ro.","C":"Áp dụng cơ chế xác thực nhiều yếu tố (MFA) và kiểm soát truy cập phù hợp với mức độ rủi ro.","D":"Cả ba đáp án trên"},"correct":"D","explanation":"Thông tư 50/2024/TT-NHNN;\nThông tư 77/2025/TT-NHNN)\n📖 Điều khoản: Điều 7 TT50,\nĐiều 10 TT50, Điều 6 TT77"},{"id":256,"stt":39,"chapter":"V. AN TOÀN – AN NINH – BẢO MẬT","topic":"V.6. Phòng chống lừa đảo trên không gian mạng","topicCode":"V.6","question":"Theo thông tư 77/2025/TT-NHNN ngày 31/12/2025, Ứng dụng Mobile Banking phải tự động thoát hoặc dừng hoạt động và thông báo cho khách hàng lý do nếu phát hiện một trong các dấu hiệu sau:","options":{"A":"Có trình gỡ lỗi (debugger) được gắn vào hoặc môi trường có trình gỡ lỗi đang hoạt động","B":"Phần mềm ứng dụng bị chèn mã bên ngoài ứng dụng khi đang chạy, thực hiện các hành vi như theo dõi các hàm được chạy, ghi lại log dữ liệu truyền qua các hàm, API.... (hook)","C":"Thiết bị đã bị phá khóa (root / jailbreak); hoặc bị mở khóa cơ chế bảo vệ (unlockbootloader)","D":"Cả ba đáp an trên"},"correct":"D","explanation":"Thông tư 77/2025/TT-NHNN\n📖 Điều khoản: khoản 2 Điều 5"},{"id":257,"stt":40,"chapter":"V. AN TOÀN – AN NINH – BẢO MẬT","topic":"V.6. Phòng chống lừa đảo trên không gian mạng","topicCode":"V.6","question":"Theo thông tư 50/2024/TT-NHNN ngày 31/10/2024, thời gian quy định thực hiện triển khai cập nhật các bản vá bảo mật hoặc các biện pháp phòng ngừa kịp thời đối với lỗ hổng mức nghiêm trọng là?","options":{"A":"Trong vòng 01 ngày đối với thành phần hệ thống kết nối trực tiếp với Internet; trong vòng 01 tháng đối với các thành phần còn lại sau khi lỗ hổng được công bố hoặc phát hiện.","B":"Trong vòng 02 ngày đối với thành phần hệ thống kết nối trực tiếp với Internet; trong vòng 01 tháng đối với các thành phần còn lại sau khi lỗ hổng được công bố hoặc phát hiện.","C":"Trong vòng 01 ngày đối với thành phần hệ thống kết nối trực tiếp với Internet; trong vòng 02 tháng đối với các thành phần còn lại sau khi lỗ hổng được công bố hoặc phát hiện.","D":"Trong vòng 02 ngày đối với thành phần hệ thống kết nối trực tiếp với Internet; trong vòng 02 tháng đối với các thành phần còn lại sau khi lỗ hổng được công bố hoặc phát hiện."},"correct":"A","explanation":"Thông tư 50/2024/TT-NHNN\n📖 Điều khoản: khoản 6 Điều 14"},{"id":258,"stt":41,"chapter":"V. AN TOÀN – AN NINH – BẢO MẬT","topic":"V.6. Phòng chống lừa đảo trên không gian mạng","topicCode":"V.6","question":"Đâu không phải hành vi lừa đảo trên không gian mạng vi phạm pháp luật về an ninh quốc gia, trật tự, an toàn xã hội?","options":{"A":"Giả mạo trang thông tin điện tử của cơ quan, tổ chức nhằm chiếm đoạt tài sản","B":"Làm giả và trao đổi trái phép thông tin thẻ tín dụng, tài khoản ngân hàng của người khác","C":"Phát hành và sử dụng trái phép các phương tiện thanh toán để trục lợi","D":"Kêu gọi từ thiện trên mạng xã hội và sử dụng tài khoản riêng cho từng đợt theo quy định của pháp luật"},"correct":"D","explanation":"Luật An ninh mạng số 116/2025/QH15\n📖 Điều khoản: Điều 13"},{"id":259,"stt":42,"chapter":"V. AN TOÀN – AN NINH – BẢO MẬT","topic":"V.6. Phòng chống lừa đảo trên không gian mạng","topicCode":"V.6","question":"Theo quy định về An toàn hệ thống thông tin trong hoạt động ngân hàng, tổ chức lập danh sách các hệ thống thông tin cần bảo đảm hoạt động liên tục tối thiểu bao gồm các hệ thống thông tin từ cấp độ mấy trở lên ?","options":{"A":"Cấp độ 4","B":"Cấp độ 3","C":"Cấp độ 2","D":"Cấp độ 1"},"correct":"B","explanation":"Thông tư 09/2020/TT-NHNN\n📖 Điều khoản: khoản 2 Điều 49"},{"id":260,"stt":43,"chapter":"V. AN TOÀN – AN NINH – BẢO MẬT","topic":"V.6. Phòng chống lừa đảo trên không gian mạng","topicCode":"V.6","question":"Hệ thống dự phòng của các hệ thống thông tin trong ngành ngân hàng từ cấp độ 3 trở lên (ngoại trừ các hệ thống thông tin xử lý thông tin bí mật nhà nước) phải bảo đảm khả năng thay thế hệ thống chính trong khoảng thời gian bao lâu?","options":{"A":"8 tiếng","B":"6 tiếng","C":"4 tiếng","D":"2 tiếng"},"correct":"C","explanation":"Thông tư 09/2020/TT-NHNN\n📖 Điều khoản: điểm c khoản 1 Điều 50"},{"id":261,"stt":44,"chapter":"V. AN TOÀN – AN NINH – BẢO MẬT","topic":"V.6. Phòng chống lừa đảo trên không gian mạng","topicCode":"V.6","question":"Tổ chức phải có kế hoạch và tổ chức triển khai bảo đảm hoạt động liên tục hệ thống thông tin trong ngành ngân hàng (ngoại trừ các hệ thống thông tin chính và dự phòng hoạt động song song) theo tần suất tối thiểu nào ?","options":{"A":"3 tháng một lần","B":"6 tháng một lần","C":"9 tháng một lần","D":"1 năm 1 lần"},"correct":"B","explanation":"Thông tư 09/2020/TT-NHNN\n📖 Điều khoản: điểm a khoản 1 Điều 52"},{"id":262,"stt":45,"chapter":"V. AN TOÀN – AN NINH – BẢO MẬT","topic":"V.7. DR, BCP – khôi phục hệ thống","topicCode":"V.7","question":"Tổ chức phải thông báo kế hoạch, nội dung và kịch bản diễn tập chuyển đổi hoạt động liên tục cho Ngân hàng Nhà nước (Cục Công nghệ thông tin) chậm nhất mấy ngày làm việc trước khi thực hiện?","options":{"A":"2 ngày","B":"3 ngày","C":"4 ngày","D":"5 ngày"},"correct":"D","explanation":"Thông tư 09/2020/TT-NHNN\n📖 Điều khoản: khoản 3 Điều 52"},{"id":263,"stt":46,"chapter":"V. AN TOÀN – AN NINH – BẢO MẬT","topic":"V.7. DR, BCP – khôi phục hệ thống","topicCode":"V.7","question":"Trường hợp không thể chuyển đổi hoạt động trong ngày làm việc, hệ thống dự phòng cho hệ thống thông tin trong ngành ngân hàng phải được thiết lập thế nào?","options":{"A":"Có cùng công suất, cấu hình với hệ thống chính và định kỳ hàng năm thực hiện chuyển đổi, kiểm tra tính sẵn sàng của hệ thống dự phòng.","B":"Đáp ứng tối thiểu 50% công suất, cấu hình với hệ thống chính và định kỳ hàng năm thực hiện chuyển đổi, kiểm tra tính sẵn sàng của hệ thống dự phòng.","C":"Đáp ứng tối thiểu 50% công suất, cấu hình với hệ thống chính và định kỳ 6 tháng một lần thực hiện chuyển đổi, kiểm tra tính sẵn sàng của hệ thống dự phòng.","D":"Có cùng công suất, cấu hình với hệ thống chính và tối thiểu 6 tháng một lần thực hiện chuyển đổi, kiểm tra tính sẵn sàng của hệ thống dự phòng."},"correct":"A","explanation":"Thông tư 09/2020/TT-NHNN\n📖 Điều khoản: điểm b khoản 1 Điều 52"},{"id":264,"stt":47,"chapter":"V. AN TOÀN – AN NINH – BẢO MẬT","topic":"V.7. DR, BCP – khôi phục hệ thống","topicCode":"V.7","question":"Các tổ chức trong lĩnh vực ngành ngân hàng cần xây dựng quy trình xử lý các tình huống mất an toàn, gián đoạn hoạt động của từng cấu phần trong hệ thống thông tin từ cấp độ mấy trở lên ?","options":{"A":"Cấp độ 1","B":"Cấp độ 2","C":"Cấp độ 3","D":"Cấp độ 4"},"correct":"C","explanation":"Thông tư 09/2020/TT-NHNN\n📖 Điều khoản: khoản 1 Điều 51"},{"id":265,"stt":48,"chapter":"V. AN TOÀN – AN NINH – BẢO MẬT","topic":"V.7. DR, BCP – khôi phục hệ thống","topicCode":"V.7","question":"Một cán bộ ngân hàng nhận được email có nội dung yêu cầu cập nhật thông tin tài khoản nội bộ để tránh bị gián đoạn truy cập hệ thống. Email có logo và chữ ký gần giống mẫu quen thuộc, nhưng địa chỉ gửi sử dụng tên miền lạ. Trong tình huống này, cách xử lý nào là phù hợp nhất?","options":{"A":"Không truy cập đường link, đồng thời xác minh lại qua kênh chính thức trước khi thực hiện bất kỳ thao tác nào.","B":"Hỏi đồng nghiệp xem có nhận email tương tự hay không rồi mới quyết định làm theo.","C":"Thực hiện ngay theo hướng dẫn vì email có logo và nội dung khẩn cấp nên khả năng cao là hợp lệ.","D":"Chỉ cần kiểm tra chữ ký email nếu đúng tên đơn vị thì có thể làm theo."},"correct":"A","explanation":"Email giả mạo có thể rất giống thật, cần xác minh nguồn trước khi thao tác.\nNgân hàng phải phổ biến quy định và đào tạo nâng cao nhận thức an toàn thông tin cho tất cả các cá nhân trong tổ chức.\n📖 Điều khoản: TT09/2020 – Điều 14, Điều 15"},{"id":266,"stt":49,"chapter":"V. AN TOÀN – AN NINH – BẢO MẬT","topic":"V.7. DR, BCP – khôi phục hệ thống","topicCode":"V.7","question":"Một cán bộ phát hiện tài khoản của mình có dấu hiệu đăng nhập bất thường từ thiết bị lạ nhưng không báo cáo vì cho rằng hệ thống ghi nhận nhầm. Điều này phản ánh vấn đề gì?","options":{"A":"Không có vấn đề nếu chưa xảy ra thiệt hại.","B":"Tự đổi mật khẩu là đủ, không cần báo cáo.","C":"Thiếu nhận thức về trách nhiệm báo cáo và xử lý sự cố an toàn thông tin.","D":"Lỗi hệ thống là nguyên nhân chính."},"correct":"C","explanation":"Không báo cáo làm tăng rủi ro và bỏ lỡ cơ hội xử lý sớm.\nCông tác phổ biến quy định, nâng cao nhận thức an toàn thông tin thực hiện chưa tốt.\n📖 Điều khoản: TT09/2020 – Điều 14, Điều 15"},{"id":267,"stt":50,"chapter":"V. AN TOÀN – AN NINH – BẢO MẬT","topic":"V.7. DR, BCP – khôi phục hệ thống","topicCode":"V.7","question":"Một nhóm cán bộ sử dụng chung một tài khoản truy cập hệ thống để thuận tiện xử lý công việc. Từ góc độ nhận thức an toàn thông tin, cách hiểu nào là đúng nhất?","options":{"A":"Phù hợp nếu chỉ dùng trong nội bộ.","B":"Không vấn đề nếu các thành viên đồng thuận.","C":"Làm mất khả năng truy vết trách nhiệm cá nhân và tiềm ẩn rủi ro bảo mật.","D":"Chỉ rủi ro nếu là tài khoản quản trị."},"correct":"C","explanation":"Phải sử dụng tài khoản cá nhân riêng biệt.\n📖 Điều khoản: TT09/2020 – điểm b khoản 3 Điều 13,\nđiểm b khoản 1 Điều 28"},{"id":268,"stt":51,"chapter":"V. AN TOÀN – AN NINH – BẢO MẬT","topic":"V.8. Nâng cao nhận thức an toàn thông tin cho cán bộ","topicCode":"V.8","question":"Một cán bộ gửi file cấu hình hệ thống nội bộ cho đối tác qua email cá nhân để xử lý nhanh công việc. Cách làm này có vấn đề gì?","options":{"A":"Không sao nếu đối tác quen.","B":"Vi phạm quy trình bảo mật và tiềm ẩn nguy cơ lộ thông tin.","C":"Chấp nhận được vì xử lý nhanh.","D":"Chỉ cần xóa file sau khi gửi."},"correct":"B","explanation":"Không chia sẻ dữ liệu qua kênh không kiểm soát.\n📖 Điều khoản: TT09/2020 – Điều 15, khoản 1 Điều 24"},{"id":269,"stt":52,"chapter":"V. AN TOÀN – AN NINH – BẢO MẬT","topic":"V.8. Nâng cao nhận thức an toàn thông tin cho cán bộ","topicCode":"V.8","question":"Hành vi nào sau đây được coi là vi phạm đạo đức nghề nghiệp về bảo mật thông tin ngân hàng?","options":{"A":"Tra cứu số dư tài khoản của người nổi tiếng chỉ vì tò mò.","B":"Báo cáo một lỗ hổng bảo mật mà bạn vô tình phát hiện được.","C":"Tham gia đầy đủ các buổi đào tạo về an toàn thông tin của ngân hàng.","D":"Đề nghị khách hàng thay đổi mật khẩu định kỳ"},"correct":"A","explanation":"Nghị định 117/2018/NĐ-CP\n📖 Điều khoản: Điều 5"},{"id":270,"stt":53,"chapter":"V. AN TOÀN – AN NINH – BẢO MẬT","topic":"V.8. Nâng cao nhận thức an toàn thông tin cho cán bộ","topicCode":"V.8","question":"Một cán bộ vừa khởi tạo giao dịch vừa phê duyệt giao dịch để tiết kiệm thời gian. Điều này phản ánh điều gì?","options":{"A":"Có thể chấp nhận được trong một số trường hợp đặc biệt khi khối lượng công việc lớn và cần xử lý nhanh để đảm bảo tiến độ chung.","B":"Đây là một cách tối ưu hiệu suất làm việc, giúp giảm thời gian xử lý và tăng năng suất cá nhân trong ngắn hạn.","C":"Tiềm ẩn rủi ro và không tuân thủ nguyên tắc kiểm soát, đặc biệt vi phạm nguyên tắc phân tách nhiệm vụ (SoD) trong quản lý rủi ro.","D":"Không ảnh hưởng đáng kể nếu số lượng giao dịch ít và được thực hiện bởi cán bộ có kinh nghiệm."},"correct":"C","explanation":"Cần tuân thủ nguyên tắc kiểm soát.\n📖 Điều khoản: TT09/2020 – điểm a khoản 4 Điều 20"},{"id":271,"stt":1,"chapter":"VI. QUẢN TRỊ – ĐIỀU HÀNH – CHIẾN LƯỢC","topic":"VI.1. Chiến lược chuyển đổi số ngân hàng","topicCode":"VI.1","question":"Căn cứ Quyết định 749/QĐ-TTg (2020) thì chương trình chuyển đổi số quốc gia đến năm 2025, định hướng đến năm 2030 có các trụ cột chính là:","options":{"A":"Chính phủ số, kinh tế số, xã hội số","B":"Tăng sử dụng công nghệ","C":"Chính phủ số, kinh tế số, tài chính số","D":"Chính phủ số, công nghệ số, xã hội số"},"correct":"A","explanation":"Quyết định 749/QĐ-TTg (2020)\n📖 Điều khoản: Mục I và Mục II.2"},{"id":272,"stt":2,"chapter":"VI. QUẢN TRỊ – ĐIỀU HÀNH – CHIẾN LƯỢC","topic":"VI.1. Chiến lược chuyển đổi số ngân hàng","topicCode":"VI.1","question":"Một ngân hàng chia sẻ dữ liệu khách hàng cho đối tác mà không có kiểm soát và không có sự đồng ý. Điều này vi phạm quy định nào?","options":{"A":"Quy định về Chính phủ số","B":"Quy định về quản trị nội bộ","C":"Quy định về bảo vệ dữ liệu cá nhân","D":"Quy định về phát triển công nghệ"},"correct":"C","explanation":"Luật Bảo vệ dữ liệu cá nhân 2025 (Luật số 91/2025/QH15)\n📖 Điều khoản: Điều 15"},{"id":273,"stt":3,"chapter":"VI. QUẢN TRỊ – ĐIỀU HÀNH – CHIẾN LƯỢC","topic":"VI.1. Chiến lược chuyển đổi số ngân hàng","topicCode":"VI.1","question":"Trong chuyển đổi số ngành ngân hàng, yếu tố nào đóng vai trò nền tảng để ra quyết định chiến lược?","options":{"A":"Công nghệ","B":"Dữ liệu","C":"Nhân sự","D":"Marketing"},"correct":"B","explanation":"Quyết định 3580/QĐ-NHNN (2025) và Nghị quyết 57-NQ/TW (2024)\n📖 Điều khoản: Quyết định 3580/QĐ-NHNN (2025) Mục I, II; Nghị quyết 57-NQ/TW (2024) phần I"},{"id":274,"stt":4,"chapter":"VI. QUẢN TRỊ – ĐIỀU HÀNH – CHIẾN LƯỢC","topic":"VI.1. Chiến lược chuyển đổi số ngân hàng","topicCode":"VI.1","question":"Đâu là nhận định sai về chuyển đổi số ngành ngân hàng?","options":{"A":"Là quá trình dài hạn, mang tính chiến lược","B":"Chỉ cần đầu tư công nghệ là đủ","C":"Cần thay đổi mô hình quản trị và vận hành","D":"Gắn với phát triển dữ liệu và trải nghiệm khách hàng"},"correct":"B","explanation":"Nghị quyết 57-NQ/TW (2024)\n📖 Điều khoản: Phần I, II"},{"id":275,"stt":5,"chapter":"VI. QUẢN TRỊ – ĐIỀU HÀNH – CHIẾN LƯỢC","topic":"VI.1. Chiến lược chuyển đổi số ngân hàng","topicCode":"VI.1","question":"Một ngân hàng từ chối mở API cho đối tác fintech vì lo ngại rủi ro, chọn phát triển toàn bộ dịch vụ nội bộ. Đánh giá nào là đúng nhất theo chiến lược chuyển đổi số ngành ngân hàng?","options":{"A":"Hoàn toàn đúng vì giảm rủi ro","B":"Phù hợp với nguyên tắc bảo mật","C":"Chưa phù hợp vì không phát triển hệ sinh thái số mở","D":"Không liên quan đến chuyển đổi số"},"correct":"C","explanation":"Quyết định 3579/QĐ-NHNN (2025)\n📖 Điều khoản: Mục III – Định hướng"},{"id":276,"stt":6,"chapter":"VI. QUẢN TRỊ – ĐIỀU HÀNH – CHIẾN LƯỢC","topic":"VI.2. Vai trò lãnh đạo trong chuyển đổi số","topicCode":"VI.2","question":"Theo Quyết định 749/QĐ-TTg, cá nhân nào phải chịu trách nhiệm trực tiếp về tiến trình chuyển đổi số trong cơ quan, tổ chức, lĩnh vực và địa bàn mình phụ trách?","options":{"A":"Cán bộ chuyên trách Công nghệ thông tin.","B":"Cán bộ, công chức làm việc tại bộ phận một cửa.","C":"Người đứng đầu cơ quan, tổ chức.","D":"Trưởng bộ phận Truyền thông và Quan hệ công chúng."},"correct":"C","explanation":"Quyết định số 749/QĐ-TTg ngày 03/6/2020 của Thủ tướng Chính phủ.\n📖 Điều khoản: Tiết a, Khoản 1, Mục IV"},{"id":277,"stt":7,"chapter":"VI. QUẢN TRỊ – ĐIỀU HÀNH – CHIẾN LƯỢC","topic":"VI.2. Vai trò lãnh đạo trong chuyển đổi số","topicCode":"VI.2","question":"Theo Quyết định 3579/QĐ-NHNN, yếu tố nào đóng vai trò quyết định đến sự thành công của công cuộc chuyển đổi số trong toàn ngành Ngân hàng?","options":{"A":"Mức độ đầu tư tài chính cho các nền tảng công nghệ đám mây.","B":"Nhận thức từ người đứng đầu đến cán bộ, công chức, viên chức.","C":"Số lượng thiết bị di động thông minh được trang bị cho nhân viên.","D":"Việc thuê các chuyên gia công nghệ nước ngoài để giám sát."},"correct":"B","explanation":"Quyết định số 3579/QĐ-NHNN ngày 03/11/2022 của NHNN.\n📖 Điều khoản: Khoản 1, Mục I (Quan điểm xây dựng chiến lược)"},{"id":278,"stt":8,"chapter":"VI. QUẢN TRỊ – ĐIỀU HÀNH – CHIẾN LƯỢC","topic":"VI.2. Vai trò lãnh đạo trong chuyển đổi số","topicCode":"VI.2","question":"Theo Quyết định 06/QĐ-TTg (Đề án 06), yếu tố nào được xem là bảo đảm cho sự thành công của chuyển đổi số gắn với dữ liệu dân cư?","options":{"A":"Sự hỗ trợ tài chính độc quyền từ các doanh nghiệp viễn thông.","B":"Việc nâng cấp toàn bộ hệ thống máy tính tại cấp xã, phường.","C":"Sự vào cuộc của cả hệ thống chính trị, đặc biệt là người đứng đầu.","D":"Tạm dừng các dịch vụ truyền thống để ép buộc dùng dịch vụ số."},"correct":"C","explanation":"Quyết định số 06/QĐ-TTg ngày 06/01/2022 của Thủ tướng Chính phủ\n📖 Điều khoản: Khoản 1, Mục I (Quan điểm chỉ đạo)"},{"id":279,"stt":9,"chapter":"VI. QUẢN TRỊ – ĐIỀU HÀNH – CHIẾN LƯỢC","topic":"VI.2. Vai trò lãnh đạo trong chuyển đổi số","topicCode":"VI.2","question":"Lãnh đạo các cơ quan, tổ chức cần xác định yếu tố nào là xuyên suốt, không thể tách rời trong tiến trình chuyển đổi số quốc gia?","options":{"A":"Các nền tảng mạng xã hội giải trí đa phương tiện.","B":"Việc mua sắm các thiết bị phần cứng nhập khẩu đắt tiền.","C":"Bảo đảm an toàn, an ninh mạng ngay từ khâu thiết kế.","D":"Mở cửa hoàn toàn dữ liệu mật của quốc gia cho quốc tế."},"correct":"C","explanation":"Quyết định số 749/QĐ-TTg ngày 03/6/2020 của Thủ tướng Chính phủ\n📖 Điều khoản: Khoản 5, Mục III"},{"id":280,"stt":10,"chapter":"VI. QUẢN TRỊ – ĐIỀU HÀNH – CHIẾN LƯỢC","topic":"VI.2. Vai trò lãnh đạo trong chuyển đổi số","topicCode":"VI.2","question":"Theo định hướng tại QĐ 3579/QĐ-NHNN, lãnh đạo cần nhận định yếu tố nào là \"tài sản quan trọng và nguồn lực chiến lược\" để nâng cao năng lực quản trị?","options":{"A":"Dữ liệu số.","B":"Hạ tầng số","C":"Nhân lực số","D":"Công nghệ số"},"correct":"A","explanation":"Quyết định số 3579/QĐ-NHNN ngày 03/11/2022 của NHNN.\n📖 Điều khoản: Khoản 5, Mục I (Quan điểm xây dựng chiến lược)"},{"id":281,"stt":11,"chapter":"VI. QUẢN TRỊ – ĐIỀU HÀNH – CHIẾN LƯỢC","topic":"VI.2. Vai trò lãnh đạo trong chuyển đổi số","topicCode":"VI.2","question":"Theo Quyết định 749/QĐ-TTg, bước đầu tiên và quan trọng nhất mà lãnh đạo cần chú trọng thực hiện trong tiến trình chuyển đổi số là gì?","options":{"A":"Mua sắm các trang thiết bị phần cứng hiện đại.","B":"Chuyển đổi nhận thức của cơ quan, tổ chức.","C":"Cắt giảm ngay lập tức nhân sự làm công tác hành chính.","D":"Thuê các chuyên gia nước ngoài về quản trị hệ thống."},"correct":"B","explanation":"Quyết định số 749/QĐ-TTg ngày 03/6/2020 của Thủ tướng Chính phủ.\n📖 Điều khoản: Khoản 1, Mục III (Quan điểm)"},{"id":282,"stt":12,"chapter":"VI. QUẢN TRỊ – ĐIỀU HÀNH – CHIẾN LƯỢC","topic":"VI.3. Mô hình ngân hàng số","topicCode":"VI.3","question":"Một ngân hàng triển khai dịch vụ mở tài khoản trực tuyến, tuy nhiên khách hàng vẫn phải đến quầy để ký xác nhận cuối cùng do quy trình nội bộ chưa thay đổi. Điều này phản ánh trạng thái nào của quá trình chuyển đổi số?","options":{"A":"Đã hoàn tất số hóa toàn trình dịch vụ","B":"Đã triển khai ngân hàng số hoàn chỉnh","C":"Đã triển khai nền tảng công nghệ nhưng chưa triển khai dịch vụ","D":"Đang ở giai đoạn số hóa kênh giao dịch nhưng chưa chuyển đổi vận hành"},"correct":"D","explanation":"Đây là tình trạng chỉ số hóa lớp giao diện nhưng chưa chuyển đổi quy trình nội bộ, Chưa đạt số hóa toàn trình"},{"id":283,"stt":13,"chapter":"VI. QUẢN TRỊ – ĐIỀU HÀNH – CHIẾN LƯỢC","topic":"VI.3. Mô hình ngân hàng số","topicCode":"VI.3","question":"Một ngân hàng muốn tích hợp dịch vụ thanh toán vào nền tảng thương mại điện tử của đối tác, nhưng gặp khó khăn do mỗi hệ thống sử dụng chuẩn dữ liệu khác nhau. Nguyên nhân cốt lõi là gì?","options":{"A":"Thiếu nguồn lực phát triển ứng dụng","B":"Chưa chuẩn hóa giao diện lập trình ứng dụng (API)","C":"Hạn chế về số lượng khách hàng","D":"Thiếu hạ tầng phần cứng"},"correct":"B","explanation":"Vấn đề nằm ở thiếu chuẩn hóa API (Application Programming Interface), dẫn đến khó tích hợp hệ thống"},{"id":284,"stt":14,"chapter":"VI. QUẢN TRỊ – ĐIỀU HÀNH – CHIẾN LƯỢC","topic":"VI.3. Mô hình ngân hàng số","topicCode":"VI.3","question":"Trong hành trình chuyển đổi số, một ngân hàng chỉ tập trung đầu tư công nghệ mà không thay đổi mô hình tổ chức và văn hóa. Điều gì có khả năng xảy ra?","options":{"A":"Tăng tốc chuyển đổi số","B":"Giảm chi phí vận hành","C":"Tăng trải nghiệm khách hàng","D":"Công nghệ không được khai thác hiệu quả"},"correct":"D","explanation":"Chuyển đổi số không chỉ là công nghệ mà còn là chuyển đổi tổ chức (organizational transformation) và văn hóa (culture change)"},{"id":285,"stt":15,"chapter":"VI. QUẢN TRỊ – ĐIỀU HÀNH – CHIẾN LƯỢC","topic":"VI.3. Mô hình ngân hàng số","topicCode":"VI.3","question":"Trong quá trình triển khai Open API, ngân hàng cho phép bên thứ ba truy cập một phần dữ liệu khách hàng. Yếu tố nào cần được kiểm soát chặt chẽ nhất?","options":{"A":"Quyền truy cập và bảo mật dữ liệu","B":"Tốc độ xử lý giao dịch","C":"Số lượng API được cung cấp","D":"Giao diện người dùng"},"correct":"A","explanation":"Open Banking yêu cầu kiểm soát truy cập dữ liệu và bảo vệ dữ liệu cá nhân."},{"id":286,"stt":16,"chapter":"VI. QUẢN TRỊ – ĐIỀU HÀNH – CHIẾN LƯỢC","topic":"VI.3. Mô hình ngân hàng số","topicCode":"VI.3","question":"Một ngân hàng triển khai giải pháp eKYC cho mở tài khoản trực tuyến, nhưng hệ thống chỉ kiểm tra ảnh giấy tờ tùy thân mà không có bước xác thực khuôn mặt (face matching/liveness check). Rủi ro lớn nhất là gì?","options":{"A":"Tăng thời gian xử lý hồ sơ","B":"Giảm trải nghiệm khách hàng","C":"Tăng chi phí vận hành","D":"Không phát hiện được giả mạo danh tính (identity spoofing)"},"correct":"D","explanation":"Thiếu bước xác thực sinh trắc học (biometric verification), đặc biệt là liveness detection, làm tăng nguy cơ giả mạo danh tính (identity fraud)."},{"id":287,"stt":17,"chapter":"VI. QUẢN TRỊ – ĐIỀU HÀNH – CHIẾN LƯỢC","topic":"VI.3. Mô hình ngân hàng số","topicCode":"VI.3","question":"Một ngân hàng triển khai hệ thống gợi ý sản phẩm cho khách hàng dựa trên dữ liệu lịch sử giao dịch. Tuy nhiên, hệ thống chỉ đưa ra các đề xuất giống nhau cho nhiều nhóm khách hàng khác nhau và không phản ánh được nhu cầu tại thời điểm hiện tại. Để nâng cao hiệu quả cá nhân hóa, giải pháp nào dưới đây là phù hợp nhất?","options":{"A":"Tăng số lượng sản phẩm được đưa vào hệ thống gợi ý","B":"Sử dụng dữ liệu thời gian thực kết hợp mô hình phân tích hành vi khách hàng","C":"Tăng tần suất gửi thông báo quảng cáo đến khách hàng","D":"Chuẩn hóa danh mục sản phẩm để dễ dàng gợi ý"},"correct":"B","explanation":"Cá nhân hóa hiệu quả cần kết hợp dữ liệu thời gian thực và phân tích hành vi, thay vì chỉ dựa trên dữ liệu lịch sử. Điều này giúp hệ thống phản ánh đúng nhu cầu hiện tại của khách hàng."},{"id":288,"stt":18,"chapter":"VI. QUẢN TRỊ – ĐIỀU HÀNH – CHIẾN LƯỢC","topic":"VI.3. Mô hình ngân hàng số","topicCode":"VI.3","question":"Một nền tảng thương mại điện tử tích hợp trực tiếp dịch vụ “mua trước – trả sau” (Buy Now Pay Later – BNPL) do ngân hàng cung cấp, cho phép khách hàng vay ngay tại bước thanh toán mà không cần rời khỏi ứng dụng. Mô hình này phản ánh đặc điểm nào của mô hình tài chính nhúng?","options":{"A":"Dịch vụ tài chính được tích hợp trực tiếp vào hành trình khách hàng trên nền tảng phi tài chính","B":"Ngân hàng cung cấp dịch vụ tài chính độc lập trên kênh riêng","C":"Ngân hàng chuyển toàn bộ hoạt động sang kênh số","D":"Dịch vụ tài chính chỉ cung cấp cho khách hàng hiện hữu của ngân hàng"},"correct":"A","explanation":"Mô hình tài chính nhúng (Embedded finance) là việc “nhúng” (embed) dịch vụ tài chính vào nền tảng phi tài chính, giúp khách hàng sử dụng dịch vụ mà không cần chuyển kênh"},{"id":289,"stt":19,"chapter":"VI. QUẢN TRỊ – ĐIỀU HÀNH – CHIẾN LƯỢC","topic":"VI.4. Đánh giá mức độ trưởng thành CĐS","topicCode":"VI.4","question":"Về an toàn thông tin, Quyết định 3579/QĐ-NHNN yêu cầu bảo đảm an toàn, an ninh mạng đối với sản phẩm, phần mềm từ giai đoạn nào?","options":{"A":"Ngay từ khâu thiết kế (Security by design).","B":"Sau khi triển khai xong hệ thống lõi (Core Banking).","C":"Ngay khi phát hiện có lỗ hổng bảo mật.","D":"Chỉ áp dụng ở khâu thanh toán quốc tế."},"correct":"A","explanation":"QĐ 3579/QĐ-NHNN\n📖 Điều khoản: Mục I.6"},{"id":290,"stt":20,"chapter":"VI. QUẢN TRỊ – ĐIỀU HÀNH – CHIẾN LƯỢC","topic":"VI.5. Quản trị thay đổi","topicCode":"VI.5","question":"Khi một ngân hàng quyết định thay đổi hệ thống lõi (Core Banking), yếu tố nào sau đây phải được ưu tiên xem xét theo yêu cầu về hoạch định sự thay đổi?","options":{"A":"Chi phí bản quyền phần mềm và phí triển khai","B":"Mục đích của sự thay đổi và các hệ quả tiềm ẩn của nó","C":"Ý kiến của các cổ đông về việc thay đổi công nghệ","D":"Thời gian dự kiến để hoàn thành việc cài đặt"},"correct":"B","explanation":"Tiêu chuẩn TCVN ISO 9001:2015\n📖 Điều khoản: Điểm a, Điều khoản 6.3"},{"id":291,"stt":21,"chapter":"VI. QUẢN TRỊ – ĐIỀU HÀNH – CHIẾN LƯỢC","topic":"VI.5. Quản trị thay đổi","topicCode":"VI.5","question":"Khi một tổ chức chuẩn bị có sự thay đổi trong quá trình CĐS, nguồn lực cần xem xét khi hoạch định sự thay đổi bao gồm những gì?","options":{"A":"Chỉ bao gồm nguồn lực về tài chính","B":"Chỉ bao gồm các trang thiết bị máy móc","C":"Các nguồn lực từ đối thủ cạnh tranh","D":"Sự sẵn có của các nguồn lực"},"correct":"D","explanation":"Tiêu chuẩn TCVN ISO 9001:2015\n📖 Điều khoản: Điểm c, Điều khoản 6.3"},{"id":292,"stt":22,"chapter":"VI. QUẢN TRỊ – ĐIỀU HÀNH – CHIẾN LƯỢC","topic":"VI.5. Quản trị thay đổi","topicCode":"VI.5","question":"Khi thay đổi thiết kế và phát triển sản phẩm thuộc phạm vi Hệ thống quản lý chất lượng do ngân hàng đang áp dụng, nội dung nào bắt buộc phải được lưu giữ?","options":{"A":"Chi phí thay đổi","B":"Ý kiến cá nhân của nhân viên","C":"Kết quả xem xét và phê duyệt thay đổi","D":"Lịch sử công ty"},"correct":"C","explanation":"Tiêu chuẩn TCVN ISO 9001:2015\n📖 Điều khoản: Điều 8.3.6: “Tổ chức phải lưu giữ thông tin dạng văn bản về… kết quả xem xét; việc cho phép thay đổi…”"},{"id":293,"stt":23,"chapter":"VI. QUẢN TRỊ – ĐIỀU HÀNH – CHIẾN LƯỢC","topic":"VI.5. Quản trị thay đổi","topicCode":"VI.5","question":"Trong phạm vi Hệ thống quản lý chất lượng do ngân hàng đang áp dụng, khi có thay đổi ngoài dự kiến trong vận hành, tổ chức phải làm gì?","options":{"A":"Bỏ qua nếu không nghiêm trọng
