dịch để đảm bảo an toàn"},"correct":"A","explanation":"Quyết định số 3579/QĐ-NHNN ngày 03/11/2025\n📖 Điều khoản: Mục IV.5.b"},{"id":400,"stt":40,"chapter":"VIII. ỨNG DỤNG THỰC TIỄN – TÌNH HUỐNG","topic":"VIII.7. Bài học mô hình ngân hàng số thành công","topicCode":"VIII.7","question":"Theo Chiến lược chuyển đổi số ngành Ngân hàng (Quyết định 3579/QĐ-NHNN), mô hình kinh doanh mới nào cần được các ngân hàng đẩy mạnh tích hợp, kết nối với các ngành khác để tạo hệ sinh thái số?","options":{"A":"Ngân hàng di động vật lý (xe lưu động)","B":"Ngân hàng viết tay","C":"Ngân hàng mở và Tài chính nhúng … để cung ứng các sản phẩm dịch vụ thân thiên, an toàn với chi phí thấp.","D":"Ngân hàng không có ứng dụng"},"correct":"C","explanation":"Quyết định số 3579/QĐ-NHNN ngày 03/11/2025\n📖 Điều khoản: Mục IV.5.đ"}]</script>

<div id="app"></div>

<script>
// ============================================================
// DATA
// ============================================================
const questions = JSON.parse(document.getElementById('questions-data').textContent);

// Tính chapters (theo thứ tự xuất hiện) và topics trong mỗi chapter
function buildChapters() {
  const map = new Map();
  for (const q of questions) {
    const ch = q.chapter || 'Khác';
    if (!map.has(ch)) map.set(ch, { chapter: ch, ids: [], topics: new Map() });
    const entry = map.get(ch);
    entry.ids.push(q.id);
    const code = q.topicCode || q.topic || '-';
    if (!entry.topics.has(code)) {
      entry.topics.set(code, { code, name: q.topic || code, ids: [] });
    }
    entry.topics.get(code).ids.push(q.id);
  }
  return [...map.values()].map(c => ({
    chapter: c.chapter,
    ids: c.ids,
    topics: [...c.topics.values()]
  }));
}
const chapters = buildChapters();

// ============================================================
// CONFIG
// ============================================================
const STORAGE_KEY = 'ontap400_v2';
const TOTAL_EXAMS = 20;
const QUESTIONS_PER_EXAM = 20;

// ============================================================
// STATE & STORAGE
// ============================================================
let storage = {
  wrongIds: [],
  sequentialIndex: 0,
  sequentialAnswers: {},
  bookmarks: [],
  examScores: {},
  topicScores: {},   // { topicCode: {score, total, date} }
  stats: { totalAnswered: 0, totalCorrect: 0 }
};
let session = null;

function loadStorage() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const data = JSON.parse(saved);
      storage = { ...storage, ...data };
      storage.wrongIds = Array.isArray(storage.wrongIds) ? storage.wrongIds : [];
      storage.bookmarks = Array.isArray(storage.bookmarks) ? storage.bookmarks : [];
      storage.sequentialAnswers = storage.sequentialAnswers || {};
      storage.examScores = storage.examScores || {};
      storage.topicScores = storage.topicScores || {};
      storage.stats = storage.stats || { totalAnswered: 0, totalCorrect: 0 };
    }
  } catch (e) { console.error(e); }
}
function saveStorage() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(storage)); }
  catch (e) { console.error(e); }
}

// ============================================================
// HELPERS
// ============================================================
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function byId(id) { return questions.find(q => q.id === id); }
function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function getFixedExamQuestions(examIndex) {
  const start = examIndex * QUESTIONS_PER_EXAM;
  return questions.slice(start, start + QUESTIONS_PER_EXAM);
}
function toast(msg) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1800);
}
function chapterRomanOnly(chapterTitle) {
  const m = chapterTitle.match(/^([IVX]+)\./);
  return m ? m[1] : chapterTitle.slice(0, 3);
}

// ============================================================
// APP
// ============================================================
const app = document.getElementById('app');
function render(html) {
  app.innerHTML = `<div class="container fade-in">${html}</div>`;
  window.scrollTo(0, 0);
}

// ============================================================
// HOME
// ============================================================
function renderHome() {
  stopExamTimer();
  session = null;
  const wrongCount = storage.wrongIds.length;
  const bookmarkCount = storage.bookmarks.length;
  const accuracy = storage.stats.totalAnswered
    ? Math.round((storage.stats.totalCorrect / storage.stats.totalAnswered) * 100)
    : 0;
  const seqProgress = Math.round((storage.sequentialIndex / questions.length) * 100);
  const examsCompleted = Object.keys(storage.examScores).length;

  render(`
    <div class="app-header">
      <h1>📚 Ôn tập ${questions.length} câu hỏi cơ bản</h1>
      <div class="subtitle">Thi tay nghề · Chuyển đổi số ngành Ngân hàng</div>
      <div class="badge-count">${chapters.length} chương · ${chapters.reduce((s,c)=>s+c.topics.length,0)} chủ đề</div>
    </div>

    <div class="stats">
      <div class="stat-box"><div class="value">${questions.length}</div><div class="label">Tổng câu</div></div>
      <div class="stat-box"><div class="value">${storage.stats.totalAnswered}</div><div class="label">Đã trả lời</div></div>
      <div class="stat-box"><div class="value" style="color:${accuracy>=70?'var(--success)':accuracy>=50?'var(--warning)':'var(--danger)'}">${accuracy}%</div><div class="label">Độ chính xác</div></div>
      <div class="stat-box"><div class="value" style="color:var(--danger)">${wrongCount}</div><div class="label">Câu sai</div></div>
    </div>

    <div class="mode-grid">
      <button class="mode-card" onclick="startSequential()">
        <div class="icon">📖</div>
        <h3>1. Ôn lần lượt ${questions.length} câu</h3>
        <p>Học tuần tự từ câu 1 đến ${questions.length}, tự lưu tiến độ.</p>
        <span class="badge">Tiến độ: ${storage.sequentialIndex}/${questions.length} (${seqProgress}%)</span>
      </button>

      <button class="mode-card warn" onclick="startWrongReview()" ${wrongCount===0?'disabled':''}>
        <div class="icon">🔁</div>
        <h3>2. Ôn các câu sai</h3>
        <p>Tập trung ôn lại những câu đã trả lời sai. Làm đúng lại sẽ tự gỡ khỏi danh sách.</p>
        <span class="badge">${wrongCount} câu cần ôn</span>
      </button>

      <button class="mode-card" onclick="showFixedExams()">
        <div class="icon">📝</div>
        <h3>3. ${TOTAL_EXAMS} đề cố định</h3>
        <p>${TOTAL_EXAMS} đề, mỗi đề ${QUESTIONS_PER_EXAM} câu, không trùng lặp. Chấm điểm.</p>
        <span class="badge">${examsCompleted}/${TOTAL_EXAMS} đề đã làm</span>
      </button>

      <button class="mode-card good" onclick="startRandomExam()">
        <div class="icon">🎲</div>
        <h3>4. Đề ngẫu nhiên</h3>
        <p>Rút ngẫu nhiên ${QUESTIONS_PER_EXAM} câu từ toàn bộ ngân hàng. Chấm điểm.</p>
        <span class="badge">Thi thử không giới hạn</span>
      </button>

      <button class="mode-card chapter" onclick="showChapters()">
        <div class="icon">📂</div>
        <h3>5. Ôn theo chương / chủ đề</h3>
        <p>Chọn 1 trong ${chapters.length} chương hoặc ${chapters.reduce((s,c)=>s+c.topics.length,0)} chủ đề để ôn tập trung.</p>
        <span class="badge">${chapters.length} chương</span>
      </button>

      <button class="mode-card star" onclick="startBookmarks()" ${bookmarkCount===0?'disabled':''}>
        <div class="icon">⭐</div>
        <h3>6. Câu đánh dấu sao</h3>
        <p>Những câu bạn đã đánh dấu để ôn lại sau.</p>
        <span class="badge">${bookmarkCount} câu</span>
      </button>
    </div>

    <div class="card">
      <h3>⚙️ Tuỳ chọn dữ liệu</h3>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn btn-outline btn-sm" onclick="confirmReset('sequential')">Reset tiến độ tuần tự</button>
        <button class="btn btn-outline btn-sm" onclick="confirmReset('wrong')">Xoá lịch sử câu sai</button>
        <button class="btn btn-outline btn-sm" onclick="confirmReset('exams')">Xoá điểm các đề</button>
        <button class="btn btn-outline btn-sm" onclick="confirmReset('bookmarks')">Xoá đánh dấu sao</button>
        <button class="btn btn-danger btn-sm" onclick="confirmReset('all')">Reset toàn bộ</button>
      </div>
    </div>

    <div style="text-align:center;color:var(--text-muted);font-size:0.82rem;margin-top:18px">
      Dữ liệu lưu trong trình duyệt (localStorage). Không gửi lên mạng. Có thể dùng offline.
    </div>
  `);
}

// ============================================================
// CHAPTER / TOPIC VIEWS
// ============================================================
function showChapters() {
  const items = chapters.map((c, i) => {
    const ids = c.ids;
    const wrongInCh = ids.filter(id => storage.wrongIds.includes(id)).length;
    return `
      <button class="chapter-item" onclick="showChapterTopics(${i})">
        <div class="ch-icon">${escapeHtml(chapterRomanOnly(c.chapter))}</div>
        <div class="ch-body">
          <div class="ch-title">${escapeHtml(c.chapter)}</div>
          <div class="ch-meta">${c.ids.length} câu · ${c.topics.length} chủ đề${wrongInCh ? ` · <span style="color:var(--danger)">${wrongInCh} câu sai</span>` : ''}</div>
        </div>
        <div class="ch-arrow">›</div>
      </button>
    `;
  }).join('');
  render(`
    <div class="topbar">
      <button class="btn btn-ghost" onclick="renderHome()">← Về trang chủ</button>
      <div class="spacer"></div>
    </div>
    <div class="app-header" style="padding:8px 0 16px">
      <h1>📂 Ôn theo chương</h1>
      <div class="subtitle">Chọn 1 chương để xem các chủ đề</div>
    </div>
    <div class="card">
      <div class="chapter-list">${items}</div>
    </div>
  `);
}

function showChapterTopics(chapterIdx) {
  const c = chapters[chapterIdx];
  if (!c) return renderHome();
  const topicItems = c.topics.map((t, i) => {
    const wrongInTp = t.ids.filter(id => storage.wrongIds.includes(id)).length;
    const score = storage.topicScores[t.code];
    let scoreHtml = '';
    if (score) {
      const pct = Math.round((score.score / score.total) * 100);
      scoreHtml = `<span class="tp-score ${pct>=70?'pass':'fail'}">${score.score}/${score.total} (${pct}%)</span>`;
    }
    return `
      <button class="topic-item" onclick="startTopicPractice('${escapeHtml(t.code)}')">
        <span class="tp-code">${escapeHtml(t.code)}</span>
        <span class="tp-name">${escapeHtml(t.name)}</span>
        <span class="tp-count">${t.ids.length} câu${wrongInTp ? ` · <span style="color:var(--danger)">${wrongInTp} sai</span>` : ''}</span>
        ${scoreHtml}
      </button>
    `;
  }).join('');
  render(`
    <div class="topbar">
      <button class="btn btn-ghost" onclick="showChapters()">← Danh sách chương</button>
      <div class="spacer"></div>
    </div>
    <div class="app-header" style="padding:8px 0 16px">
      <h1>${escapeHtml(c.chapter)}</h1>
      <div class="subtitle">${c.ids.length} câu · ${c.topics.length} chủ đề</div>
    </div>
    <div class="card">
      <button class="btn btn-primary" style="width:100%;margin-bottom:14px" onclick="startChapterPractice(${chapterIdx})">
        📚 Ôn toàn bộ ${c.ids.length} câu của chương này
      </button>
      <h3>Hoặc chọn 1 chủ đề:</h3>
      ${topicItems}
    </div>
  `);
}

function startChapterPractice(chapterIdx) {
  const c = chapters[chapterIdx];
  if (!c) return;
  session = {
    mode: 'chapter',
    ids: [...c.ids],
    index: 0,
    answers: {},
    showResultAtEnd: true,
    title: `Chương ${chapterRomanOnly(c.chapter)}`,
    backTo: () => showChapterTopics(chapterIdx)
  };
  renderQuestion();
}

function startTopicPractice(topicCode) {
  const ids = questions.filter(q => q.topicCode === topicCode).map(q => q.id);
  if (ids.length === 0) { toast('Không có câu nào cho chủ đề này.'); return; }
  session = {
    mode: 'topic',
    topicCode,
    ids,
    index: 0,
    answers: {},
    showResultAtEnd: true,
    title: `Chủ đề ${topicCode}`,
    backTo: () => {
      const chapterIdx = chapters.findIndex(c => c.topics.some(t => t.code === topicCode));
      if (chapterIdx >= 0) showChapterTopics(chapterIdx);
      else showChapters();
    }
  };
  renderQuestion();
}

// ============================================================
// SESSION STARTERS
// ============================================================
function startSequential() {
  const ids = questions.map(q => q.id);
  session = {
    mode: 'sequential',
    ids,
    index: Math.min(storage.sequentialIndex, ids.length - 1),
    answers: {},
    showResultAtEnd: false,
    title: 'Ôn lần lượt'
  };
  renderQuestion();
}
function startWrongReview() {
  if (storage.wrongIds.length === 0) { toast('Chưa có câu sai nào.'); return; }
  session = {
    mode: 'wrong',
    ids: [...storage.wrongIds],
    index: 0,
    answers: {},
    showResultAtEnd: false,
    title: 'Ôn các câu sai'
  };
  renderQuestion();
}
function showFixedExams() {
  const tiles = [];
  for (let i = 0; i < TOTAL_EXAMS; i++) {
    const score = storage.examScores[`fixed_${i}`];
    let cls = '';
    let scoreText = 'Chưa làm';
    if (score) {
      const pct = Math.round((score.score / score.total) * 100);
      cls = pct >= 70 ? 'completed-high' : 'completed-low';
      scoreText = `${score.score}/${score.total}`;
    }
    tiles.push(`
      <button class="exam-tile ${cls}" onclick="startFixedExam(${i})">
        <span class="num">Đề ${i + 1}</span>
        <span class="score">${scoreText}</span>
      </button>
    `);
  }
  render(`
    <div class="topbar">
      <button class="btn btn-ghost" onclick="renderHome()">← Về trang chủ</button>
      <div class="spacer"></div>
    </div>
    <div class="app-header" style="padding:8px 0 16px">
      <h1>📝 ${TOTAL_EXAMS} đề cố định</h1>
      <div class="subtitle">${QUESTIONS_PER_EXAM} câu/đề · Ngưỡng đạt ≥ 70%</div>
    </div>
    <div class="card">
      <div class="exam-grid">${tiles.join('')}</div>
    </div>
  `);
}
function startFixedExam(examIndex) {
  stopExamTimer();
  const qs = getFixedExamQuestions(examIndex);
  if (qs.length === 0) { toast('Đề này không có câu hỏi.'); return; }
  session = {
    mode: 'fixedExam',
    examId: `fixed_${examIndex}`,
    examIndex,
    ids: qs.map(q => q.id),
    index: 0,
    answers: {},
    showResultAtEnd: true,
    title: `Đề ${examIndex + 1}`
  };
  renderQuestion();
}
function startRandomExam() {
  stopExamTimer();
  const ids = shuffle(questions.map(q => q.id)).slice(0, QUESTIONS_PER_EXAM);
  session = {
    mode: 'randomExam',
    ids,
    index: 0,
    answers: {},
    showResultAtEnd: true,
    title: 'Đề ngẫu nhiên'
  };
  renderQuestion();
}
function startBookmarks() {
  if (storage.bookmarks.length === 0) { toast('Chưa có câu đánh dấu nào.'); return; }
  session = {
    mode: 'bookmarks',
    ids: [...storage.bookmarks],
    index: 0,
    answers: {},
    showResultAtEnd: false,
    title: 'Câu đánh dấu sao'
  };
  renderQuestion();
}

// ============================================================
// EXAM TIMER
// ============================================================
let timerInterval = null;
const EXAM_TOTAL_SECS = 10 * 60; // 10 phút cố định

function startExamTimer() {
  stopExamTimer();
  if (!session || !isExamMode()) return;
  if (session.timerRemaining === undefined) {
    session.timerRemaining = EXAM_TOTAL_SECS;
  }
  timerInterval = setInterval(() => {
    if (!session || !isExamMode()) { stopExamTimer(); return; }
    session.timerRemaining -= 1;
    updateTimerDisplay();
    if (session.timerRemaining <= 0) {
      stopExamTimer();
      toast('⏰ Hết giờ! Bài thi được nộp tự động.');
      renderResults();
    }
  }, 1000);
}

function stopExamTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

function isExamMode() {
  return session && (session.mode === 'fixedExam' || session.mode === 'randomExam');
}

function formatTimer(secs) {
  const m = Math.floor(secs / 60);
  const s = secs % 60;
  return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
}

function updateTimerDisplay() {
  const el = document.getElementById('exam-timer');
  if (!el || !session) return;
  const rem = session.timerRemaining;
  const total = EXAM_TOTAL_SECS;
  el.textContent = '⏱ ' + formatTimer(rem);
  el.className = 'exam-timer';
  if (rem <= 60) el.classList.add('danger');
  else if (rem <= total * 0.25) el.classList.add('warn');
}

// ============================================================
// QUESTION VIEW
// ============================================================
let sidebarCollapsed = false;

function toggleSidebar() {
  sidebarCollapsed = !sidebarCollapsed;
  const sb = document.getElementById('q-sidebar');
  if (sb) sb.classList.toggle('collapsed', sidebarCollapsed);
}

function toggleMobileSidebar() {
  const sb = document.getElementById('q-sidebar');
  const overlay = document.getElementById('q-sidebar-overlay');
  if (!sb) return;
  const isOpen = sb.classList.contains('mobile-open');
  sb.classList.toggle('mobile-open', !isOpen);
  if (overlay) overlay.style.display = isOpen ? 'none' : 'block';
}

function goToQuestion(index) {
  if (!session || index < 0 || index >= session.ids.length) return;
  session.index = index;
  const qId = session.ids[index];
  if (session.mode === 'sequential' && storage.sequentialAnswers[qId] && !session.answers[qId]) {
    session.answers[qId] = storage.sequentialAnswers[qId].selected;
  }
  // Close mobile sidebar
  const sb = document.getElementById('q-sidebar');
  const overlay = document.getElementById('q-sidebar-overlay');
  if (sb) sb.classList.remove('mobile-open');
  if (overlay) overlay.style.display = 'none';
  renderQuestion();
}

function buildSidebarHtml() {
  const items = session.ids.map((qId, i) => {
    const ans = session.answers[qId];
    const q = byId(qId);
    const isCurrent = i === session.index;
    let cls = 'q-item';
    let statusIcon = '';
    if (isCurrent) {
      cls += ' current';
      statusIcon = '▶';
    } else if (ans) {
      const ok = q && ans === q.correct;
      cls += ok ? ' answered-ok' : ' answered-wrong';
      statusIcon = ok ? '✓' : '✗';
    }
    return `<button class="${cls}" onclick="goToQuestion(${i})" id="qitem-${i}" title="Câu ${i + 1}">
      <span class="q-item-num">${i + 1}</span>
      <span class="q-item-label">Câu ${i + 1}</span>
      <span class="q-item-status">${statusIcon}</span>
    </button>`;
  }).join('');

  const answered = Object.keys(session.answers).length;
  const correct = session.ids.filter(id => {
    const q = byId(id); return q && session.answers[id] === q.correct;
  }).length;

  return `
    <div class="q-sidebar ${sidebarCollapsed ? 'collapsed' : ''}" id="q-sidebar">
      <div class="q-sidebar-header">
        <span class="sidebar-title">
          ${answered}/${session.ids.length} câu<br>
          <span style="font-size:0.75rem;color:var(--success);font-weight:500">✓ ${correct} đúng</span>
          ${answered - correct > 0 ? `<span style="font-size:0.75rem;color:var(--danger);font-weight:500"> · ✗ ${answered - correct} sai</span>` : ''}
        </span>
        <button class="sidebar-toggle-btn" onclick="toggleSidebar()" title="Thu/mở danh sách">☰</button>
      </div>
      <div class="q-sidebar-list" id="q-sidebar-list">
        ${items}
      </div>
    </div>
    <div class="q-sidebar-overlay" id="q-sidebar-overlay" onclick="toggleMobileSidebar()"></div>
  `;
}

function renderQuestion() {
  if (!session) return renderHome();
  const qId = session.ids[session.index];
  const q = byId(qId);
  if (!q) { nextQuestion(); return; }

  const selected = session.answers[qId];
  const revealed = !!selected;
  const isBookmarked = storage.bookmarks.includes(qId);
  const progress = Math.round(((session.index + 1) / session.ids.length) * 100);

  const optionsHtml = ['A', 'B', 'C', 'D'].map(letter => {
    const val = q.options[letter];
    if (!val) return '';
    let cls = 'option';
    if (revealed) {
      if (letter === q.correct) cls += ' correct';
      else if (letter === selected) cls += ' wrong';
    } else if (letter === selected) cls += ' selected';
    return `
      <button class="${cls}" onclick="selectAnswer('${letter}')" ${revealed ? 'disabled' : ''}>
        <span class="letter">${letter}</span>
        <span class="text">${escapeHtml(val)}</span>
      </button>
    `;
  }).join('');

  let feedbackHtml = '';
  if (revealed) {
    const isRight = selected === q.correct;
    feedbackHtml = `<div class="feedback ${isRight ? 'right' : 'wrong'}">
      ${isRight ? '✅ Chính xác!' : `❌ Sai rồi. Đáp án đúng là <strong style="margin:0 4px">${q.correct}</strong>.`}
    </div>`;
    if (q.explanation) {
      feedbackHtml += `<div class="explanation"><strong>💡 Giải thích & văn bản tham chiếu:</strong>\n${escapeHtml(q.explanation)}</div>`;
    }
  }

  const isLast = session.index === session.ids.length - 1;
  const nextBtnLabel = isLast
    ? (session.showResultAtEnd ? 'Nộp bài & xem kết quả' : 'Hoàn thành ✓')
    : 'Câu tiếp →';

  const chapterShort = q.chapter ? chapterRomanOnly(q.chapter) : '';

  const timerHtml = isExamMode()
    ? `<span class="exam-timer" id="exam-timer">⏱ ${formatTimer(session.timerRemaining !== undefined ? session.timerRemaining : EXAM_TOTAL_SECS)}</span>`
    : '';

  app.innerHTML = `<div class="quiz-layout">
    ${buildSidebarHtml()}
    <main class="q-main">
      <div class="container fade-in">
        <div class="topbar">
          <button class="btn btn-ghost" onclick="confirmExit()">← Trang chủ</button>
          <button class="mobile-sidebar-btn" onclick="toggleMobileSidebar()">☰ Câu hỏi</button>
          <div class="spacer"></div>
          ${timerHtml}
          <button class="bookmark-btn ${isBookmarked?'active':''}" onclick="toggleBookmark(${qId})" title="Đánh dấu để ôn lại">
            ${isBookmarked ? '★' : '☆'}
          </button>
        </div>

        <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap">
          <div class="chip">${escapeHtml(session.title)} · Câu ${session.index + 1}/${session.ids.length}</div>
        </div>
        <div class="meta-strip">
          ${q.chapter ? `<span class="chip chapter" title="${escapeHtml(q.chapter)}">Chương ${escapeHtml(chapterShort)}</span>` : ''}
          ${q.topic ? `<span class="chip topic">${escapeHtml(q.topic)}</span>` : ''}
        </div>
        <div class="progress-bar-wrap"><div class="progress-bar" style="width:${progress}%"></div></div>

        <div class="card">
          <div class="question-text">${escapeHtml(q.question)}</div>
          <div class="options">${optionsHtml}</div>
          ${feedbackHtml}

          <div class="btn-row" style="justify-content:space-between">
            <button class="btn btn-ghost" onclick="prevQuestion()" ${session.index === 0 ? 'disabled' : ''}>← Câu trước</button>
            <button class="btn btn-primary" onclick="nextQuestion()" ${!revealed ? 'disabled' : ''}>
              ${nextBtnLabel}
            </button>
          </div>
        </div>
      </div>
    </main>
  </div>`;

  // Scroll sidebar item into view + start/restore timer
  setTimeout(() => {
    const el = document.getElementById('qitem-' + session.index);
    if (el) el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    if (isExamMode()) {
      updateTimerDisplay();
      if (!timerInterval) startExamTimer();
    }
  }, 50);
}

function selectAnswer(letter) {
  if (!session) return;
  const qId = session.ids[session.index];
  const q = byId(qId);
  if (!q || session.answers[qId]) return;
  session.answers[qId] = letter;
  const isCorrect = letter === q.correct;
  storage.stats.totalAnswered += 1;
  if (isCorrect) storage.stats.totalCorrect += 1;
  if (isCorrect) {
    if (storage.wrongIds.includes(qId)) {
      storage.wrongIds = storage.wrongIds.filter(id => id !== qId);
    }
  } else {
    if (!storage.wrongIds.includes(qId)) storage.wrongIds.push(qId);
  }
  if (session.mode === 'sequential') {
    storage.sequentialAnswers[qId] = { selected: letter, correct: q.correct };
  }
  saveStorage();
  renderQuestion();
}

function nextQuestion() {
  if (!session) return;
  const qId = session.ids[session.index];
  if (!session.answers[qId]) return;
  if (session.mode === 'sequential' && session.index + 1 > storage.sequentialIndex) {
    storage.sequentialIndex = session.index + 1;
    saveStorage();
  }
  if (session.index < session.ids.length - 1) {
    session.index += 1;
    renderQuestion();
  } else {
    if (session.showResultAtEnd) renderResults();
    else renderCompletion();
  }
}

function prevQuestion() {
  if (!session || session.index === 0) return;
  session.index -= 1;
  const qId = session.ids[session.index];
  if (session.mode === 'sequential' && storage.sequentialAnswers[qId] && !session.answers[qId]) {
    session.answers[qId] = storage.sequentialAnswers[qId].selected;
  }
  renderQuestion();
}

function toggleBookmark(qId) {
  if (storage.bookmarks.includes(qId)) {
    storage.bookmarks = storage.bookmarks.filter(id => id !== qId);
    toast('Đã bỏ đánh dấu');
  } else {
    storage.bookmarks.push(qId);
    toast('Đã đánh dấu ⭐');
  }
  saveStorage();
  renderQuestion();
}

function confirmExit() {
  if (session && session.showResultAtEnd && Object.keys(session.answers).length > 0
      && Object.keys(session.answers).length < session.ids.length) {
    if (!confirm('Bạn đang làm bài. Thoát sẽ không lưu điểm. Tiếp tục?')) return;
  }
  renderHome();
}

// ============================================================
// COMPLETION & RESULTS
// ============================================================
function renderCompletion() {
  stopExamTimer();
  const total = session.ids.length;
  const answered = Object.values(session.answers).length;
  const correct = session.ids.filter(id => {
    const q = byId(id); return q && session.answers[id] === q.correct;
  }).length;
  const wrong = answered - correct;
  render(`
    <div class="app-header">
      <h1>🎉 Hoàn thành!</h1>
      <div class="subtitle">${escapeHtml(session.title)}</div>
    </div>
    <div class="result-hero">
      <div style="color:var(--text-muted)">Bạn đã làm xong</div>
      <div class="result-score">${correct}/${total}</div>
      <div class="result-percent ${correct*2>=total?'pass':'fail'}">${Math.round(correct/total*100)}% chính xác</div>
      <div class="result-msg">${wrong > 0 ? `${wrong} câu sai đã thêm vào danh sách ôn tập.` : 'Xuất sắc! Không có câu sai.'}</div>
    </div>
    <div class="btn-row" style="justify-content:center">
      <button class="btn btn-outline" onclick="renderHome()">🏠 Về trang chủ</button>
      ${session.mode === 'wrong' && storage.wrongIds.length > 0
        ? `<button class="btn btn-primary" onclick="startWrongReview()">Ôn tiếp câu sai</button>` : ''}
    </div>
  `);
}

function renderResults() {
  stopExamTimer();
  const total = session.ids.length;
  const correct = session.ids.filter(id => {
    const q = byId(id); return q && session.answers[id] === q.correct;
  }).length;
  const pct = Math.round((correct / total) * 100);
  const passed = pct >= 70;

  // Lưu điểm
  if (session.examId) {
    storage.examScores[session.examId] = { score: correct, total, date: new Date().toISOString() };
  }
  if (session.mode === 'topic' && session.topicCode) {
    storage.topicScores[session.topicCode] = { score: correct, total, date: new Date().toISOString() };
  }
  saveStorage();

  const reviewItems = session.ids.map((id, i) => {
    const q = byId(id); if (!q) return '';
    const sel = session.answers[id];
    const ok = sel === q.correct;
    return `
      <div class="review-item ${ok ? 'right' : ''}">
        <div>
          <span class="q-num">Câu ${i + 1}.</span>
          ${q.topic ? ` <span class="chip topic">${escapeHtml(q.topic)}</span>` : ''}
        </div>
        <div class="q-text">${escapeHtml(q.question)}</div>
        <div class="ans-line">Đáp án của bạn: <span class="your-ans ${ok?'ok':''}">${sel || '(không chọn)'}${sel ? ' — ' + escapeHtml(q.options[sel] || '') : ''}</span></div>
        ${!ok ? `<div class="ans-line">Đáp án đúng: <span class="correct-ans">${q.correct} — ${escapeHtml(q.options[q.correct] || '')}</span></div>` : ''}
        ${q.explanation ? `<div class="ans-line" style="margin-top:6px;color:var(--text-muted)">💡 ${escapeHtml(q.explanation)}</div>` : ''}
      </div>
    `;
  }).join('');

  let retryBtn = '';
  if (session.mode === 'fixedExam') {
    retryBtn = `<button class="btn btn-primary" onclick="startFixedExam(${session.examIndex})">🔄 Làm lại đề này</button>`;
  } else if (session.mode === 'randomExam') {
    retryBtn = `<button class="btn btn-primary" onclick="startRandomExam()">🎲 Đề mới ngẫu nhiên</button>`;
  } else if (session.mode === 'chapter') {
    retryBtn = `<button class="btn btn-primary" onclick="session.backTo && session.backTo()">← Chọn chương/chủ đề khác</button>`;
  } else if (session.mode === 'topic') {
    retryBtn = `<button class="btn btn-primary" onclick="startTopicPractice('${escapeHtml(session.topicCode)}')">🔄 Ôn lại chủ đề này</button>`;
  }

  const timeUsedHtml = isExamMode() && session.timerRemaining !== undefined
    ? (() => {
        const totalSecs = EXAM_TOTAL_SECS;
        const used = totalSecs - session.timerRemaining;
        return `<div style="font-size:0.9rem;color:var(--text-muted);margin-top:6px">⏱ Thời gian: ${formatTimer(used)} / ${formatTimer(totalSecs)}</div>`;
      })()
    : '';

  render(`
    <div class="app-header">
      <h1>📊 Kết quả</h1>
      <div class="subtitle">${escapeHtml(session.title)}</div>
    </div>
    <div class="result-hero">
      <div style="color:var(--text-muted)">Điểm của bạn</div>
      <div class="result-score">${correct}/${total}</div>
      <div class="result-percent ${passed?'pass':'fail'}">${pct}% ${passed?'✅ Đạt':'❌ Chưa đạt (cần ≥ 70%)'}</div>
      <div class="result-msg">Đúng ${correct} câu · Sai ${total - correct} câu</div>
      ${timeUsedHtml}
    </div>
    <div class="btn-row" style="justify-content:center;margin-bottom:18px">
      <button class="btn btn-outline" onclick="renderHome()">🏠 Về trang chủ</button>
      ${retryBtn}
    </div>
    <div class="card">
      <h3>📋 Chi tiết bài làm</h3>
      ${reviewItems}
    </div>
  `);
}

// ============================================================
// RESET
// ============================================================
function confirmReset(kind) {
  const msgs = {
    sequential: 'Reset tiến độ ôn lần lượt về câu đầu?',
    wrong: 'Xoá toàn bộ lịch sử câu sai?',
    exams: 'Xoá điểm của tất cả các đề?',
    bookmarks: 'Xoá tất cả câu đã đánh dấu sao?',
    all: 'RESET TOÀN BỘ dữ liệu? Hành động này không thể hoàn tác.'
  };
  if (!confirm(msgs[kind])) return;
  if (kind === 'sequential') {
    storage.sequentialIndex = 0;
    storage.sequentialAnswers = {};
  } else if (kind === 'wrong') {
    storage.wrongIds = [];
  } else if (kind === 'exams') {
    storage.examScores = {};
    storage.topicScores = {};
  } else if (kind === 'bookmarks') {
    storage.bookmarks = [];
  } else if (kind === 'all') {
    localStorage.removeItem(STORAGE_KEY);
    storage = {
      wrongIds: [], sequentialIndex: 0, sequentialAnswers: {},
      bookmarks: [], examScores: {}, topicScores: {},
      stats: { totalAnswered: 0, totalCorrect: 0 }
    };
  }
  saveStorage();
  toast('Đã cập nhật');
  renderHome();
}

// ============================================================
// INIT
// ============================================================
loadStorage();
renderHome();
</script>
</body>
