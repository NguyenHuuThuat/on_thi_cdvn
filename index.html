<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ôn tập 400 câu hỏi – Thi tay nghề Chuyển đổi số Ngân hàng</title>
<meta name="description" content="Ứng dụng ôn tập 400 câu hỏi trắc nghiệm Chuyển đổi số ngành Ngân hàng. Ôn tuần tự, theo chương, theo đề, xem lại câu sai.">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --primary: #1e40af;
  --primary-light: #3b82f6;
  --primary-lighter: #dbeafe;
  --primary-dark: #1e3a8a;
  --accent: #059669;
  --success: #16a34a;
  --success-light: #22c55e;
  --success-lighter: #dcfce7;
  --danger: #dc2626;
  --danger-light: #ef4444;
  --danger-lighter: #fee2e2;
  --warning: #f59e0b;
  --warning-lighter: #fef3c7;
  --bg: #f8fafc;
  --surface: #ffffff;
  --text: #0f172a;
  --text-muted: #64748b;
  --border: #e2e8f0;
  --radius: 12px;
  --radius-lg: 16px;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 12px rgba(0,0,0,0.04);
  --shadow-lg: 0 12px 36px rgba(30,64,175,0.12);
}
html, body { height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  background: linear-gradient(135deg, #eff6ff 0%, #ecfdf5 100%);
  background-attachment: fixed;
  color: var(--text);
  min-height: 100vh;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
}
.container { max-width: 960px; margin: 0 auto; padding: 20px 16px 48px; }

/* Header */
.app-header { text-align: center; padding: 24px 16px 16px; }
.app-header h1 {
  font-size: clamp(1.4rem, 4vw, 2.1rem);
  color: var(--primary-dark);
  margin-bottom: 4px;
  font-weight: 700;
  letter-spacing: -0.02em;
}
.app-header .subtitle { color: var(--text-muted); font-size: 0.95rem; }
.app-header .badge-count {
  display: inline-block;
  background: var(--primary);
  color: white;
  padding: 3px 10px;
  border-radius: 999px;
  font-size: 0.78rem;
  font-weight: 600;
  margin-top: 6px;
}

/* Cards */
.card {
  background: var(--surface);
  border-radius: var(--radius-lg);
  padding: 22px;
  box-shadow: var(--shadow);
  margin-bottom: 16px;
}
.card h3 { color: var(--primary-dark); margin-bottom: 14px; font-size: 1.05rem; }

/* Mode grid */
.mode-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 14px;
  margin-bottom: 18px;
}
.mode-card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 18px;
  cursor: pointer;
  box-shadow: var(--shadow);
  transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s;
  border: 2px solid transparent;
  text-align: left;
  display: flex;
  flex-direction: column;
  gap: 6px;
  font-family: inherit;
}
.mode-card:hover:not(:disabled) {
  transform: translateY(-3px);
  box-shadow: var(--shadow-lg);
  border-color: var(--primary-light);
}
.mode-card:disabled { opacity: 0.55; cursor: not-allowed; }
.mode-card .icon { font-size: 1.8rem; line-height: 1; }
.mode-card h3 { color: var(--primary-dark); font-size: 1.02rem; margin: 0; }
.mode-card p { color: var(--text-muted); font-size: 0.88rem; }
.mode-card .badge {
  display: inline-block;
  background: var(--primary-lighter);
  color: var(--primary-dark);
  padding: 3px 9px;
  border-radius: 999px;
  font-size: 0.76rem;
  font-weight: 600;
  margin-top: 4px;
  align-self: flex-start;
}
.mode-card.warn .badge { background: var(--danger-lighter); color: var(--danger); }
.mode-card.good .badge { background: var(--success-lighter); color: var(--success); }
.mode-card.star .badge { background: var(--warning-lighter); color: #92400e; }
.mode-card.chapter .badge { background: #f0f9ff; color: #075985; }

/* Stats */
.stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
  gap: 12px;
  margin-bottom: 18px;
}
.stat-box {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 14px;
  text-align: center;
  box-shadow: var(--shadow);
}
.stat-box .value { font-size: 1.6rem; font-weight: 700; color: var(--primary-dark); line-height: 1.2; }
.stat-box .label { font-size: 0.8rem; color: var(--text-muted); margin-top: 3px; }

/* Progress bar */
.progress-bar-wrap {
  background: var(--border);
  border-radius: 999px;
  height: 8px;
  overflow: hidden;
  margin: 10px 0 16px;
}
.progress-bar {
  background: linear-gradient(90deg, var(--primary-light), var(--success-light));
  height: 100%;
  transition: width 0.3s;
}

/* Topbar on practice screens */
.topbar {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}
.topbar .spacer { flex: 1; }
.chip {
  background: var(--primary);
  color: white;
  padding: 6px 12px;
  border-radius: 999px;
  font-weight: 600;
  font-size: 0.88rem;
}
.chip.topic {
  background: var(--primary-lighter);
  color: var(--primary-dark);
  font-weight: 500;
  font-size: 0.78rem;
}
.chip.chapter {
  background: #e0f2fe;
  color: #075985;
  font-weight: 500;
  font-size: 0.78rem;
}

/* Question */
.question-text {
  font-size: 1.05rem;
  margin-bottom: 16px;
  line-height: 1.6;
  font-weight: 500;
  white-space: pre-wrap;
}

/* Options */
.options { display: flex; flex-direction: column; gap: 10px; }
.option {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 14px 16px;
  background: #f8fafc;
  border: 2px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  transition: all 0.15s;
  font-size: 0.98rem;
  text-align: left;
  width: 100%;
  color: var(--text);
  font-family: inherit;
  line-height: 1.5;
}
.option:hover:not(:disabled) {
  border-color: var(--primary-light);
  background: #eff6ff;
}
.option:disabled { cursor: default; }
.option .letter {
  background: var(--surface);
  border: 2px solid var(--border);
  color: var(--primary-dark);
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 0.85rem;
  flex-shrink: 0;
}
.option .text { flex: 1; white-space: pre-wrap; }
.option.correct {
  background: var(--success-lighter);
  border-color: var(--success);
  color: #14532d;
}
.option.correct .letter { background: var(--success); color: white; border-color: var(--success); }
.option.wrong {
  background: var(--danger-lighter);
  border-color: var(--danger);
  color: #7f1d1d;
}
.option.wrong .letter { background: var(--danger); color: white; border-color: var(--danger); }
.option.selected:not(.correct):not(.wrong) {
  border-color: var(--primary);
  background: var(--primary-lighter);
}

.feedback {
  margin-top: 14px;
  padding: 10px 14px;
  border-radius: 10px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 8px;
}
.feedback.right { background: var(--success-lighter); color: #14532d; }
.feedback.wrong { background: var(--danger-lighter); color: #7f1d1d; }

.explanation {
  margin-top: 12px;
  padding: 12px 14px;
  background: var(--warning-lighter);
  border-left: 4px solid var(--warning);
  border-radius: 8px;
  font-size: 0.92rem;
  color: #713f12;
  white-space: pre-wrap;
}

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 10px 20px;
  border: none;
  border-radius: var(--radius);
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  transition: transform 0.12s, background 0.15s, box-shadow 0.15s, border-color 0.15s;
  font-family: inherit;
  text-decoration: none;
}
.btn:active { transform: scale(0.97); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-primary { background: var(--primary); color: white; }
.btn-primary:hover:not(:disabled) { background: var(--primary-dark); }
.btn-success { background: var(--success); color: white; }
.btn-success:hover { background: #15803d; }
.btn-danger { background: var(--danger); color: white; }
.btn-danger:hover { background: #b91c1c; }
.btn-ghost { background: transparent; color: var(--text-muted); padding: 8px 12px; }
.btn-ghost:hover { background: var(--border); color: var(--text); }
.btn-outline {
  background: var(--surface);
  color: var(--primary);
  border: 2px solid var(--border);
}
.btn-outline:hover { border-color: var(--primary); }
.btn-sm { padding: 6px 12px; font-size: 0.85rem; }

.btn-row {
  display: flex;
  gap: 10px;
  margin-top: 18px;
  flex-wrap: wrap;
}

/* Exam grid */
.exam-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(88px, 1fr));
  gap: 10px;
}
.exam-tile {
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 6px;
  text-align: center;
  cursor: pointer;
  transition: all 0.15s;
  font-family: inherit;
  font-weight: 600;
}
.exam-tile:hover {
  border-color: var(--primary);
  transform: translateY(-2px);
  background: var(--primary-lighter);
}
.exam-tile .num { font-size: 1.1rem; color: var(--primary-dark); display: block; }
.exam-tile .score {
  font-size: 0.72rem;
  color: var(--text-muted);
  font-weight: 500;
  margin-top: 3px;
  display: block;
}
.exam-tile.completed-high { border-color: var(--success); background: var(--success-lighter); }
.exam-tile.completed-high .score { color: var(--success); font-weight: 600; }
.exam-tile.completed-low { border-color: var(--danger); background: var(--danger-lighter); }
.exam-tile.completed-low .score { color: var(--danger); font-weight: 600; }

/* Chapter list */
.chapter-list { display: flex; flex-direction: column; gap: 10px; }
.chapter-item {
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  cursor: pointer;
  transition: all 0.15s;
  font-family: inherit;
  text-align: left;
  width: 100%;
  display: flex;
  align-items: center;
  gap: 14px;
}
.chapter-item:hover {
  border-color: var(--primary);
  background: var(--primary-lighter);
  transform: translateX(3px);
}
.chapter-item .ch-icon {
  width: 42px; height: 42px;
  background: var(--primary);
  color: white;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 1rem;
  flex-shrink: 0;
}
.chapter-item .ch-body { flex: 1; min-width: 0; }
.chapter-item .ch-title { font-weight: 600; color: var(--primary-dark); margin-bottom: 2px; }
.chapter-item .ch-meta { font-size: 0.82rem; color: var(--text-muted); }
.chapter-item .ch-arrow { color: var(--text-muted); font-size: 1.2rem; }

/* Topic list */
.topic-item {
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
  cursor: pointer;
  transition: all 0.15s;
  font-family: inherit;
  text-align: left;
  width: 100%;
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 8px;
}
.topic-item:hover { border-color: var(--primary-light); background: #f0f9ff; }
.topic-item .tp-code {
  font-weight: 700;
  color: var(--primary);
  font-size: 0.85rem;
  background: var(--primary-lighter);
  padding: 3px 8px;
  border-radius: 6px;
  flex-shrink: 0;
  min-width: 44px;
  text-align: center;
}
.topic-item .tp-name { flex: 1; font-size: 0.94rem; }
.topic-item .tp-count { color: var(--text-muted); font-size: 0.82rem; }
.topic-item .tp-score { font-size: 0.75rem; margin-left: 6px; }
.topic-item .tp-score.pass { color: var(--success); font-weight: 600; }
.topic-item .tp-score.fail { color: var(--danger); font-weight: 600; }

/* Result screen */
.result-hero {
  text-align: center;
  padding: 22px 16px;
  background: linear-gradient(135deg, var(--primary-lighter), var(--success-lighter));
  border-radius: var(--radius-lg);
  margin-bottom: 16px;
}
.result-score {
  font-size: 3rem;
  font-weight: 800;
  color: var(--primary-dark);
  line-height: 1;
  margin: 8px 0;
}
.result-percent {
  font-size: 1.3rem;
  font-weight: 600;
}
.result-percent.pass { color: var(--success); }
.result-percent.fail { color: var(--danger); }
.result-msg { color: var(--text-muted); margin-top: 6px; font-size: 0.95rem; }

.review-item {
  padding: 12px 14px;
  border-left: 4px solid var(--danger);
  background: #fef2f2;
  border-radius: 8px;
  margin-bottom: 10px;
  font-size: 0.94rem;
}
.review-item.right { border-left-color: var(--success); background: #f0fdf4; }
.review-item .q-num { font-weight: 700; color: var(--primary-dark); }
.review-item .q-text { margin: 4px 0 8px; white-space: pre-wrap; }
.review-item .ans-line { margin: 2px 0; font-size: 0.88rem; white-space: pre-wrap; }
.review-item .your-ans { color: var(--danger); }
.review-item .your-ans.ok { color: var(--success); }
.review-item .correct-ans { color: var(--success); font-weight: 600; }

/* Bookmark star */
.bookmark-btn {
  background: transparent;
  border: 2px solid var(--border);
  border-radius: 10px;
  cursor: pointer;
  font-size: 1.1rem;
  color: var(--text-muted);
  padding: 6px 10px;
  transition: all 0.15s;
  font-family: inherit;
}
.bookmark-btn:hover { border-color: var(--warning); color: var(--warning); }
.bookmark-btn.active { color: var(--warning); border-color: var(--warning); background: var(--warning-lighter); }

/* Empty state */
.empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); }
.empty-state .icon { font-size: 3rem; margin-bottom: 10px; }
.empty-state h3 { color: var(--text); margin-bottom: 6px; }

/* Toast */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--text);
  color: white;
  padding: 10px 18px;
  border-radius: 999px;
  font-size: 0.9rem;
  box-shadow: var(--shadow-lg);
  z-index: 1000;
  animation: toastIn 0.2s ease-out;
}
@keyframes toastIn {
  from { opacity: 0; transform: translate(-50%, 10px); }
  to { opacity: 1; transform: translate(-50%, 0); }
}

/* Responsive */
@media (max-width: 480px) {
  .container { padding: 12px 10px 32px; }
  .card { padding: 16px 14px; }
  .result-score { font-size: 2.4rem; }
  .btn { padding: 10px 16px; }
  .chapter-item { padding: 12px; gap: 10px; }
  .chapter-item .ch-icon { width: 36px; height: 36px; font-size: 0.85rem; }
}

/* Animation */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.fade-in { animation: fadeIn 0.25s ease-out; }

/* Meta strip below title */
.meta-strip {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px;
}
.meta-strip .chip { font-size: 0.78rem; }

/* ===== EXAM TIMER ===== */
.exam-timer {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  border-radius: 999px;
  font-weight: 700;
  font-size: 1rem;
  letter-spacing: 0.04em;
  background: var(--primary-lighter);
  color: var(--primary-dark);
  border: 2px solid var(--primary-lighter);
  transition: background 0.3s, color 0.3s, border-color 0.3s;
  font-variant-numeric: tabular-nums;
  min-width: 90px;
  justify-content: center;
}
.exam-timer.warn {
  background: var(--warning-lighter);
  color: #92400e;
  border-color: var(--warning);
}
.exam-timer.danger {
  background: var(--danger-lighter);
  color: var(--danger);
  border-color: var(--danger);
  animation: timerPulse 0.8s ease-in-out infinite;
}
@keyframes timerPulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.6; }
}

/* ===== QUIZ LAYOUT WITH SIDEBAR ===== */
.quiz-layout {
  display: flex;
  align-items: flex-start;
  min-height: 100vh;
}
.q-sidebar {
  width: 220px;
  flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  height: 100vh;
  position: sticky;
  top: 0;
  display: flex;
  flex-direction: column;
  box-shadow: 2px 0 8px rgba(0,0,0,0.04);
  z-index: 100;
  transition: width 0.22s, transform 0.22s;
}
.q-sidebar.collapsed {
  width: 48px;
  overflow: hidden;
}
.q-sidebar-header {
  padding: 14px 12px 10px;
  font-weight: 700;
  font-size: 0.88rem;
  color: var(--primary-dark);
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  white-space: nowrap;
}
.q-sidebar-header .sidebar-title {
  overflow: hidden;
  transition: opacity 0.18s;
}
.q-sidebar.collapsed .sidebar-title { opacity: 0; pointer-events: none; }
.sidebar-toggle-btn {
  background: transparent;
  border: none;
  cursor: pointer;
  font-size: 1.1rem;
  color: var(--text-muted);
  padding: 4px 6px;
  border-radius: 6px;
  flex-shrink: 0;
  line-height: 1;
}
.sidebar-toggle-btn:hover { background: var(--border); color: var(--text); }
.q-sidebar-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px 6px;
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.q-sidebar-list::-webkit-scrollbar { width: 4px; }
.q-sidebar-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
.q-item {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 6px 8px;
  border-radius: 8px;
  border: none;
  background: transparent;
  cursor: pointer;
  font-family: inherit;
  font-size: 0.82rem;
  text-align: left;
  white-space: nowrap;
  overflow: hidden;
  transition: background 0.12s;
  width: 100%;
  color: var(--text-muted);
}
.q-item:hover { background: var(--primary-lighter); color: var(--primary-dark); }
.q-item.current {
  background: var(--primary);
  color: white;
  font-weight: 600;
}
.q-item.answered-ok { color: var(--success); }
.q-item.answered-ok .q-item-num { background: var(--success); color: white; }
.q-item.answered-wrong { color: var(--danger); }
.q-item.answered-wrong .q-item-num { background: var(--danger); color: white; }
.q-item.current .q-item-num { background: white; color: var(--primary); }
.q-item-num {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: var(--border);
  color: var(--text-muted);
  font-weight: 700;
  font-size: 0.75rem;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.q-item-status {
  font-size: 0.75rem;
  flex-shrink: 0;
}
.q-sidebar.collapsed .q-item-label,
.q-sidebar.collapsed .q-item-status { display: none; }
.q-item-label {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.q-main {
  flex: 1;
  min-width: 0;
}
.q-main .container { max-width: 820px; }

@media (max-width: 700px) {
  .q-sidebar {
    position: fixed;
    left: 0; top: 0;
    height: 100vh;
    transform: translateX(-100%);
    width: 240px !important;
    z-index: 200;
  }
  .q-sidebar.mobile-open {
    transform: translateX(0);
    box-shadow: 4px 0 24px rgba(0,0,0,0.18);
  }
  .q-sidebar-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.3);
    z-index: 199;
  }
  .mobile-sidebar-btn { display: flex !important; }
}
.q-sidebar-overlay { display: none; }
.mobile-sidebar-btn {
  display: none;
  align-items: center;
  gap: 6px;
  padding: 6px 10px;
  background: var(--primary-lighter);
  color: var(--primary-dark);
  border: none;
  border-radius: 8px;
  font-family: inherit;
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
}
</style>
</head>
<body>

<script type="application/json" id="questions-data">[{"id":1,"stt":1,"chapter":"I. DỮ LIỆU – TÀI SẢN SỐ (DATA)","topic":"I.1. Big Data trong hoạt động ngân hàng","topicCode":"I.1","question":"Ngân hàng O muốn lưu log clickstream từ mobile app với hàng tỉ event/ ngày. Ngân hàng cần đầu tư hệ thống nào","options":{"A":"Datawarehouse truyền thống","B":"Sử dụng excel để dễ trực quan hóa và quen thuộc với người dùng văn phòng","C":"Sử dụng ngay nền tảng corebanking để tận dụng giao dịch","D":"Triển khai đầu tư Data Lake"},"correct":"D","explanation":"Datalake sẽ phù hợp với dữ liệu phi cấu trúc và volume rất lớn"},{"id":2,"stt":2,"chapter":"I. DỮ LIỆU – TÀI SẢN SỐ (DATA)","topic":"I.1. Big Data trong hoạt động ngân hàng","topicCode":"I.1","question":"Ngân hàng có dữ liệu từ ATM, POS, Mobile App và Core Banking. Để phân tích hành vi khách hàng , ngân hàng phải thực hiện hoạt động gì đối với dữ liệu thu thập được.","options":{"A":"Lưu riêng từng hệ thống","B":"Chỉ sử dụng dữ liệu Corebanking và Mobile App","C":"Chuẩn hóa và hợp nhất dữ liệu","D":"Giữ nguyên format mỗi nguồn"},"correct":"C","explanation":"Một hệ thống Bigdata platform cần chuẩn hóa dữ liệu, hợp nhất dữ liệu để đảm bảo việc xây dựng chân dung khách hàng và phân tích dữ liệu"},{"id":3,"stt":3,"chapter":"I. DỮ LIỆU – TÀI SẢN SỐ (DATA)","topic":"I.1. Big Data trong hoạt động ngân hàng","topicCode":"I.1","question":"Khách hàng mới của Ngân hàng, hiện chưa có dữ liệu lịch sử, hệ thống đề xuất sản phẩm kém, chưa hiệu quả. Nên triển khai phương án nào để tăng tính hiệu quả","options":{"A":"Đề xuất ngẫu nhiên","B":"Dùng dữ liệu Nhân khẩu học (tuổi, giới tính, địa điểm, học vấn, thu nhập, sở thích, ...) và Lookalike modeling (tìm những người tương tự khách hàng này đã giao dịch/mua sắm/hành động gì,...) để gợi ý.","C":"Chờ khách dùng vài tuần rồi gợi ý","D":"Chỉ gửi email chung chung quảng bá để tránh sai sót"},"correct":"B","explanation":"Đề xuất ngẫu nhiên : tỉ lệ chuyển đổi thấp\nChờ : mất cơ hội\nEmail chung: không cá nhân hóa.\nLookalike: tận dụng dữ liệu Bigdata, cá nhân hóa ngay"},{"id":4,"stt":4,"chapter":"I. DỮ LIỆU – TÀI SẢN SỐ (DATA)","topic":"I.1. Big Data trong hoạt động ngân hàng","topicCode":"I.1","question":"Một khách hàng phát sinh giao dịch 100tr từ một địa chỉ IP ở nước ngoài. Ngân hàng cần triển khai phương án nào khả thi để kiểm soát giao dịch","options":{"A":"Chặn ngay giao dịch","B":"Cho phép thực hiện và theo dõi log","C":"Tạm hold và gọi điện cho khách hàng xác nhận","D":"Yêu cầu OTP/ xác thực bổ sung"},"correct":"D","explanation":"Chặn ngay, an toàn nhưng ảnh hưởng trải nghiệm khách hàng\nCho phép --> rủi ro gian lận, có thể gây thiệt hại cho khách hàng\nTạm hold và gọi điện cho khách hàng -> tốn thời gian, có thể không liên lạc được do khách hàng đang ở nước ngoài\nYêu cầu OTP bổ sung: cân bằng an toàn và UX của khách hàng"},{"id":5,"stt":5,"chapter":"I. DỮ LIỆU – TÀI SẢN SỐ (DATA)","topic":"I.1. Big Data trong hoạt động ngân hàng","topicCode":"I.1","question":"Ngân hàng A triển khai mô hình chấm điểm tín dụng (credit scroring) chạy tốt nhưng vài tháng gần đây độ chính xác (accuracy) giảm, bạn hãy tư vấn cho ngân hàng A phương án nào cần thực hiện đầu tiên","options":{"A":"Tăng tập dữ liệu huấn luyện (training dataset)","B":"Kiểm tra chất lượng dữ liệu (data quality)","C":"Thay mô hình mới hoàn toàn.","D":"Thêm nhiều thuộc tính (feature) mới"},"correct":"B","explanation":"Tăng data set không giải quyết vấn đề nếu dữ liệu drift\nThay model hoàn toàn sẽ rất tốn thời gian, thêm nhiều feature không giải quyết được accuracy. Dữ liệu đầu vào có thể thay đổi do nguồn đầu vào thay đổi, do định dạng dữ liệu thay đổi hoặc hành vi người dùng khác với thời gian mô hình đã training trước đó"},{"id":6,"stt":6,"chapter":"I. DỮ LIỆU – TÀI SẢN SỐ (DATA)","topic":"I.2. Quản trị dữ liệu (Data Governance)","topicCode":"I.2","question":"Theo Nghị quyết 57-NQ/TW, dữ liệu được xác định giữ vai trò như thế nào trong phát triển khoa học, công nghệ và đổi mới sáng tạo?","options":{"A":"Là nguồn thông tin hỗ trợ ra quyết định","B":"Là tài sản phục vụ quản lý nhà nước","C":"Là tư liệu sản xuất chính, thúc đẩy phát triển nhanh cơ sở dữ liệu lớn, công nghiệp dữ liệu, kinh tế dữ liệu.","D":"Là công cụ hỗ trợ phân tích và dự báo"},"correct":"C","explanation":"Nghị quyết 57-NQ/TW (2024). Mục I.3\n📖 Điều khoản: Phần Quan điểm: mục I.3\n→ \"Dữ liệu là tư liệu sản xuất chính.Thể chế, nhân lực, hạ tầng, dữ liệu và công nghệ chiến lược là……. đưa dữ liệu thành tư liệu sản xuất chính, thúc đẩy phát triển nhanh cơ sở dữ liệu lớn, công nghiệp dữ liệu, kinh tế dữ liệu.”"},{"id":7,"stt":7,"chapter":"I. DỮ LIỆU – TÀI SẢN SỐ (DATA)","topic":"I.2. Quản trị dữ liệu (Data Governance)","topicCode":"I.2","question":"Theo Quyết định 411/QĐ-TTg, đâu KHÔNG phải là yếu tố nền móng của kinh tế và xã hội số?","options":{"A":"Hạ tầng số","B":"Dữ liệu số","C":"Nền tảng số","D":"Hoạt động thủ công truyền thống"},"correct":"D","explanation":"Quyết định 411/QĐ-TTg\n📖 Điều khoản: Phần định hướng chiến lược\nXác định nền móng gồm: hạ tầng số, dữ liệu số, nền tảng số"},{"id":8,"stt":8,"chapter":"I. DỮ LIỆU – TÀI SẢN SỐ (DATA)","topic":"I.2. Quản trị dữ liệu (Data Governance)","topicCode":"I.2","question":"Theo Quyết định 2439/QĐ-TTg, những nội dung nào nhằm thiết lập ba trụ cột cốt lõi trong phát triển và quản trị dữ liệu để tạo nền tảng vững chắc cho Quốc gia số?","options":{"A":"Hạ tầng mạng, Máy chủ và Phần mềm ứng dụng","B":"Con người, Quy trình và Công nghệ","C":"Khung kiến trúc dữ liệu quốc gia, Khung quản trị, quản lý dữ liệu quốc gia và Từ điển dữ liệu dùng chung quốc gia","D":"Dữ liệu mở, Dữ liệu chủ và Dữ liệu giao dịch"},"correct":"C","explanation":"Quyết định 2439/QĐ-TTg\nBa thành phần này khi triển khai đồng bộ sẽ hình thành nền tảng dữ liệu quốc gia thống nhất, dùng chung, an toàn và hiệu quả.\n📖 Điều khoản: Chương I, Mục I"},{"id":9,"stt":9,"chapter":"I. DỮ LIỆU – TÀI SẢN SỐ (DATA)","topic":"I.3. Chất lượng dữ liệu, chuẩn hóa dữ liệu","topicCode":"I.3","question":"Hồ sơ mở tài khoản thanh toán bao gồm các tài liệu, thông tin, dữ liệu nào?","options":{"A":"Thỏa thuận mở và sử dụng tài khoản thanh toán","B":"Các tài liệu, thông tin, dữ liệu để xác minh thông tin nhận biết khách hàng","C":"Thỏa thuận việc quản lý và sử dụng tài khoản thanh toán chung giữa các chủ thể đứng tên mở tài khoản thanh toán (nếu có) đối với trường hợp mở tài khoản thanh toán chung.","D":"Cả 3 đáp án"},"correct":"D","explanation":"Thông tư 17/2024/TT-NHNN (sửa đổi bởi Thông tư 25/2025/TT-NHNN)\n📖 Điều khoản: Điều 12.1"},{"id":10,"stt":10,"chapter":"I. DỮ LIỆU – TÀI SẢN SỐ (DATA)","topic":"I.3. Chất lượng dữ liệu, chuẩn hóa dữ liệu","topicCode":"I.3","question":"Việc chuẩn hóa dữ liệu khách hàng khi mở tài khoản thanh toán phải căn cứ vào giấy tờ nào trong các giấy tờ sau đây?","options":{"A":"Thẻ sinh viên hoặc thẻ nhân viên","B":"Giấy tờ tùy thân (Căn cước/CCCD/Hộ chiếu) còn hiệu lực","C":"Sổ hộ khẩu bản photo không công chứng","D":"Giấy xác nhận tạm trú của công an xã"},"correct":"B","explanation":"Thông tư 17/2024/TT-NHNN (sửa đổi bởi Thông tư 25/2025/TT-NHNN)\n📖 Điều khoản: Điều 12"},{"id":11,"stt":11,"chapter":"I. DỮ LIỆU – TÀI SẢN SỐ (DATA)","topic":"I.3. Chất lượng dữ liệu, chuẩn hóa dữ liệu","topicCode":"I.3","question":"Khi dữ liệu cá nhân không chính xác, chủ thể dữ liệu có quyền gì theo quy định của pháp luật về bảo vệ dữ liệu cá nhân","options":{"A":"Không có quyền gì","B":"Yêu cầu xóa bỏ toàn bộ hệ thống","C":"Quyền yêu cầu chỉnh sửa dữ liệu của mình","D":"Yêu cầu bồi thường gấp đôi số dư"},"correct":"C","explanation":"Luật bảo vệ dữ liệu cá nhân 2025\n📖 Điều khoản: Điều 13"},{"id":12,"stt":12,"chapter":"I. DỮ LIỆU – TÀI SẢN SỐ (DATA)","topic":"I.3. Chất lượng dữ liệu, chuẩn hóa dữ liệu","topicCode":"I.3","question":"Việc thu thập, lưu giữ hồ sơ mở tài khoản thanh toán phải đáp ứng yêu cầu nào sau đây","options":{"A":"Bao gồm cả 3 đáp án B, C, D","B":"Các tài liệu là văn bản giấy trong hồ sơ mở tài khoản thanh toán phải là bản chính hoặc bản sao được chứng thực hoặc bản sao cấp từ sổ gốc hoặc bản sao kèm bản chính để đối chiếu phù hợp với quy định của pháp luật về cấp bản sao từ sổ gốc, chứng thực bản sao từ bản chính, chứng thực chữ ký và chứng thực hợp đồng, giao dịch","C":"Đối với các tài liệu, thông tin, dữ liệu trong hồ sơ mở tài khoản thanh toán là dữ liệu điện tử, ngân hàng, chi nhánh ngân hàng nước ngoài phải kiểm tra, đối chiếu, xác thực đảm bảo nội dung đầy đủ, chính xác và lưu trữ theo đúng quy định pháp luật về giao dịch điện tử;","D":"Đối với trường hợp xuất trình bản chính để đối chiếu, ngân hàng, chi nhánh ngân hàng nước ngoài phải xác nhận vào bản sao và chịu trách nhiệm về tính chính xác của bản sao so với bản chính."},"correct":"A","explanation":"Thông tư 17/2024/TT-NHNN (sửa đổi bởi Thông tư 25/2025/TT-NHNN)\n📖 Điều khoản: Điều 12.6"},{"id":13,"stt":13,"chapter":"I. DỮ LIỆU – TÀI SẢN SỐ (DATA)","topic":"I.3. Chất lượng dữ liệu, chuẩn hóa dữ liệu","topicCode":"I.3","question":"Trong hoạt động của ngân hàng, dữ liệu nào sau đây là dữ liệu cá nhân nhạy cảm ?","options":{"A":"Số định danh cá nhân","B":"Tên chi nhánh giao dịch","C":"Địa chỉ email","D":"Tên đăng nhập của tài khoản ngân hàng"},"correct":"D","explanation":"Nghị định 356/2025/NĐ-CP\n📖 Điều khoản: Điều 4"},{"id":14,"stt":14,"chapter":"I. DỮ LIỆU – TÀI SẢN SỐ (DATA)","topic":"I.3. Chất lượng dữ liệu, chuẩn hóa dữ liệu","topicCode":"I.3","question":"Ngân hàng, chi nhánh ngân hàng nước ngoài tự quyết định biện pháp, hình thức, công nghệ phục vụ việc mở tài khoản thanh toán bằng phương tiện điện tử, tự chịu rủi ro phát sinh (nếu có) và phải đáp ứng các yêu cầu nào sau đây?","options":{"A":"Biện pháp, hình thức, công nghệ được ngân hàng, chi nhánh ngân hàng nước ngoài lựa chọn phải đảm bảo tiêu chuẩn về an ninh, an toàn, bảo mật theo quy định của Ngân hàng Nhà nước;","B":"Xác nhận việc khách hàng chấp thuận với các nội dung tại thỏa thuận mở và sử dụng tài khoản thanh toán","C":"Ngân hàng, chi nhánh ngân hàng nước ngoài phải thường xuyên kiểm tra, đánh giá mức độ an toàn, bảo mật của biện pháp, hình thức, công nghệ và thực hiện tạm dừng cung cấp dịch vụ để nâng cấp, chỉnh sửa, hoàn thiện trong trường hợp có dấu hiệu mất an toàn.","D":"Đáp ứng cả 3 nội dung A, B, C"},"correct":"D","explanation":"Thông tư 17/2024/TT-NHNN (sửa đổi bởi Thông tư 25/2025/TT-NHNN)\n📖 Điều khoản: Điều 16"},{"id":15,"stt":15,"chapter":"I. DỮ LIỆU – TÀI SẢN SỐ (DATA)","topic":"I.3. Chất lượng dữ liệu, chuẩn hóa dữ liệu","topicCode":"I.3","question":"Theo Luật Dữ Liệu 2024 (60/2024/QH15), ngân hàng bắt buộc phải thực hiện phân loại dữ liệu theo tiêu chí nào:","options":{"A":"Phân loại theo tính chất quan trọng của dữ liệu gồm: dữ liệu cốt lõi, dữ liệu quan trọng, dữ liệu khác","B":"Phân loại theo tiêu chí khác đáp ứng yêu cầu quản trị, xử lý, bảo vệ dữ liệu do chủ quản dữ liệu quyết định.","C":"Chỉ cơ quan quản lý nhà nước mới cần phân loại dữ liệu","D":"Cả A và B đều đúng"},"correct":"D","explanation":"Luật Dữ liệu\n📖 Điều khoản: Điều 13"},{"id":16,"stt":16,"chapter":"I. DỮ LIỆU – TÀI SẢN SỐ (DATA)","topic":"I.4. Chia sẻ, kết nối dữ liệu liên ngành","topicCode":"I.4","question":"Khái niệm \"Kết nối, chia sẻ dữ liệu bắt buộc\" theo Nghị định 278/2025/NĐ-CP được định nghĩa như thế nào?","options":{"A":"Là việc thiết lập kết nối kỹ thuật bắt buộc giữa các hệ thống thông tin, cơ sở dữ liệu trong hệ thống chính trị nhằm chia sẻ, khai thác và sử dụng dữ liệu đã được phân quyền theo quy định, không phụ thuộc vào thỏa thuận riêng giữa các cơ quan, tổ chức","B":"Là việc chia sẻ dữ liệu dựa trên hợp đồng kinh tế giữa hai bên","C":"Là việc chia sẻ dữ liệu chỉ khi có yêu cầu bằng văn bản của cấp trên","D":"Là việc các cơ quan tự nguyện đóng góp dữ liệu vào kho dùng chung"},"correct":"A","explanation":"Nghị định 278/2025/NĐ-CP\n📖 Điều khoản: Điều 3, Khoản 5"},{"id":17,"stt":17,"chapter":"I. DỮ LIỆU – TÀI SẢN SỐ (DATA)","topic":"I.4. Chia sẻ, kết nối dữ liệu liên ngành","topicCode":"I.4","question":"Theo quy định tại Nghị định 278/2025/NĐ-CP, việc tích hợp, đồng bộ và sử dụng dữ liệu chủ quốc gia là bắt buộc đối với các cơ quan, tổ chức trong hệ thống chính trị khi nào?","options":{"A":"Chỉ khi có sự đồng ý của Bộ Thông tin và Truyền thông","B":"Chỉ khi xây dựng hệ thống mới từ ngân sách trung ương","C":"Khi thực hiện các giao dịch dân sự với doanh nghiệp","D":"Khi xây dựng, cập nhật hoặc vận hành cơ sở dữ liệu, hệ thống thông tin"},"correct":"D","explanation":"Nghị định 278/2025/NĐ-CP\n📖 Điều khoản: Điều 5, Khoản 1"},{"id":18,"stt":18,"chapter":"I. DỮ LIỆU – TÀI SẢN SỐ (DATA)","topic":"I.4. Chia sẻ, kết nối dữ liệu liên ngành","topicCode":"I.4","question":"Theo quy định tại Nghị định 278/2025/NĐ-CP thì thời hạn muộn nhất để thực hiện việc kết nối, chia sẻ dữ liệu bắt buộc giữa các cơ quan trong hệ thống chính trị thực hiện thống nhất qua Nền tảng chia sẻ, điều phối dữ liệu là khi nào?","options":{"A":"Ngày 31 tháng 12 năm 2026","B":"Ngày 31 tháng 12 năm 2025","C":"Ngày 01 tháng 01 năm 2026","D":"Ngày 30 tháng 06 năm 2027"},"correct":"A","explanation":"Nghị định 278/2025/NĐ-CP\n📖 Điều khoản: Điều 24, Khoản 3"},{"id":19,"stt":19,"chapter":"I. DỮ LIỆU – TÀI SẢN SỐ (DATA)","topic":"I.4. Chia sẻ, kết nối dữ liệu liên ngành","topicCode":"I.4","question":"Theo quy định tại Nghị định 278/2025/NĐ-CP, cơ quan nào có trách nhiệm chủ trì thực hiện hoạt động kiểm toán dữ liệu định kỳ, đột xuất đối với dữ liệu của các bộ, ngành, địa phương?","options":{"A":"Kiểm toán nhà nước","B":"Bộ Công an","C":"Bộ Thông tin và Truyền thông","D":"Văn phòng Chính phủ"},"correct":"B","explanation":"Nghị định 278/2025/NĐ-CP\n📖 Điều khoản: Điều 14, Khoản 4"},{"id":20,"stt":20,"chapter":"I. DỮ LIỆU – TÀI SẢN SỐ (DATA)","topic":"I.4. Chia sẻ, kết nối dữ liệu liên ngành","topicCode":"I.4","question":"Theo quy định tại Nghị định 278/2025/NĐ-CP, hệ thống tài liệu và công cụ kỹ thuật định nghĩa thống nhất tên gọi, định dạng, cách sử dụng của các trường dữ liệu dùng chung được gọi là gì?","options":{"A":"Khung kiến trúc dữ liệu quốc gia","B":"Khung quản trị dữ liệu quốc gia","C":"Từ điển dữ liệu dùng chung","D":"Danh mục dữ liệu chủ quốc gia"},"correct":"C","explanation":"Nghị định 278/2025/NĐ-CP\n📖 Điều khoản: Điều 3, Khoản 2"},{"id":21,"stt":21,"chapter":"I. DỮ LIỆU – TÀI SẢN SỐ (DATA)","topic":"I.4. Chia sẻ, kết nối dữ liệu liên ngành","topicCode":"I.4","question":"Theo quy định tại Nghị định 278/2025/NĐ-CP, hoạt động kết nối, chia sẻ dữ liệu bắt buộc giữa các cơ quan trong hệ thống chính trị phải tuân theo nguyên tắc giám sát nào?","options":{"A":"Giám sát bí mật để đảm bảo an ninh","B":"Giám sát liên tục, công khai và có truy vết; Thực hiện thông qua hệ thống kỹ thuật và cơ chế quản lý do cơ quan nhà nước có thẩm quyền quy định; Việc xử lý vi phạm phải bảo đảm khách quan, minh bạch, đúng thẩm quyền và tương xứng với tính chất, mức độ vi phạm","C":"Giám sát định kỳ 01 lần/năm","D":"Chỉ giám sát khi có sự cố kỹ thuật xảy ra"},"correct":"B","explanation":"Nghị định 278/2025/NĐ-CP\n📖 Điều khoản: Điều 13, Khoản 1"},{"id":22,"stt":22,"chapter":"I. DỮ LIỆU – TÀI SẢN SỐ (DATA)","topic":"I.4. Chia sẻ, kết nối dữ liệu liên ngành","topicCode":"I.4","question":"Theo Nghị định 278/2025/NĐ-CP, cơ quan nào chịu trách nhiệm chủ trì hướng dẫn kỹ thuật và kiểm soát tính thống nhất của dữ liệu chủ chuyên ngành trên toàn hệ thống?","options":{"A":"Bộ Thông tin và Truyền thông.","B":"Ban Cơ yếu Chính phủ","C":"Bộ Công an","D":"Văn phòng Chính phủ."},"correct":"C","explanation":"Nghị định 278/2025/NĐ-CP\n📖 Điều khoản: Điều 6 khoản 3"},{"id":23,"stt":23,"chapter":"I. DỮ LIỆU – TÀI SẢN SỐ (DATA)","topic":"I.5. Dữ liệu mở (Open Data)","topicCode":"I.5","question":"Theo luật 60/2024/QH15, dữ liệu mở là gì?","options":{"A":"Dữ liệu mà mọi cơ quan, tổ chức, cá nhân có nhu cầu đều được tiếp cận, chia sẻ, khai thác, sử dụng.","B":"Dữ liệu được tạo lập trong quá trình hoạt động của cơ quan, tổ chức, cá nhân hoặc thu thập, tạo lập từ số hóa bản chính giấy tờ, tài liệu, các dạng vật chất khác.","C":"Dữ liệu được tiếp cận, chia sẻ, khai thác, sử dụng chung trong các cơ quan Đảng, Nhà nước, Ủy ban Mặt trận Tổ quốc Việt Nam và các tổ chức chính trị - xã hội.","D":"Dữ liệu nội bộ"},"correct":"A","explanation":"Luật số: 60/2024/QH15\n📖 Điều khoản: Điều 3.4"},{"id":24,"stt":24,"chapter":"I. DỮ LIỆU – TÀI SẢN SỐ (DATA)","topic":"I.5. Dữ liệu mở (Open Data)","topicCode":"I.5","question":"Hành vi nào sau đây là hành vi bị nghiêm cấm theo Luật Dữ liệu là gì?","options":{"A":"Công khai dữ liệu mở theo đúng danh mục.","B":"Chia sẻ dữ liệu giữa các cơ quan chuyên ngành.","C":"Giả mạo, cố ý làm sai lệch dữ liệu","D":"Sử dụng dữ liệu mở để nghiên cứu khoa học."},"correct":"C","explanation":"Luật số: 60/2024/QH15\n📖 Điều khoản: Điều 10"},{"id":25,"stt":25,"chapter":"I. DỮ LIỆU – TÀI SẢN SỐ (DATA)","topic":"I.5. Dữ liệu mở (Open Data)","topicCode":"I.5","question":"Đâu là nguyên tắc bảo đảm việc kết nối và chia sẻ dữ liệu giữa các cơ quan Theo Nghị định 278/2025/NĐ-CP?","options":{"A":"Thực hiện kịp thời, đầy đủ, đúng mục đích; bảo đảm an toàn, bảo mật và đúng phạm vi chức năng, nhiệm vụ, quyền hạn.","B":"Ưu tiên tính công khai tuyệt đối, cho phép mọi cá nhân và tổ chức tự do khai thác không giới hạn phạm vi.","C":"Chỉ thực hiện kết nối khi có yêu cầu bằng văn bản giấy và đã hoàn thành việc nộp phí chia sẻ dữ liệu.","D":"Tập trung tối đa vào tốc độ truyền tải dữ liệu mà không cần xem xét đến mục đích hoặc chức năng của đơn vị tiếp nhận."},"correct":"A","explanation":"Nghị định 278/2025/NĐ-CP\n📖 Điều khoản: Điều 4.1"},{"id":26,"stt":26,"chapter":"I. DỮ LIỆU – TÀI SẢN SỐ (DATA)","topic":"I.5. Dữ liệu mở (Open Data)","topicCode":"I.5","question":"Đâu là nguyên tắc phải tuân thủ trong việc kết nối và chia sẻ dữ liệu bắt buộc Theo Nghị định 278/2025/NĐ-CP?","options":{"A":"Quy chuẩn kỹ thuật riêng của từng địa phương và các điều khoản trong hợp đồng kinh tế giữa các bên.","B":"Khung kiến trúc dữ liệu quốc gia, Khung quản trị, quản lý dữ liệu quốc gia và Từ điển dữ liệu dùng chung.","C":"Các tiêu chuẩn quốc tế về dữ liệu mở mà không cần đối chiếu với hệ thống định nghĩa dữ liệu trong nước.","D":"Chỉ cần tuân thủ quy chế quản lý nội bộ của cơ quan cung cấp dữ liệu và văn bản thỏa thuận kết nối."},"correct":"B","explanation":"Nghị định 278/2025/NĐ-CP\n📖 Điều khoản: Điều 4.4"},{"id":27,"stt":27,"chapter":"I. DỮ LIỆU – TÀI SẢN SỐ (DATA)","topic":"I.5. Dữ liệu mở (Open Data)","topicCode":"I.5","question":"Theo Nghị định 278/2025/NĐ-CP, việc chia sẻ dữ liệu phục vụ quản lý nhà nước và dịch vụ công được quy định về chi phí như thế nào?","options":{"A":"Được thu phí để bù đắp chi phí vận hành hệ thống hạ tầng công nghệ thông tin.","B":"Phải thực hiện thu phí theo biểu giá thống nhất của Bộ Tài chính đối với mọi đối tượng.","C":"Không được thu phí dưới bất kỳ hình thức nào (trừ trường hợp pháp luật có quy định khác).","D":"Chỉ miễn phí cho các cơ quan trung ương, còn các địa phương phải trả phí kết nối."},"correct":"C","explanation":"Nghị định 278/2025/NĐ-CP\n📖 Điều khoản: Điều 16"},{"id":28,"stt":28,"chapter":"I. DỮ LIỆU – TÀI SẢN SỐ (DATA)","topic":"I.5. Dữ liệu mở (Open Data)","topicCode":"I.5","question":"Theo luật dữ liệu 60/2024/QH15, việc phân loại dữ liệu theo tính chất chia sẻ dữ liệu bao gồm những loại dữ liệu nào?","options":{"A":"Dữ liệu dùng chung, dữ liệu dùng riêng, dữ liệu mở","B":"Dữ liệu cốt lõi, dữ liệu quan trọng, dữ liệu khác","C":"Dữ liệu mở, dữ liệu cốt lõi, dữ liệu dùng riêng","D":"Dữ liệu cốt lõi, dữ liệu mở, dữ liệu khác"},"correct":"A","explanation":"Luật số: 60/2024/QH15\n📖 Điều khoản: Điều 13.1"},{"id":29,"stt":29,"chapter":"I. DỮ LIỆU – TÀI SẢN SỐ (DATA)","topic":"I.5. Dữ liệu mở (Open Data)","topicCode":"I.5","question":"Theo Luật Dữ liệu 2024, quy định những hình thức công khai dữ liệu nào?","options":{"A":"Hình thức công khai dữ liệu, bao gồm: đăng tải dữ liệu trên cổng dữ liệu, cổng thông tin điện tử, trang thông tin điện tử, phương tiện thông tin đại chúng và các hình thức khác theo quy định của pháp luật.","B":"Chỉ công khai trên Cổng thông tin điện tử của đơn vị","C":"Chỉ công bố trên các phương tiện thông tin đại chúng","D":"Chỉ công khai trên Cổng dữ liệu"},"correct":"A","explanation":"Luật số: 60/2024/QH15\n📖 Điều khoản: Điều 21.4"},{"id":30,"stt":30,"chapter":"I. DỮ LIỆU – TÀI SẢN SỐ (DATA)","topic":"I.6. Vòng đời dữ liệu khách hàng","topicCode":"I.6","question":"Thời gian lưu trữ hồ sơ mở tài khoản thanh toán được xác định theo quy định nào?","options":{"A":"Thông tư 17/2024/TT-NHNN quy định về việc mở và sử dụng tài khoản thanh toán tại các tổ chức cung ứng dịch vụ thanh toán","B":"Thông tư 04/2025/TT-NHNN quy định thời hạn lưu trữ hồ sơ, tài liệu ngành ngân hàng","C":"Đến khi nhân viên ngân hàng nghỉ việc","D":"Theo quy định nội bộ của từng ngân hàng"},"correct":"B","explanation":"Thông tư 04/2025/TT-NHNN quy định thời hạn lưu trữ hồ sơ, tài liệu ngành ngân hàng"},{"id":31,"stt":31,"chapter":"I. DỮ LIỆU – TÀI SẢN SỐ (DATA)","topic":"I.6. Vòng đời dữ liệu khách hàng","topicCode":"I.6","question":"Theo Luật bảo vệ dữ liệu cá nhân, sự đồng ý của chủ thể dữ liệu cá nhân có thể được thể hiện bằng cách nào sau đây ?","options":{"A":"Sự đồng ý của chủ thể dữ liệu cá nhân được thể hiện bằng im lặng","B":"Sự đồng ý của chủ thể dữ liệu cá nhân được thể hiện bằng phương thức rõ ràng, cụ thể, có thể in, sao chép bằng văn bản, bao gồm cả dưới dạng điện tử hoặc định dạng kiểm chứng được.","C":"Chỉ cần thông báo, không cần đồng ý","D":"Cả ba đáp án đều sai"},"correct":"B","explanation":"Luật bảo vệ dữ liệu cá nhân 2025\n📖 Điều khoản: Điều 09"},{"id":32,"stt":32,"chapter":"I. DỮ LIỆU – TÀI SẢN SỐ (DATA)","topic":"I.6. Vòng đời dữ liệu khách hàng","topicCode":"I.6","question":"Theo Nghị định 356/2025/NĐ-CP, nội dung nào sau đây thuộc những nội dung xác lập thỏa thuận về việc chuyển giao dữ liệu cá nhân với bên nhận dữ liệu cá nhân?","options":{"A":"Chỉ cần nêu rõ thông tin về số tài khoản ngân hàng và lịch sử giao dịch của các bên.","B":"Mục đích chuyển giao dữ liệu cá nhân; Đối tượng chủ thể dữ liệu cá nhân và loại dữ liệu cá nhân được chuyển giao phù hợp với mục đích chuyển giao; Thời hạn xử lý dữ liệu cá nhân, yêu cầu về xóa, hủy dữ liệu cá nhân sau khi hoàn thành mục đích chuyển giao","C":"Chỉ cần cam kết không để lộ thông tin cho các cơ quan báo chí và truyền thông đại chúng.","D":"Phải nêu rõ danh sách tất cả các nhân viên tham gia vào quá trình vận hành hệ thống máy chủ."},"correct":"B","explanation":"Nghị định 356/2025/NĐ-CP\n📖 Điều khoản: Điều 7"},{"id":33,"stt":33,"chapter":"I. DỮ LIỆU – TÀI SẢN SỐ (DATA)","topic":"I.6. Vòng đời dữ liệu khách hàng","topicCode":"I.6","question":"Theo Luật bảo vệ dữ liệu cá nhân, căn cứ nào để Ngân hàng tiến hành cung cấp dữ liệu cá nhân cho bên thứ ba?","options":{"A":"Sự đồng ý của khách hàng","B":"Không cần căn cứ","C":"Theo quy định của pháp luật","D":"Cả A và C đều đúng"},"correct":"D","explanation":"Luật bảo vệ dữ liệu cá nhân\n📖 Điều khoản: Điều 9, Điều 19, Điều 15"},{"id":34,"stt":34,"chapter":"I. DỮ LIỆU – TÀI SẢN SỐ (DATA)","topic":"I.6. Vòng đời dữ liệu khách hàng","topicCode":"I.6","question":"Theo Luật bảo vệ dữ liệu cá nhân 2025, nguyên tắc nào sau đây đúng i sản số","topicCode":"I.8","question":"Theo Luật Công nghiệp công nghệ số 71/2025/QH15, Tài sản số bao gồm các tài sản nào sau đây?","options":{"A":"Tài sản ảo và tài sản mã hóa được tạo lập trên môi trường số","B":"Tài sản số bao gồm tài sản ảo, tài sản mã hóa theo quy định và tài sản số khác","C":"Chỉ bao gồm tài sản mã hóa được xác thực bằng công nghệ blockchain","D":"Bao gồm toàn bộ dữ liệu phát sinh trong hệ thống thông tin"},"correct":"B","explanation":"Luật Công nghiệp công nghệ số 71/2025/QH15\n📖 Điều khoản: Chương V, Điều 47, Khoản 2"},{"id":45,"stt":45,"chapter":"I. DỮ LIỆU – TÀI SẢN SỐ (DATA)","topic":"I.8. Tài sản số","topicCode":"I.8","question":"Đồng tiền nào được phép sử dụng để chào bán, phát hành, giao dịch, thanh toán tài sản mã hóa theo quy định của Nghị quyết số 05/2025/NQ-CP?","options":{"A":"Đồng Đô la Mỹ (USD)","B":"Bất kỳ ngoại tệ nào được tự do chuyển đổi","C":"Đồng Việt Nam (VND)","D":"Các loại tiền điện tử phổ biến (Bitcoin, Ethereum...)"},"correct":"C","explanation":"Nghị quyết số 05/2025/NQ-CP\n📖 Điều khoản: Chương I, Điều 4, Khoản 7"},{"id":46,"stt":46,"chapter":"I. DỮ LIỆU – TÀI SẢN SỐ (DATA)","topic":"I.8. Tài sản số","topicCode":"I.8","question":"Theo Nghị quyết số 05/2025/NQ-CP, Tổ chức nào được cấp phép phát hành tài sản mã hóa?","options":{"A":"Tổ chức quốc tế có trụ sở tại Việt Nam","B":"Doanh nghiệp Việt Nam đăng ký hoạt động dưới hình thức công ty TNHH hoặc công ty cổ phần theo Luật Doanh nghiệp","C":"Doanh nghiệp có vốn đầu tư nước ngoài (FDI) trên 50%","D":"Tổ chức tín dụng được Ngân hàng Nhà nước cấp phép"},"correct":"B","explanation":"Nghị quyết số 05/2025/NQ-CP\n📖 Điều khoản: Chương II, Điều 5, Khoản 1"},{"id":47,"stt":47,"chapter":"I. DỮ LIỆU – TÀI SẢN SỐ (DATA)","topic":"I.8. Tài sản số","topicCode":"I.8","question":"Theo Nghị quyết số 05/2025/NQ-CP, tài sản mã hóa được chào bán, phát hành cho đối tượng nào?","options":{"A":"Mọi cá nhân, tổ chức trong và ngoài nước","B":"Chỉ nhà đầu tư trong nước","C":"Chỉ nhà đầu tư nước ngoài","D":"Chỉ các quỹ đầu tư chuyên nghiệp"},"correct":"C","explanation":"Nghị quyết số 05/2025/NQ-CP\n📖 Điều khoản: Chương II, Điều 6, Khoản 1"},{"id":48,"stt":48,"chapter":"I. DỮ LIỆU – TÀI SẢN SỐ (DATA)","topic":"I.8. Tài sản số","topicCode":"I.8","question":"Theo Nghị quyết số 05/2025/NQ-CP, điều kiện cấp giấy phép cung cấp dịch vụ tổ chức thị trường giao dịch tài sản mã hóa, yêu cầu mức vốn điều lệ tối thiểu đã góp đối với doanh nghiệp là bao nhiêu","options":{"A":"5.000 tỷ VNĐ","B":"10.000 tỷ VNĐ","C":"15.000 tỷ VNĐ","D":"20.000 tỷ VNĐ"},"correct":"B","explanation":"Nghị quyết số 05/2025/NQ-CP\n📖 Điều khoản: Chương III. Điều 8, Khoản 2"},{"id":49,"stt":49,"chapter":"I. DỮ LIỆU – TÀI SẢN SỐ (DATA)","topic":"I.8. Tài sản số","topicCode":"I.8","question":"Theo Luật Công nghiệp công nghệ số năm 2025, \"Tài sản mã hóa\" sử dụng công nghệ nào để xác thực đối với tài sản trong quá trình tạo lập, phát hành?","options":{"A":"Công nghệ in ấn chống giả","B":"Công nghệ mã hóa hoặc công nghệ số có chức năng tương tự","C":"Công nghệ nhận diện khuôn mặt","D":"Công nghệ quét mã vạch truyền thống"},"correct":"B","explanation":"Luật 71/2025/QH15\nTài sản mã hóa sử dụng công nghệ mã hóa hoặc công nghệ số tương tự để xác thực tài sản trong suốt vòng đời.\n📖 Điều khoản: Điều 47, Khoản 2b"},{"id":50,"stt":50,"chapter":"I. DỮ LIỆU – TÀI SẢN SỐ (DATA)","topic":"I.9. Đạo đức trong sử dụng dữ liệu","topicCode":"I.9","question":"Theo Luật Bảo vệ dữ liệu cá nhân, khi phát hiện vi phạm có thể gây hại, bên liên quan phải thông báo cho cơ quan chuyên trách trong thời gian nào?","options":{"A":"24 giờ","B":"48 giờ","C":"72 giờ","D":"7 ngày"},"correct":"C","explanation":"Luật Bảo vệ dữ liệu cá nhân (Luật số 91/2025/QH15)\n📖 Điều khoản: Khoản 1, Điều 23. Thông báo vi phạm quy định về bảo vệ dữ liệu cá nhân"},{"id":51,"stt":51,"chapter":"I. DỮ LIỆU – TÀI SẢN SỐ (DATA)","topic":"I.9. Đạo đức trong sử dụng dữ liệu","topicCode":"I.9","question":"Theo Luật Bảo vệ dữ liệu cá nhân, nội dung nào sau đây là một trong những nguyên tắc về \"Sự đồng ý của chủ thể dữ liệu cá nhân\"?","options":{"A":"Bắt buộc phải đồng ý với tất cả các mục đích để được xử lý dữ liệu","B":"Sự im lặng hoặc không phản hồi không được coi là sự đồng ý","C":"Kèm theo điều kiện bắt buộc phải đồng ý với các mục đích khác với nội dung thỏa thuận","D":"Được phép nếu ngân hàng có chính sách nội bộ cho phép"},"correct":"B","explanation":"Luật Bảo vệ dữ liệu cá nhân (Luật số 91/2025/QH15)\n📖 Điều khoản: Khoản 4, Điều 9. Sự đồng ý của chủ thể dữ liệu cá nhân"},{"id":52,"stt":52,"chapter":"I. DỮ LIỆU – TÀI SẢN SỐ (DATA)","topic":"I.9. Đạo đức trong sử dụng dữ liệu","topicCode":"I.9","question":"Theo Luật Bảo vệ dữ liệu cá nhân, Khi khách hàng yêu cầu kiểm tra dữ liệu cá nhân của mình, ngân hàng cần xử lý như thế nào?","options":{"A":"Từ chối vì dữ liệu thuộc sở hữu của ngân hàng","B":"Thực hiện theo quyền của chủ thể dữ liệu được quy định của pháp luật","C":"Thu phí cao để hạn chế yêu cầu kiểm tra","D":"Xóa toàn bộ dữ liệu của khách hàng theo yêu cầu"},"correct":"B","explanation":"Luật Bảo vệ dữ liệu cá nhân (Luật số 91/2025/QH15)\n📖 Điều khoản: Điều 4. Quyền và nghĩa vụ của chủ thể dữ liệu cá nhân"},{"id":53,"stt":53,"chapter":"I. DỮ LIỆU – TÀI SẢN SỐ (DATA)","topic":"I.9. Đạo đức trong sử dụng dữ liệu","topicCode":"I.9","question":"Theo Luật Bảo vệ dữ liệu cá nhân, Khi ngân hàng thuê bên thứ ba xử lý dữ liệu khách hàng (outsourcing), trách nhiệm bảo vệ dữ liệu thuộc về ai?","options":{"A":"Hoàn toàn thuộc về bên thứ ba vì họ trực tiếp xử lý dữ liệu","B":"Ngân hàng và bên thứ ba đều phải chịu trách nhiệm","C":"Không bên nào chịu trách nhiệm vì dữ liệu đã được mã hóa trước khi chuyển giao","D":"Chỉ cần ký hợp đồng là đủ, không cần giám sát thêm"},"correct":"B","explanation":"Luật Bảo vệ dữ liệu cá nhân 2025; Nghị định 356/2025/NĐ-CP\n📖 Điều khoản: Điều 37 (trách nhiệm của bên kiểm soát dữ liệu cá nhân)"},{"id":54,"stt":1,"chapter":"II. KHÁCH HÀNG – TRẢI NGHIỆM SỐ (CUSTOMER CENTRIC)","topic":"II.1. Lấy khách hàng làm trung tâm","topicCode":"II.1","question":"Theo quy định, tổ chức cung ứng dịch vụ thanh toán phải đảm bảo có ít nhất các hình thức tiếp nhận yêu cầu tra soát, khiếu nại nào sau đây?","options":{"A":"Tiếp nhận trực tiếp bằng văn bản tại trụ sở chính của ngân hàng.","B":"Tiếp nhận qua tổng đài điện thoại (có ghi âm, hoạt động 24/24 giờ trong ngày và 7/7 ngày trong tuần) và qua các địa điểm giao dịch hợp pháp của tổ chức.","C":"Tiếp nhận qua thư điện tử (email) và tin nhắn SMS định danh.","D":"Tiếp nhận thông qua người giới thiệu hoặc nhân viên quản lý hồ sơ khách hàng."},"correct":"B","explanation":"Thông tư 15/2024/TT-NHNN\n📖 Điều khoản: Điểm a khoản 3 Điều 6"},{"id":55,"stt":2,"chapter":"II. KHÁCH HÀNG – TRẢI NGHIỆM SỐ (CUSTOMER CENTRIC)","topic":"II.1. Lấy khách hàng làm trung tâm","topicCode":"II.1","question":"Việc mở tài khoản thanh toán cho khách hàng là người khuyết tật được thực hiện như thế nào?","options":{"A":"Ngân hàng chỉ được phép mở tài khoản thanh toán cho khách hàng là người khuyết tật nếu khách hàng có người giám hộ hợp pháp đi kèm và ký tên thay trên mọi chứng từ.","B":"Ngân hàng căn cứ điều kiện, khả năng cung ứng để hướng dẫn hồ sơ, trình tự riêng nhưng phải đảm bảo thu thập đủ tài liệu, dữ liệu để xác minh thông tin nhận biết khách hàng.","C":"Người khuyết tật bắt buộc phải sử dụng hình thức mở tài khoản thanh toán trực tiếp tại quầy, không được áp dụng hình thức mở tài khoản thanh toán bằng phương tiện điện tử.","D":"Ngân hàng có quyền từ chối mở tài khoản nếu khách hàng không thể tự ký chữ ký tay giống hệt nhau trên các mẫu biểu."},"correct":"B","explanation":"Thông tư 17/2024/TT-NHNN\n📖 Điều khoản: khoản 5 Điều 15"},{"id":56,"stt":3,"chapter":"II. KHÁCH HÀNG – TRẢI NGHIỆM SỐ (CUSTOMER CENTRIC)","topic":"II.1. Lấy khách hàng làm trung tâm","topicCode":"II.1","question":"Theo quy định, tính năng nào sau đây là bắt buộc phải có trên ứng dụng Online Banking để khách hàng được quyền chủ động quản lý chi tiêu, các giao dịch thanh toán trực tuyến sử dụng thẻ ngân hàng?","options":{"A":"Thiết lập hạn mức thanh toán trực tuyến sử dụng thẻ ngân hàng trong ngày","B":"Gửi thông báo quảng cáo các chương trình khuyến mãi","C":"Cho phép chuyển tiền liên ngân hàng 24/7","D":"Tự động khóa thẻ khi số dư dưới mức tối thiểu"},"correct":"A","explanation":"Thông tư 50/2024/TT-NHNN\n📖 Điều khoản: Khoản 9, Điều 7"},{"id":57,"stt":4,"chapter":"II. KHÁCH HÀNG – TRẢI NGHIỆM SỐ (CUSTOMER CENTRIC)","topic":"II.1. Lấy khách hàng làm trung tâm","topicCode":"II.1","question":"Những loại thông tin nào của khách hàng khi lưu trữ bắt buộc phải áp dụng biện pháp mã hóa hoặc che dấu","options":{"A":"Họ tên, địa chỉ liên lạc và số điện thoại của khách hàng.","B":"Lịch sử giao dịch và số dư tài khoản thanh toán.","C":"Mã khóa bí mật, mã PIN và thông tin sinh trắc học.","D":"Nghề nghiệp, chức vụ và thu nhập hàng tháng."},"correct":"C","explanation":"Thông tư 50/2024/TT-NHNN\n📖 Điều khoản: Khoản 2 Điều 19"},{"id":58,"stt":5,"chapter":"II. KHÁCH HÀNG – TRẢI NGHIỆM SỐ (CUSTOMER CENTRIC)","topic":"II.1. Lấy khách hàng làm trung tâm","topicCode":"II.1","question":"Ngân hàng phải cung cấp thông tin về dịch vụ Online Banking cho khách hàng vào thời điểm nào?","options":{"A":"Sau khi khách hàng thực hiện giao dịch chuyển tiền đầu tiên.","B":"Định kỳ hàng năm thông qua báo cáo thường niên.","C":"Trước hoặc ngay tại thời điểm khách hàng đăng ký sử dụng dịch vụ.","D":"Chỉ công bố khi có yêu cầu bằng văn bản từ cơ quan chức năng."},"correct":"C","explanation":"Thông tư 50/2024/TT-NHNN\n📖 Điều khoản: Khoản 1 Điều 17"},{"id":59,"stt":6,"chapter":"II. KHÁCH HÀNG – TRẢI NGHIỆM SỐ (CUSTOMER CENTRIC)","topic":"II.1. Lấy khách hàng làm trung tâm","topicCode":"II.1","question":"Trong trường hợp nào tổ chức cung ứng dịch vụ online banking được phép gửi tin nhắn SMS chứa đường dẫn liên kết (Hyperlink) truy cập trang tin điện tử cho khách hàng?","options":{"A":"Khi tổ chức cung ứng dịch vụ online banking cần quảng cáo dịch vụ mới.","B":"Khi hệ thống đang bị tấn công và cần khách hàng đăng nhập để đổi mật khẩu ngay.","C":"Khi có yêu cầu cụ thể từ khách hàng.","D":"Khi tổ chức thực hiện bảo trì hệ thống và muốn khách hàng xem lịch bảo trì."},"correct":"C","explanation":"Thông tư 50/2024/TT-NHNN\n📖 Điều khoản: Khoản 3 Điều 17 Thông tư 50/2024/TT-NHNN quy định: 3. Đơn vị không gửi tin nhắn SMS, thư điện tử cho khách hàng có nội dung chứa đường dẫn liên kết (Hyperlink) truy cập các trang tin điện tử, trừ trường hợp theo yêu cầu của khách hàng."},{"id":60,"stt":7,"chapter":"II. KHÁCH HÀNG – TRẢI NGHIỆM SỐ (CUSTOMER CENTRIC)","topic":"II.2. Hành trình khách hàng số","topicCode":"II.2","question":"Tại Quyết định 06/QĐ-TTg ngày 06/01/2022, đơn vị nào là đầu mối triển khai nhiệm vụ “Bắt đầu cung cấp định danh, tài khoản định danh điện tử cho công dân sử dụng các dịch vụ, tiện ích số do Chính phủ, bộ, ngành xác thực và đảm bảo trong năm 2022”?","options":{"A":"Bộ Nội vụ","B":"Bảo hiểm xã hội Việt Nam","C":"Bộ Công an","D":"Bộ Khoa học và Công nghệ"},"correct":"C","explanation":"Quyết định 06/QĐ-TTg ngày 06/01/2022\n📖 Điều khoản: Điều 1. Mục III.4.a"},{"id":61,"stt":8,"chapter":"II. KHÁCH HÀNG – TRẢI NGHIỆM SỐ (CUSTOMER CENTRIC)","topic":"II.2. Hành trình khách hàng số","topicCode":"II.2","question":"Để hoàn thiện hành trình khách hàng số trong lĩnh vực giải quyết thủ tục hành chính cho công dân, Quyết định 06/QĐ-TTg ngày 06/01/2022 đặt mục tiêu trong giai đoạn 2025-2030 sẽ chuẩn hóa thống nhất bao nhiêu phần trăm cho mẫu đơn, tờ khai có thông tin công dân theo yêu cầu từ dữ liệu gốc của Cơ sở dữ liệu quốc gia về dân cư?","options":{"A":"0.3","B":"0.5","C":"0.7","D":"1"},"correct":"C","explanation":"Quyết định 06/QĐ-TTg ngày 06/01/2022\n📖 Điều khoản: Mục II.2.a (Nhóm tiện ích phục vụ giải quyết thủ tục hành chính và cung cấp dịch vụ công trực tuyến) - Mục tiêu 2025-2030: \"70% mẫu đơn, tờ khai có thông tin công dân được chuẩn hóa thống nhất theo yêu cầu từ dữ liệu gốc của Cơ sở dữ liệu quốc gia về dân cư\""},{"id":62,"stt":9,"chapter":"II. KHÁCH HÀNG – TRẢI NGHIỆM SỐ (CUSTOMER CENTRIC)","topic":"II.2. Hành trình khách hàng số","topicCode":"II.2","question":"Khi gửi email quảng cáo để duy trì quan hệ với khách hàng, doanh nghiệp bắt buộc phải làm gì để không bị coi là \"Spam\"?","options":{"A":"Chỉ gửi vào khung giờ từ 8h sáng đến 5h chiều.","B":"Phải có chức năng từ chối nhận quảng cáo theo quy định","C":"Phải đính kèm bản sao Giấy phép kinh doanh trong mỗi email.","D":"Không được gửi quá 1 email mỗi tháng cho một khách hàng."},"correct":"B","explanation":"Nghị định 91/2020/NĐ-CP ngày 14/8/2020\n📖 Điều khoản: Khoản 3 Điều 14 \"3. Có chức năng từ chối theo quy định tại Điều 16 Nghị định này.\""},{"id":63,"stt":10,"chapter":"II. KHÁCH HÀNG – TRẢI NGHIỆM SỐ (CUSTOMER CENTRIC)","topic":"II.2. Hành trình khách hàng số","topicCode":"II.2","question":"Theo Quyết định số 06/QĐ-TTg ngày 06/01/2022, Ngân hàng Nhà nước Việt Nam được giao phối hợp Bộ Công an kết nối với hệ thống định danh và xác thực điện tử, Cơ sở dữ liệu quốc gia về dân cư, phát triển và sử dụng các ứng dụng trên thẻ Căn cước công dân và ứng dụng VNeID. Mục tiêu của nhiệm vụ này là gì?","options":{"A":"Tăng cường kiểm soát dữ liệu khách hàng lĩnh vực tài chính - ngân hàng phục vụ hoạt động điều hành của Chính phủ","B":"Tạo thuận lợi cho người dân tiếp cận các dịch vụ tài chính, thúc đẩy quá trình chuyển đổi số trong ngành Ngân hàng và phục vụ các hoạt động chỉ đạo, điều hành của Ngân hàng Nhà nước Việt Nam","C":"Khai thác dữ liệu công dân cho mục đích quáng bá sản phẩm dịch vụ số ngành ngân hàng","D":"Kết nối, chia sẻ thông tin, dữ liệu giữa các ngân hàng với các Bộ Ban Ngành"},"correct":"B","explanation":"Quyết định số 06/QĐ-TTg ngày 06/01/2022\n📖 Điều khoản: Mục IV.20 (NHNN Việt Nam)"},{"id":64,"stt":11,"chapter":"II. KHÁCH HÀNG – TRẢI NGHIỆM SỐ (CUSTOMER CENTRIC)","topic":"II.2. Hành trình khách hàng số","topicCode":"II.2","question":"Đâu là nguyên tắc đúng theo Nghị định 278/2025/NĐ-CP ngày 22/10/2025 về việc kết nối, chia sẻ dữ liệu?","options":{"A":"Kết nối, chia sẻ dữ liệu để thiết lập kết nối kỹ thuật giữa các hệ thống thông tin, cơ sở dữ liệu trong hệ thống chính trị là bắt buộc","B":"Việc kết nối, chia sẻ dữ liệu phải bảo đảm được thực hiện kịp thời, đầy đủ, đúng mục đích; bảo đảm an toàn, bảo mật và đúng phạm vi chức năng, nhiệm vụ, quyền hạn; phục vụ hiệu quả hoạt động cung cấp dịch vụ công, quản trị, điều hành và khai thác giá trị của dữ liệu.","C":"Việc kết nối, chia sẻ dữ liệu không nhất thiết phải tuân thủ Khung kiến trúc dữ liệu quốc gia, Khung quản trị, quản lý dữ liệu quốc gia","D":"Không có đáp án nào đúng"},"correct":"B","explanation":"Nghị định 278/2025/NĐ-CP ngày 22/10/2025\n📖 Điều khoản: Điều 4 khoản 1"},{"id":65,"stt":12,"chapter":"II. KHÁCH HÀNG – TRẢI NGHIỆM SỐ (CUSTOMER CENTRIC)","topic":"II.2. Hành trình khách hàng số","topicCode":"II.2","question":"Một trong những nhiệm vụ được đặt ra tại Quyết định 3579/QĐ-NHNN ngày 03/11/2025 nhằm đẩy mạnh chuyển đối số tại các đo àng và yêu cầu an toàn, bảo mật"},"correct":"C","explanation":"Thông tư 17/2024/TT-NHNN\n📖 Điều khoản: Khoản 1 Điều 16"},{"id":77,"stt":24,"chapter":"II. KHÁCH HÀNG – TRẢI NGHIỆM SỐ (CUSTOMER CENTRIC)","topic":"II.4. Định danh điện tử (eKYC)","topicCode":"II.4","question":"Trong quá trình giải quyết thủ tục hành chính, dịch vụ công, thực hiện các giao dịch và hoạt động khác, nếu phát hiện có sự khác nhau giữa thông tin in trên thẻ căn cước hoặc thông tin lưu trữ trong bộ phận lưu trữ được mã hóa của thẻ căn cước với thông tin trong căn cước điện tử thì cơ quan, tổ chức, cá nhân sử dụng thông tin nào?","options":{"A":"Dùng thông tin in trên thẻ căn cước","B":"Dùng thông tin do cá nhân tự khai","C":"Dùng thông tin trong căn cước điện tử","D":"Dừng giao dịch và chờ xác minh thủ công trong mọi trường hợp"},"correct":"C","explanation":"Luật Căn cước 2023\n📖 Điều khoản: Điều 33 khoản 2"},{"id":78,"stt":25,"chapter":"II. KHÁCH HÀNG – TRẢI NGHIỆM SỐ (CUSTOMER CENTRIC)","topic":"II.5. Chăm sóc khách hàng đa kênh","topicCode":"II.5","question":"Trong hệ thống chăm sóc khách hàng đa kênh, doanh nghiệp tích hợp dữ liệu từ mobile app, website và tổng đài để xây dựng chân dung khách hàng. Hành vi nào dưới đây vi phạm quy định về bảo vệ dữ liệu cá nhân hiện hành?","options":{"A":"Sử dụng dữ liệu để cải thiện trải nghiệm người dùng trong cùng dịch vụ","B":"Chia sẻ dữ liệu khách hàng nội bộ giữa các phòng ban","C":"Sử dụng dữ liệu cho mục đích marketing mới mà chưa xin lại sự đồng ý","D":"Lưu trữ dữ liệu để phục vụ chăm sóc khách hàng"},"correct":"C","explanation":"Luật Bảo vệ dữ liệu cá nhân 2025\n📖 Điều khoản: Khoản 2 Điều 3 Nguyên tắc bảo vệ dữ liệu cá nhân\nKhoản 1 Điều 4 Quyền của chủ thể dữ liệu cá nhân"},{"id":79,"stt":26,"chapter":"II. KHÁCH HÀNG – TRẢI NGHIỆM SỐ (CUSTOMER CENTRIC)","topic":"II.5. Chăm sóc khách hàng đa kênh","topicCode":"II.5","question":"Một ngân hàng triển khai chatbot trên nhiều nền tảng (web, app, mạng xã hội). Trong trường hợp chatbot thu thập thông tin khách hàng, yêu cầu nào sau đây là bắt buộc?","options":{"A":"Chỉ cần thông báo chung trong điều khoản sử dụng dịch vụ trên website ngân hàng","B":"Phải thông báo rõ ràng cho khách hàng về việc thu thập, mục đích sử dụng dữ liệu và có sự đồng ý hợp lệ của khách hàng","C":"Có thể thu thập dữ liệu nếu phục vụ cải thiện chất lượng dịch vụ mà không cần thông báo","D":"Chỉ cần mã hóa dữ liệu là đủ, không cần thông báo cho khách hàng"},"correct":"B","explanation":"Luật Bảo vệ dữ liệu cá nhân 2025\n📖 Điều khoản: Điều 3, Điều 4, Điều 9"},{"id":80,"stt":27,"chapter":"II. KHÁCH HÀNG – TRẢI NGHIỆM SỐ (CUSTOMER CENTRIC)","topic":"II.5. Chăm sóc khách hàng đa kênh","topicCode":"II.5","question":"Một khách hàng phát hiện thẻ bị lộ thông tin và cần khóa thẻ khẩn cấp vào lúc nửa đêm. Hệ thống chăm sóc khách hàng đa kênh của ngân hàng phải đảm bảo xử lý ngay cả ngoài giờ làm việc, đồng thời duy trì trải nghiệm liền mạch khi chuyển kênh.\nGiải pháp nào dưới đây là phù hợp nhất?","options":{"A":"Yêu cầu khách hàng gọi tổng đài trong giờ hành chính để xác minh trước khi khóa thẻ","B":"Triển khai chatbot tự động tiếp nhận yêu cầu và hướng dẫn khách hàng chờ nhân viên xử lý vào sáng hôm sau","C":"Cho phép khách hàng tự thực hiện khóa thẻ ngay trên mobile app hoặc qua IVR tự động (Hệ thống trả lời tự động bằng giọng nói), đồng thời đồng bộ trạng thái trên tất cả các kênh","D":"Chỉ xử lý yêu cầu qua hotline để đảm bảo kiểm soát rủi ro"},"correct":"C","explanation":"Thông tư 18/2024/TT-NHNN\n📖 Điều khoản: Điểm d khoản 1 Điều 17 Thông tư 18/2024/TT-NHNN: \"d) Thiết lập, duy trì đường dây nóng liên tục hoạt động 24/24 giờ trong ngày và 7/7 ngày trong tuần để tiếp nhận, xử lý kịp thời các thông tin phản ánh của chủ thẻ\""},{"id":81,"stt":28,"chapter":"II. KHÁCH HÀNG – TRẢI NGHIỆM SỐ (CUSTOMER CENTRIC)","topic":"II.5. Chăm sóc khách hàng đa kênh","topicCode":"II.5","question":"Nếu tổ chức, cá nhân kinh doanh cung cấp không chính xác hoặc không đầy đủ thông tin quy định, khách hàng có quyền đơn phương chấm dứt hợp đồng đã giao kết và thông báo cho tổ chức, cá nhân kinh doanh trong thời hạn bao lâu?","options":{"A":"10 ngày kể từ ngày giao kết hợp đồng","B":"20 ngày kể từ ngày giao kết hợp đồng","C":"30 ngày kể từ ngày giao kết hợp đồng","D":"Không có đáp án nào đúng"},"correct":"C","explanation":"Luật Bảo vệ quyền lợi người tiêu dùng 2023\n📖 Điều khoản: Điểm c khoản 3 Điều 38"},{"id":82,"stt":29,"chapter":"II. KHÁCH HÀNG – TRẢI NGHIỆM SỐ (CUSTOMER CENTRIC)","topic":"II.5. Chăm sóc khách hàng đa kênh","topicCode":"II.5","question":"Ngân hàng tích hợp chatbot của bên thứ ba để hỗ trợ khách hàng trên website. Điều kiện quan trọng nhất khi chia sẻ dữ liệu khách hàng cho chatbot là gì?","options":{"A":"Chỉ cần đảm bảo chatbot hoạt động hiệu quả","B":"Không cần thông báo nếu chỉ phục vụ nội bộ","C":"Phải có sự đồng ý của khách hàng hoặc căn cứ pháp lý hợp lệ","D":"Chỉ cần ẩn tên khách hàng"},"correct":"C","explanation":"Luật Bảo vệ dữ liệu cá nhân 2025\n📖 Điều khoản: Khoản 1 Điều 9; khoản 1 Điều 18; Khoản 1 Điều 30; Luật Bảo vệ dữ liệu cá nhân 2025"},{"id":83,"stt":30,"chapter":"II. KHÁCH HÀNG – TRẢI NGHIỆM SỐ (CUSTOMER CENTRIC)","topic":"II.6. UX/UI trong ngân hàng số","topicCode":"II.6","question":"Theo Nghị quyết 57-NQ/TW, cách tiếp cận nào dưới đây phù hợp nhất khi thiết kế giao diện và trải nghiệm người dùng cho dịch vụ ngân hàng số?","options":{"A":"Lấy công nghệ làm trung tâm, người dùng là đối tượng thích nghi","B":"Người dân và doanh nghiệp là trung tâm","C":"Cơ quan quản lý là trung tâm, người dùng là đối tượng thụ hưởng","D":"Dữ liệu là trung tâm, người dân và doanh nghiệp là đối tượng cung cấp dữ liệu"},"correct":"B","explanation":"Nghị quyết 57-NQ/TW\n📖 Điều khoản: Nghị quyết 57-NQ/TW, phần I “Quan điểm chỉ đạo”, mục 2: “Người dân và doanh nghiệp là trung tâm, là chủ thể, nguồn lực, động lực chính…”"},{"id":84,"stt":31,"chapter":"II. KHÁCH HÀNG – TRẢI NGHIỆM SỐ (CUSTOMER CENTRIC)","topic":"II.6. UX/UI trong ngân hàng số","topicCode":"II.6","question":"Theo Thông tư 50/2024/TT-NHNN, trước hoặc ngay tại thời điểm khách hàng đăng ký sử dụng dịch vụ Online Banking, đơn vị phải công bố tối thiểu nội dung nào sau đây cho khách hàng ?","options":{"A":"Cách thức cung cấp dịch vụ, cách thức truy cập; hạn mức giao dịch và các hình thức xác nhận; các trang thiết bị cần thiết và điều kiện sử dụng; các rủi ro liên quan đến việc sử dụng dịch vụ","B":"Hạn mức giao dịch và biểu phí dịch vụ","C":"Cách thức truy cập và số điện thoại hỗ trợ","D":"Các rủi ro liên quan đến việc sử dụng dịch vụ"},"correct":"A","explanation":"Thông tư 50/2024/TT-NHNN\n📖 Điều khoản: Điều 17 khoản 1 Thông tư 50/2024/TT-NHNN quy định đơn vị phải công bố thông tin về dịch vụ Online Banking, bảo đảm khách hàng có thể tiếp cận trước hoặc ngay tại thời điểm đăng ký; thông tin tối thiểu gồm: cách thức cung cấp dịch vụ/cách thức truy cập, hạn mức giao dịch và các hình thức xác nhận, các trang thiết bị cần thiết, và các rủi ro liên quan."},{"id":85,"stt":32,"chapter":"II. KHÁCH HÀNG – TRẢI NGHIỆM SỐ (CUSTOMER CENTRIC)","topic":"II.6. UX/UI trong ngân hàng số","topicCode":"II.6","question":"Theo Thông tư 50/2024/TT-NHNN, trong thỏa thuận cung cấp, sử dụng dịch vụ Online Banking, đơn vị phải thông tin cho khách hàng tối thiểu nội dung nào dưới đây liên quan đến dữ liệu khách hàng?","options":{"A":"Mục đích sử dụng dữ liệu của khách hàng","B":"Các loại dữ liệu của khách hàng mà đơn vị thu thập","C":"Các loại dữ liệu của khách hàng mà đơn vị thu thập, mục đích sử dụng dữ liệu của khách hàng và trách nhiệm của đơn vị trong bảo mật dữ liệu của khách hàng","D":"Trách nhiệm của đơn vị trong bảo mật dữ liệu của khách hàng"},"correct":"C","explanation":"Thông tư 17/2024/TT-NHNN\n📖 Điều khoản: Điều 17 khoản 2 điểm b Thông tư 50/2024/TT-NHNN quy định phải thông tin tối thiểu về: “Các loại dữ liệu của khách hàng mà đơn vị thu thập, mục đích sử dụng dữ liệu của khách hàng và trách nhiệm của đơn vị trong bảo mật dữ liệu của khách hàng…”."},{"id":86,"stt":33,"chapter":"II. KHÁCH HÀNG – TRẢI NGHIỆM SỐ (CUSTOMER CENTRIC)","topic":"II.6. UX/UI trong ngân hàng số","topicCode":"II.6","question":"Theo Thông tư 50/2024/TT-NHNN, đối với phần mềm ứng dụng Mobile Banking, yêu cầu nào dưới đây phải được bảo đảm trong thiết kế và cung cấp ứng dụng?","options":{"A":"Cho phép chức năng ghi nhớ mã khóa bi stt":5,"chapter":"III. CÔNG NGHỆ SỐ – NỀN TẢNG","topic":"III.1. AI trong ngân hàng","topicCode":"III.1","question":"Trong hệ thống AI chấm điểm tín dụng, ngân hàng phát hiện rò rỉ dữ liệu khách hàng. Theo luật, thời hạn thông báo cho cơ quan quản lý là bao lâu?","options":{"A":"Chậm nhất 72 giờ","B":"Chậm nhất 7 ngày","C":"Chậm nhất 48 giờ","D":"Chậm nhất 24 giờ"},"correct":"A","explanation":"Luật bảo vệ dữ liệu cá nhân số 91/2025/QH15\n📖 Điều khoản: Điều 23"},{"id":109,"stt":6,"chapter":"III. CÔNG NGHỆ SỐ – NỀN TẢNG","topic":"III.1. AI trong ngân hàng","topicCode":"III.1","question":"Ngân hàng triển khai mô hình AI chấm điểm tín dụng tự động phê duyệt khoản vay. Theo Luật trí tuệ nhân tạo, yêu cầu quan trọng liên quan đến vai trò của con người là gì?","options":{"A":"Không cần kiểm soát nếu mô hình có độ chính xác cao","B":"Chỉ cần kiểm toán định kỳ","C":"Cho phép AI tự quyết định hoàn toàn","D":"Phải bảo đảm con người có khả năng giám sát và can thiệp vào quyết định của AI"},"correct":"D","explanation":"Luật Trí tuệ nhân tạo số 134/2025/QH15\n📖 Điều khoản: Điều 4"},{"id":110,"stt":7,"chapter":"III. CÔNG NGHỆ SỐ – NỀN TẢNG","topic":"III.1. AI trong ngân hàng","topicCode":"III.1","question":"Hệ thống AI phát hiện gian lận giao dịch thời gian thực có thể chặn giao dịch nghi ngờ gian lận, ảnh hưởng trực tiếp đến quyền lợi tài chính của khách hàng. Theo luật, hệ thống này nhiều khả năng thuộc nhóm rủi ro nào?","options":{"A":"Rủi ro trung bình","B":"Không cần phân loại","C":"Rủi ro cao","D":"Rủi ro rất cao"},"correct":"C","explanation":"Luật Trí tuệ nhân tạo số 134/2025/QH15\n📖 Điều khoản: Điều 9"},{"id":111,"stt":8,"chapter":"III. CÔNG NGHỆ SỐ – NỀN TẢNG","topic":"III.1. AI trong ngân hàng","topicCode":"III.1","question":"Ngân hàng A triển khai hệ thống AI tự động tra soát thông tin khách hàng, xác định hạn mức và đề xuất phương án cấp tín dụng, đồng thời loại bỏ hoàn toàn khâu thẩm định và phê duyệt của con người. Nhận định nào sau đây giải thích đúng nhất vì sao cách triển khai này là không phù hợp?","options":{"A":"AI phục vụ con người, không thay thế thẩm quyền và trách nhiệm của con người. Bank A cắt giảm toàn bộ nhân sự thẩm định, phê duyệt khoản vay tức là đã sử dụng AI để thay thế thẩm quyền và trách nhiệm của con người.","B":"AI chỉ áp dụng được cho những khách hàng có hạn mức tín dụng cao, rủi ro thấp có thể tự động hóa khâu thẩm đinh, phê duyệt, giải ngân.","C":"Không có bộ máy nào có độ chính xác đến 100%, cần có thêm phương án dự phòng, xử lý rủi ro.","D":"Cần bổ sung thêm AI có chức năng thẩm định."},"correct":"A","explanation":"Luật Trí tuệ nhân tạo số 134/2025/QH15\n📖 Điều khoản: Điều 4, khoản 2"},{"id":112,"stt":9,"chapter":"III. CÔNG NGHỆ SỐ – NỀN TẢNG","topic":"III.2. Machine Learning, tự động hóa quyết định","topicCode":"III.2","question":"Văn bản nào sau đây định hướng phát triển trí tuệ nhân tạo và dữ liệu lớn?","options":{"A":"Luật Giao dịch điện tử số 20/2023/QH15","B":"Luật An ninh mạng số 24/2018/QH14","C":"Nghị quyết số 57-NQ/TW ngày 22/12/2024 của Bộ Chính trị về đột phá phát triển khoa học, công nghệ, đổi mới sáng tạo và chuyển đổi số quốc gia","D":"Luật Bảo vệ quyền lợi người tiêu dùng số 19/2023/QH15"},"correct":"C","explanation":"Nghị quyết 57-NQ/TW ngày 22/12/2024 của Bộ Chính trị\nXác định: Dữ liệu là tư liệu sản xuất mới\nPhát triển cơ sở dữ
