liệu lớn, kinh tế dữ liệu\nThúc đẩy ứng dụng công nghệ số, AI trong quản trị và phát triển"},{"id":113,"stt":10,"chapter":"III. CÔNG NGHỆ SỐ – NỀN TẢNG","topic":"III.2. Machine Learning, tự động hóa quyết định","topicCode":"III.2","question":"Khi sử dụng Machine Learning trong chăm sóc khách hàng, doanh nghiệp cần đảm bảo điều gì theo quy định pháp luật hiện hành?","options":{"A":"Tối ưu độ chính xác của mô hình","B":"Minh bạch trong xử lý dữ liệu và đảm bảo quyền của khách hàng","C":"Tăng tốc độ xử lý dữ liệu","D":"Tự động hóa toàn bộ quy trình"},"correct":"B","explanation":"Luật Giao dịch điện tử 2023\nLuật Bảo vệ quyền lợi người tiêu dùng 2023\nLuật An ninh mạng 2018\nĐiều 17 – Bảo vệ thông tin cá nhân trên không gian mạng\nYêu cầu:\nKhông sử dụng trái phép dữ liệu cá nhân\nCó biện pháp bảo vệ thông tin\n📖 Điều khoản: - Luật Giao dịch điện tử 2023\nĐiều 6 – Nguyên tắc trong giao dịch điện tử\nQuy định:\nBảo đảm quyền, lợi ích hợp pháp của cơ quan, tổ chức, cá nhân\nTính minh bạch và an toàn trong giao dịch điện tử\nĐiều 7 – Chính sách của Nhà nước về giao dịch điện tử\nKhuyến khích: Ứng dụng công nghệ số, hệ thống tự động\nNhưng đi kèm: Bảo đảm an toàn, tin cậy và quyền của người dùng\n- Luật Bảo vệ quyền lợi người tiêu dùng 2023\nĐiều 8 – Quyền của người tiêu dùng. Người tiêu dùng có quyền: Được cung cấp thông tin chính xác, đầy đủ; Được bảo vệ thông tin cá nhân\n- Luật An ninh mạng 2018\nĐiều 17 – Bảo vệ thông tin cá nhân trên không gian mạng\nYêu cầu: Không sử dụng trái phép dữ liệu cá nhân; Có biện pháp bảo vệ thông tin"},{"id":114,"stt":11,"chapter":"III. CÔNG NGHỆ SỐ – NỀN TẢNG","topic":"III.2. Machine Learning, tự động hóa quyết định","topicCode":"III.2","question":"Trong bối cảnh phát triển các hệ thống thông minh (AI, Machine Learning) hỗ trợ ra quyết định, yếu tố nào đóng vai trò nền tảng cốt lõi để đảm bảo hiệu quả và độ chính xác của các mô hình này?","options":{"A":"Hạ tầng phần cứng có hiệu năng cao","B":"Dữ liệu đầy đủ, chất lượng và được quản trị hiệu quả","C":"Số lượng nhân sự công nghệ thông tin","D":"Số lượng hệ thống được triển khai"},"correct":"B","explanation":"Nghị quyết số 57-NQ/TW ngày 22/12/2024 của Bộ Chính trị về đột phá phát triển khoa học, công nghệ, đổi mới sáng tạo và chuyển đổi số quốc gia\n📖 Điều khoản: Nghị quyết 57-NQ/TW\nPhần Quan điểm / Định hướng lớn\nNhấn mạnh dữ liệu là tài nguyên quan trọng là nền tảng cho phát triển kinh tế số, ứng dụng công nghệ số, AI"},{"id":115,"stt":12,"chapter":"III. CÔNG NGHỆ SỐ – NỀN TẢNG","topic":"III.2. Machine Learning, tự động hóa quyết định","topicCode":"III.2","question":"Văn bản nào sau đây đóng vai trò định hướng chiến lược cấp cao về việc xây dựng các hệ thống nền tảng số theo hướng kết nối, chia sẻ và dùng chung?","options":{"A":"Quyết định 06/QĐ-TTg ngày 06/01/2022 của Thủ tướng Chính phủ phê duyệt Đề án “Phát triển ứng dụng dữ liệu về dân cư, định danh và xác thực điện tử phục vụ chuyển đổi số quốc gia giai đoạn 2022 - 2025, tầm nhìn đến năm 2030”","B":"Nghị quyết số 57-NQ/TW ngày 22/12/2024 của Bộ Chính trị về đột phá phát triển khoa học, công nghệ, đổi mới sáng tạo và chuyển đổi số quốc gia","C":"Thông tư 50/2024/TT-NHNN được sửa đổi, bổ sung tại Thông tư 77/2025/TT-NHNN","D":"Luật Giao dịch điện tử số 20/2023/QH15"},"correct":"B","explanation":"Nghị quyết số 57-NQ/TW ngày 22/12/2024 của Bộ Chính trị về đột phá phát triển khoa học, công nghệ, đổi mới sáng tạo và chuyển đổi số quốc gia\n📖 Điều khoản: Nghị quyết 57-NQ/TW\nQuan điểm\nNhấn mạnh dữ liệu là tài nguyên quan trọng\ncần kết nối, chia sẻ và khai thác hiệu quả\nNhiệm vụ, giải pháp\nYêu cầu:\nxây dựng hạ tầng dữ liệu\nnền tảng số dùng chung\nthúc đẩy liên thông dữ liệu giữa các hệ thống"},{"id":116,"stt":13,"chapter":"III. CÔNG NGHỆ SỐ – NỀN TẢNG","topic":"III.2. Machine Learning, tự động hóa quyết định","topicCode":"III.2","question":"Theo Quyết định 06/QĐ-TTg ngày 06/01/2022 của Thủ tướng Chính phủ phê duyệt Đề án “Phát triển ứng dụng dữ liệu về dân cư, định danh và xác thực điện tử phục vụ chuyển đổi số quốc gia giai đoạn 2022 - 2025, tầm nhìn đến năm 2030” , khi sử dụng dữ liệu dân cư trong các hệ thống phân tích (như Machine Learning), yêu cầu nào cần được đảm bảo?","options":{"A":"Tối ưu thuật toán","B":"Dữ liệu được khai thác đúng mục đích, bảo mật và an toàn","C":"Tăng tốc độ xử lý","D":"Tự động hóa toàn bộ quy trình"},"correct":"B","explanation":"Quyết định 06/QĐ-TTg ngày 06/01/2022 của Thủ tướng Chính phủ phê duyệt Đề án “Phát triển ứng dụng dữ liệu về dân cư, định danh và xác thực điện tử phục vụ chuyển đổi số quốc gia giai đoạn 2022 - 2025, tầm nhìn đến năm 2030”\n📖 Điều khoản: Mục III – Nhiệm vụ, giải pháp\nYêu cầu: Khai thác dữ liệu đúng mục đích; Bảo đảm an toàn, bảo mật thông tin; Kết nối, chia sẻ có kiểm soát"},{"id":117,"stt":14,"chapter":"III. CÔNG NGHỆ SỐ – NỀN TẢNG","topic":"III.2. Machine Learning, tự động hóa quyết định","topicCode":"III.2","question":"Theo Nghị quyết số 57-NQ/TW ngày 22/12/2024 của Bộ Chính trị về đột phá phát triển khoa học, công nghệ, đổi mới sáng tạo và chuyển đổi số quốc gia, yếu tố nào được xác định là “tư liệu sản xuất chính”, làm nền tảng cho các hệ thống dữ liệu và trí tuệ nhân tạo?","options":{"A":"Hạ tầng công nghệ","B":"Dữ liệu","C":"Nhân lực số","D":"Quy trình vận hành"},"correct":"B","explanation":"Nghị quyết số 57-NQ/TW ngày 22/12/2024 của Bộ Chính trị về đột phá phát triển khoa học, công nghệ, đổi mới sáng tạo và chuyển đổi số quốc gia\n📖 Điều khoản: Theo phần Quan điểm chỉ đạo của Nghị quyết 57-NQ/TW, dữ liệu được xác định là “tư liệu sản xuất chính”, đóng vai trò nền tảng cho phát triển công nghệ số và trí tuệ nhân tạo."},{"id":118,"stt":15,"chapter":"III. CÔNG NGHỆ SỐ – NỀN TẢNG","topic":"III.2. Machine Learning, tự động hóa quyết định","topicCode":"III.2","question":"Trong bối cảnh các hệ thống phân tích dữ liệu và trí tuệ nhân tạo (như Machine Learning) xử lý dữ liệu khách hàng, văn bản nào sau đây quy định trực tiếp về việc bảo vệ dữ liệu cá nhân và quyền riêng tư của khách hàng?","options":{"A":"Nghị quyết số 57-NQ/TW ngày 22/12/2024 của Bộ Chính trị về đột phá phát triển khoa học, công nghệ, đổi mới sáng tạo và chuyển đổi số quốc gia","B":"Luật Giao dịch điện tử số 20/2023/QH15","C":"Luật bảo vệ dữ liệu cá nhân số 91/2025/QH15","D":"Nghị định quản lý, kết nối và chia sẻ dữ liệu số của cơ quan nhà nước số 47/2020/NĐ-CP"},"correct":"C","explanation":"Luật Bảo vệ dữ liệu cá nhân 2025\n📖 Điều khoản: Luật Bảo vệ dữ liệu cá nhân 2025\nĐiều 5 (Khoản 1, 2, 3, 5): Nguyên tắc xử lý dữ liệu cá nhân\nĐiều 6 (Khoản 1–4): Quyền của chủ thể dữ liệu\nĐiều 7: Nghĩa vụ bảo vệ dữ liệu"},{"id":119,"stt":16,"chapter":"III. CÔNG NGHỆ SỐ – NỀN TẢNG","topic":"III.2. Machine Learning, tự động hóa quyết định","topicCode":"III.2","question":"Một ngân hàng sử dụng Machine Learning để tự động phê duyệt khoản vay. Khách hàng bị từ chối nhưng không được cung cấp lý do rõ ràng. Theo bạn, hệ thống cần cải thiện điều gì?","options":{"A":"Tăng độ chính xác mô hình","B":"Minh bạch và khả năng giải trình quyết định","C":"Tăng tốc độ xử lý","D":"Giảm chi phí vận hành"},"correct":"B","explanation":"Luật Giao dịch điện tử 2023\nLuật Bảo vệ quyền lợi người tiêu dùng 2023\n📖 Điều khoản: - Luật Giao dịch điện tử 2023\nĐiều 6 – Nguyên tắc\nĐảm bảo: quyền lợi hợp pháp của cá nhân; tính minh bạch trong giao dịch\n- Luật Bảo vệ quyền lợi người tiêu dùng 2023\nĐiều 8: Người tiêu dùng có quyền:\nđược cung cấp thông tin rõ ràng"},{"id":120,"stt":17,"chapter":"III. CÔNG NGHỆ SỐ – NỀN TẢNG","topic":"III.3. Điện toán đám mây","topicCode":"III.3","question":"Mô hình triển khai nào là sự kết hợp giữa đám mây dùng riêng (Private Cloud) và đám mây công cộng (Public Cloud)?","options":{"A":"Đám mây công đồng\n(Community Cloud)","B":"Đa đám mây\n(Multi-Cloud)","C":"Đám mây lai\n(Hybrid Cloud)","D":"Đám mây bản địa\n(Local Cloud)"},"correct":"C"},{"id":121,"stt":18,"chapter":"III. CÔNG NGHỆ SỐ – NỀN TẢNG","topic":"III.3. Điện toán đám mây","topicCode":"III.3","question":"Chương trình phát triển Chính phủ số được Thủ tướng Chính phủ phê duyệt tại Quyết định số 2629/QĐ-TTg ngày 01/12/2025 yêu cầu xây dựng nền tảng điện toán đám mây với mục tiêu gì?","options":{"A":"Chỉ phục vụ doanh nghiệp tư nhân","B":"Cung cấp tài nguyên tính toán tập trung, hiệu năng cao","C":"Chỉ lưu trữ dữ liệu mật của Chính phủ","D":"Chỉ phục vụ các hệ thống cấp xã"},"correct":"B","explanation":"Quyết định 2629/QĐ-TTg ngày 01/12/2025 của Thủ tướng Chính phủ\n📖 Điều khoản: Mục III.4"},{"id":122,"stt":19,"chapter":"III. CÔNG NGHỆ SỐ – NỀN TẢNG","topic":"III.3. Điện toán đám mây","topicCode":"III.3","question":"Theo Quyết định số 2629/QĐ-TTg ngày 01/12/2025 của Thủ tướng Chính phủ phê duyệt Chương trình phát triển Chính phủ số, đơn vị nào chủ trì nội dung xây dựng Trung tâm Dữ liệu quốc gia và nền tảng điện toán đám mây thống nhất, hiệu năng cao?","options":{"A":"Bộ Công an","B":"Các bộ, ngành, địa phương","C":"Ban Cơ yếu Chính phủ","D":"Bộ Khoa học và Công nghệ"},"correct":"A","explanation":"Theo Quyết định 2629/QĐ-TTg\n📖 Điều khoản: Phụ lục II/Mục IV/Stt3"},{"id":123,"stt":20,"chapter":"III. CÔNG NGHỆ SỐ – NỀN TẢNG","topic":"III.3. Điện toán đám mây","topicCode":"III.3","question":"Trách nhiệm của các tổ chức, cá nhân ký kết hợp đồng có liên quan tới xử lý dữ liệu cá nhân với các tổ chức cung cấp dịch vụ điện toán đám mây?","options":{"A":"Không có quy định","B":"Cung cấp thông tin về bộ phận, nhân sự bảo vệ dữ liệu cá nhân;","C":"cung cấp quy trình nội bộ để xử lý dữ liệu cá nhân","D":"Danh sách người dùng hệ thống xử lý dữ liệu cá nhân"},"correct":"B","explanation":"Nghị định số 356/2025/NĐ-CP\n📖 Điều khoản: Điều 12.2.a"},{"id":124,"stt":21,"chapter":"III. CÔNG NGHỆ SỐ – NỀN TẢNG","topic":"III.3. Điện toán đám mây","topicCode":"III.3","question":"Tính co giãn (Elasticity), một trong những đặc điểm cốt lõi của điện toán đám mây mang ý nghĩa gì?","options":{"A":"Bảo mật, tăng cường an toàn thông tin","B":"Cho phép tự động tăng hoặc giảm tài nguyên dựa trên nhu cầu sử dụng của hệ thống","C":"Dùng bao nhiêu, thanh toán bấy nhiêu","D":"Linh hoạt trong cách tính chi phí dịch vụ"},"correct":"B"},{"id":125,"stt":22,"chapter":"III. CÔNG NGHỆ SỐ – NỀN TẢNG","topic":"III.3. Điện toán đám mây","topicCode":"III.3","question":"Mô hình dịch vụ điện toán đám mây nào cho người dùng thuê các tài nguyên hạ tầng như máy chủ, lưu trữ và mạng qua internet?","options":{"A":"SaaS (Software as a Service)","B":"PaaS (Platform as a Service)","C":"IaaS (Infrastructure as a Service)","D":"DBaaS (Database as a Service)"},"correct":"C"},{"id":126,"stt":23,"chapter":"III. CÔNG NGHỆ SỐ – NỀN TẢNG","topic":"III.3. Điện toán đám mây","topicCode":"III.3","question":"Đặc điểm cốt lõi của điện toán đám mây cho phép hệ thống tự động tăng hoặc giảm tài nguyên dựa trên nhu cầu sử dụng?","options":{"A":"Tính bảo mật (Security)","B":"Tính co giãn (Elasticity)","C":"Tính cố định (Fixed Capacity)","D":"Tính thủ công (Manual Provisioning)"},"correct":"B"},{"id":127,"stt":24,"chapter":"III. CÔNG NGHỆ SỐ – NỀN TẢNG","topic":"III.3. Điện toán đám mây","topicCode":"III.3","question":"Trong môi trường điện toán đám mây, một hệ thống AI tự động mở rộng phạm vi xử lý dữ liệu cá nhân vượt ngoài mục đích ban đầu và chưa thực hiện phân loại rủi ro cũng như kiểm soát truy cập phù hợp. Hành vi này vi phạm yêu cầu nào trong bảo vệ dữ liệu cá nhân?","options":{"A":"Yêu cầu bảo đảm an toàn, bảo mật dữ liệu trong quá trình lưu trữ và truyền tải","B":"Yêu cầu tối ưu hóa hiệu năng hệ thống và khả năng xử lý dữ liệu lớn","C":"Yêu cầu xử lý dữ liệu cá nhân đúng mục đích và giới hạn trong phạm vi cần thiết","D":"Yêu cầu bảo đảm tính liên tục và sẵn sàng của dịch vụ điện toán đám mây"},"correct":"C","explanation":"Luật Bảo vệ dữ liệu cá nhân số 91/2025/QH15\n📖 Điều khoản: Điều 30"},{"id":128,"stt":25,"chapter":"III. CÔNG NGHỆ SỐ – NỀN TẢNG","topic":"III.4. RPA - Tự động hóa quyết định","topicCode":"III.4","question":"RPA (Robotic Process Automation) là gì?","options":{"A":"Công nghệ phân tích dữ liệu lớn","B":"Công nghệ dùng robot phần mềm để tự động hóa quy trình lặp lại","C":"Công cụ thiết kế giao diện","D":"Hệ thống lưu trữ số"},"correct":"B","explanation":"RPA (Robotic Process Automation) là robot phần mềm tự động hóa các bước thao tác lặp lại theo quy tắc rõ ràng."},{"id":129,"stt":26,"chapter":"III. CÔNG NGHỆ SỐ – NỀN TẢNG","topic":"III.4. RPA - Tự động hóa quyết định","topicCode":"III.4","question":"RPA giúp ngân hàng giảm thiểu rủi ro vận hành ở điểm nào?","options":{"A":"Rút ngắn thời gian phê duyệt chính sách nội bộ","B":"Thay thế hoàn toàn hệ thống core banking","C":"Giảm lỗi do nhân viên thao tác thủ công lặp lại","D":"Mở rộng mạng lưới chi nhánh giao dịch"},"correct":"C","explanation":"RPA tự động thực hiện các thao tác lặp lại theo đúng quy tắc đã lập trình, giúp loại bỏ lỗi phát sinh do con người khi nhập liệu, đối soát hoặc xử lý hồ sơ. Nhờ đó, rủi ro vận hành giảm và quy trình trở nên ổn định, chính xác hơn."},{"id":130,"stt":27,"chapter":"III. CÔNG NGHỆ SỐ – NỀN TẢNG","topic":"III.4. RPA - Tự động hóa quyết định","topicCode":"III.4","question":"RPA (Robotic Process Automation) phù hợp nhất với loại tác vụ nào trong hoạt động ngân hàng?","options":{"A":"Quy trình đòi hỏi phán đoán chuyên môn phức tạp","B":"Các tác vụ mang tính lặp lại, quy trình cố định và có quy tắc rõ ràng","C":"Quy trình sáng tạo nội dung hoặc ra quyết định nghiệp vụ","D":"Quy trình đòi hỏi gặp trực tiếp khách hàng"},"correct":"B","explanation":"RPA hoạt động tốt nhất khi quy trình ổn định, có bước xử lý cố định, chẳng hạn: nhập liệu, đối soát, xử lý hồ sơ, kiểm tra tính hợp lệ. Những tác vụ cần phán đoán hoặc sáng tạo không phù hợp với RPA vì robot không thể tự đưa ra quyết định nghiệp vụ."},{"id":131,"stt":28,"chapter":"III. CÔNG NGHỆ SỐ – NỀN TẢNG","topic":"III.4. RPA - Tự động hóa quyết định","topicCode":"III.4","question":"Khi RPA (Robotic Process Automation) thực hiện tác vụ nội bộ, tổ chức tín dụng phải áp dụng nguyên tắc nào để giảm gian lận?","options":{"A":"Giao toàn bộ quyền quản trị hệ thống cho tài khoản RPA","B":"Không cần phân quyền vì RPA hoạt động tự động","C":"Cấp quyền tối thiểu cần thiết và kiểm soát chặt truy cập","D":"Chỉ giám sát RPA khi có sự cố phát sinh"},"correct":"C","explanation":"TT 09 áp dụng nguyên tắc least privilege cho cả người và robot, nhằm giảm nguy cơ gian lận nội bộ."},{"id":132,"stt":29,"chapter":"III. CÔNG NGHỆ SỐ – NỀN TẢNG","topic":"III.4. RPA - Tự động hóa quyết định","topicCode":"III.4","question":"RPA (Robotic Process Automation) giúp cải thiện trải nghiệm khách hàng bằng cách nào?","options":{"A":"Tăng số lần khách hàng phải xác minh thông tin","B":"Thực hiện quy trình tự động, nhanh và chính xác hơn, giảm thời gian chờ","C":"Yêu cầu khách hàng cung cấp thêm giấy tờ","D":"Chuyển toàn bộ yêu cầu sang xử lý thủ công"},"correct":"B","explanation":"RPA tự động hóa những tác vụ lặp lại như kiểm tra hồ sơ, nhập liệu, đối soát…, giúp ngân hàng xử lý yêu cầu nhanh – chính xác – ít sai sót, từ đó rút ngắn thời gian phục vụ và nâng cao sự hài lòng của khách hàng."},{"id":133,"stt":30,"chapter":"III. CÔNG NGHỆ SỐ – NỀN TẢNG","topic":"III.4. RPA - Tự động hóa quyết định","topicCode":"III.4","question":"Trong hoạt động hỗ trợ khách hàng, RPA (Robotic Process Automation) đóng vai trò gì?","options":{"A":"Xử lý được mọi yêu cầu phức tạp của khách hàng mà không cần nhân viên hỗ trợ","B":"Buộc khách hàng chuyển sang kênh tự phục vụ","C":"Tự động trả lời các yêu cầu đơn giản, giúp nhân viên tập trung xử lý yêu cầu khó","D":"Giảm số lượng kênh hỗ trợ khách hàng"},"correct":"C","explanation":"RPA xử lý các yêu cầu lặp lại (tra cứu thông tin, kiểm tra trạng thái…), giúp nhân sự tập trung hỗ trợ vấn đề chuyên sâu → nâng cao chất lượng dịch vụ."},{"id":134,"stt":31,"chapter":"III. CÔNG NGHỆ SỐ – NỀN TẢNG","topic":"III.4. RPA - Tự động hóa quyết định","topicCode":"III.4","question":"Vì sao ngân hàng cần ưu tiên tự động hóa quy trình nội bộ trong chuyển đổi số?","options":{"A":"Để giảm thời gian xử lý và nâng cao độ chính xác","B":"Tăng bước đối chiếu giấy tờ","C":"Bắt buộc mọi giao dịch phải đến quầy","D":"Để giảm mức độ ứng dụng công nghệ"},"correct":"A","explanation":"Theo QĐ 3579/QĐ-NHNN về Chiến lược chuyển đổi số ngành Ngân hàng, tự động hóa quy trình nội bộ là ưu tiên hàng đầu nhằm giảm thời gian xử lý, nâng cao độ chính xác, tiết kiệm chi phí vận hành và cải thiện trải nghiệm khách hàng"},{"id":135,"stt":32,"chapter":"III. CÔNG NGHỆ SỐ – NỀN TẢNG","topic":"III.5. API, Open Banking","topicCode":"III.5","question":"Open banking có nghĩa là hoạt động ngân hàng mở. Theo bạn, thứ gì được mở?","options":{"A":"Giao tiếp","B":"Dữ liệu và dịch vụ ngân hàng thông qua API","C":"Kho tiền","D":"Quy trình"},"correct":"B","explanation":"Bản chất của Open Banking là việc \"mở\" các kho dữ liệu của ngân hàng thông qua API để các bên thứ ba có thể tiếp cận (khi khách hàng cho phép), thay vì dữ liệu bị đóng kín chỉ trong nội bộ ngân hàng như truyền thống."},{"id":136,"stt":33,"chapter":"III. CÔNG NGHỆ SỐ – NỀN TẢNG","topic":"III.5. API, Open Banking","topicCode":"III.5","question":"Trong hệ sinh thái hoạt động ngân hàng mở, khách hàng sẽ được phục vụ nhanh hơn, được lựa chọn nhiều nền tảng cung cấp dịch vụ ngân hàng hơn. Điều này có được là do?","options":{"A":"Các ngân hàng bán lại mảng dịch vụ khách hàng cho các nền tảng bán hàng trực tuyến","B":"Bên thứ ba mua lại mảng dịch vụ khách hàng của Ngân hàng","C":"Bên thứ ba được tiếp cận trực tiếp thông tin mà các ngân hàng chia sẻ thông qua bộ giao diện lập trình ứng dụng - API.","D":"Các nền tảng bán hàng trực tuyến thuê lại mảng dịch vụ khách hàng của các ngân hàng"},"correct":"C","explanation":"Khi Fintech có quyền truy cập trực tiếp vào dữ liệu ngân hàng qua API, họ có thể xây dựng các giải pháp tài chính tức thời, giúp khách hàng thực hiện dịch vụ ngay trên ứng dụng yêu thích của mình mà không cần phải chuyển qua lại giữa nhiều hệ thống."},{"id":137,"stt":34,"chapter":"III. CÔNG NGHỆ SỐ – NỀN TẢNG","topic":"III.5. API, Open Banking","topicCode":"III.5","question":"Tuyên bố nào sau đây là không chính xác?","options":{"A":"Ngân hàng sử dụng giao diện lập trình ứng dụng API để kiểm soát việc chia sẻ dữ liệu cho bên thứ ba","B":"Ngân hàng cung cấp giao diện lập trình ứng dụng API để cho phép bên thứ ba truy vấn dữ liệu mà ngân hàng chia sẻ.","C":"Bên thứ ba sử dụng giao diện lập trình ứng dụng API để truy cập, truy vấn dữ liệu mà ngân hàng chia sẻ.","D":"Ngân hàng sử dụng giao diện lập trình ứng dụng API để chuyển dữ liệu khách hàng cho bên thứ ba một cách an toàn."},"correct":"D","explanation":"Tuyên bố này không chính xác vì API không đơn thuần là \"chuyển dữ liệu đi\". Thực tế, API đóng vai trò là một giao diện truy vấn có kiểm soát; ngân hàng không \"giao đứt\" dữ liệu mà chỉ cho phép các công ty tài chính truy cập và lấy đúng phần thông tin cần thiết dưới sự giám sát chặt chẽ của hệ thống bảo mật."},{"id":138,"stt":35,"chapter":"III. CÔNG NGHỆ SỐ – NỀN TẢNG","topic":"III.5. API, Open Banking","topicCode":"III.5","question":"API trong lĩnh vực ngân hàng được hiểu đơn giản là gì?","options":{"A":"Một loại thẻ ngân hàng điện tử","B":"Một cách để các hệ thống phần mềm kết nối và trao đổi dữ liệu với nhau","C":"Một loại tài khoản tiết kiệm trực tuyến","D":"Một phần mềm diệt virus cho ngân hàng"},"correct":"B","explanation":"API là cầu nối giúp các hệ thống khác nhau giao tiếp với nhau. Trong ngân hàng, API cho phép ứng dụng bên ngoài hoặc hệ thống nội bộ kết nối tới dịch vụ ngân hàng để lấy thông tin hoặc thực hiện các chức năng được cho phép."},{"id":139,"stt":36,"chapter":"III. CÔNG NGHỆ SỐ – NỀN TẢNG","topic":"III.5. API, Open Banking","topicCode":"III.5","question":"Open Banking là gì?","options":{"A":"Ngân hàng mở cửa làm việc 24/7","B":"Mô hình cho phép chia sẻ dữ liệu hoặc dịch vụ ngân hàng một cách an toàn cho bên thứ ba khi khách hàng đồng ý","C":"Hình thức mở thêm nhiều chi nhánh ngân hàng","D":"Dịch vụ miễn toàn bộ phí chuyển tiền"},"correct":"B","explanation":"Open Banking không có nghĩa là mở cửa ngân hàng theo nghĩa vật lý, mà là mô hình cho phép ngân hàng chia sẻ dữ liệu hoặc dịch vụ qua API cho các bên thứ ba, nhưng phải có sự đồng ý của khách hàng và tuân thủ yêu cầu bảo mật."},{"id":140,"stt":37,"chapter":"III. CÔNG NGHỆ SỐ – NỀN TẢNG","topic":"III.5. API, Open Banking","topicCode":"III.5","question":"Lợi ích phổ biến của Open Banking đối với khách hàng là gì?","options":{"A":"Cho phép khách hàng truy cập và quản lý nhiều dịch vụ tài chính từ các nhà cung cấp khác nhau","B":"Giúp ngân hàng giảm chi phí vận hành nên có thể tự động cung cấp dịch vụ tốt hơn cho khách hàng","C":"Cho phép các bên thứ ba truy cập dữ liệu tài khoản mà không cần sự tham gia của ngân hàng","D":"Tăng khả năng kiểm soát toàn bộ dữ liệu tài chính của khách hàng bởi một tổ chức duy nhất"},"correct":"A","explanation":"Open Banking giúp khách hàng có trải nghiệm thuận tiện hơn, ví dụ quản lý nhiều tài khoản, thanh toán, xem lịch sử giao dịch hoặc sử dụng các dịch vụ tài chính cá nhân trên ứng dụng của bên thứ ba được kết nối hợp pháp với ngân hàng."},{"id":141,"stt":38,"chapter":"III. CÔNG NGHỆ SỐ – NỀN TẢNG","topic":"III.5. API, Open Banking","topicCode":"III.5","question":"Biện pháp nào giúp bảo vệ an toàn khi sử dụng API ngân hàng?","options":{"A":"Chia sẻ mật khẩu tài khoản cho mọi ứng dụng để tiện đăng nhập","B":"Bỏ qua bước xác thực để thao tác nhanh hơn","C":"Sử dụng xác thực, phân quyền truy cập và mã hóa dữ liệu","D":"Cho phép mọi hệ thống truy cập API mà không cần kiểm tra"},"correct":"C","explanation":"API ngân hàng cần được bảo vệ bằng các biện pháp như xác thực người dùng hoặc hệ thống, phân quyền đúng phạm vi truy cập và mã hóa dữ liệu khi truyền nhận. Đây là những nguyên tắc cơ bản để giảm rủi ro lộ lọt thông tin và truy cập trái phép."},{"id":142,"stt":39,"chapter":"III. CÔNG NGHỆ SỐ – NỀN TẢNG","topic":"III.6. Công nghệ thanh toán không dùng tiền mặt","topicCode":"III.6","question":"Trong bối cảnh thúc đẩy thanh toán số và giảm phụ thuộc vào tiền mặt, mục tiêu cốt lõi của việc phát triển thanh toán điện tử trong nền kinh tế là gì?","options":{"A":"Tăng số lượng giao dịch điện tử trong hệ thống ngân hàng","B":"Giảm chi phí vận hành cho tổ chức tài chính","C":"Thúc đẩy phát triển kinh tế số thông qua phổ cập dịch vụ số và giảm phụ thuộc tiền mặt","D":"Mở rộng hạ tầng thanh toán tại khu vực đô thị"},"correct":"C","explanation":"Nghị quyết 57-NQ/TW và Luật Giao dịch điện tử 2023\n📖 Điều khoản: Nghị quyết 57-NQ/TW\nĐịnh hướng: phát triển kinh tế số; nâng cao hiệu quả quản trị và minh bạch\nLuật Giao dịch điện tử 2023\nĐiều 5, 6: thúc đẩy giao dịch điện tử bảo đảm an toàn, tin cậy → nền tảng cho thanh toán số"},{"id":143,"stt":40,"chapter":"III. CÔNG NGHỆ SỐ – NỀN TẢNG","topic":"III.6. Công nghệ thanh toán không dùng tiền mặt","topicCode":"III.6","question":"Ngân hàng đã triển khai đầy đủ các phương thức thanh toán không dùng tiền mặt (QR, contactless, mobile banking), nhưng tỷ lệ sử dụng thực tế của khách hàng vẫn thấp.\nTheo bạn, yếu tố đầu tiên cần xem lại là gì?","options":{"A":"Tính hiện đại của công nghệ thanh toán","B":"Mức độ thuận tiện trong trải nghiệm người dùng, làm thay đổi hành vi người dùng","C":"Tính chính xác của kỹ thuật sử dụng","D":"Mức độ tin cậy của đối tác cung cấp giải pháp"},"correct":"B"},{"id":144,"stt":41,"chapter":"III. CÔNG NGHỆ SỐ – NỀN TẢNG","topic":"III.6. Công nghệ thanh toán không dùng tiền mặt","topicCode":"III.6","question":"Trong hoạt động thanh toán không dùng tiền mặt, khi xảy ra tranh chấp, việc xác định một giao dịch điện tử có giá trị pháp lý hay không cần căn cứ trực tiếp vào văn bản nào dưới đây?","options":{"A":"Nghị quyết số 57-NQ/TW ngày 22/12/2024 của Bộ Chính trị về đột phá phát triển khoa học, công nghệ, đổi mới sáng tạo và chuyển đổi số quốc gia","B":"Luật Giao dịch điện tử số 20/2023/QH15","C":"Nghị định quản lý, kết nối và chia sẻ dữ liệu số của cơ quan nhà nước số 47/2020/NĐ-CP","D":"Quyết định 06/QĐ-TTg ngày 06/01/2022 của Thủ tướng Chính phủ phê duyệt Đề án “Phát triển ứng dụng dữ liệu về dân cư, định danh và xác thực điện tử phục vụ chuyển đổi số quốc gia giai đoạn 2022 - 2025, tầm nhìn đến năm 2030”"},"correct":"B","explanation":"Luật Giao dịch điện tử 2023\n📖 Điều khoản: Luật Giao dịch điện tử 2023\nĐiều 8: Quy định về giá trị pháp lý của thông điệp dữ liệu\nĐiều 9: Điều kiện để thông điệp dữ liệu có giá trị như văn bản\nĐiều 6: Nguyên tắc: an toàn, tin cậy trong giao dịch điện tử"},{"id":145,"stt":42,"chapter":"III. CÔNG NGHỆ SỐ – NỀN TẢNG","topic":"III.6. Công nghệ thanh toán không dùng tiền mặt","topicCode":"III.6","question":"Một khách hàng thực hiện giao dịch thanh toán điện tử, tài khoản đã bị trừ tiền nhưng giao dịch không thành công. Ngân hàng tiếp nhận khiếu nại nhưng xử lý chậm, không cung cấp thông tin rõ ràng về trạng thái giao dịch.\nƯu tiên quan trọng nhất cần đảm bảo là gì?","options":{"A":"Tăng số lượng nhân sự xử lý khiếu nại để giảm backlog","B":"Đảm bảo minh bạch thông tin, xử lý kịp thời và bảo vệ quyền lợi hợp pháp của khách hàng","C":"Tập trung tối ưu hệ thống kỹ thuật để tránh lỗi trong tương lai","D":"Tăng cường truyền thông để giảm khiếu nại"},"correct":"B","explanation":"Nghị quyết 57-NQ/TW\nLuật Giao dịch điện tử 2023\n📖 Điều khoản: - Luật Giao dịch điện tử 2023\nĐiều 6 – Nguyên tắc\nBảo đảm: an toàn; tin cậy; bảo vệ quyền, lợi ích hợp pháp của các bên\n- Nghị quyết 57-NQ/TW\nĐịnh hướng: nâng cao chất lượng dịch vụ số lấy người dân làm trung tâm\ntăng niềm tin vào dịch vụ số"},{"id":146,"stt":43,"chapter":"III. CÔNG NGHỆ SỐ – NỀN TẢNG","topic":"III.6. Công nghệ thanh toán không dùng tiền mặt","topicCode":"III.6","question":"Trong hệ thống văn bản pháp lý hiện hành, văn bản nào đóng vai trò định hướng chiến lược cấp cao cho phát triển kinh tế số tại Việt Nam, trong đó thanh toán số được xem là một thành phần quan trọng của hệ sinh thái số?","options":{"A":"Luật Giao dịch điện tử số 20/2023/QH15","B":"Nghị quyết số 57-NQ/TW ngày 22/12/2024 của Bộ Chính trị về đột phá phát triển khoa học, công nghệ, đổi mới sáng tạo và chuyển đổi số quốc gia","C":"Nghị định quản lý, kết nối và chia sẻ dữ liệu số của cơ quan nhà nước số 47/2020/NĐ-CP","D":"Quyết định 06/QĐ-TTg ngày 06/01/2022 của Thủ tướng Chính phủ phê duyệt Đề án “Phát triển ứng dụng dữ liệu về dân cư, định danh và xác thực điện tử phục vụ chuyển đổi số quốc gia giai đoạn 2022 - 2025, tầm nhìn đến năm 2030”"},"correct":"B","explanation":"Nghị quyết 57-NQ/TW\n📖 Điều khoản: Nghị quyết 57-NQ/TW\nLà văn bản cấp chiến lược của Trung ương\nĐịnh hướng: phát triển kinh tế số; phát triển hệ sinh thái số; nâng cao hiệu quả, chất lượng dịch vụ số"},{"id":147,"stt":44,"chapter":"III. CÔNG NGHỆ SỐ – NỀN TẢNG","topic":"III.6. Công nghệ thanh toán không dùng tiền mặt","topicCode":"III.6","question":"Một ngân hàng ghi nhận số lượng giao dịch điện tử tăng nhanh trong thời gian qua. Tuy nhiên, giá trị trung bình mỗi giao dịch thấp và khách hàng vẫn duy trì thói quen sử dụng tiền mặt cho các giao dịch có giá trị lớn.\nTheo bạn, vấn đề cốt lõi nhất cần được giải quyết là gì?","options":{"A":"Số lượng kênh thanh toán điện tử chưa đủ đa dạng","B":"Trải nghiệm và mức độ tin cậy của dịch vụ chưa đủ để thay thế tiền mặt trong các giao dịch giá trị cao","C":"Ngân hàng chưa triển khai đủ chương trình khuyến mại","D":"Hạ tầng công nghệ chưa đáp ứng được khối lượng giao dịch lớn"},"correct":"B","explanation":"Nghị quyết 57-NQ/TW\n📖 Điều khoản: Định hướng phát triển kinh tế số: Nâng cao chất lượng dịch vụ số; Tăng niềm tin của người dân vào dịch vụ số; Lấy người dùng làm trung tâm"},{"id":148,"stt":45,"chapter":"III. CÔNG NGHỆ SỐ – NỀN TẢNG","topic":"III.6. Công nghệ thanh toán không dùng tiền mặt","topicCode":"III.6","question":"Trong một giao dịch thanh toán điện tử liên ngân hàng, lệnh thanh toán được xử lý qua nhiều thành phần như: tổ chức cung ứng dịch vụ thanh toán (ngân hàng, trung gian thanh toán) và hệ thống thanh toán (ví dụ: hệ thống chuyển mạch, bù trừ).\nKhi xảy ra lỗi giao dịch và không xác định rõ trách nhiệm giữa các bên tham gia, vấn đề cốt lõi cần được xử lý là gì?","options":{"A":"Nâng cấp hạ tầng kỹ thuật của hệ thống thanh toán","B":"Thiết lập cơ chế phân vai, trách nhiệm và nghĩa vụ của từng bên trong quy trình xử lý giao dịch và nâng cấp hạ tầng kỹ thuật của hệ thống thanh toán","C":"Tăng số lượng kênh hỗ trợ khách hàng","D":"Tăng cường truyền thông để giảm khiếu nại"},"correct":"B","explanation":"Luật Giao dịch điện tử 2023\n📖 Điều khoản: Luật Giao dịch điện tử 2023\n\nĐiều 5: Trách nhiệm của các bên đối với thông điệp dữ liệu\nĐiều 8–9: Giá trị pháp lý và điều kiện đảm bảo → cơ sở xác định trách nhiệm khi có tranh chấp"},{"id":149,"stt":46,"chapter":"III. CÔNG NGHỆ SỐ – NỀN TẢNG","topic":"III.6. Công nghệ thanh toán không dùng tiền mặt","topicCode":"III.6","question":"Ngân hàng triển khai thanh toán mã QR, nhưng mỗi tổ chức sử dụng một chuẩn mã khác nhau, dẫn đến không thể thanh toán chéo giữa các hệ thống.\nVấn đề cốt lõi cần xử lý là gì?","options":{"A":"Tăng số lượng điểm chấp nhận thanh toán QR (ĐVCNTT)","B":"Chuẩn hóa và thống nhất tiêu chuẩn mã QR để đảm bảo khả năng liên thông giữa các hệ thống thanh toán","C":"Tăng chương trình khuyến mại để thu hút người dùng","D":"Nâng cấp hạ tầng xử lý giao dịch"},"correct":"B","explanation":"Thông tư 19/2016/TT-NHNN\n📖 Điều khoản: Thông tư 19/2016/TT-NHNN\nĐiều 4: Nguyên tắc đảm bảo an toàn, hiệu quả trong hoạt động thanh toán\nCác quy định về: kết nối hệ thống thanh toán; đảm bảo xử lý giao dịch thông suốt"},{"id":150,"stt":47,"chapter":"III. CÔNG NGHỆ SỐ – NỀN TẢNG","topic":"III.7. Sinh trắc học (Biometrics)","topicCode":"III.7","question":"Theo Thông tư 50/2024/TT-NHNN được sửa đổi, bổ sung tại TT77/2025/TT-NHNN, giải pháp phát hiện tấn công giả mạo thông tin sinh trắc học (Presentation Attack Detection - PAD) của vật thể sống phải đáp ứng tiêu chuẩn quốc tế nào và ở cấp độ tối thiểu nào?","options":{"A":"Tiêu chuẩn NIST SP 800-63B cấp độ 1 (Level 1).","B":"Tiêu chuẩn ISO 30107 cấp độ 2 (Level 2) hoặc tương đương.","C":"Tiêu chuẩn PCI DSS phiên bản 4.0 về bảo mật thẻ thanh toán.","D":"Tiêu chuẩn ISO 27001 về quản lý an toàn thông tin."},"correct":"B","explanation":"TT số 77/2025/TT-NHNN ngày 31/12/2025 của Thống đốc NHNN.\n📖 Điều khoản: Điều 7, khoản 1 (sửa đổi điểm c khoản 5 Điều 11)"},{"id":151,"stt":48,"chapter":"III. CÔNG NGHỆ SỐ – NỀN TẢNG","topic":"III.7. Sinh trắc học (Biometrics)","topicCode":"III.7","question":"Sinh trắc học (Biometrics) là gì?","options":{"A":"Công nghệ lưu trữ tài liệu trên môi trường số","B":"Công nghệ nhận dạng dựa trên đặc điểm sinh học của mỗi cá nhân","C":"Phương thức mã hóa dữ liệu truyền thống","D":"Hệ thống đo lường hiệu suất người lao động"},"correct":"B"},{"id":152,"stt":49,"chapter":"III. CÔNG NGHỆ SỐ – NỀN TẢNG","topic":"III.7. Sinh trắc học (Biometrics)","topicCode":"III.7","question":"Đặc điểm nào sau đây là ví dụ của sinh trắc học sinh lý (physiological biometrics)?","options":{"A":"Thói quen gõ phím","B":"Cách di chuyển chuột trên màn hình","C":"Khuôn mặt hoặc vân tay","D":"Mẫu sử dụng ứng dụng hàng ngày"},"correct":"C","explanation":"ISO/IEC 2382-37:2022"},{"id":153,"stt":50,"chapter":"III. CÔNG NGHỆ SỐ – NỀN TẢNG","topic":"III.7. Sinh trắc học (Biometrics)","topicCode":"III.7","question":"Lợi ích lớn nhất của sinh trắc học (biometrics) trong xác thực điện tử là gì?","options":{"A":"Giảm nhu cầu sử dụng dịch vụ trực tuyến","B":"Tăng độ chính xác và hạn chế giả mạo danh tính","C":"Giảm số hóa trong hoạt động ngân hàng","D":"Rút ngắn quy trình phê duyệt tín dụng"},"correct":"B"},{"id":154,"stt":51,"chapter":"III. CÔNG NGHỆ SỐ – NỀN TẢNG","topic":"III.7. Sinh trắc học (Biometrics)","topicCode":"III.7","question":"Sinh trắc học hỗ trợ thực hiện nhiệm vụ nào nêu trong Đề án “Phát triển ứng dụng dữ liệu về dân cư, định danh và xác thực điện tử phục vụ chuyển đổi số quốc gia giai đoạn 2022 - 2025, tầm nhìn đến năm 2030” ban hành tại Quyết định 06/QĐ-TTg ngày 06/01/2022 của Thủ tướng Chính phủ","options":{"A":"Tăng tỷ trọng giao dịch truyền thống tại quầy","B":"Phát triển các ứng dụng trên nền tảng hệ thống định danh và xác thực điện tử với các ứng dụng cốt lõi như: Ví điện tử, thanh toán không dùng tiền mặt, chứng khoán, điện, nước...","C":"Giảm mức độ ứng dụng dữ liệu trong quản lý khách hàng","D":"Phát triển nền tảng tích hợp dữ liệu, thông tin, tri thức khoa học, công nghệ quốc gia, Hệ tri thức Việt số hóa, ứng dụng AI hỗ trợ nghiên cứu khoa học, công nghệ và đổi mới sáng tạo."},"correct":"B","explanation":"QĐ 06/QĐ-TTg ngày 06/01/2022\n📖 Điều khoản: Điều 1. Mục II/2/b"},{"id":155,"stt":52,"chapter":"III. CÔNG NGHỆ SỐ – NỀN TẢNG","topic":"III.7. Sinh trắc học (Biometrics)","topicCode":"III.7","question":"Dùng sinh trắc học khi mở tài khoản có lợi ích gì?","options":{"A":"Kéo dài thời gian xử lý hồ sơ mở tài khoản","B":"Cho phép xác thực danh tính khách hàng tự động (eKYC)","C":"Tăng số lượng giấy tờ khách hàng cần nộp","D":"Giảm độ chính xác trong nhận diện khách hàng"},"correct":"B","explanation":"Thông tư 50/2024/TT-NHNN (quy định về an toàn, bảo mật trong cung cấp dịch vụ ngân hàng điện tử, bao gồm xác thực sinh trắc học và eKYC)"},{"id":156,"stt":53,"chapter":"III. CÔNG NGHỆ SỐ – NỀN TẢNG","topic":"III.7. Sinh trắc học (Biometrics)","topicCode":"III.7","question":"Khách hàng thực hiện chuyển khoản 12 triệu đồng trên Mobile Banking cho một tài khoản khác. Hệ thống yêu cầu xác thực mật khẩu dùng một lần (One Time Password - OTP) và quyét xác thực khuôn mặt. Khách hàng phản ánh “trước đây chỉ cần OTP, sao giờ phải thêm khuôn mặt?\". Giải thích nào sau đây là đúng?","options":{"A":"Giao dịch trên 10 triệu thuộc giao dịch loại C, bắt buộc OTP và kết hợp khớp đúng thông tin sinh trắc học","B":"Hệ thống đang gặp lỗi nên tự động yêu cầu OTP bổ sung","C":"Chỉ cần OTP là đủ, sinh trắc học không bắt buộc","D":"Các giao dịch từ 5 triệu trở lên đều phải dùng OTP và khuôn mặt"},"correct":"A","explanation":"Thông tư 50/2024/TT-NHNN"},{"id":157,"stt":54,"chapter":"III. CÔNG NGHỆ SỐ – NỀN TẢNG","topic":"III.7. Sinh trắc học (Biometrics)","topicCode":"III.7","question":"Theo Thông tư 50/2024/TT-NHNN, hình thức khớp đúng thông tin sinh trắc học thiết bị phải đáp ứng yêu cầu trong thời gian bao lâu?","options":{"A":"Tối thiểu 02 phút","B":"Tối đa 02 phút","C":"Tối thiểu 05 phút","D":"Tối đa 05 phút"},"correct":"B","explanation":"Thông tư 50/2024/TT-NHNN\n📖 Điều khoản: Điều 11 khoản 6/b"},{"id":158,"stt":1,"chapter":"IV. PHÁP LÝ – THỂ CHẾ – TUÂN THỦ","topic":"IV.1. Khung pháp lý chuyển đổi số, chuyển đổi số ngành ngân hàng","topicCode":"IV.1","question":"Theo Luật Chuyển đổi số 2025, đâu là nguyên tắc chuyển đổi số?","options":{"A":"Lấy công nghệ làm trung tâm.","B":"Lấy người sử dụng làm trung tâm.","C":"Lấy dữ liệu làm trung tâm.","D":"Lấy trí tuệ nhân tạo (AI) làm trung tâm."},"correct":"B","explanation":"Luật Chuyển đổi số 2025 (Luật số 148/2025/QH15) - Nguyên tắc chuyển đổi số\n📖 Điều khoản: Điều 6"},{"id":159,"stt":2,"chapter":"IV. PHÁP LÝ – THỂ CHẾ – TUÂN THỦ","topic":"IV.1. Khung pháp lý chuyển đổi số, chuyển đổi số ngành ngân hàng","topicCode":"IV.1","question":"Hành vi nào sau đây bị nghiêm cấm trong hoạt động chuyển đổi số và phát triển nền kinh tế số?","options":{"A":"Khai thác dữ liệu mở của cơ quan nhà nước để nghiên cứu.","B":"Ứng dụng trí tuệ nhân tạo (AI) để phân tích hành vi khách hàng có sự đồng ý của họ.","C":"Thu thập, sử dụng, chia sẻ, mua, bán, khai thác dữ liệu số trái quy định của pháp luật.","D":"Sử dụng điện toán đám mây của nhà cung cấp nước ngoài."},"correct":"C","explanation":"Luật Chuyển đổi số 2025 (Luật số 148/2025/QH15) -Các hành vi bị nghiêm cấm\n📖 Điều khoản: Điều 5"},{"id":160,"stt":3,"chapter":"IV. PHÁP LÝ – THỂ CHẾ – TUÂN THỦ","topic":"IV.1. Khung pháp lý chuyển đổi số, chuyển đổi số ngành ngân hàng","topicCode":"IV.1","question":"Trước khi chính thức cấp quyền kết nối Open API (Go-live) trên môi trường thật cho một đối tác, ngân hàng bắt buộc phải yêu cầu đối tác đó thực hiện quy trình nào sau đây?","options":{"A":"Ký quỹ một khoản tiền mặt tại ngân hàng để bảo đảm thanh toán.","B":"Bàn giao toàn bộ mã nguồn (source code) của ứng dụng đối tác cho ngân hàng kiểm duyệt.","C":"Phải được Ngân hàng Nhà nước cấp một Giấy phép kết nối Open API riêng biệt.","D":"Kết nối và kiểm thử thành công trên \"Hệ thống thử nghiệm Open API\" (Sandbox/Testing) do ngân hàng cung cấp."},"correct":"D","explanation":"Thông tư 64/2024/TT-NHNN - Quy định bắt buộc các ngân hàng phải xây dựng môi trường thử nghiệm và đối tác phải vượt qua bước kiểm thử này trước khi Go-live.\n📖 Điều khoản: Quy định về Hệ thống thử nghiệm"},{"id":161,"stt":4,"chapter":"IV. PHÁP LÝ – THỂ CHẾ – TUÂN THỦ","topic":"IV.1. Khung pháp lý chuyển đổi số, chuyển đổi số ngành ngân hàng","topicCode":"IV.1","question":"Theo Quyết định 2629/QĐ-TTg ngày 01/12/2025, mục tiêu cụ thể giai đoạn 2028-2030 của Chương trình phát triển Chính phủ số, 100% bộ, ngành, địa phương đạt cấp độ mấy trong trưởng thành về quản trị dữ liệu?","options":{"A":"Cấp độ 3","B":"Cấp độ 4","C":"Cấp độ 5","D":"Cấp độ 6"},"correct":"B","explanation":"Quyết định 2629/QĐ-TTg ngày 01/12/2025 phê duyệt Chương trình phát triển Chính phủ số.\n📖 Điều khoản: Mục 2.b"},{"id":162,"stt":5,"chapter":"IV. PHÁP LÝ – THỂ CHẾ – TUÂN THỦ","topic":"IV.1. Khung pháp lý chuyển đổi số, chuyển đổi số ngành ngân hàng","topicCode":"IV.1","question":"Theo Thông tư 64/2024/TT-NHNN, để minh bạch thông tin và tạo điều kiện cho các bên thứ ba kết nối, ngân hàng bắt buộc phải công khai danh mục các Open API đang cung cấp tại đâu?","options":{"A":"Trên Cổng thông tin điện tử của Ngân hàng Nhà nước Việt Nam.","B":"Trên các nền tảng mạng xã hội (Facebook, Zalo) của ngân hàng.","C":"Trên trang thông tin điện tử (Website) chính thức của chính ngân hàng đó.","D":"Trên Cổng Dịch vụ công Quốc gia."},"correct":"C","explanation":"Thông tư 64/2024/TT-NHNN\n📖 Điều khoản: Điều 9"},{"id":163,"stt":6,"chapter":"IV. PHÁP LÝ – THỂ CHẾ – TUÂN THỦ","topic":"IV.2. Bảo vệ dữ liệu cá nhân","topicCode":"IV.2","question":"Theo Luật Bảo vệ dữ liệu cá nhân 2025, dữ liệu cá nhân được chia thành những loại nào?","options":{"A":"Dữ liệu sơ cấp và dữ liệu thứ cấp","B":"Dữ liệu công khai và dữ liệu bí mật","C":"Dữ liệu cá nhân cơ bản và dữ liệu cá nhân nhạy cảm","D":"Dữ liệu định danh và dữ liệu phi định danh"},"correct":"C","explanation":"Luật 91/2025/QH15\n📖 Điều khoản: Khoản 1 Điều 2 Luật 91/2025/QH15"},{"id":164,"stt":7,"chapter":"IV. PHÁP LÝ – THỂ CHẾ – TUÂN THỦ","topic":"IV.2. Bảo vệ dữ liệu cá nhân","topicCode":"IV.2","question":"Trường hợp nào sau đây việc xử lý dữ liệu cá nhân KHÔNG cần sự đồng ý của chủ thể dữ liệu?","options":{"A":"Để thực hiện hoạt động quảng cáo sản phẩm mới","B":"Để bảo vệ tính mạng, sức khỏe của chủ thể dữ liệu trong trường hợp cấp bách","C":"Để nghiên cứu thị trường cho doanh nghiệp","D":"Để chia sẻ dữ liệu cho đối tác kinh doanh"},"correct":"B","explanation":"Luật 91/2025/QH15\n📖 Điều khoản: Điểm a khoản 1 Điều 19 Luật 91/2025/QH15"},{"id":165,"stt":8,"chapter":"IV. PHÁP LÝ – THỂ CHẾ – TUÂN THỦ","topic":"IV.2. Bảo vệ dữ liệu cá nhân","topicCode":"IV.2","question":"Mức phạt tiền tối đa đối với hành vi mua, bán dữ liệu cá nhân là bao nhiêu (trong trường hợp có khoản thu lợi bất chính)?","options":{"A":"01 tỷ đồng","B":"03 tỷ đồng","C":"05 lần khoản thu có được","D":"10 lần khoản thu có được từ hành vi vi phạm"},"correct":"D","explanation":"Luật 91/2025/QH15\n📖 Điều khoản: Khoản 3 Điều 8 Luật 91/2025/QH15"},{"id":166,"stt":9,"chapter":"IV. PHÁP LÝ – THỂ CHẾ – TUÂN THỦ","topic":"IV.2. Bảo vệ dữ liệu cá nhân","topicCode":"IV.2","question":"Theo Luật Bảo vệ dữ liệu cá nhân 2025, sự im lặng của chủ thể dữ liệu được hiểu như thế nào?","options":{"A":"Được coi là sự đồng ý sau 24 giờ","B":"Được coi là sự đồng ý sau 3 ngày làm việc","C":"Không được coi là sự đồng ý","D":"Được coi là sự đồng ý ngầm định"},"correct":"C","explanation":"Luật 91/2025/QH15\n📖 Điều khoản: Điểm d Khoản 4 Điều 9 Luật 91/2025/QH15"},{"id":167,"stt":10,"chapter":"IV. PHÁP LÝ – THỂ CHẾ – TUÂN THỦ","topic":"IV.3. Giao dịch điện tử","topicCode":"IV.3","question":"Theo Luật Giao dịch điện tử 2023, “thông điệp dữ liệu” là gì?","options":{"A":"Thông tin được số hóa để lưu trong cơ sở dữ liệu","B":"Thông tin được tạo ra bằng phần mềm và lưu dưới dạng số","C":"Thông tin được tạo ra, được gửi, được nhận, được lưu trữ bằng phương tiện điện tử","D":"Thông tin được tạo lập trên Internet để trao đổi giữa các hệ thống"},"correct":"C","explanation":"Luật Giao dịch điện tử 2023: Thông điệp dữ liệu là thông tin được tạo ra, gửi, nhận và lưu trữ bằng phương tiện điện tử. Các phương án còn lại gần nghĩa nhưng thiếu hoặc sai yếu tố cấu thành theo luật.\n📖 Điều khoản: Điều 3 Khoản 4"},{"id":168,"stt":11,"chapter":"IV. PHÁP LÝ – THỂ CHẾ – TUÂN THỦ","topic":"IV.3. Giao dịch điện tử","topicCode":"IV.3","question":"Theo Luật Giao dịch điện tử 2023, khi pháp luật yêu cầu thông tin phải được thể hiện bằng văn bản, thông điệp dữ liệu được xem là đáp ứng yêu cầu trong trường hợp nào?","options":{"A":"Nếu thông tin trong thông điệp dữ liệu đó có thể truy cập và sử dụng được để tham chiếu","B":"Nếu thông tin trong thông điệp dữ liệu có thể truy cập, sử dụng được để tham chiếu và đã được in ra giấy","C":"Nếu thông tin trong thông điệp dữ liệu có thể truy cập, sử dụng được để tham chiếu và có chữ ký điện tử","D":"Nếu thông tin trong thông điệp dữ liệu có thể truy cập, sử dụng được để tham chiếu và được cơ quan có thẩm quyền xác nhận"},"correct":"A","explanation":"Luật Giao dịch điện tử 2023: Điều luật chỉ yêu cầu thông tin trong thông điệp dữ liệu có thể truy cập và sử dụng được để tham chiếu; không bắt buộc thêm điều kiện in ra giấy, ký điện tử hay xác nhận\n📖 Điều khoản: Điều 9 khoản 1"},{"id":169,"stt":12,"chapter":"IV. PHÁP LÝ – THỂ CHẾ – TUÂN THỦ","topic":"IV.3. Giao dịch điện tử","topicCode":"IV.3","question":"Theo Luật Giao dịch điện tử 2023, thông điệp dữ liệu có giá trị như bản gốc khi đáp ứng đầy đủ yêu cầu nào?","options":{"A":"Được ký điện tử và lưu trữ trong hệ thống thông tin","B":"Được bảo đảm toàn vẹn kể từ khi khởi tạo lần đầu tiên và có thể truy cập, sử dụng được dưới dạng một thông điệp dữ liệu hoàn chỉnh","C":"Được gửi từ hệ thống thông tin của cơ quan, tổ chức và có thể in ra giấy","D":"Được lưu trữ an toàn và có mã tra cứu duy nhất"},"correct":"B","explanation":"Luật Giao dịch điện tử 2023: Điều 10 yêu cầu đồng thời hai điều kiện: bảo đảm tính toàn vẹn kể từ khi khởi tạo lần đầu và có thể truy cập, sử dụng được dưới dạng hoàn chỉnh\n📖 Điều khoản: Điều 10 khoản 1, 2"},{"id":170,"stt":13,"chapter":"IV. PHÁP LÝ – THỂ CHẾ – TUÂN THỦ","topic":"IV.3. Giao dịch điện tử","topicCode":"IV.3","question":"Trên thông điệp dữ liệu được chuyển đổi từ văn bản giấy, cơ quan nhà nước có thể lựa chọn hiển thị bổ sung hình thức nào sau đây để phục vụ tra cứu thông tin bằng phương tiện điện tử?","options":{"A":"Con dấu nổi kỹ thuật số do Ban Cơ yếu Chính phủ cấp phát.","B":"Mã phản hồi nhanh (QR) hoặc hình thức mã hóa khác chứa các thông tin chuyển đổi.","C":"Chữ ký tay của cán bộ chuyển đổi được quét màu (scan) với độ phân giải cao","D":"Hình nền chìm (watermark) logo quốc huy và tên cơ quan chuyển đổi dữ liệu"},"correct":"B","explanation":"Nghị định 137/2024/NĐ-CP\n📖 Điều khoản: Điểm a Khoản 1 Điều 4"},{"id":171,"stt":14,"chapter":"IV. PHÁP LÝ – THỂ CHẾ – TUÂN THỦ","topic":"IV.3. Giao dịch điện tử","topicCode":"IV.3","question":"Theo quy định của Luật Giao dịch điện tử 2023, dịch vụ nào sau đây KHÔNG thuộc nhóm các \"Dịch vụ tin cậy\"?","options":{"A":"Dịch vụ lưu trữ dữ liệu điện tử thông thường","B":"Dịch vụ cấp dấu thời gian.","C":"Dịch vụ chứng thực thông điệp dữ liệu.","D":"Dịch vụ chứng thực chữ ký số công cộng."},"correct":"A","explanation":"Khoản 1 Điều 28, Luật Giao dịch điện tử 2023 (Luật chỉ định danh 3 loại hình dịch vụ tin cậy là B, C và D. Chứng thực hợp đồng điện tử không nằm trong danh mục này)."},{"id":172,"stt":15,"chapter":"IV. PHÁP LÝ – THỂ CHẾ – TUÂN THỦ","topic":"IV.3. Rủi ro pháp lý trong môi trường số","topicCode":"IV.3","question":"Chủ thể nào sau đây được xem là \"Chủ quản hệ thống thông tin phục vụ giao dịch điện tử\"?","options":{"A":"Cơ quan, tổ chức, cá nhân có thẩm quyền quản lý trực tiếp đối với hệ thống thông tin đó.","B":"Đơn vị nhà thầu cung cấp giải pháp, phần mềm để xây dựng và vận hành hệ thống thông tin đó.","C":"Tổ chức cung cấp dịch vụ chứng thực chữ ký số công cộng được tích hợp trên hệ thống.","D":"Bộ Khoa học và Công nghệ hoặc Sở Khoa học và Công nghệ quản lý tại địa bàn."},"correct":"A","explanation":"Nghị định 137/2024/NĐ-CP\n📖 Điều khoản: Khoản 1 Điều 15"},{"id":173,"stt":16,"chapter":"IV. PHÁP LÝ – THỂ CHẾ – TUÂN THỦ","topic":"IV.4. Rủi ro pháp lý trong môi trường số","topicCode":"IV.4","question":"Trong giao kết sản phẩm, dịch vụ ngân hàng trên môi trường số, nhận định nào sau đây là đúng đối với hợp đồng điện tử?","options":{"A":"A. Hợp đồng điện tử luôn có giá trị pháp lý thấp hơn hợp đồng giấy","B":"B. Hợp đồng điện tử chỉ có hiệu lực khi được in ra giấy và ký tay lại","C":"C. Hợp đồng điện tử không bị phủ nhận giá trị pháp lý","D":"D. Hợp đồng điện tử không được dùng trong lĩnh vực ngân hàng"},"correct":"C","explanation":"Luật giao dịch điện tử 2023\n📖 Điều khoản: Điều 8, Điều 9 Luật Giao dịch điện tử 2023"},{"id":174,"stt":17,"chapter":"IV. PHÁP LÝ – THỂ CHẾ – TUÂN THỦ","topic":"IV.4. Rủi ro pháp lý trong môi trường số","topicCode":"IV.4","question":"Theo Luật Giao dịch điện tử 2023, chữ ký điện tử có bị phủ nhận giá trị pháp lý chỉ vì được thể hiện dưới dạng chữ ký điện tử hay không?","options":{"A":"A. Có, vì chỉ chữ ký tay mới có giá trị pháp lý đầy đủ","B":"B. Không, chữ ký điện tử không bị phủ nhận giá trị pháp lý chỉ vì được thể hiện dưới dạng chữ ký điện tử","C":"C. Có, trừ trường hợp chữ ký số công cộng","D":"D. Không, nhưng chỉ áp dụng trong giao dịch dân sự, không áp dụng trong giao dịch ngân hàng"},"correct":"B","explanation":"Luật giao dịch điện tử 2023\n📖 Điều khoản: Điều 23 Luật Giao dịch điện tử 2023"},{"id":175,"stt":18,"chapter":"IV. PHÁP LÝ – THỂ CHẾ – TUÂN THỦ","topic":"IV.4. Rủi ro pháp lý trong môi trường số","topicCode":"IV.4","question":"Khi ngân hàng thuê một bên xử lý dữ liệu khách hàng để cung cấp dịch vụ số, theo Luật Bảo vệ dữ liệu cá nhân 2025, ngân hàng phải có trách nhiệm nào dưới đây","options":{"A":"A. Sau khi chuyển dữ liệu cho bên xử lý, ngân hàng chuyển toàn bộ trách nhiệm pháp lý sang bên thứ ba","B":"B. Chỉ cần có hợp đồng thương mại, không nhất thiết phải quy định rõ trách nhiệm, quyền và nghĩa vụ của các bên liên quan đến xử lý dữ liệu cá nhân","C":"C. Ngân hàng chỉ chịu trách nhiệm nếu trực tiếp làm lộ dữ liệu cá nhân của khách hàng","D":"D. Ngân hàng nêu rõ trách nhiệm, quyền và nghĩa vụ của các bên trong thỏa thuận, hợp đồng liên quan đến xử lý dữ liệu cá nhân; lựa chọn bên xử lý dữ liệu cá nhân phù hợp; và chịu trách nhiệm trước chủ thể dữ liệu cá nhân về các thiệt hại do quá trình xử lý dữ liệu cá nhân gây ra"},"correct":"D","explanation":"Luật bảo vệ dữ liệu cá nhân\n📖 Điều khoản: Điều 37 Luật Bảo vệ dữ liệu cá nhân 2025"},{"id":176,"stt":19,"chapter":"IV. PHÁP LÝ – THỂ CHẾ – TUÂN THỦ","topic":"IV.4. Rủi ro pháp lý trong môi trường số","topicCode":"IV.4","question":"Trong hoạt động ngân hàng số, dữ liệu sinh trắc học của khách hàng được pháp luật xếp vào nhóm dữ liệu nào dưới đây?","options":{"A":"A. Dữ liệu nội bộ của ngân hàng, không thuộc phạm vi điều chỉnh riêng của pháp luật về bảo vệ dữ liệu cá nhân","B":"B. Dữ liệu cá nhân nhạy cảm","C":"C. Dữ liệu được tự do xử lý trên môi trường điện tử nếu phục vụ xác thực giao dịch","D":"D. Dữ liệu kỹ thuật thông thường của hệ thống thông tin"},"correct":"B","explanation":"Luật bảo vệ dữ liệu cá nhân & Nghị định 356/2025/NĐ-CP\n📖 Điều khoản: Điều 37 Luật Bảo vệ dữ liệu cá nhân 2025; Khoản 6 Điều 23 Nghị định 356/2025/NĐ-CP"},{"id":177,"stt":20,"chapter":"IV. PHÁP LÝ – THỂ CHẾ – TUÂN THỦ","topic":"IV.4. Rủi ro pháp lý trong môi trường số","topicCode":"IV.4","question":"Theo Thông tư 50/2024/TT-NHNN, đâu là một trách nhiệm của đơn vị cung cấp dịch vụ Online Banking nhằm bảo đảm an toàn, bảo mật dữ liệu khách hàng?","options":{"A":"A. Chỉ cần đăng cảnh báo chung trên website của đơn vị","B":"B. Áp dụng các biện pháp bảo đảm an toàn, bảo mật dữ liệu khách hàng và thông báo cho khách hàng khi xảy ra sự cố làm lộ, lọt dữ liệu của khách hàng","C":"C. Chỉ xử lý khi khách hàng có khiếu nại hoặc phát sinh thiệt hại","D":"D. Không cần thông báo cho khách hàng nếu sự cố xuất phát từ bên thứ ba"},"correct":"B","explanation":"Thông tư 50/2024/TT-NHNN\n📖 Điều khoản: Điều 19 Thông tư 50/2024/TT-NHNN"},{"id":178,"stt":21,"chapter":"IV. PHÁP LÝ – THỂ CHẾ – TUÂN THỦ","topic":"IV.4. Rủi ro pháp lý trong môi trường số","topicCode":"IV.4","question":"Khi phát hiện hành vi vi phạm về bảo vệ dữ liệu cá nhân có thể xâm phạm đến quyền, lợi ích hợp pháp của khách hàng, cơ quan, tổ chức có liên quan phải làm gì?","options":{"A":"A. Chỉ cần khắc phục nội bộ, không cần thông báo","B":"B. Chờ đến khi khách hàng khiếu nại mới xử lý","C":"C. Chỉ cần báo cho đối tác công nghệ","D":"D. Phải thông báo cho cơ quan chuyên trách bảo vệ dữ liệu cá nhân trong thời hạn luật định, đồng thời ngăn chặn, khắc phục hậu quả và phối hợp xử lý"},"correct":"D","explanation":"Luật bảo vệ dữ liệu cá nhân\n📖 Điều khoản: Điều 23 Luật Bảo vệ dữ liệu cá nhân"},{"id":179,"stt":22,"chapter":"IV. PHÁP LÝ – THỂ CHẾ – TUÂN THỦ","topic":"IV.4. Rủi ro pháp lý trong môi trường số","topicCode":"IV.4","question":"Theo Luật Bảo vệ dữ liệu cá nhân 2025 và Nghị định hướng dẫn, tình huống nào dưới đây thể hiện tổ chức chưa thực hiện đúng trách nhiệm bảo đảm xử lý dữ liệu cá nhân đúng mục đích, giới hạn việc thu thập, chuyển giao, lưu trữ phù hợp với quy định pháp luật?","options":{"A":"A. Ngân hàng dùng thông tin khách hàng để thực hiện đúng giao dịch mà khách hàng yêu cầu","B":"B. Ngân hàng thu thập dữ liệu để mở tài khoản nhưng sau đó chia sẻ cho đối tác tiếp thị sản phẩm khác ngoài mục đích đã thông báo","C":"C. Ngân hàng lưu lịch sử giao dịch để phục vụ đối soát và khiếu nại","D":"D. Ngân hàng mã hóa dữ liệu khi lưu trữ"},"correct":"B","explanation":"Luật bảo vệ dữ liệu cá nhân & Nghị định 356/2025/NĐ-CP\n📖 Điều khoản: Điều 37 Luật Bảo vệ dữ liệu cá nhân 2025; Khoản 6 Điều 23 Nghị định 356/2025/NĐ-CP"},{"id":180,"stt":23,"chapter":"IV. PHÁP LÝ – THỂ CHẾ – TUÂN THỦ","topic":"IV.5. Pháp lý Fintech, Bigtech","topicCode":"IV.5","question":"Trong Luật Giao dịch điện tử 2023, khái niệm \"Chữ ký điện tử\" được hiểu như thế nào?","options":{"A":"A.Là chữ ký được tạo lập dưới dạng dữ liệu điện tử gắn liền hoặc kết hợp một cách lôgíc với thông điệp dữ liệu để xác nhận chủ thể ký và khẳng định sự chấp thuận của chủ thể đó đối với thông điệp dữ liệu","B":"B. Là hình ảnh chữ ký viết tay của cá nhân được quét (scan) hoặc chụp lại và chèn vào các tài liệu điện tử để xác nhận người gửi","C":"C. Là chữ ký sử dụng thuật toán khóa không đối xứng, gồm khóa bí mật và khóa công khai để kiểm tra thông điệp dữ liệu","D":"D. Là thông điệp dữ liệu nhằm xác nhận cơ quan, tổ chức, cá nhân được chứng thực là người ký"},"correct":"A","explanation":"Luật Giao dịch điện tử số 20/2023/QH15 ngày 22/6/2023\n📖 Điều khoản: Điều 3 Khoản 11 Luật Giao dịch điện tử 2023 11. Chữ ký điện tử là chữ ký được tạo lập dưới dạng dữ liệu điện tử gắn liền hoặc kết hợp một cách lô gíc với thông điệp dữ liệu để xác nhận chủ thể ký và khẳng định sự chấp thuận của chủ thể đó đối với thông điệp dữ liệu."},{"id":181,"stt":24,"chapter":"IV. PHÁP LÝ – THỂ CHẾ – TUÂN THỦ","topic":"IV.5. Pháp lý Fintech, Bigtech","topicCode":"IV.5","question":"Cơ chế thử nghiệm có kiểm soát trong lĩnh vực ngân hàng áp dụng cho các đối tượng nào sau đây?","options":{"A":"A. Tổ chức tín dụng, chi nhánh ngân hàng nước ngoài (không áp dụng đối với điểm c, khoản 2, điều 1); công ty Fintech; cơ quan nhà nước có thẩm quyền; khách hàng và tổ chức, cá nhân có liên quan.","B":"B. Tổ chức tín dụng, chi nhánh ngân hàng nước ngoài; công ty Fintech; khách hàng, nhưng không bao gồm cơ quan nhà nước có thẩm quyền","C":"C. Công ty Fintech và tổ chức tín dụng, không bao gồm khách hàng","D":"D. Tổ chức tín dụng, chi nhánh ngân hàng nước ngoài; công ty Fintech; cơ quan nhà nước có thẩm quyền; khách hàng và tổ chức, cá nhân có liên quan"},"correct":"A","explanation":"Nghị định 94/2025/NĐ-CP\n📖 Điều khoản: Điều 2 Nghị định 94/2025 quy định: \"Điều 2. Đối tượng áp dụng\n1. Tổ chức tín dụng, chi nhánh ngân hàng nước ngoài theo quy định tại Luật Các tổ chức tín dụng (không áp dụng đối với điểm c khoản 2 Điều 1 Nghị định này).\n2. Các công ty công nghệ tài chính.\n3. Các cơ quan nhà nước có thẩm quyền.\n4. Khách hàng và các tổ chức, cá nhân khác có liên quan đến Cơ chế thử nghiệm.\""},{"id":182,"stt":25,"chapter":"IV. PHÁP LÝ – THỂ CHẾ – TUÂN THỦ","topic":"IV.5. Pháp lý Fintech, Bigtech","topicCode":"IV.5","question":"Giải pháp công nghệ tài chính nào dưới đây được tham gia Cơ chế thử nghiệm có kiểm soát trong lĩnh vực ngân hàng?","options":{"A":"A. Chấm điểm tín dụng, chia sẻ dữ liệu qua giao diện lập trình ứng dụng mở (Open API) và cho vay ngang hàng","B":"B. Chấm điểm tín dụng, chia sẻ dữ liệu qua giao diện lập trình ứng dụng mở (Open API) và ví điện tử","C":"C. Chấm điểm tín dụng, chia sẻ dữ liệu cá nhân và cho vay ngang hàng","D":"D. Chấm điểm khả tín, chia sẻ dữ liệu qua giao diện lập trình ứng dụng mở (Open API) và cho vay ngang hàng"},"correct":"A","explanation":"Nghị định 94/2025/NĐ-CP\n📖 Điều khoản: Khoản 2 Điều 1 Nghị định 94/2025/NĐ-CP"},{"id":183,"stt":26,"chapter":"IV. PHÁP LÝ – THỂ CHẾ – TUÂN THỦ","topic":"IV.5. Pháp lý Fintech, Bigtech","topicCode":"IV.5","question":"Tổ chức đề nghị cấp Giấy phép hoạt động cung ứng dịch vụ trung gian thanh toán nếu nộp hồ sơ qua đường bưu điện hoặc nộp trực tiếp tới Bộ phận Một cửa Ngân hàng Nhà nước thì phải gửi hồ sơ như thế nào?","options":{"A":"A. Gửi 01 bộ hồ sơ và 02 đĩa CD (hoặc 02 USB) lưu trữ bản quét bộ hồ sơ đầy đủ","B":"B. Gửi 02 bộ hồ sơ và 06 đĩa CD (hoặc 06 USB) lưu trữ bản quét bộ hồ sơ đầy đủ","C":"C. Gửi 03 bộ hồ sơ và 06 đĩa CD (hoặc 06 USB) lưu trữ bản quét bộ hồ sơ đầy đủ","D":"D. Gửi 02 bộ hồ sơ, không cần kèm bản quét điện tử"},"correct":"B","explanation":"Nghị định 52/2024/NĐ-CP\n📖 Điều khoản: khoản 3 Điều 24 Nghị định 52/2024/NĐ-CP:\n“Trường hợp nộp hồ sơ được gửi qua đường bưu điện (dịch vụ bưu chính) hoặc nộp trực tiếp tới Bộ phận Một cửa Ngân hàng Nhà nước, tổ chức đề nghị cấp Giấy phép gửi 02 bộ hồ sơ và 06 đĩa CD (hoặc 06 USB) lưu trữ bản quét Bộ hồ sơ đầy đủ đề nghị cấp Giấy phép theo quy định tại khoản 2 Điều này.”"},{"id":184,"stt":27,"chapter":"IV. PHÁP LÝ – THỂ CHẾ – TUÂN THỦ","topic":"IV.5. Pháp lý Fintech, Bigtech","topicCode":"IV.5","question":"Theo Luật Bảo vệ dữ liệu cá nhân số 91/2025/QH15, tổ chức phi ngân hàng có được phép sử dụng thông tin tín dụng của khách hàng để chấm điểm, xếp hạng tín dụng khi chưa có sự đồng ý của khách hàng đó không?","options":{"A":"A. Được phép, nếu phục vụ mục đích thẩm định hồ sơ vay vốn..","B":"B. Không được phép.","C":"C. Được phép, nếu dữ liệu đã được mã hóa trước khi xử lý.","D":"D. Được phép, nếu tổ chức có thỏa thuận hợp tác với ngân hàng."},"correct":"B","explanation":"Luật Bảo vệ dữ liệu cá nhân số 91/2025/QH15 ngày 26 tháng 6 năm 2025\n📖 Điều khoản: Diểm b khoản 1 Điều 27 Luật số 91/2025/QH15 quy định trách nhiệm của tổ chức hoạt động trong lĩnh vực tài chính, ngân hàng: \"Không sử dụng thông tin tín dụng của chủ thể dữ liệu cá nhân để chấm điểm, xếp hạng tín dụng... khi chưa có sự đồng ý của chủ thể dữ liệu cá nhân\"."},{"id":185,"stt":28,"chapter":"IV. PHÁP LÝ – THỂ CHẾ – TUÂN THỦ","topic":"IV.5. Pháp lý Fintech, Bigtech","topicCode":"IV.5","question":"Dịch vụ thanh toán không dùng tiền mặt được phân thành nhóm nào dưới đây?","options":{"A":"A. Dịch vụ thanh toán qua tài khoản thanh toán của khách hàng và dịch vụ trung gian thanh toán","B":"B. Dịch vụ thanh toán qua tài khoản thanh toán của khách hàng và dịch vụ thanh toán không qua tài khoản thanh toán của khách hàng","C":"C. Dịch vụ thanh toán của ngân hàng và dịch vụ thanh toán của công ty Fintech","D":"D. Dịch vụ thanh toán điện tử và dịch vụ thanh toán truyền thống"},"correct":"B","explanation":"Nghị định 52/2024/NĐ-CP\n📖 Điều khoản: Khoản 1 Điều 3 Nghị định 52/2024 quy định: \"1. Dịch vụ thanh toán không dùng tiền mặt (sau đây gọi là dịch vụ thanh toán) bao gồm: dịch vụ thanh toán qua tài khoản thanh toán của khách hàng và dịch vụ thanh toán không qua tài khoản thanh toán của khách hàng.\""},{"id":186,"stt":29,"chapter":"IV. PHÁP LÝ – THỂ CHẾ – TUÂN THỦ","topic":"IV.5. Pháp lý Fintech, Bigtech","topicCode":"IV.5","question":"Câu nào đúng đối với quy trình thẩm định, xét duyệt hồ sơ đăng ký tham gia Cơ chế thử nghiệm trong lĩnh vực ngân hàng?","options":{"A":"A. Trong thời hạn 60 ngày làm việc kể từ ngày nhận hồ sơ, Ngân hàng Nhà nước tự thẩm định hồ sơ; trường hợp cần thiết mới lấy ý kiến các bộ liên quan","B":"B. Trong thời hạn 90 ngày làm việc kể từ ngày gửi văn bản xác nhận đã nhận đầy đủ thành phần hồ sơ hợp lệ, Ngân hàng Nhà nước phối hợp với các bộ liên quan tiến hành thẩm định hồ sơ, bao gồm cả việc kiểm tra tại chỗ nếu cần thiết","C":"C. Trong thời hạn 90 ngày kể từ ngày nhận hồ sơ, Ngân hàng Nhà nước phải cấp ngay Giấy chứng nhận tham gia Cơ chế thử nghiệm nếu hồ sơ đầy đủ","D":"D. Trong thời hạn 30 ngày làm việc kể từ ngày nhận hồ sơ, Ngân hàng Nhà nước phải hoàn tất việc lấy ý kiến các bộ liên quan và quyết định cấp Giấy chứng nhận"},"correct":"B","explanation":"Khoản 3 Điều 10 Nghị định 94/2025/NĐ-CP\n📖 Điều khoản: khoản 3 Điều 10 Nghị định 94/2025/NĐ-CP (đối với chấm điểm tín dụng, Open API): “Trong thời hạn 90 ngày làm việc kể từ ngày gửi văn bản xác nhận đã nhận đầy đủ thành phần hồ sơ hợp lệ, Ngân hàng Nhà nước phối hợp với các bộ liên quan tiến hành thẩm định hồ sơ bao gồm cả việc kiểm tra tại chỗ nếu cần thiết.”\nkhoản 3 Điều 13 quy định (cho P2P lending): “Trong thời hạn 90 ngày làm việc kể từ ngày gửi văn bản xác nhận đã nhận đầy đủ thành phần hồ sơ hợp lệ, Ngân hàng Nhà nước phối hợp với các bộ liên quan tiến hành thẩm định hồ sơ bao gồm cả việc kiểm tra tại chỗ nếu cần thiết.”"},{"id":187,"stt":30,"chapter":"IV. PHÁP LÝ – THỂ CHẾ – TUÂN THỦ","topic":"IV.6. Chữ ký số, hợp đồng điện tử","topicCode":"IV.6","question":"Theo Luật Giao dịch điện tử 2023, chữ ký điện tử được phân loại theo phạm vi sử dụng bao gồm những loại nào?","options":{"A":"Chữ ký điện tử chuyên dùng, chữ ký số công cộng, chữ ký điện tử cá nhân.","B":"Chữ ký điện tử chuyên dùng, chữ ký số công cộng, chữ ký số chuyên dùng công vụ.","C":"Chữ ký điện tử nội bộ, chữ ký điện tử cá nhân..","D":"Chữ ký số, chữ ký sinh trắc học, chữ ký scan."},"correct":"B","explanation":"Luật Giao dịch điện tử 2023 (Luật số 20/2023/QH15) - Phân loại chữ ký điện tử\n📖 Điều khoản: Điều 22"},{"id":188,"stt":31,"chapter":"IV. PHÁP LÝ – THỂ CHẾ – TUÂN THỦ","topic":"IV.6. Chữ ký số, hợp đồng điện tử","topicCode":"IV.6","question":"Theo Luật Giao dịch điện tử 2023, trường hợp văn bản giấy là giấy phép, giấy chứng nhận, chứng chỉ, văn bản xác nhận, văn bản chấp thuận khác do cơ quan, tổ chức có thẩm quyền phát hành thì việc chuyển đổi sang thông điệp dữ liệu phải có loại chữ ký nào?","options":{"A":"Bất kỳ loại chữ ký điện tử nào do các bên tự thỏa thuận.","B":"Chữ ký hình ảnh (scan) đính kèm tệp văn bản.","C":"Chữ ký số của cơ quan, tổ chức thực hiện chuyển đổi.","D":"Chữ ký bằng hình ảnh nhận diện khuôn mặt không cần chứng thư."},"correct":"C","explanation":"Luật Giao dịch điện tử 2023 (Luật số 20/2023/QH15) - Giá trị pháp lý của chữ ký điện tử\n📖 Điều khoản: Khoản d, Điều 12"},{"id":189,"stt":32,"chapter":"IV. PHÁP LÝ – THỂ CHẾ – TUÂN THỦ","topic":"IV.6. Chữ ký số, hợp đồng điện tử","topicCode":"IV.6","question":"Theo quy định của pháp luật về giao dịch điện tử, \"Giao kết hợp đồng điện tử\" được hiểu như thế nào?","options":{"A":"Là việc sử dụng robot để tự động đàm phán và ký kết hợp đồng.","B":"Là việc ký hợp đồng giấy bằng bút mực sau đó scan thành bản điện tử (PDF) để gửi email.","C":"Là việc sử dụng thông điệp dữ liệu để tiến hành một phần hoặc toàn bộ giao dịch trong quá trình giao kết hợp đồng điện tử","D":"Là bắt buộc hai bên phải dùng chữ ký số công cộng ký trên cùng một file dữ liệu."},"correct":"C","explanation":"Luật Giao dịch điện tử 2023 (Luật số 20/2023/QH15) - Giao kết hợp đồng điện tử\n📖 Điều khoản: Khoản 1, Điều 35"},{"id":190,"stt":33,"chapter":"IV. PHÁP LÝ – THỂ CHẾ – TUÂN THỦ","topic":"IV.6. Chữ ký số, hợp đồng điện tử","topicCode":"IV.6","question":"Theo Luật Giao dịch điện tử 2023, đâu là trách nhiệm của Cơ quan, tổ chức, cá nhân khi sử dụng dữ liệu mở của cơ quan nhà nước","options":{"A":"Khai báo định danh khi khai thác, sử dụng dữ liệu mở","B":"Trích dẫn, ghi nhận thông tin sử dụng dữ liệu mở trong sản phẩm, dịch vụ, tài liệu liên quan có sử dụng dữ liệu mở","C":"Xin phép cơ quan nhà nước khi sử dụng dữ liệu mở vào sản phẩm, dịch vụ thương mại của mình","D":"Xin phép cơ quan nhà nước khi sử dụng dữ liệu mở vào sản phẩm, dịch vụ phi thương mại của mình"},"correct":"B","explanation":"Luật Giao dịch điện tử 2023 (Luật số 20/2023/QH15)\n📖 Điều khoản: Điều 43"},{"id":191,"stt":34,"chapter":"IV. PHÁP LÝ – THỂ CHẾ – TUÂN THỦ","topic":"IV.7. Trách nhiệm pháp lý khi xảy ra sự cố Công nghệ thông tin","topicCode":"IV.7","question":"Đơn vị nào thuộc NHNN đóng vai trò là đầu mối tiếp nhận, điều phối ứng cứu sự cố ATTT mạng trong toàn ngành Ngân hàng?","options":{"A":"Vụ Pháp chế","B":"Cục Công nghệ thông tin","C":"Thanh tra Ngân hàng Nhà nước","D":"Vụ Thanh toán"},"correct":"B","explanation":"Thông tư 09/2020/TT-NHNN\n📖 Điều khoản: Căn cứ khoản 1 Điều 48, khoản 1 Điều 54 Thông tư 09/2020/TT-NHNN"},{"id":192,"stt":35,"chapter":"IV. PHÁP LÝ – THỂ CHẾ – TUÂN THỦ","topic":"IV.7. Trách nhiệm pháp lý khi xảy ra sự cố Công nghệ thông tin","topicCode":"IV.7","question":"Theo quy định của NHNN, Đối tượng ký ban hành Quy chế an toàn thông tin của Tổ chức là?","options":{"A":"Trưởng phòng Công nghệ thông tin","B":"Giám đốc an ninh thông tin (CISO)","C":"Người đại diện hợp pháp của tổ chức","D":"Cán bộ vận hành hệ thống"},"correct":"C","explanation":"Thông tư 09/2020/TT-NHNN\n📖 Điều khoản: Khoản 1 Điều 6, Thông tư 09/2020/TT-NHNN"},{"id":193,"stt":36,"chapter":"IV. PHÁP LÝ – THỂ CHẾ – TUÂN THỦ","topic":"IV.7. Trách nhiệm pháp lý khi xảy ra sự cố Công nghệ thông tin","topicCode":"IV.7","question":"Đơn vị nào dưới đây không phải là thành viên Mạng lưới ứng cứu sự cố an toàn thông tin trong ngành Ngân hàng?","options":{"A":"Cục Công nghệ thông tin (Ngân hàng Nhà nước Việt Nam)","B":"Bộ phận chuyên trách an toàn thông tin của tổ chức tín dụng","C":"Các cơ quan, tổ chức tự nguyện tham gia mạng lưới","D":"Cục an ninh mạng và phòng, chống tội phạm công nghệ cao (Bộ Công an)"},"correct":"D","explanation":"Thông tư 09/2020/TT-NHNN\n📖 Điều khoản: Điểm c, điều 48, Thông tư 09/2020/TT-NHNN"},{"id":194,"stt":37,"chapter":"IV. PHÁP LÝ – THỂ CHẾ – TUÂN THỦ","topic":"IV.7. Trách nhiệm pháp lý khi xảy ra sự cố Công nghệ thông tin","topicCode":"IV.7","question":"Theo quy định của thông tư 09/2020/TT-NHNN, định kỳ hàng năm đơn vị phải tổ chức diễn tập phương án xử lý sự cố bảo đảm an toàn thông tin cho tối thiểu bao nhiêu hệ thống thông tin từ cấp độ 3 trở lên.","options":{"A":"1 hệ thống","B":"2 hệ thống","C":"Tất cả các hệ thống thông tin từ cấp độ 3 trở lên","D":"Theo kế hoạch nội bộ của đơn vị"},"correct":"A","explanation":"Thông tư 09/2020/TT-NHNN\n📖 Điều khoản: Khoản 6, điều 46, Thông tư 09/2020/TT-NHNN"},{"id":195,"stt":38,"chapter":"IV. PHÁP LÝ – THỂ CHẾ – TUÂN THỦ","topic":"IV.8. Ngân hàng số, thanh toán","topicCode":"IV.8","question":"Theo Chiến lược Chuyển đổi số ngành Ngân hàng đến năm 2030, quan điểm nào dưới đây được nêu đúng nhất về xác định đúng vai trò, vị trí của người dân, doanh nghiệp trong chuyển đổi số ngành Ngân hàng?","options":{"A":"A. Người dân và doanh nghiệp là đối tượng thụ hưởng chính của chuyển đổi số ngành Ngân hàng","B":"B. Người dân và doanh nghiệp là trung tâm, là chủ thể và là động lực chính của công cuộc chuyển đổi số ngành Ngân hàng","C":"C. Người dân và doanh nghiệp là trung tâm và là đối tượng phục vụ của công cuộc chuyển đổi số ngành Ngân hàng","D":"D. Người dân và doanh nghiệp là chủ thể và là động lực quan trọng của công cuộc chuyển đổi số ngành Ngân hàng"},"correct":"B","explanation":"Quyết định 3579/QĐ-NHNN năm 2025\n📖 Điều khoản: Quan điểm xây dựng Chiến lược: \"Người dân và doanh nghiệp là trung tâm, là chủ thể và là động lực chính của công cuộc chuyển đổi số ngành Ngân hàng\""},{"id":196,"stt":39,"chapter":"IV. PHÁP LÝ – THỂ CHẾ – TUÂN THỦ","topic":"IV.8. Ngân hàng số, thanh toán","topicCode":"IV.8","question":"Tổ chức cung ứng dịch vụ thanh toán có quyền từ chối thực hiện lệnh thanh toán của chủ tài khoản thanh toán trong trường hợp nào dưới đây?","options":{"A":"A. Khi lệnh thanh toán không hợp lệ hoặc tài khoản thanh toán không đủ tiền","B":"B. Khi lệnh thanh toán không hợp lệ hoặc có cơ sở pháp lý để xác định chủ tài khoản vi phạm các hành vi bị cấm, hoặc khi tài khoản thanh toán không đủ tiền, trừ trường hợp có thỏa thuận khác","C":"C. Khi lệnh thanh toán không hợp lệ, hoặc chủ tài khoản có dấu hiệu rủi ro theo đánh giá nội bộ của tổ chức cung ứng dịch vụ thanh toán","D":"D. Khi tài khoản thanh toán không đủ tiền hoặc chủ tài khoản chưa cập nhật lại thông tin nhận biết khách hàng"},"correct":"B","explanation":"Nghị định 52/2024/NĐ-CP\n📖 Điều khoản: Khoản 5 Điều 10 Nghị định 52 quy định tổ chức cung ứng dịch vụ thanh toán có quyền từ chối khi “5. Tổ chức cung ứng dịch vụ thanh toán có quyền từ chối thực hiện lệnh thanh toán của chủ tài khoản thanh toán khi lệnh thanh toán không hợp lệ hoặc có cơ sở pháp lý để xác định chủ tài khoản vi phạm các hành vi bị cấm theo quy định tại Điều 8 Nghị định này hoặc khi tài khoản thanh toán không đủ tiền trừ trường hợp có thỏa thuận khác. Trường hợp từ chối thực hiện lệnh thanh toán của chủ tài khoản thanh toán, tổ chức cung ứng dịch vụ thanh toán phải thông báo lý do từ chối cho chủ
