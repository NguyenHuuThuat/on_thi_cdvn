","B":"Chỉ ghi nhận","C":"Đánh giá hệ quả và giảm thiểu tác động bất lợi","D":"Chờ lãnh đạo quyết định"},"correct":"C","explanation":"Tiêu chuẩn TCVN ISO 9001:2015\n📖 Điều khoản: Điều 8.1: “xem xét các hệ quả của những thay đổi ngoài dự kiến, thực hiện hành động để giảm nhẹ mọi tác động bất lợi…”"},{"id":294,"stt":24,"chapter":"VI. QUẢN TRỊ – ĐIỀU HÀNH – CHIẾN LƯỢC","topic":"VI.6. Quản lý dự án công nghệ thông tin","topicCode":"VI.6","question":"Khi Điều lệ dự án đã được phê duyệt và cán bộ quản lý dự án đã xác định được các bên liên quan, cán bộ quản lý dự án nên làm gì trước khi bắt đầu lập kế hoạch dự án?","options":{"A":"Phân tích các bên liên quan.","B":"Tổ chức họp khởi động dự án (Kick-off).","C":"Thông báo cho các bên liên quan chính về Điều lệ dự án đã được phê duyệt.","D":"Thực hiện quy trình lập kế hoạch gắn với các bên liên quan."},"correct":"C","explanation":"Khi Điều lệ dự án đã được phê duyệt, cán bộ quản lý dự án cần thông báo cho các bên liên quan chính biết thông tin, trước khi phối hợp thực hiện dự án.\n📖 Điều khoản: Hướng dẫn Khung kiến thức Quản lý dự án (PMBOK Guide) của PMI"},{"id":295,"stt":25,"chapter":"VI. QUẢN TRỊ – ĐIỀU HÀNH – CHIẾN LƯỢC","topic":"VI.6. Quản lý dự án công nghệ thông tin","topicCode":"VI.6","question":"Bạn đang quản lý một dự án lớn. Để quản lý và kiểm soát công việc hiệu quả, bạn muốn các chỉ số KPI của dự án được thu thập và báo cáo tự động. Bạn nên sử dụng công cụ tốt nhất nào?","options":{"A":"Hệ thống thông tin quản lý dự án","B":"Dữ liệu ước tính đã công bố.","C":"Công nghệ truyền thông.","D":"Đánh giá hiệu suất"},"correct":"A","explanation":"Để quản lý một dự án lớn hiệu quả, cần sử dụng phần mềm \"Hệ thống thông tin quản lý dự án\" để hỗ trợ nhập dữ liệu, quản lý thông tin, chấm điểm KPI …\n📖 Điều khoản: Hướng dẫn Khung kiến thức Quản lý dự án (PMBOK Guide) của PMI"},{"id":296,"stt":26,"chapter":"VI. QUẢN TRỊ – ĐIỀU HÀNH – CHIẾN LƯỢC","topic":"VI.6. Quản lý dự án công nghệ thông tin","topicCode":"VI.6","question":"Công việc nào dưới đây là một trong những nhiệm vụ cuối cùng của cán bộ quản lý dự án khi thực hiện thủ tục kết thúc dự án?","options":{"A":"Nghiệm thu chính thức các sản phẩm bàn giao của dự án","B":"Phân tích giá trị thu được","C":"Đánh giá mức độ hài lòng của các bên liên quan về dự án","D":"Kiểm tra tính chính xác của các sản phẩm bàn giao"},"correct":"C","explanation":"Khi đã thực hiện thủ tục kết thúc dự án như sign off, kết thúc hợp đồng, đồng bộ tài liệu,... cán bộ quản lý dự án cần Đánh giá mức độ hài lòng của các bên liên quan về dự án.\n📖 Điều khoản: Hướng dẫn Khung kiến thức Quản lý dự án (PMBOK Guide) của PMI"},{"id":297,"stt":27,"chapter":"VI. QUẢN TRỊ – ĐIỀU HÀNH – CHIẾN LƯỢC","topic":"VI.6. Quản lý dự án công nghệ thông tin","topicCode":"VI.6","question":"Quy trình nào sau đây được thực hiện để xác định các sản phẩm bàn giao của dự án đã sẵn sàng để khách hàng kiểm tra và nghiệm thu?","options":{"A":"Chỉ đạo và Quản lý công việc dự án.","B":"Kiểm soát mua sắm","C":"Quản lý chất lượng","D":"Kiểm soát chất lượng"},"correct":"D","explanation":"Quy trình kiểm soát chất lượng nhằm đảm bảo sản phẩm đã được sản xuất đạt chất lượng. Sau đó sản phẩm sẽ được bàn giao cho khách hàng kiểm tra và nghiệm thu.\n📖 Điều khoản: Hướng dẫn Khung kiến thức Quản lý dự án (PMBOK Guide) của PMI"},{"id":298,"stt":28,"chapter":"VI. QUẢN TRỊ – ĐIỀU HÀNH – CHIẾN LƯỢC","topic":"VI.6. Quản lý dự án công nghệ thông tin","topicCode":"VI.6","question":"Cán bộ phụ trách ứng phó rủi ro phải báo cáo định kỳ cho cán bộ quản lý dự án về tính hiệu quả của kế hoạch ứng phó rủi ro trong quy trình nào?","options":{"A":"Lập kế hoạch ứng phó rủi ro.","B":"Xác định rủi ro.","C":"Giám sát rủi ro","D":"Kiểm soát rủi ro."},"correct":"C","explanation":"Các rủi ro sau khi đã được xác định và lên kế hoạch ứng phó, cán bộ phụ trách cần thực hiện quy trình giám sát rủi ro để đánh giá tính hiệu quả của kế hoạch ứng phó.\n📖 Điều khoản: Hướng dẫn Khung kiến thức Quản lý dự án (PMBOK Guide) của PMI"},{"id":299,"stt":29,"chapter":"VI. QUẢN TRỊ – ĐIỀU HÀNH – CHIẾN LƯỢC","topic":"VI.6. Quản lý dự án công nghệ thông tin","topicCode":"VI.6","question":"Cán bộ quản lý dự án muốn tận dụng kiến thức có sẵn trong tổ chức để quản lý dự án hiện tại tốt hơn. Cán bộ quản lý dự án nên thực hiện theo cách nào là tốt nhất?","options":{"A":"Đảm bảo tất cả các bên liên quan đồng thuận với kế hoạch quản lý kiến thức.","B":"Ghi lại các bài học kinh nghiệm xuyên suốt vòng đời dự án.","C":"Tạo bầu không khí tin cậy để mọi người sẵn lòng chia sẻ kiến thức.","D":"Trao quyền và khuyến khích đội ngũ tự quản lý"},"correct":"C","explanation":"Tri thức của tổ chức thể hiện dưới dạng văn bản, và kinh nghiệm của nhân viên. Tạo bầu không khí tin cậy để mọi người sẵn lòng chia sẻ kiến thức là cách tốt nhất để thu thập tri thức.\n📖 Điều khoản: Hướng dẫn Khung kiến thức Quản lý dự án (PMBOK Guide) của PMI"},{"id":300,"stt":30,"chapter":"VI. QUẢN TRỊ – ĐIỀU HÀNH – CHIẾN LƯỢC","topic":"VI.7. Đo lường hiệu quả chuyển đổi số (KPI, OKR)","topicCode":"VI.7","question":"Để đo lường hiệu quả số hóa quy trình, Quyết định hiện hành của ngành Ngân hàng đặt chỉ tiêu bao nhiêu ngân hàng số hóa 100% quy trình cho vay nhỏ lẻ?","options":{"A":"Ít nhất 40% các ngân hàng","B":"Ít nhất 50% các ngân hàng","C":"Ít nhất 60% các ngân hàng","D":"Ít nhất 80% các ngân hàng"},"correct":"B","explanation":"Quyết định 3579/QĐ-NHNN\n📖 Điều khoản: Mục III.2.b"},{"id":301,"stt":31,"chapter":"VI. QUẢN TRỊ – ĐIỀU HÀNH – CHIẾN LƯỢC","topic":"VI.7. Đo lường hiệu quả chuyển đổi số (KPI, OKR)","topicCode":"VI.7","question":"Theo Chiến lược chuyển đổi số ngành Ngân hàng đến năm 2030, chỉ tiêu về tỷ lệ hồ sơ công việc tại ngân hàng được xử lý và lưu trữ trên môi trường mạng là bao nhiêu?","options":{"A":"Ít nhất 60%","B":"Ít nhất 70%","C":"Ít nhất 80%","D":"Ít nhất 90%"},"correct":"B","explanation":"Quyết định 3579/QĐ-NHNN\n📖 Điều khoản: Mục III.2.b"},{"id":302,"stt":32,"chapter":"VI. QUẢN TRỊ – ĐIỀU HÀNH – CHIẾN LƯỢC","topic":"VI.7. Đo lường hiệu quả chuyển đổi số (KPI, OKR)","topicCode":"VI.7","question":"Theo Chiến lược chuyển đổi số ngành Ngân hàng đến năm 2030, chỉ tiêu về an toàn thông tin yêu cầu tỷ lệ ngân hàng cung ứng dịch vụ thanh toán thẻ tuân thủ chuẩn PCI DSS là?","options":{"A":"Ít nhất 50% đơn vị","B":"Ít nhất 60% đơn vị","C":"Ít nhất 70% đơn vị","D":"Ít nhất 80% đơn vị"},"correct":"D","explanation":"Quyết định 3579/QĐ-NHNN\n📖 Điều khoản: Mục III.2.b"},{"id":303,"stt":33,"chapter":"VI. QUẢN TRỊ – ĐIỀU HÀNH – CHIẾN LƯỢC","topic":"VI.7. Đo lường hiệu quả chuyển đổi số (KPI, OKR)","topicCode":"VI.7","question":"Quyết Chiến lược chuyển đổi số ngành Ngân hàng đến năm 2030 chỉ ra yếu tố nào là thước đo hiệu quả chuyển đổi số của ngành Ngân hàng?","options":{"A":"Số lượng máy chủ đám mây được triển khai","B":"Sự hài lòng của người dân, khách hàng","C":"Số lượng phần mềm nội bộ được nâng cấp","D":"Mức chi ngân sách cho an toàn thông tin"},"correct":"B","explanation":"Quyết định 3579/QĐ-NHNN\n📖 Điều khoản: phần tham chiếu nguyên tắc Kế hoạch ngành Ngân hàng triển khai NQ 57-NQ/TW"},{"id":304,"stt":34,"chapter":"VI. QUẢN TRỊ – ĐIỀU HÀNH – CHIẾN LƯỢC","topic":"VI.7. Đo lường hiệu quả chuyển đổi số (KPI, OKR)","topicCode":"VI.7","question":"Theo Chiến lược quốc gia về phát triển kinh tế số và xã hội số (Quyết định 411/QĐ-TTg) đặt ra chỉ tiêu bao nhiêu phần trăm doanh nghiệp nhỏ và vừa sử dụng nền tảng số đến năm 2025?","options":{"A":"Đạt trên 30%","B":"Đạt trên 40%","C":"Đạt trên 50%","D":"Đạt trên 70%"},"correct":"C","explanation":"Quyết định 411/QĐ-TTg\n📖 Điều khoản: Mục III.1.a"},{"id":305,"stt":35,"chapter":"VI. QUẢN TRỊ – ĐIỀU HÀNH – CHIẾN LƯỢC","topic":"VI.8. Dịch vụ công, cải cách hành chính","topicCode":"VI.8","question":"Theo Nghị định 42/2022/NĐ-CP, dịch vụ công trực tuyến hiện nay được chia thành bao nhiêu mức độ?","options":{"A":"1","B":"2","C":"3","D":"4"},"correct":"B","explanation":"Nghị định 42/2022/NĐ-CP\n📖 Điều khoản: Khoản 1 Điều 11"},{"id":306,"stt":36,"chapter":"VI. QUẢN TRỊ – ĐIỀU HÀNH – CHIẾN LƯỢC","topic":"VI.8. Dịch vụ công, cải cách hành chính","topicCode":"VI.8","question":"Người dân, doanh nghiệp sử dụng thông tin gì để tra cứu tình trạng giải quyết hồ sơ thủ tục hành chính đã nộp trên Cổng Dịch vụ công quốc gia?","options":{"A":"Số điện thoại","B":"Mã số hồ sơ TTHC","C":"Họ tên và ngày tháng năm sinh","D":"Mã số thuế"},"correct":"B","explanation":"Hệ thống Thông tin giải quyết TTHC sẽ sinh mã hồ sơ TTHC đối với các TTHC trực tuyến được nộp/ các hồ sơ TTHC nộp trực tiếp được cán bộ một cửa tạo, mã hồ sơ cung cấp cho người dùng để tra cứu trạng thái giải quyết TTHC, thanh toán phí/ lệ phí trực tuyến"},{"id":307,"stt":37,"chapter":"VI. QUẢN TRỊ – ĐIỀU HÀNH – CHIẾN LƯỢC","topic":"VI.8. Dịch vụ công, cải cách hành chính","topicCode":"VI.8","question":"Theo quy định của pháp luật hiện hành, dịch vụ công trực tuyến toàn trình trả kết quả bằng hình thức nào?","options":{"A":"Đại diện được ủy quyền bằng văn bản giấy.","B":"Fax hoặc thư điện tử cá nhân.","C":"Trực tuyến hoặc qua bưu chính công ích","D":"Chỉ trả kết quả trực tiếp tại cơ quan nhà nước"},"correct":"C","explanation":"Nghị định 42/2022/NĐ-CP\n📖 Điều khoản: Khoản 1 Điều 11"},{"id":308,"stt":38,"chapter":"VI. QUẢN TRỊ – ĐIỀU HÀNH – CHIẾN LƯỢC","topic":"VI.8. Dịch vụ công, cải cách hành chính","topicCode":"VI.8","question":"Trong thành phần hồ sơ Dịch vụ công trực tuyến, người dân, doanh nghiệp không cần phải nộp những loại giấy tờ nào?","options":{"A":"Văn bản do cơ quan hành chính nhà nước cấp","B":"Bản số hóa từ văn bản giấy","C":"Giấy tờ, thành phần hồ sơ đã có trong CSDL của cơ quan nhà nước","D":"Phương án A và C"},"correct":"D","explanation":"\"Nghị định số 45/2020/NĐ-CP của Chính phủ: Về thực hiện thủ tục hành chính trên môi trường điện tử\" Người dân, doanh nghiệp có thể tái sử dụng dữ liệu tại kho dữ liệu đã được kết nối, chia sẻ"},{"id":309,"stt":39,"chapter":"VI. QUẢN TRỊ – ĐIỀU HÀNH – CHIẾN LƯỢC","topic":"VI.8. Dịch vụ công, cải cách hành chính","topicCode":"VI.8","question":"Cách xác thực người dùng khi đăng nhập trên cổng Dịch vụ công Quốc gia?","options":{"A":"Mã OTP qua số điện thoại chính chủ của người đại diện theo pháp luật.","B":"Sử dụng tài khoản định danh điện tử tổ chức (VNeID mức độ 2)","C":"Sử dụng Chữ ký số (USB Token, SIM ký số hoặc Chữ ký số từ xa) được cấp cho tổ chức.","D":"Phương án B và C"},"correct":"D","explanation":"Nghị định số 45/2020/NĐ-CP; Nghị định số 42/2022/NĐ-CP; Nghị định 69/2024/NĐ-CP;"},{"id":310,"stt":40,"chapter":"VI. QUẢN TRỊ – ĐIỀU HÀNH – CHIẾN LƯỢC","topic":"VI.8. Dịch vụ công, cải cách hành chính","topicCode":"VI.8","question":"Phương thức nộp hồ sơ để mở tài khoản thanh toán tại Ngân hàng Nhà nước?","options":{"A":"Nộp trực tiếp tại Bộ phận một cửa Ngân hàng Nhà nước Trung ương/Khu vực. Nộp qua dịch vụ bưu chính;","B":"Nộp qua Cổng dịch vụ công Ngân hàng Nhà nước; Nộp trực tiếp tại Bộ phận một cửa NHNN Trung ương/ Khu vực. Nộp qua dịch vụ bưu chính;","C":"Nộp qua Cổng dịch vụ công Quốc gia","D":"Phương án A và C"},"correct":"D","explanation":"Theo công bố trên Cổng DVCQG, và công văn số 10065/NHNN-VP ngày 15/12/2025 về Triển khai 32 DVCTT toàn trình đối với TTHC lĩnh vực thành lập hoạt động ngân hàng, hoạt động thanh toán, hoạt động ngoại hối : TTHC mã 1.001317 (Thủ tục Mở tài khoản thanh toán tại Ngân hàng Nhà nước của Tổ chức tín dụng, chi nhánh Ngân hàng nước ngoài, Kho bạc Nhà nước) đã thực hiện được theo 3 phương thức; (1) Nộp trực tiếp tại Bộ phận một cửa NHNN Trung ương/Khu vực; (2) Nộp qua dịch vụ bưu chính; (3) Nộp qua Cổng dịch vụ công Quốc gia"},{"id":311,"stt":1,"chapter":"VII. NHÂN LỰC – VĂN HÓA SỐ","topic":"VII.1. Phát triển nguồn nhân lực số","topicCode":"VII.1","question":"Theo Chiến lược chuyển đổi số ngành Ngân hàng đến năm 2030, Giải pháp nào sau đây được đặt ra để thu hút nguồn nhân lực chất lượng cao phục vụ chuyển đổi số?","options":{"A":"Tăng chỉ tiêu tuyển dụng công chức CNTT trong ngành ngân hàng","B":"Xây dựng chính sách thu hút, tuyển dụng và đãi ngộ nhân lực chuyển đổi số, lực lượng chuyên trách bảo đảm an toàn, an ninh mạng.","C":"Đẩy mạnh đào tạo nội bộ thay cho tuyển mới","D":"Hợp tác với doanh nghiệp công nghệ để bổ sung nhân lực"},"correct":"B","explanation":"Quyết định số 3579/QĐ-NHNN ngày 03/11/2025 phê duyệt “Chiến lược chuyển đổi số ngành ngân hàng đến năm 2030”\n📖 Điều khoản: Phần IV, khoản 8, tiểu mục a"},{"id":312,"stt":2,"chapter":"VII. NHÂN LỰC – VĂN HÓA SỐ","topic":"VII.1. Phát triển nguồn nhân lực số","topicCode":"VII.1","question":"Theo Luật Chuyển đổi số, tổ chức tín dụng cần thực hiện trách nhiệm gì đối với người lao động có nguy cơ mất việc làm do chuyển đổi số?","options":{"A":"Hỗ trợ tài chính để chuyển đổi nghề","B":"Đào tạo, hướng dẫn chuyển đổi nghề nghiệp, nâng cao năng lực số phù hợp nhu cầu thị trường.","C":"Sắp xếp lại vị trí việc làm","D":"Tổ chức đào tạo lại kỹ năng số"},"correct":"B","explanation":"Luật Chuyển đổi số 148/2025/QH15 ngày 11 tháng 12 năm 2025\n📖 Điều khoản: Điều 17 khoản 5"},{"id":313,"stt":3,"chapter":"VII. NHÂN LỰC – VĂN HÓA SỐ","topic":"VII.1. Phát triển nguồn nhân lực số","topicCode":"VII.1","question":"Theo Quyết định 757/QĐ-BKHCN ban hành khung kiến thức, kỹ năng số cơ bản và hướng dẫn đánh giá, xác nhận hoàn thành mức độ phổ cập kỹ năng số, Kiến thức số cơ bản gồm những thành phần nào?","options":{"A":"Kiến thức công nghệ thông tin cơ bản","B":"Kiến thức công nghệ số và dữ liệu","C":"Kiến thức bảo mật, dữ liệu, trí tuệ nhân tạo","D":"Kiến thức về chuyển đổi số, công nghệ số, trí tuệ nhân tạo"},"correct":"D","explanation":"Quyết định 757/QĐ-BKHCN ngày 29/04/2025 của Bộ Khoa học - Công nghệ ban hành khung kiến thức, kỹ năng số cơ bản và hướng dẫn đánh giá, xác nhận hoàn thành mức độ phổ cập kỹ năng số\n📖 Điều khoản: Phụ lục I mục II.1"},{"id":314,"stt":4,"chapter":"VII. NHÂN LỰC – VĂN HÓA SỐ","topic":"VII.1. Phát triển nguồn nhân lực số","topicCode":"VII.1","question":"Theo Quyết định 2711/QĐ-TTg ngày 12/12/2025 Phê duyệt Chiến lược quốc gia về phát triển đội ngũ trí thức trong thời kỳ đẩy mạnh công nghiệp hóa, hiện đại hóa đất nước đến năm 2030, tầm nhìn đến 2045, việc xây dựng hệ thống tiêu chí, chỉ số đánh giá hiệu quả công việc (KPI) nhằm đánh giá, phân loại trí thức cần căn cứ vào nhóm năng lực nào sau đây?","options":{"A":"Năng lực chuyên môn và năng lực quản lý trong hoạt động nghề nghiệp","B":"Năng lực quản trị tổ chức và năng lực phát triển nguồn nhân lực","C":"Năng lực nghiên cứu khoa học và năng lực ứng dụng thực tiễn","D":"Năng lực chuyển đổi số và năng lực hội nhập quốc tế"},"correct":"D","explanation":"Quyết định 2711/QĐ-TTg ngày 12/12/2025 Phê duyệt Chiến lược quốc gia về phát triển đội ngũ trí thức trong thời kỳ đẩy mạnh CNH, HĐH đất nước đến năm 2030, tầm nhìn đến 2045\n📖 Điều khoản: Phụ lục – Mục 2 – Nhiệm vụ 2"},{"id":315,"stt":5,"chapter":"VII. NHÂN LỰC – VĂN HÓA SỐ","topic":"VII.1. Phát triển nguồn nhân lực số","topicCode":"VII.1","question":"Theo Chuyển đối số, các tổ chức tín dụng có trách nhiệm nào sau đây khi triển khai chuyển đổi số?","options":{"A":"Tổ chức đào tạo chuyên sâu cho bộ phận công nghệ thông tin và bộ phận quản trị hệ thống","B":"Tổ chức đào tạo, bồi dưỡng, phổ cập năng lực số cơ bản cho người lao động","C":"Khuyến khích người lao động tự học kỹ năng số, đơn vị chỉ hỗ trợ khi cần thiết","D":"Ưu tiên tuyển dụng nhân sự có kỹ năng số"},"correct":"B","explanation":"Luật Chuyển đổi số 148/2025/QH15 ngày 11 tháng 12 năm 2025\n📖 Điều khoản: Điều 17 khoản 5"},{"id":316,"stt":6,"chapter":"VII. NHÂN LỰC – VĂN HÓA SỐ","topic":"VII.1. Phát triển nguồn nhân lực số","topicCode":"VII.1","question":"Theo Chiến lược quốc gia về phát triển đội ngũ trí thức trong thời kỳ đẩy mạnh công nghiệp hóa, hiện đại hóa đất nước đến năm 2030, tầm nhìn đến 2045, một trong những mục tiêu đến năm 2030 là gì?","options":{"A":"Ít nhất 50% trí thức dưới 45 tuổi trong khu vực công được đào tạo và bồi dưỡng theo các chương trình nâng cao trình độ chuyên môn, quản lý, lãnh đạo","B":"Bảo đảm tối thiểu 30% phụ nữ và người thuộc các nhóm thiểu số tham gia trong các vị trí làm việc, nghiên cứu, giảng dạy, lãnh đạo trong lĩnh vực khoa học, công nghệ và đổi mới sáng tạo","C":"Tăng tỷ lệ lực lượng lao động trí thức trong các ngành công nghiệp công nghệ cao, công nghiệp chiến lược lên 50%","D":"Tỷ lệ người học các ngành khoa học cơ bản, kỹ thuật và công nghệ đạt ít nhất 50%, trong đó có ít nhất 6.000 nghiên cứu sinh, 20.000 người học các chương trình tài năng"},"correct":"A","explanation":"Quyết định 2711/QĐ-TTg ngày 12/12/2025 Phê duyệt Chiến lược quốc gia về phát triển đội ngũ trí thức trong thời kỳ đẩy mạnh công nghiệp hóa, hiện đại hóa đất nước đến năm 2030, tầm nhìn đến 2045\n📖 Điều khoản: Khoản 2 Mục II Điều 1"},{"id":317,"stt":7,"chapter":"VII. NHÂN LỰC – VĂN HÓA SỐ","topic":"VII.1. Phát triển nguồn nhân lực số","topicCode":"VII.1","question":"Theo Quyết định số 127/QĐ-TTg ngày 26/01/2021 của Thủ tướng ban hành chiến lược quốc gia về nghiên cứu, phát triển và ứng dụng trí tuệ nhân tạo đến năm 2030, nhiệm vụ nào góp phần phát triển nguồn nhân lực cho hệ sinh thái trí tuệ nhân tạo?","options":{"A":"Triển khai phổ cập kỹ năng cơ bản về ứng dụng trí tuệ nhân tạo và khoa học dữ liệu","B":"Tăng cường đào tạo nhân lực về trí tuệ nhân tạo","C":"Đẩy mạnh ứng dụng trí tuệ nhân tạo trong công việc","D":"Hoàn thiện hệ sinh thái khởi nghiệp đổi mới sáng tạo"},"correct":"A","explanation":"Quyết định số 127/QĐ-TTg ngày 26/01/2021 của Thủ tướng ban hành chiến lược quốc gia về nghiên cứu, phát triển và ứng dụng trí tuệ nhân tạo đến năm 2030\n📖 Điều khoản: Mục III.3"},{"id":318,"stt":8,"chapter":"VII. NHÂN LỰC – VĂN HÓA SỐ","topic":"VII.1. Phát triển nguồn nhân lực số","topicCode":"VII.1","question":"Một ngân hàng thương mại cổ phần có vốn nhà nước muốn thuê chuyên gia nước ngoài để xây dựng chiến lược đào tạo nhân lực số. Theo quy định tại Luật Chuyển đổi số năm 2025, nhận định nào đúng?","options":{"A":"Chỉ được thuê chuyên gia trong nước","B":"Chỉ được thuê khi có phê duyệt của Ngân hàng Nhà nước","C":"Được chủ động lựa chọn hình thức và thời hạn thuê chuyên gia","D":"Chỉ được thuê theo hình thức hợp đồng ngắn hạn dưới 12 tháng"},"correct":"C","explanation":"Luật Chuyển đổi số 148/2025/QH15 ngày 11 tháng 12 năm 2025\n📖 Điều khoản: Điều 18, Khoản 2, Điểm a"},{"id":319,"stt":9,"chapter":"VII. NHÂN LỰC – VĂN HÓA SỐ","topic":"VII.1. Phát triển nguồn nhân lực số","topicCode":"VII.1","question":"Khái niệm nào trong Luật Chuyển đổi số năm 2025 được sử dụng để chỉ lực lượng lao động có năng lực số phục vụ chuyển đổi số?","options":{"A":"Công dân số","B":"Chuyên gia công nghệ","C":"Nhân lực số","D":"Nhân sự quản trị số"},"correct":"C","explanation":"Luật Chuyển đổi số 148/2025/QH15 ngày 11 tháng 12 năm 2025\n📖 Điều khoản: Điều 3, Khoản 18"},{"id":320,"stt":10,"chapter":"VII. NHÂN LỰC – VĂN HÓA SỐ","topic":"VII.2. Kỹ năng số cho người lao động","topicCode":"VII.2","question":"Một nhân viên ngân hàng thường xuyên đăng nhập hệ thống nội bộ từ nhiều thiết bị khác nhau (máy tính cơ quan, laptop cá nhân). Để đảm bảo vừa thuận tiện vừa tuân thủ quy định an toàn thông tin, phương án nào dưới đây là phù hợp nhất?","options":{"A":"Sử dụng xác thực đa yếu tố (MFA) kết hợp thiết bị tin cậy","B":"Cho phép lưu mật khẩu trên trình duyệt để đăng nhập nhanh","C":"Dùng chung tài khoản với đồng nghiệp để giảm thao tác","D":"Chỉ sử dụng mật khẩu và thay đổi định kỳ"},"correct":"A","explanation":"MFA giúp tăng cường xác thực khi truy cập từ nhiều thiết bị, đặc biệt trong môi trường làm việc phân tán. Việc chỉ dùng mật khẩu (D) là chưa đủ.\n📖 Điều khoản: Yêu cầu kiểm soát truy cập tại Thông tư 09/2020/TT-NHNN về an toàn hệ thống thông tin. (Điều 28, 29, 30)"},{"id":321,"stt":11,"chapter":"VII. NHÂN LỰC – VĂN HÓA SỐ","topic":"VII.2. Kỹ năng số cho người lao động","topicCode":"VII.2","question":"Một nhân viên nhận được email từ địa chỉ gần giống email nội bộ, yêu cầu cung cấp thông tin đăng nhập để “cập nhật hệ thống”. Hành vi phù hợp nhất là gì?","options":{"A":"Thực hiện theo hướng dẫn để tránh gián đoạn công việc","B":"Chuyển tiếp email cho đồng nghiệp để xác minh","C":"Báo cáo bộ phận IT/An toàn thông tin và không cung cấp thông tin","D":"Trả lời email yêu cầu xác nhận lại danh tính người gửi"},"correct":"C","explanation":"Đây là tình huống tấn công giả mạo (phishing). Nguyên tắc đúng là không tương tác và báo cáo.\n📖 Điều khoản: Phù hợp yêu cầu nâng cao nhận thức ATTT tại Nghị quyết 57-NQ/TW và quy định kiểm soát an toàn thông tin tại TT09/2020/NHNN (điều 7)"},{"id":322,"stt":12,"chapter":"VII. NHÂN LỰC – VĂN HÓA SỐ","topic":"VII.2. Kỹ năng số cho người lao động","topicCode":"VII.2","question":"Một nhân viên ngân hàng thường xuyên làm việc từ xa bằng laptop cá nhân. Khi sử dụng, nhân viên này không cập nhật hệ điều hành, không cài phần mềm bảo mật và thường kết nối Wi-Fi công cộng để truy cập hệ thống nội bộ. Tình huống này phản ánh thiếu hụt kỹ năng số nào dưới đây?","options":{"A":"Kỹ năng sử dụng công cụ làm việc số","B":"Kỹ năng bảo mật thiết bị và nhận thức an toàn thông tin","C":"Kỹ năng phân tích dữ liệu","D":"Kỹ năng quản lý dự án CNTT"},"correct":"B","explanation":"Người lao động cần có nhận thức về bảo mật thiết bị, bao gồm cập nhật hệ thống, sử dụng phần mềm bảo mật và tránh kết nối mạng không an toàn. Đây là một phần quan trọng của kỹ năng số cơ bản trong ngân hàng.\n📖 Điều khoản: Nhận thức an toàn thông tin và quản lý vận hành hệ thống theo Thông tư 09/2020/TT-NHNN: Điều 7, 20, 25."},{"id":323,"stt":13,"chapter":"VII. NHÂN LỰC – VĂN HÓA SỐ","topic":"VII.2. Kỹ năng số cho người lao động","topicCode":"VII.2","question":"Một nhân viên sử dụng cùng một mật khẩu cho nhiều hệ thống khác nhau. Nguy cơ lớn nhất là gì?","options":{"A":"Nhân viên dễ bị nhầm lẫn và quên mật khẩu do đăng nhập vào quá nhiều hệ thống cùng lúc","B":"Gây ra hiện tượng xung đột dữ liệu giữa các nền tảng, làm giảm hiệu suất vận hành của hệ thống thông tin","C":"Hệ thống bảo mật của tổ chức sẽ tự động xóa tài khoản của nhân viên nếu phát hiện có sự trùng lặp mật khẩu","D":"Một hệ thống bị lộ thông tin dẫn đến nguy cơ tất cả các hệ thống còn lại đều bị chiếm quyền truy cập (tấn công lây lan)"},"correct":"D","explanation":"Luật Bảo vệ dữ liệu cá nhân\nLuật An toàn thông tin mạng 2015\n📖 Điều khoản: Điều 19, Luật Bảo vệ dữ liệu cá nhân (Năm 2024/2025 - cập nhật 2026);\nĐiều 27, Luật An toàn thông tin mạng 2015;\nTCVN 11290-1:2016 (tương đương ISO/IEC 27001): Tại mục kiểm soát truy cập (Access Control), tiêu chuẩn này yêu cầu người dùng phải tuân thủ các thực hành an toàn về mật khẩu. Việc tái sử dụng mật khẩu (Password Reuse) là rủi ro hàng đầu dẫn đến các cuộc tấn công Credential Stuffing (sử dụng thông tin đăng nhập bị rò rỉ từ một hệ thống kém bảo mật để tấn công hàng loạt các hệ thống quan trọng khác)."},{"id":324,"stt":14,"chapter":"VII. NHÂN LỰC – VĂN HÓA SỐ","topic":"VII.2. Kỹ năng số cho người lao động","topicCode":"VII.2","question":"Một nhân viên có khả năng đọc dashboard, hiểu xu hướng và đưa ra quyết định kinh doanh dựa trên dữ liệu. Kỹ năng này phản ánh điều gì?","options":{"A":"Kỹ năng vận hành hệ thống","B":"Kỹ năng phân tích dữ liệu (data literacy)","C":"Kỹ năng lập trình","D":"Kỹ năng quản lý dự án"},"correct":"B","explanation":"Data literacy là năng lực cốt lõi trong chuyển đổi số. Việc Phát triển nguồn nhân lực số là một trong các trụ cột của chuyển đổi số quốc gia. Con người phải có năng lực sử dụng, khai thác dữ liệu và công nghệ số để tham gia chuyển đổi số (NQ 57 về nhân lực số)\n📖 Điều khoản: Nghị quyết 57-NQ/TW."},{"id":325,"stt":15,"chapter":"VII. NHÂN LỰC – VĂN HÓA SỐ","topic":"VII.2. Kỹ năng số cho người lao động","topicCode":"VII.2","question":"Trong quá trình làm việc từ xa, một nhóm dự án ngân hàng sử dụng các công cụ như Microsoft Teams hoặc Zoom để họp và trao đổi công việc. Tuy nhiên, các thành viên thường chia sẻ link họp công khai, không thiết lập mật khẩu phòng họp và không kiểm soát người tham gia, dẫn đến nguy cơ người ngoài truy cập trái phép. Kỹ năng số nào dưới đây cần được cải thiện rõ nhất trong tình huống này?","options":{"A":"Kỹ năng sử dụng chức năng nâng cao của công cụ họp trực tuyến","B":"Kỹ năng lập kế hoạch dự án","C":"Kỹ năng bảo mật khi sử dụng công cụ số","D":"Kỹ năng phân tích dữ liệu"},"correct":"C","explanation":"Việc sử dụng công cụ số không chỉ dừng ở thao tác kỹ thuật mà còn cần đảm bảo an toàn thông tin, như thiết lập mật khẩu phòng họp, kiểm soát người tham gia và tránh chia sẻ link công khai.\n📖 Điều khoản: Thông tư 09/2020/TT-NHNN (nhận thức ATTT và kiểm soát truy cập theo Điều 7, 28, 29)"},{"id":326,"stt":16,"chapter":"VII. NHÂN LỰC – VĂN HÓA SỐ","topic":"VII.2. Kỹ năng số cho người lao động","topicCode":"VII.2","question":"Một nhân viên thường xuyên bỏ qua các cảnh báo bảo mật từ hệ thống (ví dụ: cảnh báo truy cập bất thường). Điều này có thể dẫn đến hậu quả gì?","options":{"A":"Không ảnh hưởng nếu hệ thống vẫn hoạt động","B":"Tăng hiệu suất làm việc","C":"Bỏ lỡ dấu hiệu tấn công hoặc truy cập trái phép","D":"Giảm chi phí vận hành"},"correct":"C","explanation":"Cảnh báo bảo mật là tín hiệu sớm của sự cố. Bỏ qua các tín hiệu này có thể dẫn đến tấn công nghiêm trọng.\n📖 Điều khoản: Nguyên tắc giám sát hệ thống tại Thông tư 09/2020/NHNN. (Điều 25,20)"},{"id":327,"stt":17,"chapter":"VII. NHÂN LỰC – VĂN HÓA SỐ","topic":"VII.2. Kỹ năng số cho người lao động","topicCode":"VII.2","question":"Một nhân viên ngân hàng cần chia sẻ file chứa dữ liệu khách hàng cho đồng nghiệp để xử lý nghiệp vụ. Trong các cách dưới đây, đâu là phương án phù hợp nhất để đảm bảo an toàn thông tin?","options":{"A":"Gửi file qua email cá nhân để thuận tiện truy cập từ nhiều thiết bị","B":"Gửi file qua hệ thống email nội bộ, đặt mật khẩu cho file và xác nhận đúng người nhận trước khi gửi","C":"Chia sẻ file qua ứng dụng nhắn tin cá nhân để gửi nhanh","D":"Tải file lên nền tảng lưu trữ công cộng và gửi link cho đồng nghiệp"},"correct":"B","explanation":"Việc chia sẻ dữ liệu nội bộ cần tuân thủ nguyên tắc bảo vệ dữ liệu và kiểm soát truy cập, bao gồm sử dụng kênh chính thức, xác thực người nhận và áp dụng biện pháp bảo mật như đặt mật khẩu hoặc mã hóa.\n📖 Điều khoản: Thông tư 09/2020/TT-NHNN: Điều 24, 28, 29"},{"id":328,"stt":18,"chapter":"VII. NHÂN LỰC – VĂN HÓA SỐ","topic":"VII.3. Thích ứng nghề nghiệp","topicCode":"VII.3","question":"Theo Quyết định số 757/QĐ-BKHCN ngày 29/4/2025 ban hành Khung kiến thức, kỹ năng số cơ bản và hướng dẫn đánh giá, xác nhận hoàn thành mức độ phổ cập kỹ năng số, để nâng cao khả năng đáp ứng yêu cầu của thị trường lao động hiện đại, người lao động cần biết tối thiểu nội dung gì?","options":{"A":"Kiến thức số cơ bản","B":"Kiến thức số nâng cao","C":"Kỹ năng số cơ bản","D":"Kiến thức số cơ bản và kỹ năng số cơ bản"},"correct":"D","explanation":"Quyết định số 757/QĐ-BKHCN ngày 29/4/2025\n📖 Điều khoản: Phụ lục 01, Mục 2"},{"id":329,"stt":19,"chapter":"VII. NHÂN LỰC – VĂN HÓA SỐ","topic":"VII.3. Thích ứng nghề nghiệp","topicCode":"VII.3","question":"Theo Quyết định số 757/QĐ-BKHCN ngày 29/4/2025 ban hành Khung kiến thức, kỹ năng số cơ bản và hướng dẫn đánh giá, xác nhận hoàn thành mức độ phổ cập kỹ năng số, để thích ứng với công việc thời đại số, mỗi cán bộ nhân viên nên làm gì khi nhận thấy mình còn thiếu hụt kỹ năng công nghệ?","options":{"A":"Học tất cả các khóa về chuyển đổi số","B":"Tập trung các khóa AI vì đang là xu hướng","C":"Tự đánh giá năng lực còn thiếu và tìm khóa học, hướng dẫn phù hợp","D":"Tập trung phát triển năng lực chuyên môn"},"correct":"C","explanation":"Quyết định số 757/QĐ-BKHCN ngày 29/4/2025\n📖 Điều khoản: Phụ lục I.4, mục 2.b, II.5 - 5.4"},{"id":330,"stt":20,"chapter":"VII. NHÂN LỰC – VĂN HÓA SỐ","topic":"VII.3. Thích ứng nghề nghiệp","topicCode":"VII.3","question":"Theo Quyết định số 757/QĐ-BKHCN ngày 29/4/2025 ban hành Khung kiến thức, kỹ năng số cơ bản và hướng dẫn đánh giá, xác nhận hoàn thành mức độ phổ cập kỹ năng số, thích ứng với môi trường làm việc số cũng bao gồm việc bảo vệ sức khỏe thể chất và tinh thần. Người lao động nên làm gì?","options":{"A":"Ngồi nhìn màn hình liên tục 15 tiếng không nghỉ","B":"Ngồi đúng tư thế, biết nghỉ ngơi sau khi sử dụng thiết bị lâu, biết sử dụng AI cân bằng tránh phụ thuộc quá mức, thiên kiến.","C":"Mở màn hình sáng chói nhất để dễ đọc","D":"Dùng kết quả của AI không cần kiểm chứng lại"},"correct":"B","explanation":"Quyết định số 757/QĐ-BKHCN ngày 29/4/2025\n📖 Điều khoản: Phụ lục I.1"},{"id":331,"stt":21,"chapter":"VII. NHÂN LỰC – VĂN HÓA SỐ","topic":"VII.3. Thích ứng nghề nghiệp","topicCode":"VII.3","question":"Theo Quyết định số 757/QĐ-BKHCN ngày 29/4/2025 ban hành Khung kiến thức, kỹ năng số cơ bản và hướng dẫn đánh giá, xác nhận hoàn thành mức độ phổ cập kỹ năng số, khi tìm kiếm thông tin trên mạng hoặc dùng AI hỗ trợ công việc, thói quen nghề nghiệp nào là bắt buộc để tránh sai sót?","options":{"A":"Tin tưởng 100% vào thông tin đầu tiên tìm được","B":"Sao chép toàn bộ nội dung mà không cần đọc lại","C":"Biết kiểm chứng, nhận diện, đánh giá mức độ tin cậy của nguồn thông tin.","D":"Chỉ đọc và chia sẻ tin tức giật gân"},"correct":"C","explanation":"Quyết định số 757/QĐ-BKHCN ngày 29/4/2025\n📖 Điều khoản: Phụ lục I.4, mục 2.b, II.1"},{"id":332,"stt":22,"chapter":"VII. NHÂN LỰC – VĂN HÓA SỐ","topic":"VII.3. Thích ứng nghề nghiệp","topicCode":"VII.3","question":"Theo Quyết định số 757/QĐ-BKHCN ngày 29/4/2025 ban hành Khung kiến thức, kỹ năng số cơ bản và hướng dẫn đánh giá, xác nhận hoàn thành mức độ phổ cập kỹ năng số, đối với người lao động hoạt động trong doanh nghiệp, để thích ứng và có cơ hội tiếp cận cá
