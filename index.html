 tin cơ bản","B":"Giúp cán bộ hiểu đúng, nắm vững kiến thức và sử dụng thành thạo các nền tảng, công cụ, dịch vụ số phục vụ công việc","C":"Tập trung đào tạo chuyên sâu về lập trình và phát triển phần mềm","D":"Đào tạo kỹ năng quản lý dự án CNTT cho cán bộ lãnh đạo"},"correct":"B","explanation":"Quyết định 1938/QĐ-NHNN ngày 28/04/2025\n📖 Điều khoản: Mục I. Mục tiêu"},{"id":339,"stt":29,"chapter":"VII. NHÂN LỰC – VĂN HÓA SỐ","topic":"VII.4. Đào tạo lại, nâng cao trình độ kỹ năng chuyển đổi số,…","topicCode":"VII.4","question":"Theo định hướng phát triển xã hội số tại Quyết định số 749/QĐ-TTg, đối tượng nào cần được nâng cao nhận thức, kỹ năng về chuyển đổi số?","options":{"A":"Cán bộ","B":"Công viên chức","C":"Người lao động","D":"Tất cả đều đúng"},"correct":"D","explanation":"Quyết định số 749/QĐ-TTg ngày 03/6/2020\n📖 Điều khoản: Điều 1. Mục V.9."},{"id":340,"stt":30,"chapter":"VII. NHÂN LỰC – VĂN HÓA SỐ","topic":"VII.4. Đào tạo lại, nâng cao trình độ kỹ năng chuyển đổi số,…","topicCode":"VII.4","question":"Theo Quyết định số 3580/QĐ-NHNN ngày 03/11/2025, cần làm gì để nâng cao kỹ năng về xây dựng, quản lý và sử dụng dữ liệu an toàn, hiệu quả?","options":{"A":"Ứng dụng AI xây dựng hệ thống quản lý dữ liệu","B":"Thiết lập cơ chế đào tạo liên tục, kết hợp thực tiễn và tăng cường hợp tác quốc tế về khoa học công nghệ và đổi mới sáng tạo","C":"Xây dựng các chương trình đi đào tạo tại nước ngoài","D":"Hoàn thiện hành lang pháp lý về dữ liệu, bảo vệ dữ liệu cá nhân"},"correct":"B","explanation":"Quyết định số 3580/QĐ-NHNN (Chiến lược Dữ liệu ngành Ngân hàng)\n📖 Điều khoản: Điều 1. Mục IV.2.7"},{"id":341,"stt":31,"chapter":"VII. NHÂN LỰC – VĂN HÓA SỐ","topic":"VII.4. Đào tạo lại, nâng cao trình độ kỹ năng chuyển đổi số,…","topicCode":"VII.4","question":"Tại Quyết định số 749/QĐ-TTg, Reskilling (Đào tạo lại) một trong các nhiệm vụ cốt lõi của nội dung nào?","options":{"A":"Phát triển xã hội số","B":"Phát triển công nghệ số","C":"Phát triển Kinh tế số","D":"Tất cả đều sai"},"correct":"A","explanation":"Quyết định số 749/QĐ-TTg ngày 03/6/2020\n📖 Điều khoản: Điều 1. Mục VII.2"},{"id":342,"stt":32,"chapter":"VII. NHÂN LỰC – VĂN HÓA SỐ","topic":"VII.4. Đào tạo lại, nâng cao trình độ kỹ năng chuyển đổi số,…","topicCode":"VII.4","question":"Theo Quyết định số 757/QĐ-BKHCN ngày 29/4/2025 ban hành Khung kiến thức, kỹ năng số cơ bản và hướng dẫn đánh giá, xác nhận hoàn thành mức độ phổ cập kỹ năng số, hình thức đánh giá nào sau đây được khuyến nghị để đánh giá mức độ phổ cập kỹ năng số?","options":{"A":"Tổ chức các lớp học tập trung dài ngày","B":"Hạn chế học tập online vì sợ rủi ro","C":"Sử dụng công cụ số hóa: Sử dụng các nền tảng trực tuyến hoặc phần mềm để tổ chức bài kiểm tra và phân tích kết quả tự động, kết hợp với trí tuệ nhân tạo để đưa ra báo cáo chi tiết.","D":"Ngừng đào tạo nghiệp vụ chuyên môn, tập trung đào tạo chuyên sâu về công nghệ"},"correct":"C","explanation":"Quyết định số 757/QĐ-KHCN ngày 29/04/2025\n📖 Điều khoản: Phụ lục 2. Mục II, khoản 1"},{"id":343,"stt":33,"chapter":"VII. NHÂN LỰC – VĂN HÓA SỐ","topic":"VII.4. Đào tạo lại, nâng cao trình độ kỹ năng chuyển đổi số,…","topicCode":"VII.4","question":"Theo Quyết định số 749/QĐ-TTg ngày 03/06/2020 của Thủ tướng phê duyệt “chương trình chuyển đổi số quốc gia đến năm 2025, định hướng đến năm 2030”, một trong những giải pháp phát triển xã hội số là gì?","options":{"A":"Xây dựng thị trường thương mại điện tử lành mạnh có tính cạnh tranh và phát triển bền vững, trong đó hỗ trợ ứng dụng rộng rãi thương mại điện tử trong doanh nghiệp và cộng đồng;","B":"Xây dựng chương trình nâng cao nhận thức, đào tạo kỹ năng về chuyển đổi số, phát triển Chính phủ số cho cán bộ, công chức, viên chức và người lao động trong cơ quan nhà nước","C":"Nghiên cứu, xây dựng các khu thử nghiệm dành cho doanh nghiệp công nghệ theo mô hình tiên tiến của thế giới để tiên phong thử nghiệm công nghệ mới nhất, mô hình mới nhất trên thế giới","D":"Triển khai các chương trình đào tạo, đào tạo lại kỹ năng lãnh đạo, quản lý chuyển đổi số cho người đứng đầu các cơ quan, tổ chức, Giám đốc điều hành các doanh nghiệp"},"correct":"D"},{"id":344,"stt":34,"chapter":"VII. NHÂN LỰC – VĂN HÓA SỐ","topic":"VII.5. Văn hóa đổi mới sáng tạo","topicCode":"VII.5","question":"Đổi mới sáng tạo được hiểu là gì theo Luật số 93/2025/QH của Quốc hội: Luật khoa học, công nghệ và đổi mới sáng tạo?","options":{"A":"Là hoạt động tạo ra sản phẩm mới, dịch vụ mới, quy trình mới, mô hình kinh doanh mới hoặc cải tiến đáng kể so với sản phẩm, dịch vụ, quy trình, mô hình kinh doanh đã có","B":"Là việc tạo ra và triển khai các thành tựu khoa học trong hoạt động sản xuất, kinh doanh nhằm nâng cao hiệu quả kinh tế, cải thiện năng suất lao động và chất lượng sản phẩm, hàng hóa","C":"Là việc nghiên cứu và phát triển các giải pháp kỹ thuật, công nghệ và tổ chức sản xuất nhằm nâng cao hiệu quả hoạt động của doanh nghiệp, cải thiện chất lượng sản phẩm và tăng khả năng cạnh tranh trên thị trường","D":"Là việc ứng dụng các thành tựu khoa học và phương thức quản lý trong sản xuất và cung ứng dịch vụ nhằm nâng cao hiệu quả kinh tế"},"correct":"A","explanation":"Luật số 93/2025/QH\n📖 Điều khoản: Điều 3"},{"id":345,"stt":35,"chapter":"VII. NHÂN LỰC – VĂN HÓA SỐ","topic":"VII.5. Văn hóa đổi mới sáng tạo","topicCode":"VII.5","question":"Đâu là những thách thức chủ yếu cản trở ngân hàng trong quá trình thực hiện chuyển đổi số?","options":{"A":"Rào cản về văn hóa, nhận thức, hạn chế về nguồn nhân lực số và hạ tầng công nghệ thông tin chưa đáp ứng yêu cầu","B":"Sự gia tăng các quy định bảo mật khiến doanh nghiệp không thể triển khai công nghệ mới","C":"Chi phí đầu tư công nghệ làm giảm lợi nhuận và không thể phục hồi","D":"Dư thừa nguồn nhân lực có kỹ năng số gây khó khăn trong phân công công việc"},"correct":"A","explanation":"Nghị quyết 57-NQ/TW (2024), phần II và Quyết định 749/QĐ-TTg (2020), mục III\n📖 Điều khoản: Phần II và Mục III"},{"id":346,"stt":36,"chapter":"VII. NHÂN LỰC – VĂN HÓA SỐ","topic":"VII.5. Văn hóa đổi mới sáng tạo","topicCode":"VII.5","question":"Tại sao việc chuyển sang mô hình \"Agile Banking\" lại được coi là một cuộc cách mạng về văn hóa doanh nghiệp chứ không chỉ là thay đổi sơ đồ tổ chức?","options":{"A":"Vì mô hình này buộc nhân viên phải làm việc nhiều giờ hơn mỗi ngày.","B":"Vì mô hình này đòi hỏi sự thay đổi trong tư duy: từ kiểm soát sang trao quyền, từ cục bộ sang cộng tác, và từ sợ sai sang thử nghiệm","C":"Vì mô hình này giúp ngân hàng cắt giảm toàn bộ chi phí dành cho các hoạt động văn hóa, văn nghệ","D":"Vì mô hình này chỉ tập trung vào việc thay đổi các phần mềm máy tính hiện có."},"correct":"B","explanation":"Banking 4.0. BankingEverywhere, Never at a Bank\n📖 Điều khoản: 148 - 152"},{"id":347,"stt":37,"chapter":"VII. NHÂN LỰC – VĂN HÓA SỐ","topic":"VII.5. Văn hóa đổi mới sáng tạo","topicCode":"VII.5","question":"Yếu tố nào có thể là rào cản mạnh mẽ nhất đối với một văn hóa số lành mạnh trong ngân hàng?","options":{"A":"Sự thiếu hụt về vốn đầu tư công nghệ","B":"Các quy định pháp lý khắt khe của ngành","C":"Tư duy và hành vi cục bộ","D":"Sự cạnh tranh từ các công ty khởi nghiệp Fintech"},"correct":"C","explanation":"Banking 4.0. BankingEverywhere, Never at a Bank https://www.mckinsey.com/capabilities/tech-and-ai/our-insights/culture-for-a-digital-age#/\n📖 Điều khoản: 148 - 152"},{"id":348,"stt":38,"chapter":"VII. NHÂN LỰC – VĂN HÓA SỐ","topic":"VII.5. Văn hóa đổi mới sáng tạo","topicCode":"VII.5","question":"Trong văn hoá chuyển đổi số, việc \"kết hợp các thế hệ nhân sự khác nhau\" nhằm mục đích gì?","options":{"A":"Để cắt giảm chi phí lương bằng cách sử dụng nhân sự thực tập","B":"Để tạo ra một kho tri thức số tận dụng cả kỹ năng số và kinh nghiệm thực tiễn","C":"Để tạo ra sự cạnh tranh giữa nhân viên cũ và mới","D":"Để làm hài lòng các quy định về đa dạng về độ tuổi của nhà nước và chính phủ"},"correct":"B","explanation":"Banking 5.0 How fintech will change traditional banks in the new normal post pandemic\n📖 Điều khoản: 59-60"},{"id":349,"stt":39,"chapter":"VII. NHÂN LỰC – VĂN HÓA SỐ","topic":"VII.5. Văn hóa đổi mới sáng tạo","topicCode":"VII.5","question":"Trình độ tiếp thu và vận dụng kiến thức khoa học, hệ thống kiến thức được con người phát minh, nhận thức và được tích lũy lại, bổ sung nâng cao và không ngừng đổi mới qua các thế hệ được coi là yếu tố cấu thành nên văn hoá nào?","options":{"A":"Văn hoá tinh thần","B":"Văn hoá vật chất","C":"Văn hoá đổi mới sáng tạo","D":"Vừa là văn hoá vật chất, vừa là văn hoá tinh thần"},"correct":"A","explanation":"Giáo trình văn hoá doanh nghiệp (PGS.TS. Đỗ Thị Phi Hoài)\n📖 Điều khoản: Mục 1.2"},{"id":350,"stt":40,"chapter":"VII. NHÂN LỰC – VĂN HÓA SỐ","topic":"VII.5. Văn hóa đổi mới sáng tạo","topicCode":"VII.5","question":"Văn hoá doanh nghệp có những tác động tích cực nào tới sự phát triển của doanh nghiệp?","options":{"A":"Văn hóa doanh nghiệp tạo nên phong thái của doanh nghiệp,giúp phân biệt doanh nghiệp này với doanh nghiệp khác","B":"Văn hóa doanh nghiệp khích lệ quá trình đổi mới và sáng chế","C":"Văn hóa doanh nghiệp tạo nên lực hướng tâm cho toàn doanh nghiệp","D":"Cả 3 đáp án trên"},"correct":"D","explanation":"Giáo trình văn hoá doanh nghiệp (PGS.TS. Đỗ Thị Phi Hoài)\n📖 Điều khoản: Mục 2.3"},{"id":351,"stt":41,"chapter":"VII. NHÂN LỰC – VĂN HÓA SỐ","topic":"VII.5. Văn hóa đổi mới sáng tạo","topicCode":"VII.5","question":"Theo Quyết định số 411/QĐ-TTg ngày 31/3/2022 Phê duyệt Chiến lược quốc gia phát triển kinh tế số và xã hội số đến năm 2025, định hướng đến năm 2030, văn hoá số được đặc trưng bởi thước đo nào sau đây?","options":{"A":"Số lượng thiết bị thông minh (điện thoại, máy tính) mà người dân sở hữu.","B":"Tốc độ đường truyền mạng cáp quang và mạng di động tại các địa phương.","C":"Mức độ sử dụng dịch vụ công trực tuyến, mức độ sử dụng dịch vụ số trên mạng, mức độ sử dụng các dịch vụ y tế số, giáo dục số của người dân","D":"Tổng số lượng các ứng dụng di động được phát triển bởi các doanh nghiệp trong nước."},"correct":"C","explanation":"Quyết định số 411/QĐ-TTg ngày 31/3/2022\n📖 Điều khoản: III. Mục 2"},{"id":352,"stt":42,"chapter":"VII. NHÂN LỰC – VĂN HÓA SỐ","topic":"VII.5. Văn hóa đổi mới sáng tạo","topicCode":"VII.5","question":"Theo Quyết định số 749/QĐ-TTg Phê duyệt \"Chương trình Chuyển đổi số quốc gia đến năm 2025, định hướng đến năm 2030\", trong chuyển đổi số, cần tạo dựng và phát triển văn hoá gì để thúc đẩy yếu tố thể chế và công nghệ số?","options":{"A":"Hình thành văn hoá chấp nhận và thử nghiệm cái mới","B":"Hình thành văn số gắn với bảo vệ văn hoá và giá trị đạo đức của con người","C":"Ưu tiên duy trì văn hóa làm việc theo quy trình sẵn có để đảm bảo tính kiểm soát và hạn chế tối đa sai sót công nghệ","D":"Xây dựng văn hóa làm việc độc lập, khép kín giữa các bộ phận để bảo mật thông tin tuyệt đối và tránh sự can thiệp của các bên thứ ba"},"correct":"A","explanation":"Quyết định số 749/QĐ-TTg ngày 3/6/2020\n📖 Điều khoản: Mục III. 3"},{"id":353,"stt":43,"chapter":"VII. NHÂN LỰC – VĂN HÓA SỐ","topic":"VII.6. Đạo đức nghề nghiệp trong môi trường số","topicCode":"VII.6","question":"Theo Bộ chuẩn mực đạo đức nghề nghiệp và quy tắc ứng xử của cán bộ ngân hàng, chuẩn mực \"Sự cẩn trọng\" yêu cầu cán bộ ngân hàng KHÔNG được thực hiện hành vi nào sau đây khi xử lý nghiệp vụ trên môi trường số?","options":{"A":"Lường đoán kỹ mọi rủi ro để phòng ngừa.","B":"Làm tắt, bỏ qua các bước trong quy trình nghiệp vụ.","C":"Thận trọng trong giao tiếp và kỷ luật phát ngôn.","D":"Tự giác chịu sự giám sát, kiểm soát theo quy định."},"correct":"B","explanation":"Bộ chuẩn mực đạo đức nghề nghiệp và quy tắc ứng xử của cán bộ ngân hàng (Ban hành kèm theo Quyết định số 11/QĐ-HHNH ngày 25/02/2019 của Hội đồng Hiệp hội Ngân hàng Việt Nam)\n📖 Điều khoản: Điều 4, Khoản 2, điểm b"},{"id":354,"stt":44,"chapter":"VII. NHÂN LỰC – VĂN HÓA SỐ","topic":"VII.6. Đạo đức nghề nghiệp trong môi trường số","topicCode":"VII.6","question":"Trong bối cảnh chuyển đổi số, chuẩn mực đạo đức nào khuyến khích cán bộ rèn luyện khả năng thích ứng và không ngừng cải tiến phương pháp làm việc?","options":{"A":"Tính tuân thủ.","B":"Sự liêm chính.","C":"Tính chủ động, sáng tạo, thích ứng.","D":"Sự tận tâm và chuyên cần."},"correct":"C","explanation":"Bộ chuẩn mực đạo đức nghề nghiệp và quy tắc ứng xử của cán bộ ngân hàng (Ban hành kèm theo Quyết định số 11/QĐ-HHNH ngày 25/02/2019 của Hội đồng Hiệp hội Ngân hàng Việt Nam)\n📖 Điều khoản: Điều 4, Khoản 5, điểm a"},{"id":355,"stt":45,"chapter":"VII. NHÂN LỰC – VĂN HÓA SỐ","topic":"VII.6. Đạo đức nghề nghiệp trong môi trường số","topicCode":"VII.6","question":"Khi khai thác dữ liệu số, cán bộ ngân hàng phải đảm bảo nguyên tắc nào theo Chiến lược dữ liệu ngành Ngân hàng đến năm 2030?","options":{"A":"Việc thu thập và chia sẻ dữ liệu phải tôn trọng quyền của chủ sở hữu dữ liệu","B":"Ưu tiên khai thác tối đa dữ liệu mà không cần bảo vệ dữ liệu cá nhân.","C":"Chia sẻ dữ liệu công khai không cần tuân thủ an ninh mạng.","D":"Thu thập dữ liệu nhiều lần cho cùng một mục đích để đối chiếu."},"correct":"A","explanation":"Chiến lược dữ liệu ngành Ngân hàng đến năm 2030 (Quyết định số 3580/QĐ-NHNN ngày 03/11/2025)\n📖 Điều khoản: Quan điểm xây dựng chiến lược số 5, Mục I"},{"id":356,"stt":46,"chapter":"VII. NHÂN LỰC – VĂN HÓA SỐ","topic":"VII.6. Đạo đức nghề nghiệp trong môi trường số","topicCode":"VII.6","question":"Theo Chiến lược dữ liệu ngành Ngân hàng đến năm 2030, nguyên tắc “Công khai và minh bạch” yêu cầu dữ liệu phải đảm bảo điều gì?","options":{"A":"Chỉ cung cấp thông tin cho cán bộ lãnh đạo cấp cao.","B":"Bảo mật tuyệt đối, không chia sẻ cho bất kỳ bên thứ ba nào.","C":"Bình đẳng trong việc tiếp cận và sử dụng theo quy định pháp luật.","D":"Tự do chia sẻ dữ liệu khách hàng mà không cần quy trình"},"correct":"C","explanation":"Chiến lược dữ liệu ngành Ngân hàng đến năm 2030 (Quyết định số 3580/QĐ-NHNN ngày 03/11/2025)\n📖 Điều khoản: Mục III, Khoản 2 (Nguyên tắc Công khai và minh bạch)"},{"id":357,"stt":47,"chapter":"VII. NHÂN LỰC – VĂN HÓA SỐ","topic":"VII.6. Đạo đức nghề nghiệp trong môi trường số","topicCode":"VII.6","question":"Theo Chiến lược dữ liệu ngành Ngân hàng đến năm 2030, việc thu thập và chia sẻ dữ liệu số trong ngành Ngân hàng phải tôn trọng yếu tố nào sau đây?","options":{"A":"Lợi ích tối đa của ngân hàng.","B":"Quyền của chủ sở hữu dữ liệu.","C":"Ý kiến của cán bộ quản trị hệ thống.","D":"Tất cả các xu hướng công nghệ mới nhất được triển khai."},"correct":"B","explanation":"Chiến lược dữ liệu ngành Ngân hàng đến năm 2030 (Quyết định số 3580/QĐ-NHNN ngày 03/11/2025)\n📖 Điều khoản: Mục III, Khoản 5 (Nguyên tắc Quyền sở hữu và bảo mật)"},{"id":358,"stt":48,"chapter":"VII. NHÂN LỰC – VĂN HÓA SỐ","topic":"VII.6. Đạo đức nghề nghiệp trong môi trường số","topicCode":"VII.6","question":"Theo chuẩn mực \"Sự liêm chính\" của Bộ chuẩn mực đạo đức nghề nghiệp và quy tắc ứng xử của cán bộ ngân hàng, cán bộ ngân hàng KHÔNG được thực hiện hành vi nào trên môi trường số?","options":{"A":"Bảo vệ tài sản và lợi ích hợp pháp của tổ chức.","B":"Báo cáo kịp thời khi phát hiện hành vi vi phạm.","C":"Minh bạch trong các mối quan hệ liên quan đến tiền bạc.","D":"Lợi dụng địa vị, thông tin bí mật để thu lợi cá nhân."},"correct":"D","explanation":"Bộ chuẩn mực đạo đức nghề nghiệp và quy tắc ứng xử của cán bộ ngân hàng (Ban hành kèm theo Quyết định số 11/QĐ-HHNH ngày 25/02/2019 của Hội đồng Hiệp hội Ngân hàng Việt Nam)\n📖 Điều khoản: Điều 4, Khoản 3 và Điều 5, Khoản 1, điểm b"},{"id":359,"stt":49,"chapter":"VII. NHÂN LỰC – VĂN HÓA SỐ","topic":"VII.6. Đạo đức nghề nghiệp trong môi trường số","topicCode":"VII.6","question":"Chuẩn mực \"Sự tận tâm và chuyên cần\" của Bộ chuẩn mực đạo đức nghề nghiệp và quy tắc ứng xử của cán bộ ngân hàng yêu cầu cán bộ ngân hàng làm gì để thích ứng với chuyển đổi số?","options":{"A":"Làm việc theo kinh nghiệm truyền thống, không cần thay đổi.","B":"Thường xuyên học hỏi, nâng cao kiến thức và tinh thông nghiệp vụ.","C":"Thực hiện những nhiệm vụ đơn giản, ít rủi ro công nghệ.","D":"Xử lý công việc phụ thuộc hoàn toàn vào hệ thống tự động."},"correct":"B","explanation":"Bộ chuẩn mực đạo đức nghề nghiệp và quy tắc ứng xử của cán bộ ngân hàng (Ban hành kèm theo Quyết định số 11/QĐ-HHNH ngày 25/02/2019 của Hội đồng Hiệp hội Ngân hàng Việt Nam)\n📖 Điều khoản: Điều 4, Khoản 4, điểm b"},{"id":360,"stt":50,"chapter":"VII. NHÂN LỰC – VĂN HÓA SỐ","topic":"VII.6. Đạo đức nghề nghiệp trong môi trường số","topicCode":"VII.6","question":"Hành vi nào sau đây vi phạm chuẩn mực \"Tính chủ động, sáng tạo, thích ứng\" của Bộ chuẩn mực đạo đức nghề nghiệp và quy tắc ứng xử của cán bộ ngân hàng trong bối cảnh ngân hàng số?","options":{"A":"Bảo thủ, cứng nhắc, gây cản trở cho đổi mới, sáng tạo.","B":"Không ngừng cải tiến phương pháp làm việc.","C":"Rèn luyện khả năng thích ứng trước sự thay đổi của môi trường.","D":"Tự giác nghiên cứu và ứng dụng công nghệ mới."},"correct":"A","explanation":"Bộ chuẩn mực đạo đức nghề nghiệp và quy tắc ứng xử của cán bộ ngân hàng (Ban hành kèm theo Quyết định số 11/QĐ-HHNH ngày 25/02/2019 của Hội đồng Hiệp hội Ngân hàng Việt Nam)\n📖 Điều khoản: Điều 4, Khoản 5, điểm b"},{"id":361,"stt":1,"chapter":"VIII. ỨNG DỤNG THỰC TIỄN – TÌNH HUỐNG","topic":"VIII.1. Rò rỉ dữ liệu khách hàng","topicCode":"VIII.1","question":"Theo Luật số 91/2025/QH15, dữ liệu nào sau đây được phân loại là dữ liệu cá nhân nhạy cảm?","options":{"A":"Họ tên, ngày tháng năm sinh","B":"Địa chỉ nơi ở, số điện thoại","C":"Tên đăng nhập, mật khẩu truy cập của tài khoản ngân hàng","D":"Ảnh chân dung, biển số xe"},"correct":"C","explanation":"Điều 2, Luật 91/2025/QH15,\nĐiều 4, Nghị định 356/2025/NĐ-CP"},{"id":362,"stt":2,"chapter":"VIII. ỨNG DỤNG THỰC TIỄN – TÌNH HUỐNG","topic":"VIII.1. Rò rỉ dữ liệu khách hàng","topicCode":"VIII.1","question":"Khi phát hiện vi phạm quy định về bảo vệ dữ liệu cá nhân có thể gây tổn hại đến quốc phòng, an ninh quốc gia, tổ chức phải thông báo cho cơ quan chuyên trách trong thời hạn bao lâu?","options":{"A":"24 giờ","B":"48 giờ","C":"72 giờ","D":"07 ngày làm việc"},"correct":"C","explanation":"Điều 23, Luật 91/2025/QH15"},{"id":363,"stt":3,"chapter":"VIII. ỨNG DỤNG THỰC TIỄN – TÌNH HUỐNG","topic":"VIII.1. Rò rỉ dữ liệu khách hàng","topicCode":"VIII.1","question":"Cơ quan chuyên trách bảo vệ dữ liệu cá nhân thuộc quản lý của cơ quan nào sau đây?","options":{"A":"Cục An toàn thông tin (Bộ TT&TT)","B":"Bộ Công an","C":"Ngân hàng Nhà nước","D":"Thanh tra Chính phủ"},"correct":"B","explanation":"Điều 33, Luật 91/2025/QH15"},{"id":364,"stt":4,"chapter":"VIII. ỨNG DỤNG THỰC TIỄN – TÌNH HUỐNG","topic":"VIII.1. Rò rỉ dữ liệu khách hàng","topicCode":"VIII.1","question":"Theo Luật bảo vệ dữ liệu cá nhân, hành vi nào dưới đây là hành vi bị cấm?","options":{"A":"Lưu trữ dữ liệu trên Cloud có mã hóa","B":"Mua bán, trao đổi dữ liệu cá nhân khi chưa có sự đồng ý của chủ thể","C":"Xóa dữ liệu khách hàng theo yêu cầu","D":"Gửi email thông báo cho khách hàng"},"correct":"B","explanation":"Điều 7, Luật 91/2025/QH15"},{"id":365,"stt":5,"chapter":"VIII. ỨNG DỤNG THỰC TIỄN – TÌNH HUỐNG","topic":"VIII.1. Rò rỉ dữ liệu khách hàng","topicCode":"VIII.1","question":"Theo Luật bảo vệ dữ liệu cá nhân, việc xử lý dữ liệu cá nhân của trẻ em từ đủ 7 tuổi trở lên cần sự đồng ý của ai?","options":{"A":"Chỉ cần trẻ em đó","B":"Người đại diện theo pháp luật","C":"Cả trẻ em đó và người đại diện theo pháp luật","D":"Không cần sự đồng ý"},"correct":"C","explanation":"Điều 24, Luật 91/2025/QH15"},{"id":366,"stt":6,"chapter":"VIII. ỨNG DỤNG THỰC TIỄN – TÌNH HUỐNG","topic":"VIII.1. Rò rỉ dữ liệu khách hàng","topicCode":"VIII.1","question":"Khi nhận được yêu cầu xóa dữ liệu cá nhân từ chủ thể dữ liệu, Bên kiểm soát dữ liệu phải phản hồi trong thời hạn bao lâu?","options":{"A":"24 giờ","B":"10 ngày làm việc","C":"05 ngày làm việc","D":"02 ngày làm việc"},"correct":"D","explanation":"Điều 5, Nghị định 356/2025/NĐ-CP"},{"id":367,"stt":7,"chapter":"VIII. ỨNG DỤNG THỰC TIỄN – TÌNH HUỐNG","topic":"VIII.1. Rò rỉ dữ liệu khách hàng","topicCode":"VIII.1","question":"Nhân sự bảo vệ dữ liệu cá nhân trong cơ quan, tổ chức phải đáp ứng điều kiện nào về trình độ và kinh nghiệm?","options":{"A":"Trình độ Đại học và 01 năm kinh nghiệm","B":"Chỉ cần chứng chỉ bồi dưỡng","C":"Trình độ trung cấp và 03 năm kinh nghiệm","D":"Trình độ cao đẳng trở lên và 02 năm kinh nghiệm"},"correct":"D","explanation":"Điều 13, Nghị định 356/2025/NĐ-CP"},{"id":368,"stt":8,"chapter":"VIII. ỨNG DỤNG THỰC TIỄN – TÌNH HUỐNG","topic":"VIII.1. Rò rỉ dữ liệu khách hàng","topicCode":"VIII.1","question":"Trong trường hợp chuyển dữ liệu cá nhân xuyên biên giới, hồ sơ đánh giá tác động phải được nộp về cơ quan chuyên trách trong thời hạn bao lâu kể từ ngày tiến hành?","options":{"A":"30 ngày","B":"45 ngày","C":"60 ngày","D":"90 ngày"},"correct":"C","explanation":"Điều 18, Nghị định 356/2025/NĐ-CP"},{"id":369,"stt":9,"chapter":"VIII. ỨNG DỤNG THỰC TIỄN – TÌNH HUỐNG","topic":"VIII.2. Số hóa quy trình nội bộ","topicCode":"VIII.2","question":"Theo quan điểm chỉ đạo tại Chương trình Chuyển đổi số quốc gia (Quyết định số 749/QĐ-TTg), nhận thức đóng vai trò quyết định trong chuyển đổi số. Dựa trên quan điểm này, một cơ quan, tổ chức có thể tiến hành chuyển đổi số ngay thông qua hành động nào sau đây?","options":{"A":"Giữ nguyên các bước quy trình giấy lên hệ thống máy tính.","B":"Đầu tư phần mềm đắt tiền nhất, bỏ qua đào tạo nhân sự.","C":"Sử dụng nguồn lực, hệ thống kỹ thuật sẵn có để số hóa toàn bộ tài sản thông tin của mình, tái cấu trúc quy trình nghiệp vụ, cơ cấu tổ chức và chuyển đổi các mối quan hệ từ môi trường truyền thống sang môi trường số","D":"Khối công nghệ (IT) chịu trách nhiệm triển kha, các khối nghiệp vụ không cần tham gia."},"correct":"C","explanation":"Quyết định số 749/QĐ-TTg ngày 03/6/2020\n📖 Điều khoản: Mục III, điểm 1"},{"id":370,"stt":10,"chapter":"VIII. ỨNG DỤNG THỰC TIỄN – TÌNH HUỐNG","topic":"VIII.2. Số hóa quy trình nội bộ","topicCode":"VIII.2","question":"Theo Quyết định số 749/QĐ-TT Chương trình Chuyển đổi số quốc gia đến năm 2025, định hướng đến năm 2030, đâu là một trong những nhiệm vụ được đặt ra đối với việc phát triển Chính phủ số","options":{"A":"Chuẩn hóa, điện tử hóa quy trình nghiệp vụ xử lý hồ sơ trên môi trường mạng, biểu mẫu, chế độ báo cáo","B":"Xây dựng các nền tảng số phục vụ đô thị thông minh và phát triển kinh tế số địa phương","C":"Đẩy mạnh cung cấp dịch vụ công trực tuyến mức độ cao mà không cần thay đổi quy trình nội bộ hiện có","D":"Tái cấu trúc toàn bộ hệ thống CNTT theo hướng tập trung, thay thế các hệ thống hiện hữu bằng một nền tảng duy nhất"},"correct":"A","explanation":"Quyết định số 749/QĐ-TTg ngày 03/6/2020\n📖 Điều khoản: Điều 1, mục V khoản 7"},{"id":371,"stt":11,"chapter":"VIII. ỨNG DỤNG THỰC TIỄN – TÌNH HUỐNG","topic":"VIII.2. Số hóa quy trình nội bộ","topicCode":"VIII.2","question":"Theo Nghị định 278/2025/NĐ-CP, việc giám sát hoạt động xử lý dữ liệu cần tuân theo nguyên tắc nào sau đây?","options":{"A":"Hoạt động kết nối, chia sẻ dữ liệu bắt buộc giữa các cơ quan trong hệ thống chính trị phải được giám sát liên tục, công khai và có truy vết","B":"Việc giám sát được thực hiện thông qua hệ thống kỹ thuật và cơ chế quản lý do cơ quan nhà nước có thẩm quyền quy định","C":"Việc xử lý vi phạm phải bảo đảm khách quan, minh bạch, đúng thẩm quyền và tương xứng với tính chất, mức độ vi phạm.","D":"Tất cả đáp án trên đều đúng"},"correct":"D","explanation":"Nghị định 278/2025/NĐ-CP\n📖 Điều khoản: Điều 13.1"},{"id":372,"stt":12,"chapter":"VIII. ỨNG DỤNG THỰC TIỄN – TÌNH HUỐNG","topic":"VIII.3. Kịch bản chuyển đổi số tại chi nhánh","topicCode":"VIII.3","question":"Một chi nhánh ngân hàng đã đầu tư hệ thống máy giao dịch tự động (Kiosk) và ứng dụng di động, nhưng người dân vẫn ưu tiên đến giao dịch trực tiếp tại quầy. Đánh giá vấn đề này dưới góc độ quan điểm chỉ đạo tại Chương trình Chuyển đổi số quốc gia đến năm 2025, định hướng đến năm 2030 (Quyết định 749/QĐ-TTg), nhận định nào sau đây chỉ ra nguyên nhân cốt lõi nhất khiến nền tảng số thất bại trong việc thay đổi hành vi người dùng?","options":{"A":"Do tổ chức chưa áp dụng các biện pháp hành chính cứng rắn nhằm hạn chế và ép buộc người dân ngừng giao dịch tại quầy","B":"Do các nền tảng số chưa thực sự lấy \"người dân làm trung tâm\", chưa cung cấp được trải nghiệm tốt nhất, thân thiện và đơn giản nhất.","C":"Do hệ thống máy móc chưa tích hợp đủ các công nghệ phức tạp nhất.","D":"Khách hàng chưa quen công nghệ"},"correct":"B","explanation":"Quyết định 749/QĐ-TTg\n📖 Điều khoản: Mục V"},{"id":373,"stt":13,"chapter":"VIII. ỨNG DỤNG THỰC TIỄN – TÌNH HUỐNG","topic":"VIII.3. Kịch bản chuyển đổi số tại chi nhánh","topicCode":"VIII.3","question":"Chi nhánh triển khai hệ thống quản lý công việc mới, nhưng nhân viên vẫn dùng Excel cá nhân vì “quen tay”. Theo các quan điểm và nhiệm vụ tại Chương trình Chuyển đổi số quốc gia đến năm 2025, định hướng đến năm 2030 (Quyết định số 749/QĐ-TTg), giải pháp nào sau đây là phù hợp nhất để giải quyết vấn đề trên?","options":{"A":"Yêu cầu bắt buộc sử dụng hệ thống, không cần giải thích","B":"Tổ chức đào tạo, nâng cao nhận thức kết hợp với tái cấu trúc quy trình nghiệp vụ để chuyển đổi hoàn toàn phương thức làm việc sang môi trường số","C":"Cho phép song song Excel và hệ thống mới vô thời hạn để tránh gián đoạn","D":"Giao phó toàn bộ trách nhiệm cho bộ phận công nghệ thông tin (IT) tự điều chỉnh hệ thống mà không cần các khối nghiệp vụ tham gia thay đổi quy trình"},"correct":"B","explanation":"Quyết định 749/QĐ-TTg, Mục III\n📖 Điều khoản: Quyết định 749/QĐ-TTg\nMục III – Nhiệm vụ, giải pháp\nNhóm giải pháp:\nchuyển đổi nhận thức\ntổ chức và thay đổi cách làm việc"},{"id":374,"stt":14,"chapter":"VIII. ỨNG DỤNG THỰC TIỄN – TÌNH HUỐNG","topic":"VIII.3. Kịch bản chuyển đổi số tại chi nhánh","topicCode":"VIII.3","question":"Một ngân hàng đã đầu tư nguồn ngân sách lớn để mua sắm và triển khai nhiều hệ thống công nghệ số, nhưng hiệu quả vận hành thực tế và chất lượng dịch vụ không có sự cải thiện rõ rệt. Theo các quan điểm chỉ đạo tại Chương trình Chuyển đổi số quốc gia đến năm 2025, định hướng đến năm 2030 (Quyết định số 749/QĐ-TTg), nguyên nhân dẫn đến sự lãng phí và kém hiệu quả này là gì?","options":{"A":"Chỉ coi chuyển đổi số là việc mua sắm công nghệ đắt tiền mà bỏ qua việc đánh giá sự tương thích của các hệ thống phần mềm với nhau","B":"Chưa áp đặt các chỉ tiêu (KPI) bắt buộc đủ cứng rắn để ép buộc nhân sự và khách hàng phải từ bỏ phương thức giao dịch truyền thống","C":"Ứng dụng công nghệ nhưng chưa gắn liền với việc tái cấu trúc quy trình nghiệp vụ và chưa lấy trải nghiệm của khách hàng làm trung tâm","D":"Giao phó toàn bộ trách nhiệm đánh giá hiệu quả chuyển đổi số cho đội ngũ nhân viên cấp dưới thay vì ban lãnh đạo"},"correct":"C","explanation":"Quyết định 749/QĐ-TTg\nNghị quyết 57-NQ/TW\n📖 Điều khoản: - Quyết định 749/QĐ-TTg\nMục tiêu: phát triển kinh tế số\nnâng cao hiệu quả hoạt động\n- Nghị quyết 57-NQ/TW\nMục tiêu: nâng cao hiệu quả quản trị và chất lượng dịch vụ"},{"id":375,"stt":15,"chapter":"VIII. ỨNG DỤNG THỰC TIỄN – TÌNH HUỐNG","topic":"VII.3. Kịch bản chuyển đổi số tại chi nhánh","topicCode":"VII.3","question":"Chi nhánh muốn điều chỉnh quy trình số hóa để phù hợp với đặc thù địa phương (khách hàng lớn tuổi, ít dùng công nghệ). Tuy nhiên, hệ thống được thiết kế theo chuẩn chung toàn hệ thống.\nTheo quan điểm và định hướng tại Chương trình Chuyển đổi số quốc gia đến năm 2025, định hướng đến năm 2030 (Quyết định số 749/QĐ-TTg), cách tiếp cận nào sau đây là chuẩn xác nhất để giải quyết tình huống này?","options":{"A":"Cho phép chi nhánh tùy biến toàn bộ quy trình theo nhu cầu địa phương","B":"Giữ nguyên toàn bộ quy trình chuẩn, không cho phép thay đổi","C":"Tuân thủ kiến trúc nền tảng và dữ liệu tập trung của toàn hệ thống, nhưng kết hợp linh hoạt trong phương thức triển khai và bố trí nhân sự hỗ trợ trực tiếp người dân","D":"Mỗi chi nhánh tự xây dựng quy trình riêng"},"correct":"C","explanation":"Quyết định 749/QĐ-TTg\n📖 Điều khoản: Mục III – Nhiệm vụ, giải pháp\n\nPhát triển:\nnền tảng số dùng chung\nnhưng cho phép triển khai linh hoạt theo thực tế"},{"id":376,"stt":16,"chapter":"VIII. ỨNG DỤNG THỰC TIỄN – TÌNH HUỐNG","topic":"VIII.3. Kịch bản CĐS tại chi nhánh","topicCode":"VIII.3","question":"Chi nhánh đang báo cáo thành công chuyển đổi số dựa trên số lượng hệ thống đã triển khai. Tuy nhiên, lãnh đạo yêu cầu đánh giá lại hiệu quả thực chất.\nTheo các mục tiêu và quan điểm cốt lõi tại Chương trình Chuyển đổi số quốc gia đến năm 2025, định hướng đến năm 2030 (Quyết định số 749/QĐ-TTg), thước đo nào sau đây mới phản ánh đúng bản chất và hiệu quả thực tế của quá trình chuyển đổi số?","options":{"A":"Số lượng phần mềm, nền tảng, hệ thống công nghệ thông tin đã được đầu tư, triển khai trong đơn vị.","B":"Mức độ cải thiện hiệu quả hoạt động, chất lượng phục vụ người dân/doanh nghiệp, giảm chi phí, tăng năng suất và tạo ra giá trị mới từ dữ liệu, dịch vụ số.","C":"Số lượng văn bản, kế hoạch, chương trình hành động về chuyển đổi số đã được ban hành","D":"Số lượng cán bộ được cấp tài khoản truy cập vào các hệ thống số nội bộ."},"correct":"B","explanation":"Quyết định 749/QĐ-TTg\n📖 Điều khoản: Mục II. Mục tiêu cơ bản: nêu các mục tiêu về nâng cao hiệu quả, hiệu lực hoạt động; phát triển kinh tế số; năng suất lao động; dịch vụ công; dữ liệu và dịch vụ sáng tạo.\nMục III. Quan điểm, khoản 2: Người dân là trung tâm của chuyển đổi số.\nMục III. Quan điểm, khoản 4: Phát triển nền tảng số... giảm chi phí, tăng hiệu quả."},{"id":377,"stt":17,"chapter":"VIII. ỨNG DỤNG THỰC TIỄN – TÌNH HUỐNG","topic":"VIII.4. Rủi ro khi triển khai ngân hàng số","topicCode":"VIII.4","question":"Theo quy định tại Thông tư 09/2020/TT-NHNN, khi xây dựng mới hoặc nâng cấp hệ thống thông tin, tổ chức tín dụng bắt buộc phải hoàn thành thủ tục nào sau đây trước khi đưa hệ thống vào vận hành chính thức?","options":{"A":"Cài đặt sẵn các công cụ, phương tiện phát triển ứng dụng ngay trên môi trường vận hành để bộ phận IT có thể kịp thời chỉnh sửa nếu phát sinh lỗi.","B":"Có thể đưa hệ thống lên chạy thử nghiệm trực tiếp trên môi trường vận hành thật (production) nhằm tiết kiệm chi phí","C":"Tổ chức phải thực hiện phân loại hệ thống thông tin theo cấp độ","D":"Chỉ cần đối tác cung cấp phần mềm (bên thứ ba) gửi email cam kết hệ thống đã an toàn là đủ điều kiện triển khai, không cần phê duyệt nội bộ."},"correct":"C","explanation":"Khi xây dựng mới hoặc nâng cấp hệ thống thông tin do tổ chức quản lý trực tiếp, tổ chức phải thực hiện phân loại hệ thống thông tin theo cấp độ\n📖 Điều khoản: Điều 37, Thông tư 09/2020/TT-NHNN"},{"id":378,"stt":18,"chapter":"VIII. ỨNG DỤNG THỰC TIỄN – TÌNH HUỐNG","topic":"VIII.4. Rủi ro khi triển khai ngân hàng số","topicCode":"VIII.4","question":"Trong quá trình triển khai Ngân hàng mở (Open Banking), một ngân hàng tiến hành kết nối, chia sẻ dữ liệu khách hàng cho các đối tác công nghệ (bên thứ ba) nhưng không thiết lập cơ chế kiểm soát chặt chẽ quyền truy cập. Theo quy định tại Nghị định 356/2025/NĐ-CP, hành vi này dẫn đến hệ quả/rủi ro pháp lý trực tiếp nào sau đây?","options":{"A":"Tăng tốc tích hợp","B":"Giảm chi phí vận hành","C":"Tăng số lượng giao dịch","D":"Vi phạm bảo vệ dữ liệu cá nhân"},"correct":"D","explanation":"Việc ngân hàng chia sẻ dữ liệu trong mô hình Open Banking mà không kiểm soát đầy đủ quyền truy cập của bên thứ ba là hành vi vi phạm nghiêm trọng các nghĩa vụ bảo vệ an toàn dữ liệu. Theo Nghị định 356/2025/NĐ-CP (điều 9, 12, 20)"},{"id":379,"stt":19,"chapter":"VIII. ỨNG DỤNG THỰC TIỄN – TÌNH HUỐNG","topic":"VIII.4. Rủi ro khi triển khai ngân hàng số","topicCode":"VIII.4","question":"Một nhân viên nội bộ có quyền truy cập cao lạm dụng quyền để lấy dữ liệu khách hàng. Theo Quy định tại Thông tư 09/2020/TT-NHNN, đây là hệ quả của rủi ro công nghệ thông tin liên quan trực tiếp đến yếu tố nào dưới đây?","options":{"A":"Quy trình vận hành","B":"Bên thứ ba","C":"Con người","D":"Pháp lý"},"correct":"C","explanation":"Căn cứ Khoản 1 Điều 2 Thông tư 09/2020/TT-NHNN, Rủi ro công nghệ thông tin được định nghĩa là rủi ro liên quan đến \"quản lý, sử dụng phần cứng, phần mềm, truyền thông, giao diện hệ thống, vận hành và con người\"\nHành vi lạm quyền của nhân viên chính là rủi ro phát sinh từ yếu tố \"con người\" trong tổ chức."},{"id":380,"stt":20,"chapter":"VIII. ỨNG DỤNG THỰC TIỄN – TÌNH HUỐNG","topic":"VIII.4. Rủi ro khi triển khai ngân hàng số","topicCode":"VIII.4","question":"Ngân hàng không có phương án dự phòng (DRP) cho hệ thống trọng yếu. Rủi ro lớn nhất tổ chức phải đối mặt khi xảy ra sự cố là gì?","options":{"A":"Gián đoạn hoạt động liên tục","B":"Không ảnh hưởng","C":"Tăng hiệu suất","D":"Giảm chi phí"},"correct":"A","explanation":"Phương án dự phòng và khôi phục (DRP) là yêu cầu nhằm đảm bảo hệ thống có thể duy trì hoặc khôi phục hoạt động khi xảy ra sự cố, tránh gián đoạn dịch vụ.\n📖 Điều khoản: Thông tư 09/2020/TT-NHNN: Điều 33, 41"},{"id":381,"stt":21,"chapter":"VIII. ỨNG DỤNG THỰC TIỄN – TÌNH HUỐNG","topic":"VIII.4. Rủi ro khi triển khai ngân hàng số","topicCode":"VIII.4","question":"Theo quy định tại Thông tư 09/2020/TT-NHNN, để giám sát và phát hiện sớm các sự cố an toàn thông tin, tổ chức bắt buộc phải áp dụng biện pháp quản lý dữ liệu nhật ký (log) đối với các hệ thống thông tin từ cấp độ 3 trở lên theo nguyên tắc nào sau đây?","options":{"A":"Được phép lưu trữ nhật ký phân tán tại từng máy chủ ứng dụng cục bộ nhằm tiết kiệm chi phí đầu tư hệ thống lưu trữ dùng chung","B":"Phải thu thập, lưu trữ nhật ký theo hình thức tập trung và xây dựng hệ thống SIEM để phân tích, cảnh báo tự động","C":"Chỉ bắt buộc ghi nhật ký và giám sát tập trung đối với những giao dịch chuyển tiền điện tử liên ngân hàng có giá trị từ 100 triệu đồng trở lên","D":"Có thể phân công nhân sự công nghệ thông tin tự kiểm tra, phân tích nhật ký thủ công định kỳ hằng ngày thay vì phải đầu tư hệ thống phân tích sự kiện"},"correct":"B","explanation":"Căn cứ theo khoản 2 Điều 26 Thông tư 09/2020/TT-NHNN, dữ liệu nhật ký của hệ thống thông tin từ cấp độ 3 trở lên phải được lưu trữ trực tuyến tối thiểu 3 tháng theo hình thức tập trung. Điểm b khoản 2 Điều 47 quy định bắt buộc phải Xây dựng hệ thống quản lý và phân tích sự kiện an toàn thông tin (SIEM) để thu thập, lưu trữ tập trung nhật ký hệ thống cấp độ 3\n📖 Điều khoản: Thông tư 09/2020/TT-NHNN: Điều 26, 47"},{"id":382,"stt":22,"chapter":"VIII. ỨNG DỤNG THỰC TIỄN – TÌNH HUỐNG","topic":"VIII.4. Rủi ro khi triển khai ngân hàng số","topicCode":"VIII.4","question":"Trong ngân hàng số, việc mã hóa dữ liệu (encryption) có vai trò gì?","options":{"A":"Tăng dung lượng lưu trữ dữ liệu","B":"Bảo vệ dữ liệu khỏi truy cập trái phép","C":"Giảm tốc độ hệ thống","D":"Không cần thiết"},"correct":"B","explanation":"Mã hóa là biện pháp bảo vệ dữ liệu theo TT09/2020/NHNN; Nghị định 356/2025/NĐ-CP\n📖 Điều khoản: Nghị định 356/2025/NĐ-CP, Điều 7, 9, 12"},{"id":383,"stt":23,"chapter":"VIII. ỨNG DỤNG THỰC TIỄN – TÌNH HUỐNG","topic":"VIII.4. Rủi ro khi triển khai NH số","topicCode":"VIII.4","question":"Để tối ưu hóa chi phí vận hành ngân hàng số, một ngân hàng quyết định thuê dịch vụ Điện toán đám mây (Cloud Computing) để lưu trữ dữ liệu cá nhân của khách hàng. Căn cứ theo Nghị định 356/2025/NĐ-CP, để phòng ngừa rủi ro rò rỉ dữ liệu, ngân hàng bắt buộc phải tuân thủ nguyên tắc kỹ thuật nào sau đây đối với khối dữ liệu này?","options":{"A":"Chỉ bắt buộc mã hóa dữ liệu trong quá trình truyền tải, không cần mã hóa khi lưu trữ tĩnh nếu nhà cung cấp Cloud là các tập đoàn công nghệ lớn.","B":"Giao phó toàn bộ quyền quyết định về phân quyền truy cập dữ liệu cho nhà cung cấp dịch vụ đám mây quản lý để đồng bộ hệ thống","C":"Dữ liệu cá nhân phải được mã hoá ở trạng thái nghỉ và truyền, kèm theo phân quyền truy cập nghiêm ngặt.","D":"Không bắt buộc phải mã hóa nếu ngân hàng đã đưa điều khoản \"khách hàng tự chịu rủi ro lộ lọt\" vào hợp đồng mở tài khoản"},"correct":"C","explanation":"Theo khoản 4 Điều 12 Nghị định 356/2025/NĐ-CP, pháp luật quy định bắt buộc: \"Dữ liệu cá nhân trên điện toán đám mây phải được mã hoá ở trạng thái nghỉ và truyền, kèm theo phân quyền truy cập nghiêm ngặt\""},{"id":384,"stt":24,"chapter":"VIII. ỨNG DỤNG THỰC TIỄN – TÌNH HUỐNG","topic":"VIII.5. Ứng dụng công nghệ thông tin trong hoạt động Công đoàn","topicCode":"VIII.5","question":"Công đoàn quản lý đoàn viên bằng file Excel rời rạc, khó tổng hợp. Theo định hướng của Quyết định 749/QĐ-TTg, giải pháp nào là phù hợp nhất để giải quyết tình trạng trên?","options":{"A":"Tăng số lượng file Excel","B":"In danh sách giấy","C":"Số hóa tài sản thông tin và xây dựng hệ thống cơ sở dữ liệu quản lý tập trung, thông suốt.","D":"Giảm số lượng đoàn viên"},"correct":"C","explanation":"Phát triển dữ liệu số, nền tảng số\n📖 Điều khoản: Theo Quyết định 749/QĐ-TTg, một cơ quan, tổ chức có thể tiến hành chuyển đổi số ngay thông qua việc số hóa toàn bộ tài sản thông tin của mình\nĐồng thời, trong nhiệm vụ phát triển Chính phủ số, Quyết định cũng nhấn mạnh việc phát triển hạ tầng số và cơ sở dữ liệu một cách tập trung, thông suốt"},{"id":385,"stt":25,"chapter":"VIII. ỨNG DỤNG THỰC TIỄN – TÌNH HUỐNG","topic":"VIII.5. Ứng dụng công nghệ thông tin trong hoạt động Công đoàn","topicCode":"VIII.5","question":"Công đoàn đã triển khai app + website + chatbot (đa kênh) nhưng tỷ lệ đoàn viên tương tác vẫn rất thấp. Theo định hướng của Quyết định 749/QĐ-TTg, giải pháp nào là phù hợp nhất?","options":{"A":"Tiếp tục phát triển thêm kênh mới","B":"Tăng số lượng thông báo gửi đến đoàn viên","C":"Đánh giá lại dịch vụ, tái thiết kế trải nghiệm dựa trên nhu cầu thực tế của người dùng","D":"Giảm đầu tư vào kênh số"},"correct":"C","explanation":"Quyết định 749/QĐ-TTg – lấy người dùng làm trung tâm, nâng cao trải nghiệm số"},{"id":386,"stt":26,"chapter":"VIII. ỨNG DỤNG THỰC TIỄN – TÌNH HUỐNG","topic":"VIII.5. Ứng dụng công nghệ thông tin trong hoạt động Công đoàn","topicCode":"VIII.5","question":"Công đoàn đã triển khai nền tảng quản lý sự kiện trực tuyến, nhưng nhiều đơn vị trực thuộc vẫn duy trì lập danh sách bằng Excel và thực hiện các quy trình phê duyệt thủ công song song với hệ thống mới. Dựa trên quan điểm và nhiệm vụ của Quyết định số 749/QĐ-TTg, giải pháp nào sau đây là phù hợp và mang tính căn cơ nhất để giải quyết tình trạng này?","options":{"A":"Cho phép duy trì song song để đảm bảo linh hoạt","B":"Chuẩn hóa quy trình nghiệp vụ và yêu cầu chuyển đổi hoàn toàn các bước xử lý sang môi trường số","C":"Tăng đào tạo sử dụng hệ thống","D":"Giữ nguyên quy trình làm việc, nâng cấp thêm tính năng"},"correct":"B","explanation":"Quyết định 749/QĐ-TTg – chuyển đổi số là thay đổi tổng thể (con người, quy trình, công nghệ)\n📖 Điều khoản: Mục III\n\nYêu cầu:\nchuyển đổi số toàn diện\ntránh tình trạng song song thủ công – số"},{"id":387,"stt":27,"chapter":"VIII. ỨNG DỤNG THỰC TIỄN – TÌNH HUỐNG","topic":"VIII.5. Ứng dụng công nghệ thông tin trong hoạt động Công đoàn","topicCode":"VIII.5","question":"Công đoàn đã triển khai hệ thống báo cáo số, nhưng dữ liệu thu thập từ các đơn vị lại thiếu đồng bộ, phân tán và không thống nhất, khiến cấp lãnh đạo thiếu cơ sở tin cậy để ra quyết định. Căn cứ theo định hướng phát triển Chính phủ số tại Quyết định số 749/QĐ-TTg, giải pháp cốt lõi nào sau đây cần được ưu tiên thực hiện để giải quyết triệt để vấn đề này?","options":{"A":"Tăng tần suất báo cáo","B":"Xây dựng chiến lược quản trị dữ liệu, chuẩn hóa biểu mẫu báo cáo và kết nối cơ sở dữ liệu một cách tập trung, thông suốt.","C":"Tăng nhân sự kiểm tra","D":"Thay thế hệ thống khác"},"correct":"B","explanation":"Quyết định 749/QĐ-TTg – phát triển dữ liệu số, đảm bảo chất lượng và tính tin cậy\n📖 Điều khoản: Mục III\nKết nối, chia sẻ dữ liệu\nxây dựng hệ sinh thái dữ liệu"},{"id":388,"stt":28,"chapter":"VIII. ỨNG DỤNG THỰC TIỄN – TÌNH HUỐNG","topic":"VIII.5. Ứng dụng công nghệ thông tin trong hoạt động Công đoàn","topicCode":"VIII.5","question":"Hệ thống cho phép người dùng đăng ký dịch vụ nhưng không có cơ chế xác thực danh tính.\nRủi ro lớn nhất là gì?","options":{"A":"Tăng trải nghiệm","B":"Giảm chi phí","C":"Không đảm bảo tính xác thực và pháp lý","D":"Tăng số lượng người dùng"},"correct":"C","explanation":"Luật Giao dịch điện tử 2023\n📖 Điều khoản: Điều 6 – Nguyên tắc\nBảo đảm:\nan toàn, tin cậy trong giao dịch điện tử"},{"id":389,"stt":29,"chapter":"VIII. ỨNG DỤNG THỰC TIỄN – TÌNH HUỐNG","topic":"VIII.5. Ứng dụng CNTT trong hoạt động Công đoàn","topicCode":"VIII.5","question":"Theo Nghị quyết số 57-NQ/TW, để khắc phục tình trạng các hoạt động công đoàn được triển khai đồng loạt, \"cào bằng\" cho mọi đoàn viên, giải pháp nâng cao chất lượng dịch vụ số cần hướng tới là gì?","options":{"A":"Tăng cường ngân sách và nhân sự cho các hoạt động quy mô lớn","B":"Cá nhân hóa hoạt động dựa trên dữ liệu người dùng","C":"Cắt giảm bớt số lượng hoạt động để tiết kiệm nguồn lực","D":"Khảo sát nhu cầu đoàn viên thông qua phiếu giấy thủ công."},"correct":"B","explanation":"Nghị quyết 57-NQ/TW\n📖 Điều khoản: Định hướng\nPhát triển: dữ liệu nâng cao chất lượng dịch vụ phục vụ người dân"},{"id":390,"stt":30,"chapter":"VIII. ỨNG DỤNG THỰC TIỄN – TÌNH HUỐNG","topic":"VIII.6. Phân tích sản phẩm ngân hàng số","topicCode":"VIII.6","question":"QR Code Payment là gì?","options":{"A":"Thanh toán bằng thẻ từ","B":"Thanh toán bằng cách quét mã QR","C":"Thanh toán bằng tiền mặt","D":"Thanh toán qua email"},"correct":"B","explanation":"Điều 3 - Thông tư 15/2024/TT-NHNN"},{"id":391,"stt":31,"chapter":"VIII. ỨNG DỤNG THỰC TIỄN – TÌNH HUỐNG","topic":"VIII.6. Phân tích sản phẩm ngân hàng số","topicCode":"VIII.6","question":"Cơ quan quản lý dữ liệu định danh và xác thực điện tử của Khách hàng là gì?","options":{"A":"NHNN","B":"Bộ Công an","C":"Bộ Thông tin và truyền thông","D":"Bộ Tài chính"},"correct":"B","explanation":"Điều 3 - Nghị định 59/2022/NĐ-CP"},{"id":392,"stt":32,"chapter":"VIII. ỨNG DỤNG THỰC TIỄN – TÌNH HUỐNG","topic":"VIII.6. Phân tích sản phẩm ngân hàng số","topicCode":"VIII.6","question":"Phương thức nào KHÔNG phải là phương thức xác thực?","options":{"A":"Password","B":"OTP","C":"D-OTP","D":"Mã hóa dữ liệu"},"correct":"D","explanation":"Điều 11 - Thông tư 50/2024/TT-NHNN"},{"id":393,"stt":33,"chapter":"VIII. ỨNG DỤNG THỰC TIỄN – TÌNH HUỐNG","topic":"VIII.6. Phân tích sản phẩm ngân hàng số","topicCode":"VIII.6","question":"Thẻ tín dụng (Credit Card) cho phép:","options":{"A":"Chỉ rút tiền mặt","B":"Không thanh toán được online","C":"Sử dụng dưới hình thức dùng trước - trả sau","D":"Phải nộp tiền vào thẻ mới sử dụng được"},"correct":"C","explanation":"Điều 16 - Thông tư 18/2024/TT-NHNN"},{"id":394,"stt":34,"chapter":"VIII. ỨNG DỤNG THỰC TIỄN – TÌNH HUỐNG","topic":"VIII.6. Phân tích sản phẩm ngân hàng số","topicCode":"VIII.6","question":"Theo Thông tư số 16/2020/TT-NHNN, Chủ tài khoản thanh toán có thể là:","options":{"A":"Cá nhân","B":"Tổ chức","C":"Doanh nghiệp nhà nước","D":"Cả A và B"},"correct":"D","explanation":"Điều 12 - Thông tư số 16/2020/TT-NHNN"},{"id":395,"stt":35,"chapter":"VIII. ỨNG DỤNG THỰC TIỄN – TÌNH HUỐNG","topic":"VIII.6. Phân tích sản phẩm ngân hàng số","topicCode":"VIII.6","question":"Khái niệm eKYC trong ngân hàng số là gì?","options":{"A":"Hình thức thanh toán điện tử","B":"Định danh khách hàng điện tử","C":"Mã hóa dữ liệu","D":"Xác thực OTP"},"correct":"B","explanation":"Điều 16 - Thông tư 17/2024/TT-NHNN"},{"id":396,"stt":36,"chapter":"VIII. ỨNG DỤNG THỰC TIỄN – TÌNH HUỐNG","topic":"VIII.7. Bài học mô hình ngân hàng số thành công","topicCode":"VIII.7","question":"Để hướng tới mô hình ngân hàng số thành công, tạo điều kiện cho Khách hàng cá nhân tiếp cận vay vốn nhỏ lẻ một cách thuận tiện, một trong những giải pháp các Ngân hàng cần hướng tới là gì?","options":{"A":"Yêu cầu phải gặp mặt trực tiếp 3 lần","B":"Số hóa 100% quy trình cho vay nhỏ lẻ, giá trị nhỏ của Khách hàng cá nhân","C":"Bắt buộc phải thế chấp tài sản lớn","D":"Chỉ cho vay qua sổ hộ khẩu giấy"},"correct":"B","explanation":"Quyết định số 3579/QĐ-NHNN ngày 03/11/2025\n📖 Điều khoản: Mục III.2.b"},{"id":397,"stt":37,"chapter":"VIII. ỨNG DỤNG THỰC TIỄN – TÌNH HUỐNG","topic":"VIII.7. Bài học mô hình ngân hàng số thành công","topicCode":"VIII.7","question":"Một trong những giải pháp tại Quyết định 3579/QĐ-NHNN ngày 3/11/2025 hướng tới hỗ trợ, tạo điều kiện thuận lợi cho khách hàng tiếp cận, vay vốn bằng phương tiện điện tử là gì?","options":{"A":"Nghiên cứu áp dụng các giải pháp chấm điểm tín dụng tự động với kho dữ liệu khách hàng, kho dữ liệu mở , dữ liệu bên thứ 3 và mô hình chấm điểm đáng tin cậy.","B":"Cán bộ quan hệ khách hàng và cán bộ thẩm định trực tiếp giúp khách hàng xử lý hồ sơ","C":"Cán bộ quan h
